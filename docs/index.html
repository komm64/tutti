h.","h3Install":"3. Install / account questions","installBody":"Tutti <strong>reuses your existing browser logins</strong> for each social network. There's no separate Tutti account or login step. Once you're logged in to a social network in the same Chrome profile, Tutti can post from there.","h2Faq":"FAQ","q1":"Q. My post failed.","a1":"This usually means a social network changed its DOM. Use <strong>Diagnose &rarr; Report</strong> in the popup. A selector hot-fix usually ships within days via <code>selectors.json</code> auto-update (no extension update required).","q2":"Q. Tutti doesn't remember my login.","a2":"Tutti relies on the network's normal browser login. Log in to each network in Chrome first, then Tutti can post on your behalf. Incognito mode doesn't work because the network sessions aren't there.","q3":"Q. Character limits differ per network — is that a problem?","a3":"No. Long posts that exceed a network's character limit are automatically split into a continuation thread (on X, a proper reply chain; on other networks, sequential posts). Posts within the limit go through as-is.","q4":"Q. I'm told my image / video is too large.","a4":"Images are auto-resized via Canvas to fit each network's size limit. Videos are auto-compressed with ffmpeg.wasm when above a network's cap. If even compression can't fit, you'll see an error — please verify the file uploads via the network's native app first.","q5":"Q. Does Tutti see my post content?","a5":"No. Post content never passes through a third-party server. Tutti injects directly into each network's web compose page. See our <a href=\"./privacy.html\">Privacy Policy</a> for details. The only exception is when you press the in-product Report button, which sends redacted error information to our private issue tracker.","q6":"Q. Can I donate?","a6":"Yes! The biggest ongoing cost is keeping up with each social network's UI changes. Any support is appreciated:"}},"eo":{"lang":"eo","common":{"appName":"Tutti","tagline":"Unu Chrome-etendaĵo. Dek unu sociaj retoj. Nul ĝeno.","navHome":"Hejmo","navGitHub":"GitHub","navSupport":"Subteno","navPrivacy":"Politiko pri privateco","navLanguages":"Aliaj lingvoj","footerCopy":"&copy; 2026 komm64 &mdash; <a href=\"https://github.com/komm64/tutti/blob/main/LICENSE\">Ĉiuj rajtoj rezervitaj</a>","footerContact":"Tutti estas Chrome-etendaĵo de <a href=\"https://github.com/komm64\">komm64</a>. Kontakto: <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>"},"index":{"title":"Tutti — Etendaĵo por krucpoŝti","headerTagline":"Unu Chrome-etendaĵo. Dek unu sociaj retoj. Nul ĝeno.","h2Overview":"Superrigardo","overviewBody":"Tutti dissendas la saman afiŝon al 11 sociaj retoj (X, Bluesky, Threads, Tumblr, Mastodon, Misskey, Pixiv, TikTok, YouTube Shorts, Instagram, DeviantArt) per unu klako. Ĝi ne havas malantaŭon; afiŝa enhavo neniam pasas tra iu ajn triaparta servilo.","h2PrivacySummary":"Privateco en unu frazo","privacySummaryBody":"Tutti ne havas malantaŭan servilon. Afiŝa enhavo (teksto, bildoj, video) iras rekte de via retumilo al ĉiu socia reto, kiun vi elektas — neniam tra iu ajn servilo kontrolata de la programisto.","privacyFullPolicy":"Plena politiko:"},"privacy":{"title":"Tutti — Politiko pri privateco","headerTagline":"Neniu triaparta datenkolekto. Ĉiu afiŝa enhavo iras rekte de via retumilo al ĉiu SNS.","lastUpdated":"Lastfoje ĝisdatigita: 2026-05-23 (v0.5.0)","h2Data":"1. Datumoj, kiujn ni kolektas kaj transdonas","dataIntro":"<strong>Tutti ne havas malantaŭan servilon.</strong> Afiŝa enhavo (teksto, bildoj, video) neniam estas transdonita al iu ajn triaparta servilo. Ĝi vojaĝas rekte de via retumilo al ĉiu socia reto, kiun vi elektas, ekzakte kvazaŭ vi mem tajpis kaj sendis ĝin tie.","dataLi1":"Afiŝa teksto, bildoj kaj video estas transdonitaj nur al la SNS-paĝoj, kiujn vi elektas (X, Bluesky, Threads, Mastodon, Misskey, Tumblr, Pixiv, DeviantArt, Instagram, TikTok, YouTube) ene de via retumilo.","dataLi2":"Kiam la laŭvola oficiala API-vojo estas ebligita por Bluesky / Mastodon / Misskey, afiŝoj estas senditaj rekte de via retumilo al la <strong>propra API-servilo de tiu SNS</strong> uzante la akreditaĵojn, kiujn vi provizis en Agordoj. Neniu Tutti / programista servilo estas implikita.","dataLi3":"Neniaj analizaj, spurad-aj aŭ reklamaj datumoj estas kolektitaj.","dataLi4":"Tutti <strong>ne</strong> legas aŭ konservas viajn aŭtentigajn ĵetonojn, kuketojn aŭ seancajn datumojn de la SNS-paĝaroj.","h3Report":"Escepto — manaj erar-raportoj (konsento per klako)","reportIntro":"Kiam (kaj nur kiam) vi premas la <strong>butonon &laquo;Raporti&raquo;</strong> montrita en erara dialogujo aŭ diagnoza panelo, la sekvanta estas sendita per Cloudflare Workers relais al <strong>privata GitHub-issue-spuristo</strong> (<code>komm64/tutti-issues</code>, videbla nur al la Tutti-programisto):","reportLi1":"La erar-mesaĝo, la etendaĵo-versio, la User-Agent-ĉeno de la retumilo.","reportLi2":"La lastaj 30 enskriboj de la interna protokolo de la etendaĵo (la protokol-nivelo, kiun vi agordis; INFO defaŭlte). Afiŝa enhavo, bildoj, video, SNS-ensalutaj datumoj kaj API-akreditaĵoj <strong>neniam</strong> estas inkluzivitaj.","reportLi3":"Redaktita DOM-foto de la SNS-langeto, kie okazis la eraro, uzata por ripari rompitajn elektilojn. Tekstoenhavo, atributaj valoroj, URL-vojoj/-demandoj/-fragmentoj, atributoj <code>href</code>/<code>src</code> kaj etikedoj <code>&lt;meta&gt;</code>/<code>&lt;link&gt;</code> estas forigitaj. La ŝarĝo estas limigita al 8 KB. Vidu <a href=\"https://github.com/komm64/tutti/blob/main/src/utils/dom-snapshot.ts\">dom-snapshot.ts</a> por la efektivigo.","reportOutro":"Nenio estas sendita ĝis vi premas la raport-butonon. La celloko estas privata, videbla nur al la Tutti-programisto.","h2Local":"2. Loke konservitaj datumoj","localIntro":"La sekvantaj estas konservitaj nur ene de via retumilo per la <code>storage</code>-API de Chrome. Nenio estas transdonita ekster la aparato de Tutti.","localSettings":"<strong>Agordoj</strong> (<code>chrome.storage.sync</code>): URL-oj de Mastodon-/Misskey-instancoj, autoPost-baskulo, aspekt-reĝimo, elektilo-superregila URL ktp. Povas esti reproduktita al viaj aliaj aparatoj per Chrome Sync, se vi estas ensalutinta al Chrome.","localDrafts":"<strong>Malnetoj</strong> (<code>chrome.storage.session</code>): Afiŝa teksto en progreso kaj ligitaj amaskomunikiloj (bildoj / video). Aŭtomate forviŝita kiam la retumilo finiĝas.","localSelected":"<strong>Elektitaj SNS</strong> (<code>chrome.storage.local</code>): La SNS, kiujn vi markis kiel afiŝajn celojn. Persistas inter seancoj por komforto; nur loka al la aparato.","localUsers":"<strong>Lastaj viditaj uzantnomoj</strong> (<code>chrome.storage.local</code>): La nuntempe ensalutita uzantnomo en ĉiu SNS, montrita en la ŝprucfenestro por ke vi povu konfirmi, kiu konto ricevos la afiŝon. Nur loka al la aparato.","localHistory":"<strong>Afiŝa historio</strong> (<code>chrome.storage.local</code>): La lastaj 20 afiŝoj: la unuaj 80 signoj de teksto, celplatformoj, sukceso/malsukceso per platformo kaj tempomarko. Nur loka al la aparato.","localCreds":"<strong>API-akreditaĵoj</strong> (<code>chrome.storage.local</code>): Nur se vi eksplicite ebligis la oficialan API-vojon por Bluesky / Mastodon / Misskey: via Bluesky app password aŭ aliro-ĵetono de Mastodon / Misskey. <strong>Nur loka al la aparato; neniam reproduktita per Chrome Sync; neniam transdonita al iu ajn programista servilo.</strong> Forigebla el la Agordoj-asistanto.","localSelectors":"<strong>Kaŝmemoro de elektilo-superregilo</strong> (<code>chrome.storage.local</code>): Elektilo-hotfix-datumoj prenitaj de la URL, kiun vi agordis en Agordoj (defaŭlta: la publika <code>selectors.json</code> sur la GitHub Pages de Tutti).","localVideoCap":"<strong>Kaŝmemoro de video-alŝuto-limo</strong> (<code>chrome.storage.local</code>): Rezulto de API-sondoj por video-alŝuto-limoj per konto (ekz. Bluesky). Nur numeraj valoroj; neniaj akreditaĵoj.","localWipe":"Ĉio ĉi povas esti forigita iam ajn malinstalante la etendaĵon aŭ purigante la etendaĵan stokadon de Chrome.","h2Perms":"3. Uzataj permesoj","permsThead1":"Permeso","permsThead2":"Celo","permsStorage":"Konservi la suprajn lokajn datumojn (agordoj, malnetoj, historio, elektitaj platformoj, ktp.) ene de via retumilo.","permsOffscreen":"Funkciigi <code>ffmpeg.wasm</code> en ekstera dokumento por kunpremi / re-kodigi videodosierojn, kiam la fonto superas la grandec-limon de la cela SNS. Videodatenoj estas prilaboritaj nur loke; ne transdonitaj ie ajn de Tutti.","permsSidePanel":"Laŭvola UI-aspekt-reĝimo: montras la verkadan formularon de Tutti en la flanka panelo de Chrome anstataŭ la ago-ŝprucfenestro, por ke ĝi restu malfermita dum vi ŝanĝas inter SNS-langetoj. Vi elektas el la paĝo de Opcioj; la defaŭlta estas la norma ŝprucfenestro.","permsHost":"Injekti content-skriptojn en ĉiun SNS-retejon (x.com / twitter.com / bsky.app / bsky.social / threads.net / threads.com / mastodon.social / misskey.io / tumblr.com / pixiv.net / tiktok.com / youtube.com / instagram.com / deviantart.com) por plenigi la verkadan formularon kun via afiŝa enhavo kaj sendi ĝin nome de vi. Neniaj datumoj estas legitaj el ĉi tiuj retejoj kaj senditaj aliloken; la content-skripto skribas nur vian propran enigon.","permsOptHost":"Petita ĉe rultempo nur se vi agordas kutiman URL-on de Mastodon- aŭ Misskey-instanco (krom la defaŭltaj). Chrome montras la norman permes-inviton tiumomente.","h2Relationship":"4. Rilato kun la SNS-provizantoj","relationshipBody":"Tutti aŭtomatigas la retan UI de (aŭ, laŭvole, afiŝas per la oficiala API de) la 11 subtenataj retoj. Ĉi tio estas neoficiala funkcio; Tutti ne estas asociita kun X, Bluesky, Meta (Threads / Instagram), Mastodon gGmbH, Misskey, Tumblr, Pixiv, DeviantArt, TikTok aŭ YouTube. Vi restas ligita al la propraj uzkondiĉoj de ĉiu servo.","h2Contact":"5. Kontakto","contactGitHub":"GitHub Issues:","contactEmail":"Retpoŝto:","h2Changes":"6. Ŝanĝoj al ĉi tiu politiko","changesBody":"Ĝisdatigoj al ĉi tiu politiko estas komunikitaj per ĝisdatigo de ĉi tiu paĝo kaj la kanona fontodosiero (<a href=\"https://github.com/komm64/tutti/blob/main/PRIVACY.md\">PRIVACY.md</a>)."},"support":{"title":"Tutti — Subteno","headerTagline":"Subtenaj rimedoj kaj FAQ","h2Help":"Bezonas helpon?","h3Failed":"1. Afiŝado malsukcesis / io kondutas strange","failedBody":"Uzu la <strong>butonon &laquo;Diagnozi&raquo; → &laquo;Raporti&raquo; ene de la ŝprucfenestro</strong>. Ĉi tio estas la kanona kanalo. La raporto estas redaktita (uzantnomoj, URL-oj, retpoŝtoj) kaj transsendita al nia privata issue-spuristo, kie elektilo-ripar-PR estas malfermita aŭtomate kaj puŝita kiel hot-fix al ĉiuj uzantoj ene de tagoj.","calloutTitle":"Kial uzi la enproduktan raport-butonon?","calloutBody":"La raport-fluo de la ŝprucfenestro aŭtomate alligas la finan verkad-staton, redaktitan DOM-foton kaj rezultojn de elektilo-revizio — ĝuste tion, kio necesas por rapide ripari elektilo-rompiĝon. PII estas forigita tra pluraj tavoloj antaŭ sendo.","h3General":"2. Ĝeneralaj demandoj / petoj pri funkcioj","generalBody":"Sendu al ni retpoŝton ĉe <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>. Ĉi tio estas privata kanalo, sekura por kunhavigi ekranfotojn / personajn uzantnomojn.","h3Install":"3. Instal- / kont-demandoj","installBody":"Tutti <strong>reuzas viajn ekzistantajn retumilajn ensaluton</strong> por ĉiu socia reto. Ne estas aparta Tutti-konto aŭ ensaluto-paŝo. Foje vi estas ensalutinta al socia reto en la sama Chrome-profilo, Tutti povas afiŝi de tie.","h2Faq":"FAQ","q1":"D. Mia afiŝo malsukcesis.","a1":"Ĉi tio kutime signifas, ke socia reto ŝanĝis sian DOM. Uzu <strong>Diagnozi → Raporti</strong> en la ŝprucfenestro. Elektilo-hotfix kutime alvenas ene de tagoj per la aŭtomata ĝisdatigo de <code>selectors.json</code> (etendaĵa ĝisdatigo ne estas postulata).","q2":"D. Tutti ne memoras mian ensaluton.","a2":"Tutti dependas de la normala retumila ensaluto de la reto. Unue ensalutu al ĉiu reto en Chrome, tiam Tutti povas afiŝi nome de vi. Inkognita reĝimo ne funkcias, ĉar la seancoj de la reto ne estas tie.","q3":"D. Signo-limoj diferencas laŭ reto — ĉu tio estas problemo?","a3":"Ne. Longaj afiŝoj, kiuj superas la signo-limon de reto, estas aŭtomate dividitaj en daŭriga fadeno (sur X, taŭga respondoĉeno; sur aliaj retoj, sinsekvaj afiŝoj). Afiŝoj ene de la limo pasas tia, kia ili estas.","q4":"D. Oni diras al mi, ke mia bildo / video estas tro granda.","a4":"Bildoj estas aŭtomate regrandigitaj per Canvas por konformi al la grandec-limo de ĉiu reto. Videoj estas aŭtomate kunpremitaj per ffmpeg.wasm, kiam ili estas super la limo de reto. Se eĉ kunpremo ne kongruas, vi vidos eraron — bonvolu unue kontroli, ke la dosiero alŝutiĝas per la denaska aplikaĵo de la reto.","q5":"D. Ĉu Tutti vidas mian afiŝan enhavon?","a5":"Ne. Afiŝa enhavo neniam pasas tra triaparta servilo. Tutti injektas rekte en la retan verkadan paĝon de ĉiu reto. Vidu nian <a href=\"./privacy.html\">Politikon pri privateco</a> por detaloj. La sola escepto estas, kiam vi premas la enproduktan raport-butonon, kiu sendas redaktitajn erar-informojn al nia privata issue-spuristo.","q6":"D. Ĉu mi povas donaci?","a6":"Ankoraŭ ne — ni laboras pri malalt-prema subten-kanalo. La plej granda daŭra kosto estas sekvi la UI-ŝanĝojn de ĉiu socia reto; estontaj Ko-fi-fluoj financos tiun bontenadon."}},"es-419":{"lang":"es-419","common":{"appName":"Tutti","tagline":"Una extensión de Chrome. Once redes sociales. Cero complicaciones.","navHome":"Inicio","navGitHub":"GitHub","navSupport":"Soporte","navPrivacy":"Política de privacidad","navLanguages":"Otros idiomas","footerCopy":"&copy; 2026 komm64 &mdash; <a href=\"https://github.com/komm64/tutti/blob/main/LICENSE\">Todos los derechos reservados</a>","footerContact":"Tutti es una extensión de Chrome de <a href=\"https://github.com/komm64\">komm64</a>. Contacto: <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>"},"index":{"title":"Tutti — Extensión para publicar en varias redes","headerTagline":"Una extensión de Chrome. Once redes sociales. Cero complicaciones.","h2Overview":"Resumen","overviewBody":"Tutti transmite la misma publicación a 11 redes sociales (X, Bluesky, Threads, Tumblr, Mastodon, Misskey, Pixiv, TikTok, YouTube Shorts, Instagram, DeviantArt) con un solo clic. No tiene backend; el contenido de las publicaciones nunca pasa por ningún servidor de terceros.","h2PrivacySummary":"Privacidad en una sola frase","privacySummaryBody":"Tutti no tiene servidor backend. El contenido de las publicaciones (texto, imágenes, video) va directamente desde tu navegador a cada red social que selecciones — nunca a través de ningún servidor controlado por el desarrollador.","privacyFullPolicy":"Política completa:"},"privacy":{"title":"Tutti — Política de privacidad","headerTagline":"Sin recopilación de datos por terceros. Todo el contenido va directamente desde tu navegador a cada SNS.","lastUpdated":"Última actualización: 2026-05-23 (v0.5.0)","h2Data":"1. Datos que recopilamos y transmitimos","dataIntro":"<strong>Tutti no tiene servidor backend.</strong> El contenido de las publicaciones (texto, imágenes, video) nunca se transmite a ningún servidor de terceros. Viaja directamente desde tu navegador a cada red social que selecciones, exactamente como si lo hubieras escrito y enviado ahí tú mismo.","dataLi1":"El texto, las imágenes y el video de las publicaciones se pasan únicamente a las páginas de los SNS que elijas (X, Bluesky, Threads, Mastodon, Misskey, Tumblr, Pixiv, DeviantArt, Instagram, TikTok, YouTube) dentro de tu navegador.","dataLi2":"Cuando la ruta opcional de API oficial está habilitada para Bluesky / Mastodon / Misskey, las publicaciones se envían directamente desde tu navegador al <strong>servidor API propio de ese SNS</strong> usando las credenciales que proporcionaste en la configuración. No interviene ningún servidor de Tutti ni del desarrollador.","dataLi3":"No se recopilan datos de análisis, seguimiento ni publicidad.","dataLi4":"Tutti <strong>no</strong> lee ni almacena tus tokens de autenticación, cookies o datos de sesión de los sitios SNS.","h3Report":"Excepción — informes manuales de errores (consentimiento por clic)","reportIntro":"Cuando (y solo cuando) presionas el <strong>botón &ldquo;Reportar&rdquo;</strong> mostrado en un cuadro de diálogo de error o en el panel de diagnóstico, lo siguiente se envía a través de un relay de Cloudflare Workers a un <strong>rastreador privado de incidencias en GitHub</strong> (<code>komm64/tutti-issues</code>, visible solo para el desarrollador de Tutti):","reportLi1":"El mensaje de error, la versión de la extensión, la cadena User-Agent del navegador.","reportLi2":"Las últimas 30 entradas del registro interno de la extensión (el nivel de log que configuraste; INFO por defecto). El contenido de las publicaciones, las imágenes, el video, los datos de inicio de sesión en SNS y las credenciales de API <strong>nunca</strong> se incluyen.","reportLi3":"Una instantánea DOM redactada de la pestaña SNS donde ocurrió el error, usada para reparar selectores rotos. El contenido de texto, los valores de atributos, las rutas/consultas/fragmentos de URL, los atributos <code>href</code>/<code>src</code> y las etiquetas <code>&lt;meta&gt;</code>/<code>&lt;link&gt;</code> se eliminan. El payload está limitado a 8 KB. Consulta <a href=\"https://github.com/komm64/tutti/blob/main/src/utils/dom-snapshot.ts\">dom-snapshot.ts</a> para la implementación.","reportOutro":"No se envía nada hasta que presiones el botón de reporte. El destino es privado, visible solo para el desarrollador de Tutti.","h2Local":"2. Datos almacenados localmente","localIntro":"Lo siguiente se almacena solo dentro de tu navegador mediante la API <code>storage</code> de Chrome. Tutti no transmite nada fuera del dispositivo.","localSettings":"<strong>Configuración</strong> (<code>chrome.storage.sync</code>): URLs de instancias de Mastodon / Misskey, switch autoPost, modo de visualización, URL de override de selectores, etc. Puede replicarse a tus otros dispositivos mediante Chrome Sync si has iniciado sesión en Chrome.","localDrafts":"<strong>Borradores</strong> (<code>chrome.storage.session</code>): Texto de publicación en progreso y medios adjuntos (imágenes / video). Se elimina automáticamente al cerrar el navegador.","localSelected":"<strong>SNS seleccionados</strong> (<code>chrome.storage.local</code>): Los SNS que marcaste como destinos de publicación. Persiste entre sesiones por conveniencia; solo local al dispositivo.","localUsers":"<strong>Últimos nombres de usuario vistos</strong> (<code>chrome.storage.local</code>): El nombre de usuario actualmente conectado en cada SNS, mostrado en el popup para que puedas confirmar qué cuenta recibirá la publicación. Solo local al dispositivo.","localHistory":"<strong>Historial de publicaciones</strong> (<code>chrome.storage.local</code>): Las últimas 20 publicaciones: primeros 80 caracteres de texto, plataformas objetivo, éxito/fallo por plataforma y marca de tiempo. Solo local al dispositivo.","localCreds":"<strong>Credenciales de API</strong> (<code>chrome.storage.local</code>): Solo si habilitaste explícitamente la ruta de API oficial para Bluesky / Mastodon / Misskey: tu app password de Bluesky o access token de Mastodon / Misskey. <strong>Solo local al dispositivo; nunca se replica vía Chrome Sync; nunca se transmite a ningún servidor del desarrollador.</strong> Removible desde el asistente de configuración.","localSelectors":"<strong>Caché de override de selectores</strong> (<code>chrome.storage.local</code>): Datos de hot-fix de selectores obtenidos de la URL que configuraste en la configuración (por defecto: el <code>selectors.json</code> público en las GitHub Pages de Tutti).","localVideoCap":"<strong>Caché de límite de subida de video</strong> (<code>chrome.storage.local</code>): Resultado de sondeos API para los límites de subida de video por cuenta (p. ej., Bluesky). Solo valores numéricos; sin credenciales.","localWipe":"Todo esto puede borrarse en cualquier momento desinstalando la extensión o limpiando el almacenamiento de extensiones de Chrome.","h2Perms":"3. Permisos utilizados","permsThead1":"Permiso","permsThead2":"Propósito","permsStorage":"Almacenar los datos locales anteriores (configuración, borradores, historial, plataformas seleccionadas, etc.) dentro de tu navegador.","permsOffscreen":"Ejecutar <code>ffmpeg.wasm</code> en un documento offscreen para comprimir / recodificar archivos de video cuando el origen exceda el límite de tamaño del SNS de destino. Los datos de video se procesan solo localmente; Tutti no los transmite a ninguna parte.","permsSidePanel":"Modo de visualización de UI opcional: muestra el formulario de redacción de Tutti en el panel lateral de Chrome en lugar del popup de acción, para que permanezca abierto mientras cambias entre pestañas de SNS. Optas por él desde la página de Opciones; el predeterminado es el popup estándar.","permsHost":"Inyectar content scripts en cada sitio SNS (x.com / twitter.com / bsky.app / bsky.social / threads.net / threads.com / mastodon.social / misskey.io / tumblr.com / pixiv.net / tiktok.com / youtube.com / instagram.com / deviantart.com) para rellenar el formulario de redacción con el contenido de tu publicación y enviarlo en tu nombre. No se leen datos de estos sitios para enviarlos a otra parte; el content script solo escribe tu propia entrada.","permsOptHost":"Solicitado en tiempo de ejecución solo si configuras una URL de instancia personalizada de Mastodon o Misskey (distinta de las predeterminadas). Chrome muestra el aviso de permiso estándar en ese momento.","h2Relationship":"4. Relación con los proveedores de SNS","relationshipBody":"Tutti automatiza la UI web de (u opcionalmente publica vía la API oficial de) las 11 redes compatibles. Esta es funcionalidad no oficial; Tutti no está afiliado a X, Bluesky, Meta (Threads / Instagram), Mastodon gGmbH, Misskey, Tumblr, Pixiv, DeviantArt, TikTok ni YouTube. Sigues sujeto a los términos de uso propios de cada servicio.","h2Contact":"5. Contacto","contactGitHub":"GitHub Issues:","contactEmail":"Correo electrónico:","h2Changes":"6. Cambios a esta política","changesBody":"Las actualizaciones de esta política se comunican actualizando esta página y el archivo de origen canónico (<a href=\"https://github.com/komm64/tutti/blob/main/PRIVACY.md\">PRIVACY.md</a>)."},"support":{"title":"Tutti — Soporte","headerTagline":"Recursos de soporte y preguntas frecuentes","h2Help":"¿Necesitas ayuda?","h3Failed":"1. La publicación falló / algo se comporta raro","failedBody":"Usa el <strong>botón &ldquo;Diagnosticar&rdquo; → &ldquo;Reportar&rdquo; dentro del popup</strong>. Este es el canal oficial. El reporte se redacta (handles, URLs, correos) y se reenvía a nuestro rastreador privado de incidencias, donde se abre automáticamente un PR de corrección de selectores y se distribuye como hot-fix a todos los usuarios en pocos días.","calloutTitle":"¿Por qué usar el botón de reporte dentro del producto?","calloutBody":"El flujo de reporte del popup adjunta automáticamente el estado final de redacción, una instantánea DOM redactada y los resultados de auditoría de selectores — exactamente lo necesario para corregir rápidamente los selectores rotos. La PII se elimina a través de múltiples capas antes del envío.","h3General":"2. Preguntas generales / solicitudes de funciones","generalBody":"Escríbenos a <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>. Este es un canal privado, seguro para compartir capturas de pantalla / handles personales.","h3Install":"3. Preguntas de instalación / cuenta","installBody":"Tutti <strong>reutiliza tus inicios de sesión existentes del navegador</strong> para cada red social. No hay cuenta de Tutti separada ni paso de inicio de sesión. Una vez que hayas iniciado sesión en una red social en el mismo perfil de Chrome, Tutti puede publicar desde ahí.","h2Faq":"Preguntas frecuentes","q1":"P. Mi publicación falló.","a1":"Esto normalmente significa que una red social cambió su DOM. Usa <strong>Diagnosticar → Reportar</strong> en el popup. Un hot-fix de selector normalmente se envía en pocos días vía la actualización automática de <code>selectors.json</code> (no se requiere actualización de la extensión).","q2":"P. Tutti no recuerda mi inicio de sesión.","a2":"Tutti depende del inicio de sesión normal de la red en el navegador. Inicia sesión en cada red en Chrome primero y luego Tutti puede publicar en tu nombre. El modo incógnito no funciona porque las sesiones de la red no están ahí.","q3":"P. Los límites de caracteres difieren por red — ¿es un problema?","a3":"No. Las publicaciones largas que exceden el límite de caracteres de una red se dividen automáticamente en un hilo de continuación (en X, una cadena de respuestas apropiada; en otras redes, publicaciones secuenciales). Las publicaciones dentro del límite pasan tal cual.","q4":"P. Me dicen que mi imagen / video es demasiado grande.","a4":"Las imágenes se redimensionan automáticamente vía Canvas para ajustarse al límite de tamaño de cada red. Los videos se comprimen automáticamente con ffmpeg.wasm cuando superan el límite de una red. Si ni siquiera la compresión encaja, verás un error — verifica primero que el archivo se sube vía la app nativa de la red.","q5":"P. ¿Ve Tutti el contenido de mi publicación?","a5":"No. El contenido de las publicaciones nunca pasa por un servidor de terceros. Tutti inyecta directamente en la página web de redacción de cada red. Consulta nuestra <a href=\"./privacy.html\">Política de privacidad</a> para más detalles. La única excepción es cuando presionas el botón de reporte dentro del producto, que envía información de error redactada a nuestro rastreador privado de incidencias.","q6":"P. ¿Puedo donar?","a6":"Todavía no — estamos trabajando en un canal de apoyo sin presión. El costo continuo más grande es mantenernos al día con los cambios de UI de cada red social; los futuros flujos de Ko-fi financiarán ese mantenimiento."}},"es-ES":{"lang":"es-ES","common":{"appName":"Tutti","tagline":"Una extensión de Chrome. Once redes sociales. Cero molestias.","navHome":"Inicio","navGitHub":"GitHub","navSupport":"Soporte","navPrivacy":"Política de privacidad","navLanguages":"Otros idiomas","footerCopy":"&copy; 2026 komm64 &mdash; <a href=\"https://github.com/komm64/tutti/blob/main/LICENSE\">Todos los derechos reservados</a>","footerContact":"Tutti es una extensión de Chrome de <a href=\"https://github.com/komm64\">komm64</a>. Contacto: <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>"},"index":{"title":"Tutti — Extensión de publicación cruzada","headerTagline":"Una extensión de Chrome. Once redes sociales. Cero molestias.","h2Overview":"Descripción general","overviewBody":"Tutti difunde la misma publicación a 11 redes sociales (X, Bluesky, Threads, Tumblr, Mastodon, Misskey, Pixiv, TikTok, YouTube Shorts, Instagram, DeviantArt) con un solo clic. No tiene backend; el contenido de las publicaciones nunca pasa por ningún servidor de terceros.","h2PrivacySummary":"Privacidad en una frase","privacySummaryBody":"Tutti no tiene servidor backend. El contenido de las publicaciones (texto, imágenes, vídeo) va directamente desde tu navegador a cada red social que selecciones — nunca a través de ningún servidor controlado por el desarrollador.","privacyFullPolicy":"Política completa:"},"privacy":{"title":"Tutti — Política de privacidad","headerTagline":"Sin recopilación de datos por terceros. Todo el contenido de publicaciones va directamente desde tu navegador a cada SNS.","lastUpdated":"Última actualización: 2026-05-23 (v0.5.0)","h2Data":"1. Datos que recopilamos y transmitimos","dataIntro":"<strong>Tutti no tiene servidor backend.</strong> El contenido de las publicaciones (texto, imágenes, vídeo) nunca se transmite a ningún servidor de terceros. Viaja directamente desde tu navegador a cada red social que selecciones, exactamente como si lo hubieras escrito y enviado allí tú mismo.","dataLi1":"El texto, las imágenes y el vídeo de las publicaciones se pasan únicamente a las páginas de los SNS que elijas (X, Bluesky, Threads, Mastodon, Misskey, Tumblr, Pixiv, DeviantArt, Instagram, TikTok, YouTube) dentro de tu navegador.","dataLi2":"Cuando la ruta opcional de API oficial está habilitada para Bluesky / Mastodon / Misskey, las publicaciones se envían directamente desde tu navegador al <strong>servidor API propio de ese SNS</strong> utilizando las credenciales que proporcionaste en la configuración. No interviene ningún servidor de Tutti ni del desarrollador.","dataLi3":"No se recopilan datos analíticos, de seguimiento ni publicitarios.","dataLi4":"Tutti <strong>no</strong> lee ni almacena tus tokens de autenticación, cookies o datos de sesión de los sitios SNS.","h3Report":"Excepción — informes manuales de errores (consentimiento por clic)","reportIntro":"Cuando (y solo cuando) pulsas el <strong>botón &ldquo;Informar&rdquo;</strong> mostrado en un cuadro de diálogo de error o en el panel de diagnóstico, se envía lo siguiente a través de un relay de Cloudflare Workers a un <strong>rastreador privado de incidencias de GitHub</strong> (<code>komm64/tutti-issues</code>, visible solo para el desarrollador de Tutti):","reportLi1":"El mensaje de error, la versión de la extensión y la cadena User-Agent del navegador.","reportLi2":"Las últimas 30 entradas del registro interno de la extensión (el nivel de log que hayas configurado; INFO por defecto). El contenido de las publicaciones, las imágenes, el vídeo, los datos de inicio de sesión en SNS y las credenciales de API <strong>nunca</strong> se incluyen.","reportLi3":"Una instantánea DOM redactada de la pestaña SNS donde ocurrió el error, utilizada para reparar selectores rotos. El contenido de texto, los valores de atributos, las rutas/consultas/fragmentos de URL, los atributos <code>href</code>/<code>src</code> y las etiquetas <code>&lt;meta&gt;</code>/<code>&lt;link&gt;</code> se eliminan. El payload está limitado a 8 KB. Consulta <a href=\"https://github.com/komm64/tutti/blob/main/src/utils/dom-snapshot.ts\">dom-snapshot.ts</a> para la implementación.","reportOutro":"Nada se envía hasta que pulses el botón de informe. El destino es privado, visible solo para el desarrollador de Tutti.","h2Local":"2. Datos almacenados localmente","localIntro":"Lo siguiente se almacena solo dentro de tu navegador a través de la API <code>storage</code> de Chrome. Tutti no transmite nada fuera del dispositivo.","localSettings":"<strong>Configuración</strong> (<code>chrome.storage.sync</code>): URLs de instancias de Mastodon / Misskey, conmutador autoPost, modo de visualización, URL de override de selectores, etc. Puede replicarse a tus otros dispositivos mediante Chrome Sync si has iniciado sesión en Chrome.","localDrafts":"<strong>Borradores</strong> (<code>chrome.storage.session</code>): Texto de publicación en progreso y medios adjuntos (imágenes / vídeo). Se borra automáticamente al cerrar el navegador.","localSelected":"<strong>SNS seleccionados</strong> (<code>chrome.storage.local</code>): Los SNS que marcaste como destinos de publicación. Persiste entre sesiones por comodidad; solo local al dispositivo.","localUsers":"<strong>Últimos nombres de usuario vistos</strong> (<code>chrome.storage.local</code>): El nombre de usuario actualmente conectado en cada SNS, mostrado en el popup para que puedas confirmar qué cuenta recibirá la publicación. Solo local al dispositivo.","localHistory":"<strong>Historial de publicaciones</strong> (<code>chrome.storage.local</code>): Las últimas 20 publicaciones: primeros 80 caracteres de texto, plataformas objetivo, éxito/fallo por plataforma y marca de tiempo. Solo local al dispositivo.","localCreds":"<strong>Credenciales API</strong> (<code>chrome.storage.local</code>): Solo si habilitaste explícitamente la ruta de API oficial para Bluesky / Mastodon / Misskey: tu app password de Bluesky o token de acceso de Mastodon / Misskey. <strong>Solo local al dispositivo; nunca se replica vía Chrome Sync; nunca se transmite a ningún servidor del desarrollador.</strong> Eliminable desde el asistente de configuración.","localSelectors":"<strong>Caché de override de selectores</strong> (<code>chrome.storage.local</code>): Datos de hot-fix de selectores obtenidos de la URL que configuraste en la configuración (por defecto: el <code>selectors.json</code> público en las páginas de GitHub de Tutti).","localVideoCap":"<strong>Caché de límite de carga de vídeo</strong> (<code>chrome.storage.local</code>): Resultado de sondeos API para límites de carga de vídeo por cuenta (p. ej., Bluesky). Solo valores numéricos; sin credenciales.","localWipe":"Todo esto puede borrarse en cualquier momento desinstalando la extensión o limpiando el almacenamiento de extensiones de Chrome.","h2Perms":"3. Permisos utilizados","permsThead1":"Permiso","permsThead2":"Propósito","permsStorage":"Almacenar los datos locales anteriores (configuración, borradores, historial, plataformas seleccionadas, etc.) dentro de tu navegador.","permsOffscreen":"Ejecutar <code>ffmpeg.wasm</code> en un documento offscreen para comprimir / recodificar archivos de vídeo cuando el origen exceda el límite de tamaño del SNS de destino. Los datos de vídeo se procesan solo localmente; Tutti no los transmite a ninguna parte.","permsSidePanel":"Modo de visualización de UI opcional: muestra el formulario de redacción de Tutti en el panel lateral de Chrome en lugar del popup de acción, para que permanezca abierto mientras cambias entre pestañas de SNS. Optas por él desde la página de Opciones; el valor predeterminado es el popup estándar.","permsHost":"Inyectar content scripts en cada sitio SNS (x.com / twitter.com / bsky.app / bsky.social / threads.net / threads.com / mastodon.social / misskey.io / tumblr.com / pixiv.net / tiktok.com / youtube.com / instagram.com / deviantart.com) para rellenar el formulario de redacción con el contenido de tu publicación y enviarlo en tu nombre. No se leen datos de estos sitios para enviarlos a otra parte; el content script solo escribe tu propia entrada.","permsOptHost":"Solicitado en tiempo de ejecución solo si configuras una URL de instancia personalizada de Mastodon o Misskey (distinta de las predeterminadas). Chrome muestra el aviso de permiso estándar en ese momento.","h2Relationship":"4. Relación con los proveedores de SNS","relationshipBody":"Tutti automatiza la UI web de (u opcionalmente publica a través de la API oficial de) las 11 redes compatibles. Esta es una funcionalidad no oficial; Tutti no está afiliado a X, Bluesky, Meta (Threads / Instagram), Mastodon gGmbH, Misskey, Tumblr, Pixiv, DeviantArt, TikTok ni YouTube. Sigues sujeto a los términos de uso propios de cada servicio.","h2Contact":"5. Contacto","contactGitHub":"GitHub Issues:","contactEmail":"Correo electrónico:","h2Changes":"6. Cambios a esta política","changesBody":"Las actualizaciones de esta política se comunican actualizando esta página y el archivo de origen canónico (<a href=\"https://github.com/komm64/tutti/blob/main/PRIVACY.md\">PRIVACY.md</a>)."},"support":{"title":"Tutti — Soporte","headerTagline":"Recursos de soporte y preguntas frecuentes","h2Help":"¿Necesitas ayuda?","h3Failed":"1. La publicación falló / algo se comporta de forma extraña","failedBody":"Usa el <strong>botón &ldquo;Diagnosticar&rdquo; → &ldquo;Informar&rdquo; dentro del popup</strong>. Este es el canal canónico. El informe se redacta (nombres de usuario, URLs, correos) y se reenvía a nuestro rastreador privado de incidencias, donde se abre automáticamente un PR de corrección de selectores y se distribuye como hot-fix a todos los usuarios en pocos días.","calloutTitle":"¿Por qué usar el botón de informe dentro del producto?","calloutBody":"El flujo de informe del popup adjunta automáticamente el estado final de redacción, una instantánea DOM redactada y los resultados de auditoría de selectores — exactamente lo necesario para corregir rápidamente los selectores rotos. La PII se elimina a través de múltiples capas antes del envío.","h3General":"2. Preguntas generales / solicitudes de funciones","generalBody":"Escríbenos a <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>. Este es un canal privado, seguro para compartir capturas de pantalla / nombres de usuario personales.","h3Install":"3. Preguntas sobre instalación / cuenta","installBody":"Tutti <strong>reutiliza tus inicios de sesión existentes del navegador</strong> para cada red social. No hay cuenta de Tutti separada ni paso de inicio de sesión. Una vez que hayas iniciado sesión en una red social en el mismo perfil de Chrome, Tutti puede publicar desde allí.","h2Faq":"Preguntas frecuentes","q1":"P. Mi publicación falló.","a1":"Esto normalmente significa que una red social cambió su DOM. Usa <strong>Diagnosticar → Informar</strong> en el popup. Un hot-fix de selector normalmente se envía en pocos días a través de la actualización automática de <code>selectors.json</code> (no se requiere actualización de la extensión).","q2":"P. Tutti no recuerda mi inicio de sesión.","a2":"Tutti depende del inicio de sesión normal de la red en el navegador. Inicia sesión en cada red en Chrome primero y luego Tutti puede publicar en tu nombre. El modo incógnito no funciona porque las sesiones de la red no están ahí.","q3":"P. Los límites de caracteres difieren por red — ¿es un problema?","a3":"No. Las publicaciones largas que exceden el límite de caracteres de una red se dividen automáticamente en un hilo de continuación (en X, una cadena de respuestas adecuada; en otras redes, publicaciones secuenciales). Las publicaciones dentro del límite pasan tal cual.","q4":"P. Me dicen que mi imagen / vídeo es demasiado grande.","a4":"Las imágenes se redimensionan automáticamente mediante Canvas para ajustarse al límite de tamaño de cada red. Los vídeos se comprimen automáticamente con ffmpeg.wasm cuando superan el límite de una red. Si incluso la compresión no encaja, verás un error — verifica primero que el archivo se sube vía la app nativa de la red.","q5":"P. ¿Ve Tutti el contenido de mi publicación?","a5":"No. El contenido de las publicaciones nunca pasa por un servidor de terceros. Tutti inyecta directamente en la página web de redacción de cada red. Consulta nuestra <a href=\"./privacy.html\">Política de privacidad</a> para más detalles. La única excepción es cuando pulsas el botón de informe dentro del producto, que envía información de error redactada a nuestro rastreador privado de incidencias.","q6":"P. ¿Puedo donar?","a6":"Todavía no — estamos trabajando en un canal de apoyo sin presión. El mayor coste continuo es mantenernos al día con los cambios de UI de cada red social; los futuros flujos de Ko-fi financiarán ese mantenimiento."}},"fi":{"lang":"fi","common":{"appName":"Tutti","tagline":"Yksi Chrome-laajennus. Yksitoista sosiaalista verkostoa. Nolla vaivaa.","navHome":"Etusivu","navGitHub":"GitHub","navSupport":"Tuki","navPrivacy":"Tietosuojakäytäntö","navLanguages":"Muut kielet","footerCopy":"&copy; 2026 komm64 &mdash; <a href=\"https://github.com/komm64/tutti/blob/main/LICENSE\">Kaikki oikeudet pidätetään</a>","footerContact":"Tutti on <a href=\"https://github.com/komm64\">komm64</a>:n Chrome-laajennus. Yhteystiedot: <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>"},"index":{"title":"Tutti — Ristijulkaisulaajennus","headerTagline":"Yksi Chrome-laajennus. Yksitoista sosiaalista verkostoa. Nolla vaivaa.","h2Overview":"Yleiskatsaus","overviewBody":"Tutti lähettää saman julkaisun 11 sosiaaliseen verkostoon (X, Bluesky, Threads, Tumblr, Mastodon, Misskey, Pixiv, TikTok, YouTube Shorts, Instagram, DeviantArt) yhdellä napsautuksella. Sillä ei ole taustajärjestelmää; julkaisusisältö ei koskaan kulje minkään kolmannen osapuolen palvelimen kautta.","h2PrivacySummary":"Tietosuoja yhdellä lauseella","privacySummaryBody":"Tutilla ei ole taustapalvelinta. Julkaisusisältö (teksti, kuvat, video) menee suoraan selaimestasi jokaiseen valitsemaasi sosiaaliseen verkostoon — ei koskaan minkään kehittäjän hallitseman palvelimen kautta.","privacyFullPolicy":"Täydellinen käytäntö:"},"privacy":{"title":"Tutti — Tietosuojakäytäntö","headerTagline":"Ei kolmansien osapuolten tietojen keräystä. Kaikki julkaisusisältö menee suoraan selaimestasi jokaiseen SNS:ään.","lastUpdated":"Päivitetty viimeksi: 2026-05-23 (v0.5.0)","h2Data":"1. Keräämämme ja siirtämämme tiedot","dataIntro":"<strong>Tutilla ei ole taustapalvelinta.</strong> Julkaisusisältöä (teksti, kuvat, video) ei koskaan siirretä minkään kolmannen osapuolen palvelimelle. Se kulkee suoraan selaimestasi jokaiseen valitsemaasi sosiaaliseen verkostoon, aivan kuin olisit itse kirjoittanut ja lähettänyt sen siellä.","dataLi1":"Julkaisun teksti, kuvat ja video välitetään vain valitsemillesi SNS-sivuille (X, Bluesky, Threads, Mastodon, Misskey, Tumblr, Pixiv, DeviantArt, Instagram, TikTok, YouTube) selaimesi sisällä.","dataLi2":"Kun valinnainen virallinen API-reitti on käytössä Bluesky / Mastodon / Misskeyssä, julkaisut lähetetään suoraan selaimestasi <strong>kyseisen SNS:n omaan API-palvelimeen</strong> käyttäen Asetuksissa antamiasi tunnistetietoja. Mikään Tutti- / kehittäjäpalvelin ei ole mukana.","dataLi3":"Mitään analytiikka-, seuranta- tai mainostietoja ei kerätä.","dataLi4":"Tutti <strong>ei</strong> lue eikä tallenna todennustunnuksia, evästeitä tai istuntotietoja SNS-sivustoilta.","h3Report":"Poikkeus — manuaaliset virheraportit (suostumus napsautuksella)","reportIntro":"Kun (ja vain kun) painat <strong>&rdquo;Raportoi&rdquo;-painiketta</strong>, joka näytetään virhevalintaikkunassa tai diagnostiikkapaneelissa, seuraava lähetetään Cloudflare Workers -välityksen kautta <strong>yksityiseen GitHub-issue-trackeriin</strong> (<code>komm64/tutti-issues</code>, näkyy vain Tutti-kehittäjälle):","reportLi1":"Virheilmoitus, laajennuksen versio, selaimen User-Agent-merkkijono.","reportLi2":"Laajennuksen sisäisen lokin viimeiset 30 merkintää (määrittämäsi lokitaso; oletuksena INFO). Julkaisusisältöä, kuvia, videoita, SNS-kirjautumistietoja ja API-tunnistetietoja <strong>ei koskaan</strong> sisällytetä.","reportLi3":"Toimitettu DOM-tilannekuva SNS-välilehdestä, jossa virhe tapahtui, käytetään rikkoutuneiden valitsimien korjaamiseen. Tekstisisältö, attribuuttiarvot, URL-polut/-kyselyt/-fragmentit, <code>href</code>/<code>src</code>-attribuutit ja <code>&lt;meta&gt;</code>/<code>&lt;link&gt;</code>-tunnisteet poistetaan. Hyötykuorman yläraja on 8 kt. Katso toteutus kohdasta <a href=\"https://github.com/komm64/tutti/blob/main/src/utils/dom-snapshot.ts\">dom-snapshot.ts</a>.","reportOutro":"Mitään ei lähetetä, ennen kuin painat raportointipainiketta. Kohde on yksityinen, näkyvissä vain Tutti-kehittäjälle.","h2Local":"2. Paikallisesti tallennetut tiedot","localIntro":"Seuraava tallennetaan vain selaimeesi Chromen <code>storage</code>-API:n kautta. Tutti ei siirrä mitään laitteen ulkopuolelle.","localSettings":"<strong>Asetukset</strong> (<code>chrome.storage.sync</code>): Mastodon-/Misskey-instanssin URL:t, autoPost-kytkin, näyttötila, valitsimen ohitus-URL jne. Voidaan replikoida muihin laitteisiisi Chrome Syncin kautta, jos olet kirjautuneena Chromeen.","localDrafts":"<strong>Luonnokset</strong> (<code>chrome.storage.session</code>): Käynnissä oleva julkaisuteksti ja liitetyt mediat (kuvat / video). Tyhjennetään automaattisesti, kun selain suljetaan.","localSelected":"<strong>Valitut SNS:t</strong> (<code>chrome.storage.local</code>): SNS:t, jotka olet merkinnyt julkaisukohteiksi. Säilyy istuntojen välillä mukavuuden vuoksi; vain laitteen paikallisesti.","localUsers":"<strong>Viimeksi nähdyt käyttäjänimet</strong> (<code>chrome.storage.local</code>): Kuhunkin SNS:ään kirjautunut nykyinen käyttäjänimi, näytetään ponnahdusikkunassa, jotta voit vahvistaa, mikä tili vastaanottaa julkaisun. Vain laitteen paikallisesti.","localHistory":"<strong>Julkaisuhistoria</strong> (<code>chrome.storage.local</code>): Viimeiset 20 julkaisua: tekstin 80 ensimmäistä merkkiä, kohdealustat, onnistuminen/epäonnistuminen alustakohtaisesti ja aikaleima. Vain laitteen paikallisesti.","localCreds":"<strong>API-tunnistetiedot</strong> (<code>chrome.storage.local</code>): Vain jos otit nimenomaisesti käyttöön virallisen API-reitin Bluesky / Mastodon / Misskeylle: Bluesky app password tai Mastodon-/Misskey-käyttötunnus. <strong>Vain laitteen paikallisesti; ei koskaan replikoida Chrome Syncin kautta; ei koskaan siirretä mihinkään kehittäjäpalvelimelle.</strong> Poistettavissa Asetukset-velhosta.","localSelectors":"<strong>Valitsimen ohituksen välimuisti</strong> (<code>chrome.storage.local</code>): Valitsimen pikakorjaustiedot, jotka on haettu Asetuksissa määrittämästäsi URL-osoitteesta (oletus: julkinen <code>selectors.json</code> Tutin GitHub Pagesissa).","localVideoCap":"<strong>Videon latausrajan välimuisti</strong> (<code>chrome.storage.local</code>): API-koetuksien tulos tilikohtaisille videon latausrajoille (esim. Bluesky). Vain numeeriset arvot; ei tunnistetietoja.","localWipe":"Kaikki tämä voidaan pyyhkiä milloin tahansa poistamalla laajennus asennuksesta tai tyhjentämällä Chromen laajennusmuisti.","h2Perms":"3. Käytetyt luvat","permsThead1":"Lupa","permsThead2":"Tarkoitus","permsStorage":"Tallenna yllä olevat paikalliset tiedot (asetukset, luonnokset, historia, valitut alustat jne.) selaimeesi.","permsOffscreen":"Suorita <code>ffmpeg.wasm</code> näytön ulkopuolisessa asiakirjassa pakatakseen / uudelleen koodatakseen videotiedostoja, kun lähde ylittää kohde-SNS:n kokorajan. Videotietoja käsitellään vain paikallisesti; Tutti ei siirrä niitä minnekään.","permsSidePanel":"Valinnainen UI-näyttötila: näyttää Tutin julkaisun laatimislomakkeen Chromen sivupaneelissa toimintoponnahdusikkunan sijaan, jotta se pysyy auki, kun vaihdat SNS-välilehtien välillä. Otat sen käyttöön Asetukset-sivulta; oletusarvo on tavallinen ponnahdusikkuna.","permsHost":"Injektoi sisältöskriptit kuhunkin SNS-sivustoon (x.com / twitter.com / bsky.app / bsky.social / threads.net / threads.com / mastodon.social / misskey.io / tumblr.com / pixiv.net / tiktok.com / youtube.com / instagram.com / deviantart.com) täyttääksesi julkaisun laatimislomakkeen julkaisusisällölläsi ja lähettääksesi sen puolestasi. Näiltä sivustoilta ei lueta tietoja ja lähetetä muualle; sisältöskripti kirjoittaa vain oman syötteesi.","permsOptHost":"Pyydetään ajon aikana vain, jos määrität mukautetun Mastodon- tai Misskey-instanssin URL:n (muu kuin oletusarvo). Chrome näyttää tavallisen lupakehotteen tuona hetkenä.","h2Relationship":"4. Suhde SNS-palveluntarjoajiin","relationshipBody":"Tutti automatisoi 11 tuetun verkoston web-UI:n (tai valinnaisesti julkaisee virallisen API:n kautta). Tämä on epävirallinen toiminto; Tutti ei ole sidoksissa X:ään, Blueskyyn, Metaan (Threads / Instagram), Mastodon gGmbH:hen, Misskeyhin, Tumblriin, Pixiviin, DeviantArtiin, TikTokiin tai YouTubeen. Olet edelleen sidottu kunkin palvelun omiin käyttöehtoihin.","h2Contact":"5. Yhteystiedot","contactGitHub":"GitHub Issues:","contactEmail":"Sähköposti:","h2Changes":"6. Tämän käytännön muutokset","changesBody":"Päivitykset tähän käytäntöön ilmoitetaan päivittämällä tämä sivu ja kanoninen lähdetiedosto (<a href=\"https://github.com/komm64/tutti/blob/main/PRIVACY.md\">PRIVACY.md</a>)."},"support":{"title":"Tutti — Tuki","headerTagline":"Tukiresurssit ja UKK","h2Help":"Tarvitsetko apua?","h3Failed":"1. Julkaiseminen epäonnistui / jokin käyttäytyy oudosti","failedBody":"Käytä <strong>&rdquo;Diagnosoi&rdquo; → &rdquo;Raportoi&rdquo; -painiketta ponnahdusikkunan sisällä</strong>. Tämä on kanoninen kanava. Raportti toimitetaan (käyttäjätunnukset, URL:t, sähköpostit) ja välitetään yksityiselle issue-trackerillemme, jossa valitsimen korjaus-PR avataan automaattisesti ja työnnetään pikakorjauksena kaikille käyttäjille muutamassa päivässä.","calloutTitle":"Miksi käyttää tuotteen sisäistä raportointipainiketta?","calloutBody":"Ponnahdusikkunan raportointiprosessi liittää automaattisesti lopullisen julkaisutilan, toimitetun DOM-tilannekuvan ja valitsimen tarkastusten tulokset — juuri sen, mitä tarvitaan valitsimen rikkoutumisen nopeaan korjaamiseen. PII poistetaan useiden kerrosten kautta ennen lähetystä.","h3General":"2. Yleiset kysymykset / ominaisuuspyynnöt","generalBody":"Lähetä meille sähköpostia osoitteeseen <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>. Tämä on yksityinen kanava, turvallinen kuvakaappausten / henkilökohtaisten käyttäjätunnusten jakamiseen.","h3Install":"3. Asennus- / tilikysymykset","installBody":"Tutti <strong>käyttää uudelleen olemassa olevia selaimen kirjautumisiasi</strong> jokaisessa sosiaalisessa verkostossa. Erillistä Tutti-tiliä tai kirjautumisvaihetta ei ole. Kun olet kirjautuneena sosiaaliseen verkostoon samassa Chrome-profiilissa, Tutti voi julkaista sieltä.","h2Faq":"UKK","q1":"K. Julkaisuni epäonnistui.","a1":"Tämä tarkoittaa yleensä, että sosiaalinen verkosto on muuttanut DOM:iaan. Käytä <strong>Diagnosoi → Raportoi</strong> ponnahdusikkunassa. Valitsimen pikakorjaus toimitetaan yleensä muutaman päivän sisällä <code>selectors.json</code>-automaattipäivityksen kautta (laajennuksen päivitystä ei tarvita).","q2":"K. Tutti ei muista kirjautumistani.","a2":"Tutti luottaa verkoston tavalliseen selainkirjautumiseen. Kirjaudu ensin kuhunkin verkostoon Chromessa, niin Tutti voi julkaista puolestasi. Yksityisyystila ei toimi, koska verkoston istuntoja ei ole siellä.","q3":"K. Merkkirajat vaihtelevat verkostoittain — onko siitä ongelmaa?","a3":"Ei. Pitkät julkaisut, jotka ylittävät verkoston merkkirajan, jaetaan automaattisesti jatkoketjuksi (X:ssä asianmukainen vastausketju; muissa verkostoissa peräkkäiset julkaisut). Rajan sisällä olevat julkaisut menevät läpi sellaisinaan.","q4":"K. Minulle kerrotaan, että kuvani / videoni on liian iso.","a4":"Kuvien koko muutetaan automaattisesti Canvasilla kunkin verkoston kokorajan mukaiseksi. Videot pakataan automaattisesti ffmpeg.wasm:llä, kun ne ylittävät verkoston rajan. Jos edes pakkaus ei mahdu, näet virheen — vahvista ensin, että tiedosto latautuu verkoston natiiviapplikaation kautta.","q5":"K. Näkeekö Tutti julkaisusisältöni?","a5":"Ei. Julkaisusisältö ei koskaan kulje kolmannen osapuolen palvelimen kautta. Tutti injektoituu suoraan kunkin verkoston julkaisun laatimisen verkkosivulle. Katso lisätietoja <a href=\"./privacy.html\">tietosuojakäytännöstämme</a>. Ainoa poikkeus on, kun painat tuotteen sisäistä raportointipainiketta, joka lähettää toimitettua virhetietoa yksityiselle issue-trackerillemme.","q6":"K. Voinko lahjoittaa?","a6":"En vielä — työstämme matalapainetukikanavaa. Suurin jatkuva kustannus on pysyä mukana kunkin sosiaalisen verkoston UI-muutoksissa; tulevat Ko-fi-virtaukset rahoittavat tuon ylläpidon."}},"fr":{"lang":"fr","common":{"appName":"Tutti","tagline":"Une extension Chrome. Onze réseaux sociaux. Zéro tracas.","navHome":"Accueil","navGitHub":"GitHub","navSupport":"Support","navPrivacy":"Politique de confidentialité","navLanguages":"Autres langues","footerCopy":"&copy; 2026 komm64 &mdash; <a href=\"https://github.com/komm64/tutti/blob/main/LICENSE\">Tous droits réservés</a>","footerContact":"Tutti est une extension Chrome de <a href=\"https://github.com/komm64\">komm64</a>. Contact : <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>"},"index":{"title":"Tutti — Extension de publication croisée","headerTagline":"Une extension Chrome. Onze réseaux sociaux. Zéro tracas.","h2Overview":"Aperçu","overviewBody":"Tutti diffuse la même publication sur 11 réseaux sociaux (X, Bluesky, Threads, Tumblr, Mastodon, Misskey, Pixiv, TikTok, YouTube Shorts, Instagram, DeviantArt) en un seul clic. Pas de backend ; le contenu des publications ne passe jamais par un serveur tiers.","h2PrivacySummary":"Confidentialité en une phrase","privacySummaryBody":"Tutti n'a pas de serveur backend. Le contenu des publications (texte, images, vidéo) va directement de votre navigateur vers chaque réseau social que vous sélectionnez — jamais via un serveur contrôlé par le développeur.","privacyFullPolicy":"Politique complète :"},"privacy":{"title":"Tutti — Politique de confidentialité","headerTagline":"Aucune collecte de données par des tiers. Tout le contenu des publications va directement de votre navigateur vers chaque SNS.","lastUpdated":"Dernière mise à jour : 2026-05-23 (v0.5.0)","h2Data":"1. Données que nous collectons et transmettons","dataIntro":"<strong>Tutti n'a pas de serveur backend.</strong> Le contenu des publications (texte, images, vidéo) n'est jamais transmis à un serveur tiers. Il voyage directement de votre navigateur vers chaque réseau social que vous sélectionnez, exactement comme si vous aviez tapé et soumis vous-même.","dataLi1":"Le texte, les images et la vidéo des publications sont transmis uniquement aux pages SNS que vous choisissez (X, Bluesky, Threads, Mastodon, Misskey, Tumblr, Pixiv, DeviantArt, Instagram, TikTok, YouTube) au sein de votre navigateur.","dataLi2":"Lorsque la voie d'API officielle facultative est activée pour Bluesky / Mastodon / Misskey, les publications sont envoyées directement depuis votre navigateur vers <strong>le propre serveur d'API de ce SNS</strong> en utilisant les identifiants que vous avez fournis dans les paramètres. Aucun serveur Tutti / développeur n'est impliqué.","dataLi3":"Aucune donnée d'analyse, de suivi ou publicitaire n'est collectée.","dataLi4":"Tutti <strong>ne</strong> lit ni ne stocke vos jetons d'authentification, cookies ou données de session des sites SNS.","h3Report":"Exception — rapports d'erreur manuels (consentement par clic)","reportIntro":"Lorsque (et uniquement lorsque) vous appuyez sur le <strong>bouton &laquo;&nbsp;Signaler&nbsp;&raquo;</strong> affiché dans une boîte de dialogue d'erreur ou le panneau de diagnostic, les éléments suivants sont envoyés via un relais Cloudflare Workers vers un <strong>traqueur d'issues GitHub privé</strong> (<code>komm64/tutti-issues</code>, visible uniquement par le développeur de Tutti) :","reportLi1":"Le message d'erreur, la version de l'extension, la chaîne User-Agent du navigateur.","reportLi2":"Les 30 dernières entrées du journal interne de l'extension (le niveau de log que vous avez configuré ; INFO par défaut). Le contenu des publications, les images, la vidéo, les données de connexion SNS et les identifiants API ne sont <strong>jamais</strong> inclus.","reportLi3":"Un instantané DOM expurgé de l'onglet SNS où l'erreur s'est produite, utilisé pour réparer les sélecteurs cassés. Le contenu textuel, les valeurs d'attributs, les chemins/requêtes/fragments d'URL, les attributs <code>href</code>/<code>src</code> et les balises <code>&lt;meta&gt;</code>/<code>&lt;link&gt;</code> sont supprimés. La charge utile est plafonnée à 8 Ko. Voir <a href=\"https://github.com/komm64/tutti/blob/main/src/utils/dom-snapshot.ts\">dom-snapshot.ts</a> pour l'implémentation.","reportOutro":"Rien n'est envoyé tant que vous n'appuyez pas sur le bouton de signalement. La destination est privée, visible uniquement par le développeur de Tutti.","h2Local":"2. Données stockées localement","localIntro":"Les éléments suivants sont stockés uniquement dans votre navigateur via l'API <code>storage</code> de Chrome. Rien n'est transmis hors de l'appareil par Tutti.","localSettings":"<strong>Paramètres</strong> (<code>chrome.storage.sync</code>) : URLs d'instances Mastodon / Misskey, bascule autoPost, mode d'affichage, URL d'override de sélecteurs, etc. Peut être répliqué sur vos autres appareils via Chrome Sync si vous êtes connecté à Chrome.","localDrafts":"<strong>Brouillons</strong> (<code>chrome.storage.session</code>) : Texte de publication en cours et médias joints (images / vidéo). Effacé automatiquement à la fermeture du navigateur.","localSelected":"<strong>SNS sélectionnés</strong> (<code>chrome.storage.local</code>) : Les SNS que vous avez cochés comme cibles de publication. Persiste entre les sessions par commodité ; local à l'appareil uniquement.","localUsers":"<strong>Derniers noms d'utilisateur vus</strong> (<code>chrome.storage.local</code>) : Le nom d'utilisateur actuellement connecté sur chaque SNS, affiché dans le popup afin que vous puissiez confirmer quel compte recevra la publication. Local à l'appareil uniquement.","localHistory":"<strong>Historique des publications</strong> (<code>chrome.storage.local</code>) : Les 20 dernières publications : 80 premiers caractères du texte, plateformes ciblées, succès/échec par plateforme et horodatage. Local à l'appareil uniquement.","localCreds":"<strong>Identifiants API</strong> (<code>chrome.storage.local</code>) : Uniquement si vous avez explicitement activé la voie d'API officielle pour Bluesky / Mastodon / Misskey : votre app password Bluesky ou votre access token Mastodon / Misskey. <strong>Local à l'appareil uniquement ; jamais répliqué via Chrome Sync ; jamais transmis à un serveur du développeur.</strong> Supprimable depuis l'assistant des paramètres.","localSelectors":"<strong>Cache d'override de sélecteurs</strong> (<code>chrome.storage.local</code>) : Données de hot-fix de sélecteurs récupérées depuis l'URL que vous avez configurée dans les paramètres (par défaut : le <code>selectors.json</code> public sur les GitHub Pages de Tutti).","localVideoCap":"<strong>Cache de limite d'upload vidéo</strong> (<code>chrome.storage.local</code>) : Résultat des sondages d'API pour les limites d'upload vidéo par compte (par ex. Bluesky). Valeurs numériques uniquement ; pas d'identifiants.","localWipe":"Tout cela peut être effacé à tout moment en désinstallant l'extension ou en vidant le stockage d'extensions de Chrome.","h2Perms":"3. Permissions utilisées","permsThead1":"Permission","permsThead2":"Finalité","permsStorage":"Stocker les données locales ci-dessus (paramètres, brouillons, historique, plateformes sélectionnées, etc.) dans votre navigateur.","permsOffscreen":"Exécuter <code>ffmpeg.wasm</code> dans un document offscreen pour compresser / réencoder des fichiers vidéo lorsque la source dépasse la limite de taille du SNS de destination. Les données vidéo sont traitées localement uniquement ; non transmises nulle part par Tutti.","permsSidePanel":"Mode d'affichage UI facultatif : afficher le formulaire de composition de Tutti dans le panneau latéral de Chrome au lieu du popup d'action, afin qu'il reste ouvert lorsque vous changez d'onglet SNS. Vous y consentez depuis la page Options ; la valeur par défaut est le popup standard.","permsHost":"Injecter des content scripts dans chaque site SNS (x.com / twitter.com / bsky.app / bsky.social / threads.net / threads.com / mastodon.social / misskey.io / tumblr.com / pixiv.net / tiktok.com / youtube.com / instagram.com / deviantart.com) pour remplir le formulaire de composition avec le contenu de votre publication et le soumettre en votre nom. Aucune donnée n'est lue depuis ces sites et envoyée ailleurs ; le content script n'écrit que votre propre entrée.","permsOptHost":"Demandé à l'exécution uniquement si vous configurez une URL d'instance personnalisée pour Mastodon ou Misskey (autre que les valeurs par défaut). Chrome affiche l'invite de permission standard à ce moment-là.","h2Relationship":"4. Relation avec les fournisseurs SNS","relationshipBody":"Tutti automatise l'interface web (ou, facultativement, publie via l'API officielle) des 11 réseaux pris en charge. Il s'agit d'une fonctionnalité non officielle ; Tutti n'est affilié ni à X, Bluesky, Meta (Threads / Instagram), Mastodon gGmbH, Misskey, Tumblr, Pixiv, DeviantArt, TikTok ni YouTube. Vous restez lié aux conditions d'utilisation propres à chaque service.","h2Contact":"5. Contact","contactGitHub":"GitHub Issues :","contactEmail":"E-mail :","h2Changes":"6. Modifications de cette politique","changesBody":"Les mises à jour de cette politique sont communiquées en mettant à jour cette page et le fichier source canonique (<a href=\"https://github.com/komm64/tutti/blob/main/PRIVACY.md\">PRIVACY.md</a>)."},"support":{"title":"Tutti — Support","headerTagline":"Ressources de support et FAQ","h2Help":"Besoin d'aide ?","h3Failed":"1. La publication a échoué / quelque chose se comporte bizarrement","failedBody":"Utilisez le <strong>bouton &laquo;&nbsp;Diagnostiquer&nbsp;&raquo; → &laquo;&nbsp;Signaler&nbsp;&raquo; à l'intérieur du popup</strong>. C'est le canal canonique. Le rapport est expurgé (handles, URLs, e-mails) et transmis à notre traqueur d'issues privé, où une PR de correction de sélecteurs est ouverte automatiquement et poussée comme hot-fix à tous les utilisateurs sous quelques jours.","calloutTitle":"Pourquoi utiliser le bouton de signalement intégré au produit ?","calloutBody":"Le flux de signalement du popup joint automatiquement l'état final de composition, un instantané DOM expurgé et les résultats d'audit des sélecteurs — exactement ce qu'il faut pour corriger rapidement les ruptures de sélecteurs. Les PII sont supprimées à travers plusieurs couches avant l'envoi.","h3General":"2. Questions générales / demandes de fonctionnalités","generalBody":"Envoyez-nous un e-mail à <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>. C'est un canal privé, sûr pour partager des captures d'écran / handles personnels.","h3Install":"3. Questions d'installation / compte","installBody":"Tutti <strong>réutilise vos connexions de navigateur existantes</strong> pour chaque réseau social. Pas de compte Tutti séparé ni d'étape de connexion. Une fois connecté à un réseau social dans le même profil Chrome, Tutti peut publier depuis là.","h2Faq":"FAQ","q1":"Q. Ma publication a échoué.","a1":"Cela signifie généralement qu'un réseau social a modifié son DOM. Utilisez <strong>Diagnostiquer → Signaler</strong> dans le popup. Un hot-fix de sélecteur est généralement livré sous quelques jours via la mise à jour automatique de <code>selectors.json</code> (aucune mise à jour de l'extension requise).","q2":"Q. Tutti ne se souvient pas de ma connexion.","a2":"Tutti s'appuie sur la connexion normale du réseau dans le navigateur. Connectez-vous d'abord à chaque réseau dans Chrome, puis Tutti pourra publier en votre nom. Le mode incognito ne fonctionne pas car les sessions du réseau n'y sont pas.","q3":"Q. Les limites de caractères diffèrent selon les réseaux — est-ce un problème ?","a3":"Non. Les longues publications qui dépassent la limite de caractères d'un réseau sont automatiquement divisées en un fil de continuation (sur X, une véritable chaîne de réponses ; sur d'autres réseaux, des publications séquentielles). Les publications dans la limite passent telles quelles.","q4":"Q. On me dit que mon image / ma vidéo est trop volumineuse.","a4":"Les images sont automatiquement redimensionnées via Canvas pour s'adapter à la limite de taille de chaque réseau. Les vidéos sont automatiquement compressées avec ffmpeg.wasm lorsqu'elles dépassent la limite d'un réseau. Si même la compression ne suffit pas, vous verrez une erreur — veuillez d'abord vérifier que le fichier s'envoie via l'application native du réseau.","q5":"Q. Tutti voit-il le contenu de ma publication ?","a5":"Non. Le contenu des publications ne passe jamais par un serveur tiers. Tutti injecte directement dans la page web de composition de chaque réseau. Consultez notre <a href=\"./privacy.html\">Politique de confidentialité</a> pour les détails. La seule exception est lorsque vous appuyez sur le bouton de signalement intégré au produit, qui envoie des informations d'erreur expurgées à notre traqueur d'issues privé.","q6":"Q. Puis-je faire un don ?","a6":"Pas encore — nous travaillons sur un canal de soutien sans pression. Le plus grand coût continu est de suivre les changements d'UI de chaque réseau social ; les futurs flux Ko-fi financeront cette maintenance."}},"hu":{"lang":"hu","common":{"appName":"Tutti","tagline":"Egyetlen Chrome-bővítmény. Tizenegy közösségi hálózat. Nulla bonyodalom.","navHome":"Kezdőlap","navGitHub":"GitHub","navSupport":"Támogatás","navPrivacy":"Adatvédelmi szabályzat","navLanguages":"Egyéb nyelvek","footerCopy":"&copy; 2026 komm64 &mdash; <a href=\"https://github.com/komm64/tutti/blob/main/LICENSE\">Minden jog fenntartva</a>","footerContact":"A Tutti egy <a href=\"https://github.com/komm64\">komm64</a> által készített Chrome-bővítmény. Kapcsolat: <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>"},"index":{"title":"Tutti — Keresztposztolási bővítmény","headerTagline":"Egyetlen Chrome-bővítmény. Tizenegy közösségi hálózat. Nulla bonyodalom.","h2Overview":"Áttekintés","overviewBody":"A Tutti ugyanazt a bejegyzést 11 közösségi hálózatra (X, Bluesky, Threads, Tumblr, Mastodon, Misskey, Pixiv, TikTok, YouTube Shorts, Instagram, DeviantArt) közvetíti egyetlen kattintással. Nincs háttérrendszere; a bejegyzések tartalma soha nem halad át harmadik fél szerverén.","h2PrivacySummary":"Adatvédelem egy mondatban","privacySummaryBody":"A Tutti nem rendelkezik háttérszerverrel. A bejegyzések tartalma (szöveg, képek, videó) közvetlenül a böngészőjéből megy minden kiválasztott közösségi hálózatra — soha nem a fejlesztő által ellenőrzött szerveren keresztül.","privacyFullPolicy":"Teljes szabályzat:"},"privacy":{"title":"Tutti — Adatvédelmi szabályzat","headerTagline":"Nincs harmadik féltől származó adatgyűjtés. Minden bejegyzéstartalom közvetlenül a böngészőjéből megy minden SNS-hez.","lastUpdated":"Utoljára frissítve: 2026-05-23 (v0.5.0)","h2Data":"1. Az általunk gyűjtött és továbbított adatok","dataIntro":"<strong>A Tutti nem rendelkezik háttérszerverrel.</strong> A bejegyzések tartalma (szöveg, képek, videó) soha nem kerül továbbításra harmadik fél szerverére. Közvetlenül a böngészőjéből utazik minden kiválasztott közösségi hálózathoz, pontosan úgy, mintha Ön maga írta és küldte volna be ott.","dataLi1":"A bejegyzés szövege, képei és videója csak az Ön által kiválasztott SNS oldalakra (X, Bluesky, Threads, Mastodon, Misskey, Tumblr, Pixiv, DeviantArt, Instagram, TikTok, YouTube) kerül továbbításra a böngészőjén belül.","dataLi2":"Ha a választható hivatalos API útvonal engedélyezve van a Bluesky / Mastodon / Misskey számára, a bejegyzések közvetlenül a böngészőjéből kerülnek küldésre az adott SNS <strong>saját API szerverére</strong> a Beállításokban megadott hitelesítő adatok felhasználásával. Semmilyen Tutti / fejlesztői szerver nincs bevonva.","dataLi3":"Nem gyűjtünk semmilyen analitikai, követési vagy hirdetési adatot.","dataLi4":"A Tutti <strong>nem</strong> olvas és nem tárol semmilyen hitelesítési tokent, sütit vagy munkamenet-adatot az SNS oldalakról.","h3Report":"Kivétel — kézi hibajelentések (kattintásonkénti hozzájárulás)","reportIntro":"Amikor (és csak akkor) megnyomja a hibapárbeszédpanelben vagy a diagnosztikai panelen megjelenő <strong>&bdquo;Jelentés&rdquo; gombot</strong>, a következőket küldjük el Cloudflare Workers reléjen keresztül egy <strong>privát GitHub issue trackerbe</strong> (<code>komm64/tutti-issues</code>, amelyet csak a Tutti fejlesztője láthat):","reportLi1":"A hibaüzenet, a bővítmény verziója, a böngésző User-Agent karakterlánca.","reportLi2":"A bővítmény belső naplójának utolsó 30 bejegyzése (az Ön által konfigurált naplószint; alapértelmezésben INFO). A bejegyzés tartalma, képek, videó, SNS bejelentkezési adatok és API hitelesítő adatok <strong>soha</strong> nem szerepelnek benne.","reportLi3":"A hibát okozó SNS lap szerkesztett DOM pillanatfelvétele, amelyet a sérült szelektorok javítására használunk. A szöveges tartalom, attribútumértékek, URL útvonalak/lekérdezések/töredékek, <code>href</code>/<code>src</code> attribútumok és <code>&lt;meta&gt;</code>/<code>&lt;link&gt;</code> tagek eltávolításra kerülnek. A hasznos teher 8 KB-ra van korlátozva. Az implementációhoz lásd a <a href=\"https://github.com/komm64/tutti/blob/main/src/utils/dom-snapshot.ts\">dom-snapshot.ts</a> fájlt.","reportOutro":"Semmi nem kerül küldésre, amíg meg nem nyomja a jelentési gombot. A célhely privát, csak a Tutti fejlesztője láthatja.","h2Local":"2. Helyileg tárolt adatok","localIntro":"A következő adatok csak a böngészőjén belül kerülnek tárolásra a Chrome <code>storage</code> API-ján keresztül. A Tutti semmit sem továbbít az eszközről.","localSettings":"<strong>Beállítások</strong> (<code>chrome.storage.sync</code>): Mastodon / Misskey példány URL-ek, autoPost kapcsoló, megjelenítési mód, szelektor felülíró URL stb. Chrome Synccel replikálható más eszközeire, ha bejelentkezett Chrome-ba.","localDrafts":"<strong>Piszkozatok</strong> (<code>chrome.storage.session</code>): Folyamatban lévő bejegyzésszöveg és csatolt média (képek / videó). A böngésző bezárásakor automatikusan törlődik.","localSelected":"<strong>Kiválasztott SNS-ek</strong> (<code>chrome.storage.local</code>): Az SNS-ek, amelyeket bejegyzéscélokként bejelölt. Munkamenetek között megmarad a kényelem érdekében; csak helyileg az eszközön.","localUsers":"<strong>Utoljára látott felhasználónevek</strong> (<code>chrome.storage.local</code>): Az egyes SNS-eken jelenleg bejelentkezett felhasználónév, amely a popup-ban jelenik meg, hogy megerősítse, melyik fiók kapja a bejegyzést. Csak helyileg az eszközön.","localHistory":"<strong>Bejegyzés-előzmények</strong> (<code>chrome.storage.local</code>): Az utolsó 20 bejegyzés: a szöveg első 80 karaktere, célplatformok, sikeresség/sikertelenség platformonként és időbélyeg. Csak helyileg az eszközön.","localCreds":"<strong>API hitelesítő adatok</strong> (<code>chrome.storage.local</code>): Csak ha kifejezetten engedélyezte a hivatalos API útvonalat a Bluesky / Mastodon / Misskey számára: a Bluesky app password vagy Mastodon / Misskey hozzáférési token. <strong>Csak helyileg az eszközön; soha nem replikálódik Chrome Sync-en keresztül; soha nem továbbítódik semmilyen fejlesztői szerverre.</strong> A Beállítások varázslójából eltávolítható.","localSelectors":"<strong>Szelektor felülírás gyorsítótár</strong> (<code>chrome.storage.local</code>): Szelektor hot-fix adatok, amelyeket a Beállításokban konfigurált URL-ről szereztek be (alapértelmezett: a Tutti GitHub Pages-en lévő nyilvános <code>selectors.json</code>).","localVideoCap":"<strong>Videofeltöltési limit gyorsítótár</strong> (<code>chrome.storage.local</code>): API szondák eredménye fiókonkénti videofeltöltési korlátokhoz (pl. Bluesky). Csak numerikus értékek; nincsenek hitelesítő adatok.","localWipe":"Mindezek bármikor törölhetők a bővítmény eltávolításával vagy a Chrome bővítményeinek tárhelyének törlésével.","h2Perms":"3. Használt engedélyek","permsThead1":"Engedély","permsThead2":"Cél","permsStorage":"A fenti helyi adatok (beállítások, piszkozatok, előzmények, kiválasztott platformok stb.) tárolása a böngészőjén belül.","permsOffscreen":"<code>ffmpeg.wasm</code> futtatása offscreen dokumentumban videofájlok tömörítéséhez / újrakódolásához, amikor a forrás meghaladja a cél SNS méretkorlátját. A videoadatok csak helyileg kerülnek feldolgozásra; a Tutti sehova nem továbbítja őket.","permsSidePanel":"Választható UI megjelenítési mód: a Tutti bejegyzéskészítő űrlapját a Chrome oldalpaneljében jeleníti meg az akció popup helyett, így nyitva marad, miközben SNS lapok között vált. Az Opciók oldalon választhatja ki; az alapértelmezett a normál popup.","permsHost":"Content scriptek beillesztése minden SNS oldalra (x.com / twitter.com / bsky.app / bsky.social / threads.net / threads.com / mastodon.social / misskey.io / tumblr.com / pixiv.net / tiktok.com / youtube.com / instagram.com / deviantart.com) a bejegyzéskészítő űrlap kitöltéséhez a bejegyzés tartalmával és az Ön nevében történő elküldéséhez. Nem olvasunk adatokat ezekről az oldalakról, és nem küldjük máshová; a content script csak az Ön saját bemenetét írja.","permsOptHost":"Csak akkor kerül lekérésre futásidőben, ha egyedi Mastodon vagy Misskey példány URL-t konfigurál (az alapértelmezetteken kívül). A Chrome ekkor megjeleníti a standard engedélyezési kérdést.","h2Relationship":"4. Kapcsolat az SNS szolgáltatókkal","relationshipBody":"A Tutti automatizálja a 11 támogatott hálózat webes UI-ját (vagy opcionálisan a hivatalos API-jukon keresztül posztol). Ez nem hivatalos funkcionalitás; a Tutti nem áll kapcsolatban az X, Bluesky, Meta (Threads / Instagram), Mastodon gGmbH, Misskey, Tumblr, Pixiv, DeviantArt, TikTok vagy YouTube szolgáltatókkal. Továbbra is köteles az egyes szolgáltatások saját felhasználási feltételeinek betartására.","h2Contact":"5. Kapcsolat","contactGitHub":"GitHub Issues:","contactEmail":"E-mail:","h2Changes":"6. A szabályzat módosításai","changesBody":"A szabályzat frissítéseit ezen oldal és a kanonikus forrásfájl (<a href=\"https://github.com/komm64/tutti/blob/main/PRIVACY.md\">PRIVACY.md</a>) frissítésével közöljük."},"support":{"title":"Tutti — Támogatás","headerTagline":"Támogatási erőforrások és GYIK","h2Help":"Segítségre van szüksége?","h3Failed":"1. A posztolás sikertelen / valami furcsán viselkedik","failedBody":"Használja a popup-on belüli <strong>&bdquo;Diagnosztika&rdquo; → &bdquo;Jelentés&rdquo; gombot</strong>. Ez a kanonikus csatorna. A jelentés szerkesztésre kerül (kezelőnevek, URL-ek, e-mailek) és továbbításra kerül a privát issue trackerünkbe, ahol automatikusan megnyílik egy szelektor-javítási PR, és néhány napon belül hot-fix-ként minden felhasználóhoz eljut.","calloutTitle":"Miért használjam a termékbe épített jelentési gombot?","calloutBody":"A popup jelentési folyamata automatikusan csatolja a végső szerkesztési állapotot, egy szerkesztett DOM pillanatfelvételt és a szelektor audit eredményeit — pontosan amire szükség van a szelektorok hibájának gyors javításához. A PII több rétegen keresztül kerül eltávolításra a küldés előtt.","h3General":"2. Általános kérdések / funkciókérések","generalBody":"Írjon nekünk a <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a> címre. Ez egy privát csatorna, biztonságos képernyőképek / személyes kezelőnevek megosztásához.","h3Install":"3. Telepítési / fiókkérdések","installBody":"A Tutti minden közösségi hálózat esetén <strong>a meglévő böngésző bejelentkezéseit használja újra</strong>. Nincs külön Tutti fiók vagy bejelentkezési lépés. Miután bejelentkezett egy közösségi hálózatba ugyanabban a Chrome profilban, a Tutti onnan posztolhat.","h2Faq":"GYIK","q1":"K. A posztolásom nem sikerült.","a1":"Ez általában azt jelenti, hogy egy közösségi hálózat megváltoztatta a DOM-ját. Használja a popup-ban a <strong>Diagnosztika → Jelentés</strong>-t. A szelektor hot-fix általában néhány napon belül érkezik a <code>selectors.json</code> automatikus frissítésén keresztül (nincs szükség bővítményfrissítésre).","q2":"K. A Tutti nem emlékszik a bejelentkezésemre.","a2":"A Tutti a hálózat normál böngésző-bejelentkezésére támaszkodik. Először jelentkezzen be minden hálózatba Chrome-ban, majd a Tutti az Ön nevében posztolhat. Inkognitó módban nem működik, mert a hálózat munkamenetei nincsenek ott.","q3":"K. A karakterkorlátok hálózatonként eltérőek — probléma ez?","a3":"Nem. A hálózat karakterkorlátját meghaladó hosszú bejegyzések automatikusan folytatás-szálra oszlanak (X-en megfelelő válaszláncra; más hálózatokon szekvenciális bejegyzésekre). A korláton belüli bejegyzések úgy mennek át, ahogy vannak.","q4":"K. Azt mondják, hogy a képem / videóm túl nagy.","a4":"A képek automatikusan átméreteződnek a Canvas-on keresztül, hogy illeszkedjenek az egyes hálózatok méretkorlátjához. A videók automatikusan tömörítésre kerülnek az ffmpeg.wasm segítségével, amikor egy hálózat korlátja fölé érnek. Ha még a tömörítés sem fér el, hibaüzenetet fog látni — kérjük, először ellenőrizze, hogy a fájl feltöltődik a hálózat natív alkalmazásán keresztül.","q5":"K. Látja a Tutti a bejegyzéseim tartalmát?","a5":"Nem. A bejegyzés tartalma soha nem halad át harmadik fél szerverén. A Tutti közvetlenül beilleszti minden hálózat web-szerkesztő oldalába. Részletekért lásd az <a href=\"./privacy.html\">Adatvédelmi szabályzatunkat</a>. Az egyetlen kivétel az, amikor megnyomja a termékbe épített jelentési gombot, amely szerkesztett hibainformációt küld a privát issue trackerünkbe.","q6":"K. Adományozhatok?","a6":"Még nem — alacsony nyomású támogatási csatornán dolgozunk. A legnagyobb folyamatos költség az egyes közösségi hálózatok UI változtatásainak követése; a jövőbeli Ko-fi folyamatok ezt a karbantartást finanszírozzák majd."}},"id":{"lang":"id","common":{"appName":"Tutti","tagline":"Satu ekstensi Chrome. Sebelas jejaring sosial. Tanpa repot.","navHome":"Beranda","navGitHub":"GitHub","navSupport":"Dukungan","navPrivacy":"Kebijakan privasi","navLanguages":"Bahasa lain","footerCopy":"&copy; 2026 komm64 &mdash; <a href=\"https://github.com/komm64/tutti/blob/main/LICENSE\">Hak cipta dilindungi</a>","footerContact":"Tutti adalah ekstensi Chrome oleh <a href=\"https://github.com/komm64\">komm64</a>. Kontak: <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>"},"index":{"title":"Tutti — Ekstensi posting silang","headerTagline":"Satu ekstensi Chrome. Sebelas jejaring sosial. Tanpa repot.","h2Overview":"Ikhtisar","overviewBody":"Tutti menyiarkan postingan yang sama ke 11 jejaring sosial (X, Bluesky, Threads, Tumblr, Mastodon, Misskey, Pixiv, TikTok, YouTube Shorts, Instagram, DeviantArt) dengan satu klik. Tidak ada backend; konten postingan tidak pernah melewati server pihak ketiga mana pun.","h2PrivacySummary":"Privasi dalam satu kalimat","privacySummaryBody":"Tutti tidak memiliki server backend. Konten postingan (teks, gambar, video) langsung dari browser Anda ke setiap jejaring sosial yang Anda pilih — tidak pernah melalui server yang dikendalikan pengembang.","privacyFullPolicy":"Kebijakan lengkap:"},"privacy":{"title":"Tutti — Kebijakan privasi","headerTagline":"Tidak ada pengumpulan data pihak ketiga. Semua konten postingan langsung dari browser Anda ke setiap SNS.","lastUpdated":"Terakhir diperbarui: 2026-05-23 (v0.5.0)","h2Data":"1. Data yang kami kumpulkan dan kirim","dataIntro":"<strong>Tutti tidak memiliki server backend.</strong> Konten postingan (teks, gambar, video) tidak pernah dikirim ke server pihak ketiga mana pun. Konten ini berjalan langsung dari browser Anda ke setiap jejaring sosial yang Anda pilih, persis seolah-olah Anda mengetik dan mengirimnya sendiri di sana.","dataLi1":"Teks, gambar, dan video postingan diteruskan hanya ke halaman SNS yang Anda pilih (X, Bluesky, Threads, Mastodon, Misskey, Tumblr, Pixiv, DeviantArt, Instagram, TikTok, YouTube) di dalam browser Anda.","dataLi2":"Saat jalur API resmi opsional diaktifkan untuk Bluesky / Mastodon / Misskey, postingan dikirim langsung dari browser Anda ke <strong>server API milik SNS tersebut</strong> menggunakan kredensial yang Anda berikan di Pengaturan. Tidak ada server Tutti / pengembang yang terlibat.","dataLi3":"Tidak ada data analitik, pelacakan, atau iklan yang dikumpulkan.","dataLi4":"Tutti <strong>tidak</strong> membaca atau menyimpan token autentikasi, cookie, atau data sesi Anda dari situs SNS.","h3Report":"Pengecualian — laporan kesalahan manual (persetujuan per klik)","reportIntro":"Saat (dan hanya saat) Anda menekan <strong>tombol &laquo;Laporkan&raquo;</strong> yang ditampilkan di dialog kesalahan atau panel diagnosis, hal berikut dikirim melalui relay Cloudflare Workers ke <strong>pelacak issue GitHub pribadi</strong> (<code>komm64/tutti-issues</code>, hanya terlihat oleh pengembang Tutti):","reportLi1":"Pesan kesalahan, versi ekstensi, string User-Agent browser.","reportLi2":"30 entri terakhir dari log internal ekstensi (tingkat log yang Anda konfigurasi; INFO secara default). Konten postingan, gambar, video, data login SNS, dan kredensial API <strong>tidak pernah</strong> disertakan.","reportLi3":"Snapshot DOM yang disunting dari tab SNS tempat kesalahan terjadi, digunakan untuk memperbaiki selektor yang rusak. Konten teks, nilai atribut, jalur/kueri/fragmen URL, atribut <code>href</code>/<code>src</code>, dan tag <code>&lt;meta&gt;</code>/<code>&lt;link&gt;</code> dihapus. P
