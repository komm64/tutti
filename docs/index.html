ayload dibatasi 8 KB. Lihat <a href=\"https://github.com/komm64/tutti/blob/main/src/utils/dom-snapshot.ts\">dom-snapshot.ts</a> untuk implementasinya.","reportOutro":"Tidak ada yang dikirim sampai Anda menekan tombol laporan. Tujuannya pribadi, hanya terlihat oleh pengembang Tutti.","h2Local":"2. Data yang disimpan secara lokal","localIntro":"Hal-hal berikut disimpan hanya di dalam browser Anda melalui API <code>storage</code> Chrome. Tidak ada yang dikirim keluar perangkat oleh Tutti.","localSettings":"<strong>Pengaturan</strong> (<code>chrome.storage.sync</code>): URL instance Mastodon / Misskey, sakelar autoPost, mode tampilan, URL pengganti selektor, dll. Dapat direplikasi ke perangkat lain Anda melalui Chrome Sync jika Anda masuk ke Chrome.","localDrafts":"<strong>Draf</strong> (<code>chrome.storage.session</code>): Teks postingan yang sedang berlangsung dan media terlampir (gambar / video). Dihapus otomatis saat browser keluar.","localSelected":"<strong>SNS yang dipilih</strong> (<code>chrome.storage.local</code>): SNS yang Anda centang sebagai target postingan. Tetap ada antar sesi untuk kenyamanan; hanya lokal di perangkat.","localUsers":"<strong>Nama pengguna terakhir terlihat</strong> (<code>chrome.storage.local</code>): Nama pengguna yang saat ini masuk di setiap SNS, ditampilkan di popup sehingga Anda dapat mengonfirmasi akun mana yang akan menerima postingan. Hanya lokal di perangkat.","localHistory":"<strong>Riwayat postingan</strong> (<code>chrome.storage.local</code>): 20 postingan terakhir: 80 karakter pertama teks, platform target, keberhasilan/kegagalan per platform, dan stempel waktu. Hanya lokal di perangkat.","localCreds":"<strong>Kredensial API</strong> (<code>chrome.storage.local</code>): Hanya jika Anda secara eksplisit mengaktifkan jalur API resmi untuk Bluesky / Mastodon / Misskey: Bluesky app password atau token akses Mastodon / Misskey Anda. <strong>Hanya lokal di perangkat; tidak pernah direplikasi melalui Chrome Sync; tidak pernah dikirim ke server pengembang mana pun.</strong> Dapat dihapus dari wizard Pengaturan.","localSelectors":"<strong>Cache pengganti selektor</strong> (<code>chrome.storage.local</code>): Data hot-fix selektor yang diambil dari URL yang Anda konfigurasi di Pengaturan (default: <code>selectors.json</code> publik di GitHub Pages Tutti).","localVideoCap":"<strong>Cache batas unggahan video</strong> (<code>chrome.storage.local</code>): Hasil probe API untuk batas unggahan video per akun (mis. Bluesky). Hanya nilai numerik; tidak ada kredensial.","localWipe":"Semua ini dapat dihapus kapan saja dengan menghapus instalasi ekstensi atau membersihkan penyimpanan ekstensi Chrome.","h2Perms":"3. Izin yang digunakan","permsThead1":"Izin","permsThead2":"Tujuan","permsStorage":"Menyimpan data lokal di atas (pengaturan, draf, riwayat, platform yang dipilih, dll.) di dalam browser Anda.","permsOffscreen":"Menjalankan <code>ffmpeg.wasm</code> di dokumen offscreen untuk mengompres / mengkode ulang file video saat sumber melebihi batas ukuran SNS tujuan. Data video diproses hanya secara lokal; tidak dikirim ke mana pun oleh Tutti.","permsSidePanel":"Mode tampilan UI opsional: menampilkan formulir penulisan Tutti di panel samping Chrome alih-alih popup tindakan, agar tetap terbuka saat Anda beralih antara tab SNS. Anda mengaktifkannya melalui halaman Opsi; default adalah popup standar.","permsHost":"Menyuntikkan content scripts ke setiap situs SNS (x.com / twitter.com / bsky.app / bsky.social / threads.net / threads.com / mastodon.social / misskey.io / tumblr.com / pixiv.net / tiktok.com / youtube.com / instagram.com / deviantart.com) untuk mengisi formulir penulisan dengan konten postingan Anda dan mengirimkannya atas nama Anda. Tidak ada data yang dibaca dari situs ini dan dikirim ke tempat lain; content script hanya menulis input Anda sendiri.","permsOptHost":"Diminta saat runtime hanya jika Anda mengonfigurasi URL instance Mastodon atau Misskey kustom (selain default). Chrome menampilkan permintaan izin standar pada saat itu.","h2Relationship":"4. Hubungan dengan penyedia SNS","relationshipBody":"Tutti mengotomatiskan UI web dari (atau, secara opsional, memposting melalui API resmi) 11 jejaring yang didukung. Ini adalah fungsi tidak resmi; Tutti tidak berafiliasi dengan X, Bluesky, Meta (Threads / Instagram), Mastodon gGmbH, Misskey, Tumblr, Pixiv, DeviantArt, TikTok, atau YouTube. Anda tetap terikat oleh ketentuan penggunaan masing-masing layanan.","h2Contact":"5. Kontak","contactGitHub":"GitHub Issues:","contactEmail":"Email:","h2Changes":"6. Perubahan pada kebijakan ini","changesBody":"Pembaruan pada kebijakan ini dikomunikasikan dengan memperbarui halaman ini dan file sumber kanonis (<a href=\"https://github.com/komm64/tutti/blob/main/PRIVACY.md\">PRIVACY.md</a>)."},"support":{"title":"Tutti — Dukungan","headerTagline":"Sumber daya dukungan dan FAQ","h2Help":"Butuh bantuan?","h3Failed":"1. Postingan gagal / ada yang berperilaku aneh","failedBody":"Gunakan <strong>tombol &laquo;Diagnosis&raquo; → &laquo;Laporkan&raquo; di dalam popup</strong>. Ini adalah saluran kanonis. Laporan disunting (handle, URL, email) dan diteruskan ke pelacak issue pribadi kami, di mana PR perbaikan selektor dibuka secara otomatis dan dikirim sebagai hot-fix ke semua pengguna dalam beberapa hari.","calloutTitle":"Mengapa menggunakan tombol laporan dalam produk?","calloutBody":"Aliran laporan popup secara otomatis melampirkan keadaan penulisan akhir, snapshot DOM yang disunting, dan hasil audit selektor — persis apa yang dibutuhkan untuk memperbaiki kerusakan selektor dengan cepat. PII dihapus melalui beberapa lapisan sebelum dikirim.","h3General":"2. Pertanyaan umum / permintaan fitur","generalBody":"Kirim email kepada kami di <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>. Ini adalah saluran pribadi, aman untuk berbagi tangkapan layar / handle pribadi.","h3Install":"3. Pertanyaan instalasi / akun","installBody":"Tutti <strong>menggunakan kembali login browser yang sudah ada</strong> untuk setiap jejaring sosial. Tidak ada akun Tutti terpisah atau langkah login. Setelah Anda masuk ke jejaring sosial di profil Chrome yang sama, Tutti dapat memposting dari sana.","h2Faq":"FAQ","q1":"T. Postingan saya gagal.","a1":"Ini biasanya berarti jejaring sosial mengubah DOM-nya. Gunakan <strong>Diagnosis → Laporkan</strong> di popup. Hot-fix selektor biasanya dikirim dalam beberapa hari melalui pembaruan otomatis <code>selectors.json</code> (tidak perlu pembaruan ekstensi).","q2":"T. Tutti tidak mengingat login saya.","a2":"Tutti bergantung pada login browser normal dari jejaring. Login ke setiap jejaring di Chrome terlebih dahulu, kemudian Tutti dapat memposting atas nama Anda. Mode penyamaran tidak berfungsi karena sesi jejaring tidak ada di sana.","q3":"T. Batas karakter berbeda per jejaring — apakah itu masalah?","a3":"Tidak. Postingan panjang yang melebihi batas karakter jejaring secara otomatis dibagi menjadi utas lanjutan (di X, rantai balasan yang tepat; di jejaring lain, postingan berurutan). Postingan dalam batas dilewati apa adanya.","q4":"T. Saya diberi tahu bahwa gambar / video saya terlalu besar.","a4":"Gambar diubah ukurannya secara otomatis melalui Canvas agar sesuai dengan batas ukuran setiap jejaring. Video dikompresi secara otomatis dengan ffmpeg.wasm saat berada di atas batas jejaring. Jika bahkan kompresi tidak muat, Anda akan melihat kesalahan — silakan verifikasi terlebih dahulu bahwa file diunggah melalui aplikasi asli jejaring.","q5":"T. Apakah Tutti melihat konten postingan saya?","a5":"Tidak. Konten postingan tidak pernah melewati server pihak ketiga. Tutti menyuntikkan langsung ke halaman web penulisan setiap jejaring. Lihat <a href=\"./privacy.html\">Kebijakan Privasi</a> kami untuk detailnya. Satu-satunya pengecualian adalah saat Anda menekan tombol laporan dalam produk, yang mengirim informasi kesalahan yang disunting ke pelacak issue pribadi kami.","q6":"T. Bisakah saya berdonasi?","a6":"Belum — kami sedang mengerjakan saluran dukungan tanpa tekanan. Biaya berkelanjutan terbesar adalah mengikuti perubahan UI setiap jejaring sosial; aliran Ko-fi di masa depan akan mendanai pemeliharaan tersebut."}},"it":{"lang":"it","common":{"appName":"Tutti","tagline":"Un'estensione di Chrome. Undici social network. Zero seccature.","navHome":"Home","navGitHub":"GitHub","navSupport":"Supporto","navPrivacy":"Informativa sulla privacy","navLanguages":"Altre lingue","footerCopy":"&copy; 2026 komm64 &mdash; <a href=\"https://github.com/komm64/tutti/blob/main/LICENSE\">Tutti i diritti riservati</a>","footerContact":"Tutti è un'estensione di Chrome di <a href=\"https://github.com/komm64\">komm64</a>. Contatto: <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>"},"index":{"title":"Tutti — Estensione per pubblicare su più piattaforme","headerTagline":"Un'estensione di Chrome. Undici social network. Zero seccature.","h2Overview":"Panoramica","overviewBody":"Tutti trasmette lo stesso post su 11 social network (X, Bluesky, Threads, Tumblr, Mastodon, Misskey, Pixiv, TikTok, YouTube Shorts, Instagram, DeviantArt) con un solo clic. Non ha backend; il contenuto dei post non passa mai per alcun server di terze parti.","h2PrivacySummary":"Privacy in una frase","privacySummaryBody":"Tutti non ha un server backend. Il contenuto dei post (testo, immagini, video) va direttamente dal tuo browser a ciascun social network selezionato — mai tramite un server controllato dallo sviluppatore.","privacyFullPolicy":"Informativa completa:"},"privacy":{"title":"Tutti — Informativa sulla privacy","headerTagline":"Nessuna raccolta di dati da parte di terzi. Tutto il contenuto dei post va direttamente dal tuo browser a ciascun SNS.","lastUpdated":"Ultimo aggiornamento: 2026-05-23 (v0.5.0)","h2Data":"1. Dati che raccogliamo e trasmettiamo","dataIntro":"<strong>Tutti non ha un server backend.</strong> Il contenuto dei post (testo, immagini, video) non viene mai trasmesso ad alcun server di terze parti. Viaggia direttamente dal tuo browser a ciascun social network selezionato, esattamente come se lo avessi digitato e inviato tu stesso.","dataLi1":"Il testo, le immagini e i video dei post vengono passati solo alle pagine SNS che scegli (X, Bluesky, Threads, Mastodon, Misskey, Tumblr, Pixiv, DeviantArt, Instagram, TikTok, YouTube) all'interno del tuo browser.","dataLi2":"Quando il percorso API ufficiale facoltativo è abilitato per Bluesky / Mastodon / Misskey, i post vengono inviati direttamente dal tuo browser al <strong>server API proprio di quel SNS</strong> utilizzando le credenziali da te fornite nelle Impostazioni. Nessun server Tutti / dello sviluppatore è coinvolto.","dataLi3":"Non vengono raccolti dati di analisi, tracciamento o pubblicitari.","dataLi4":"Tutti <strong>non</strong> legge né memorizza i tuoi token di autenticazione, cookie o dati di sessione dei siti SNS.","h3Report":"Eccezione — segnalazioni manuali di errore (consenso per clic)","reportIntro":"Quando (e solo quando) premi il <strong>pulsante &ldquo;Segnala&rdquo;</strong> mostrato in una finestra di errore o nel pannello di diagnosi, il seguente viene inviato tramite un relay Cloudflare Workers a un <strong>tracker di issue GitHub privato</strong> (<code>komm64/tutti-issues</code>, visibile solo allo sviluppatore di Tutti):","reportLi1":"Il messaggio di errore, la versione dell'estensione, la stringa User-Agent del browser.","reportLi2":"Le ultime 30 voci del log interno dell'estensione (il livello di log che hai configurato; INFO per impostazione predefinita). Il contenuto dei post, le immagini, i video, i dati di accesso ai SNS e le credenziali API <strong>non</strong> sono mai inclusi.","reportLi3":"Uno snapshot DOM redatto della scheda SNS in cui si è verificato l'errore, utilizzato per riparare i selettori rotti. Il contenuto testuale, i valori degli attributi, i percorsi/query/frammenti URL, gli attributi <code>href</code>/<code>src</code> e i tag <code>&lt;meta&gt;</code>/<code>&lt;link&gt;</code> vengono rimossi. Il payload è limitato a 8 KB. Vedere <a href=\"https://github.com/komm64/tutti/blob/main/src/utils/dom-snapshot.ts\">dom-snapshot.ts</a> per l'implementazione.","reportOutro":"Nulla viene inviato finché non premi il pulsante di segnalazione. La destinazione è privata, visibile solo allo sviluppatore di Tutti.","h2Local":"2. Dati memorizzati localmente","localIntro":"Quanto segue è memorizzato solo all'interno del tuo browser tramite l'API <code>storage</code> di Chrome. Nulla viene trasmesso fuori dal dispositivo da Tutti.","localSettings":"<strong>Impostazioni</strong> (<code>chrome.storage.sync</code>): URL di istanze Mastodon / Misskey, toggle autoPost, modalità di visualizzazione, URL di override dei selettori, ecc. Può essere replicato sui tuoi altri dispositivi tramite Chrome Sync se hai effettuato l'accesso a Chrome.","localDrafts":"<strong>Bozze</strong> (<code>chrome.storage.session</code>): Testo del post in corso e media allegati (immagini / video). Cancellato automaticamente alla chiusura del browser.","localSelected":"<strong>SNS selezionati</strong> (<code>chrome.storage.local</code>): I SNS che hai contrassegnato come destinazioni di pubblicazione. Persiste tra le sessioni per comodità; solo locale al dispositivo.","localUsers":"<strong>Ultimi nomi utente visti</strong> (<code>chrome.storage.local</code>): Il nome utente attualmente connesso su ciascun SNS, visualizzato nel popup per consentirti di confermare quale account riceverà il post. Solo locale al dispositivo.","localHistory":"<strong>Cronologia post</strong> (<code>chrome.storage.local</code>): Gli ultimi 20 post: primi 80 caratteri di testo, piattaforme di destinazione, successo/fallimento per piattaforma e timestamp. Solo locale al dispositivo.","localCreds":"<strong>Credenziali API</strong> (<code>chrome.storage.local</code>): Solo se hai abilitato esplicitamente il percorso API ufficiale per Bluesky / Mastodon / Misskey: la tua app password Bluesky o l'access token Mastodon / Misskey. <strong>Solo locale al dispositivo; mai replicato tramite Chrome Sync; mai trasmesso ad alcun server dello sviluppatore.</strong> Rimovibile dalla procedura guidata delle Impostazioni.","localSelectors":"<strong>Cache di override dei selettori</strong> (<code>chrome.storage.local</code>): Dati di hot-fix dei selettori recuperati dall'URL che hai configurato in Impostazioni (predefinito: il <code>selectors.json</code> pubblico sulle GitHub Pages di Tutti).","localVideoCap":"<strong>Cache del limite di upload video</strong> (<code>chrome.storage.local</code>): Risultato dei sondaggi API per i limiti di upload video per account (ad es. Bluesky). Solo valori numerici; nessuna credenziale.","localWipe":"Tutto questo può essere cancellato in qualsiasi momento disinstallando l'estensione o cancellando lo storage delle estensioni di Chrome.","h2Perms":"3. Autorizzazioni utilizzate","permsThead1":"Autorizzazione","permsThead2":"Scopo","permsStorage":"Memorizzare i dati locali sopra (impostazioni, bozze, cronologia, piattaforme selezionate, ecc.) all'interno del tuo browser.","permsOffscreen":"Eseguire <code>ffmpeg.wasm</code> in un documento offscreen per comprimere / ricodificare file video quando la sorgente supera il limite di dimensione del SNS di destinazione. I dati video vengono elaborati solo localmente; non trasmessi da nessuna parte da Tutti.","permsSidePanel":"Modalità di visualizzazione UI opzionale: mostra il modulo di composizione di Tutti nel pannello laterale di Chrome anziché nel popup di azione, in modo che rimanga aperto mentre passi da una scheda SNS all'altra. Opt-in dalla pagina Opzioni; il valore predefinito è il popup standard.","permsHost":"Iniettare content script in ciascun sito SNS (x.com / twitter.com / bsky.app / bsky.social / threads.net / threads.com / mastodon.social / misskey.io / tumblr.com / pixiv.net / tiktok.com / youtube.com / instagram.com / deviantart.com) per compilare il modulo di composizione con il contenuto del post e inviarlo per tuo conto. Nessun dato viene letto da questi siti e inviato altrove; il content script scrive solo il tuo input.","permsOptHost":"Richiesto a runtime solo se configuri un URL di istanza Mastodon o Misskey personalizzato (diverso dai predefiniti). In quel momento Chrome mostra il prompt di autorizzazione standard.","h2Relationship":"4. Rapporto con i provider SNS","relationshipBody":"Tutti automatizza l'interfaccia web (o, facoltativamente, pubblica tramite l'API ufficiale) degli 11 network supportati. Questa è funzionalità non ufficiale; Tutti non è affiliato a X, Bluesky, Meta (Threads / Instagram), Mastodon gGmbH, Misskey, Tumblr, Pixiv, DeviantArt, TikTok o YouTube. Rimani soggetto ai termini di utilizzo di ciascun servizio.","h2Contact":"5. Contatto","contactGitHub":"GitHub Issues:","contactEmail":"Email:","h2Changes":"6. Modifiche a questa informativa","changesBody":"Gli aggiornamenti a questa informativa vengono comunicati aggiornando questa pagina e il file sorgente canonico (<a href=\"https://github.com/komm64/tutti/blob/main/PRIVACY.md\">PRIVACY.md</a>)."},"support":{"title":"Tutti — Supporto","headerTagline":"Risorse di supporto e FAQ","h2Help":"Hai bisogno di aiuto?","h3Failed":"1. La pubblicazione è fallita / qualcosa si comporta in modo strano","failedBody":"Usa il <strong>pulsante &ldquo;Diagnostica&rdquo; → &ldquo;Segnala&rdquo; all'interno del popup</strong>. Questo è il canale canonico. La segnalazione viene redatta (handle, URL, email) e inoltrata al nostro tracker di issue privato, dove viene aperta automaticamente una PR di correzione dei selettori e inviata come hot-fix a tutti gli utenti entro pochi giorni.","calloutTitle":"Perché usare il pulsante di segnalazione integrato nel prodotto?","calloutBody":"Il flusso di segnalazione del popup allega automaticamente lo stato finale di composizione, uno snapshot DOM redatto e i risultati di audit dei selettori — esattamente ciò che serve per correggere rapidamente la rottura dei selettori. La PII viene rimossa attraverso più livelli prima dell'invio.","h3General":"2. Domande generali / richieste di funzionalità","generalBody":"Scrivici a <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>. Questo è un canale privato, sicuro per condividere screenshot / handle personali.","h3Install":"3. Domande su installazione / account","installBody":"Tutti <strong>riutilizza i tuoi accessi al browser esistenti</strong> per ciascun social network. Non c'è un account Tutti separato né una procedura di accesso. Una volta effettuato l'accesso a un social network nello stesso profilo Chrome, Tutti può pubblicare da lì.","h2Faq":"FAQ","q1":"D. La mia pubblicazione è fallita.","a1":"Di solito significa che un social network ha modificato il suo DOM. Usa <strong>Diagnostica → Segnala</strong> nel popup. Un hot-fix di selettore solitamente viene rilasciato entro pochi giorni tramite l'aggiornamento automatico di <code>selectors.json</code> (non è richiesto un aggiornamento dell'estensione).","q2":"D. Tutti non ricorda il mio accesso.","a2":"Tutti si basa sul normale accesso al browser del network. Accedi prima a ciascun network in Chrome, poi Tutti potrà pubblicare per tuo conto. La modalità in incognito non funziona perché le sessioni del network non sono presenti.","q3":"D. I limiti di caratteri differiscono per network — è un problema?","a3":"No. I post lunghi che superano il limite di caratteri di un network vengono automaticamente divisi in un thread di continuazione (su X, una vera catena di risposte; su altri network, post sequenziali). I post entro il limite vengono inviati così come sono.","q4":"D. Mi viene detto che la mia immagine / il mio video è troppo grande.","a4":"Le immagini vengono ridimensionate automaticamente tramite Canvas per adattarsi al limite di dimensione di ciascun network. I video vengono compressi automaticamente con ffmpeg.wasm quando superano il limite di un network. Se nemmeno la compressione è sufficiente, vedrai un errore — verifica prima che il file venga caricato tramite l'app nativa del network.","q5":"D. Tutti vede il contenuto del mio post?","a5":"No. Il contenuto dei post non passa mai per un server di terze parti. Tutti inietta direttamente nella pagina web di composizione di ciascun network. Vedi la nostra <a href=\"./privacy.html\">Informativa sulla privacy</a> per i dettagli. L'unica eccezione è quando premi il pulsante di segnalazione integrato nel prodotto, che invia informazioni di errore redatte al nostro tracker di issue privato.","q6":"D. Posso fare una donazione?","a6":"Non ancora — stiamo lavorando a un canale di supporto a bassa pressione. Il costo continuo maggiore è stare al passo con le modifiche dell'interfaccia di ciascun social network; i futuri flussi Ko-fi finanzieranno quella manutenzione."}},"ja":{"lang":"ja","common":{"appName":"Tutti","tagline":"1 つの Chrome 拡張で 11 の SNS にクロスポスト。手間ゼロ。","navHome":"ホーム","navGitHub":"GitHub","navSupport":"サポート","navPrivacy":"プライバシーポリシー","navLanguages":"他の言語","footerCopy":"&copy; 2026 komm64 &mdash; <a href=\"https://github.com/komm64/tutti/blob/main/LICENSE\">All Rights Reserved</a>","footerContact":"Tutti は <a href=\"https://github.com/komm64\">komm64</a> による Chrome 拡張です。連絡先: <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>"},"index":{"title":"Tutti — クロスポスト拡張","headerTagline":"1 つの Chrome 拡張で 11 の SNS にクロスポスト。手間ゼロ。","h2Overview":"概要","overviewBody":"Tutti は同じ投稿を 11 のソーシャルネットワーク (X, Bluesky, Threads, Tumblr, Mastodon, Misskey, Pixiv, TikTok, YouTube Shorts, Instagram, DeviantArt) にワンクリックで一斉送信します。バックエンドを持たず、投稿内容はいかなる第三者サーバーも経由しません。","h2PrivacySummary":"プライバシーを一言で","privacySummaryBody":"Tutti にバックエンドサーバーは無く、投稿コンテンツ (テキスト・画像・動画) はブラウザから選択した各 SNS へ直接送信されます。開発者の管理サーバーを経由することはありません。","privacyFullPolicy":"完全なポリシー:"},"privacy":{"title":"Tutti — プライバシーポリシー","headerTagline":"第三者サーバーを経由しません。投稿内容はブラウザから各 SNS に直接渡されます。","lastUpdated":"最終更新: 2026-05-23 (v0.5.0)","h2Data":"1. 取得・送信するデータ","dataIntro":"<strong>Tutti にバックエンドサーバーは存在しません。</strong> 投稿コンテンツ (テキスト・画像・動画) はいかなる第三者サーバーにも送信されません。ブラウザから直接、ユーザーが選択した各 SNS に、自分でそこに入力して送信したのと同じように渡されます。","dataLi1":"投稿テキスト・画像・動画は、ユーザーが選択した SNS (X, Bluesky, Threads, Mastodon, Misskey, Tumblr, Pixiv, DeviantArt, Instagram, TikTok, YouTube) のページにブラウザ内でのみ渡されます。","dataLi2":"Bluesky / Mastodon / Misskey で公式 API 経路を有効にしている場合、Settings に登録された認証情報を使って <strong>各 SNS の公式 API サーバーへ直接</strong> 接続します。Tutti / 開発者サーバーは介在しません。","dataLi3":"解析・トラッキング・広告のためのデータ収集は行いません。","dataLi4":"Tutti は SNS の認証 token / cookie / セッションデータを <strong>読み取りません</strong>。保存もしません。","h3Report":"例外 — 手動エラー報告 (click ごとに opt-in)","reportIntro":"popup のエラー dialog または診断 panel に表示される <strong>「報告する」ボタン</strong>をユーザーが押した時 (またその時に限り)、以下が Cloudflare Workers リレー経由で <strong>private な GitHub issue tracker</strong> (<code>komm64/tutti-issues</code>、Tutti 開発者のみ閲覧可) に送信されます:","reportLi1":"エラーメッセージ、拡張バージョン、ブラウザ User-Agent 文字列。","reportLi2":"拡張内部ログの末尾 30 件 (設定された log level、default は INFO)。投稿本文・画像・動画・SNS のログイン情報・API credentials は <strong>含まれません</strong>。","reportLi3":"セレクタ修復用に、エラーが発生した SNS タブの redacted DOM snapshot。テキスト・属性値・URL の path/query/fragment、<code>href</code>/<code>src</code> 属性、<code>&lt;meta&gt;</code>/<code>&lt;link&gt;</code> タグを削除した上で、最大 8 KB で送信されます。実装は <a href=\"https://github.com/komm64/tutti/blob/main/src/utils/dom-snapshot.ts\">dom-snapshot.ts</a> を参照。","reportOutro":"報告ボタンを押すまで送信は発生しません。送信先は private で、Tutti 開発者のみ閲覧できます。","h2Local":"2. ローカルに保存するデータ","localIntro":"以下は Chrome の <code>storage</code> API を介してユーザーのブラウザ内にのみ保存されます。Tutti から外部に送信されることはありません。","localSettings":"<strong>設定</strong> (<code>chrome.storage.sync</code>): Mastodon / Misskey インスタンス URL、autoPost トグル、表示方式、Selector override URL 等。Chrome にサインインしていれば Chrome Sync で他デバイスに複製される場合があります。","localDrafts":"<strong>下書き</strong> (<code>chrome.storage.session</code>): 入力中のテキスト + 添付メディア (画像・動画)。ブラウザ終了時に自動消去。","localSelected":"<strong>SNS 選択</strong> (<code>chrome.storage.local</code>): 投稿先としてチェックした SNS。便宜上セッションをまたいで保持されます。デバイスローカルのみ。","localUsers":"<strong>ログイン中アカウント名</strong> (<code>chrome.storage.local</code>): 各 SNS の現在ログイン中ユーザー名。どのアカウントに投稿されるかを popup で確認できるよう表示されます。デバイスローカルのみ。","localHistory":"<strong>投稿履歴</strong> (<code>chrome.storage.local</code>): 直近 20 件の投稿。先頭 80 文字・対象プラットフォーム・プラットフォーム別の成否・タイムスタンプを記録。デバイスローカルのみ。","localCreds":"<strong>API credentials</strong> (<code>chrome.storage.local</code>): Bluesky / Mastodon / Misskey の公式 API 経路を明示的に有効にした場合のみ保存される、Bluesky app password または Mastodon / Misskey の access token。<strong>デバイスローカル限定。Chrome Sync には載らず、開発者サーバーにも送信されません。</strong> Settings の wizard から個別削除可能。","localSelectors":"<strong>Selector override キャッシュ</strong> (<code>chrome.storage.local</code>): Settings で指定された URL から取得した selector hot-fix データ (default は Tutti GitHub Pages の公式 <code>selectors.json</code>)。","localVideoCap":"<strong>動画 upload 上限キャッシュ</strong> (<code>chrome.storage.local</code>): Bluesky 等の動画 upload 上限を API probe した結果。数値のみ、認証情報を含みません。","localWipe":"拡張のアンインストール、または Chrome の拡張ストレージクリアでいつでもすべて完全削除できます。","h2Perms":"3. 必要な権限","permsThead1":"権限","permsThead2":"用途","permsStorage":"上記のローカルデータ (設定・下書き・履歴・選択 SNS 等) をブラウザ内に保存するため。","permsOffscreen":"動画ファイルが投稿先 SNS のサイズ上限を超える場合、<code>ffmpeg.wasm</code> を offscreen document 内で実行し、圧縮・再エンコードするため。動画データはローカル処理のみで、Tutti から外部送信されることはありません。","permsSidePanel":"オプションの UI 表示方式: Tutti の投稿フォームを通常の popup ではなく Chrome の side panel に表示します。SNS タブを切り替えても開いたまま使えます。Options ページで明示的に opt-in、default は標準の popup です。","permsHost":"各 SNS サイト (x.com / twitter.com / bsky.app / bsky.social / threads.net / threads.com / mastodon.social / misskey.io / tumblr.com / pixiv.net / tiktok.com / youtube.com / instagram.com / deviantart.com) に content script を inject し、投稿フォームに本文を入力してユーザーに代わって送信するため。これらのサイトからデータを読み取って外部送信することはありません。content script はユーザーの入力を書き込むだけです。","permsOptHost":"Mastodon / Misskey の代替インスタンス URL (default 以外) を設定した時のみ runtime で要求されます。その時点で Chrome の標準的な権限ダイアログが表示されます。","h2Relationship":"4. SNS 各社との関係","relationshipBody":"Tutti は対応 11 ネットワークの Web UI を自動操作 (または公式 API 経由で投稿) します。これは非公式機能であり、Tutti は X, Bluesky, Meta (Threads / Instagram), Mastodon gGmbH, Misskey, Tumblr, Pixiv, DeviantArt, TikTok, YouTube とは無関係です。各サービスの利用規約には引き続き従ってください。","h2Contact":"5. 連絡先","contactGitHub":"GitHub Issues:","contactEmail":"メール:","h2Changes":"6. ポリシーの変更","changesBody":"このポリシーの変更はこのページと canonical な source ファイル (<a href=\"https://github.com/komm64/tutti/blob/main/PRIVACY.md\">PRIVACY.md</a>) の更新によって通知されます。"},"support":{"title":"Tutti — サポート","headerTagline":"サポートリソースと FAQ","h2Help":"困ったときは","h3Failed":"1. 投稿が失敗した / 動作が変","failedBody":"<strong>popup の「診断」 → 「報告する」ボタン</strong>をお使いください。これが正規経路です。レポートは redact (ハンドル・URL・メール) 済みで private な issue tracker に転送され、そこから自動的に selector 修正 PR が作成され、数日中に hot-fix として全ユーザーに配信されます。","calloutTitle":"なぜ製品内の Report ボタンを?","calloutBody":"popup の Report 経路は投稿の最終状態、redacted DOM snapshot、selector 検出結果を自動添付します。これが selector breakage の修正に必要なすべてです。個人特定可能な情報は送信前に多段で redact されます。","h3General":"2. 一般的な質問 / 機能要望","generalBody":"<a href=\"mailto:contact@komm64.com\">contact@komm64.com</a> までメールしてください。private な経路です。スクリーンショットや個人ハンドルを安全に共有できます。","h3Install":"3. インストール / アカウント関連","installBody":"Tutti は <strong>各 SNS の既存ブラウザログインを再利用</strong>します。Tutti 専用のアカウントやログイン手順はありません。同じ Chrome プロファイルで SNS にログイン済みなら、そこから Tutti が投稿できます。","h2Faq":"FAQ","q1":"Q. 投稿が失敗しました。","a1":"多くの場合、SNS が DOM 構造を変更したためです。popup の <strong>診断 → 報告する</strong> をお使いください。多くの場合 <code>selectors.json</code> 自動更新で数日中に hot-fix が配信されます (拡張本体の更新は不要)。","q2":"Q. Tutti がログインを覚えてくれない。","a2":"Tutti は各 SNS の通常のブラウザログインに依存します。まず各 SNS に Chrome でログインしてください。そうすれば Tutti が代わりに投稿できます。シークレットモードでは SNS のセッションが存在しないため動きません。","q3":"Q. SNS によって文字数制限が違うけど問題は?","a3":"問題ありません。文字数制限を超える長文は自動で連投スレッドに分割されます (X は真の reply chain、他 SNS は連投)。制限以内ならそのまま投稿されます。","q4":"Q. 画像 / 動画が大きすぎると言われる。","a4":"画像は Canvas で各 SNS のサイズ上限に合わせて自動リサイズされます。動画は SNS の上限を超える場合 ffmpeg.wasm で自動圧縮されます。それでも収まらない場合はエラーになります。SNS のネイティブアプリでアップロードできるサイズか先に確認してください。","q5":"Q. Tutti は投稿内容を見ていますか?","a5":"いいえ。投稿内容は第三者サーバーを一切経由しません。Tutti は各 SNS の Web 投稿ページに直接 inject します。詳細は<a href=\"./privacy.html\">プライバシーポリシー</a>を参照。唯一の例外は製品内の Report ボタンを押した時で、これは redact 済のエラー情報を private な issue tracker に送信します。","q6":"Q. 寄付できますか?","a6":"もちろん！最大の継続コストは各 SNS の UI 変更への追従です。サポートいただけると助かります："}},"ko":{"lang":"ko","common":{"appName":"Tutti","tagline":"하나의 Chrome 확장 프로그램. 11개의 소셜 네트워크. 번거로움 제로.","navHome":"홈","navGitHub":"GitHub","navSupport":"지원","navPrivacy":"개인정보 처리방침","navLanguages":"다른 언어","footerCopy":"&copy; 2026 komm64 &mdash; <a href=\"https://github.com/komm64/tutti/blob/main/LICENSE\">All Rights Reserved</a>","footerContact":"Tutti는 <a href=\"https://github.com/komm64\">komm64</a>가 개발한 Chrome 확장 프로그램입니다. 연락처: <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>"},"index":{"title":"Tutti — 크로스포스트 확장 프로그램","headerTagline":"하나의 Chrome 확장 프로그램. 11개의 소셜 네트워크. 번거로움 제로.","h2Overview":"개요","overviewBody":"Tutti는 동일한 게시물을 11개의 소셜 네트워크 (X, Bluesky, Threads, Tumblr, Mastodon, Misskey, Pixiv, TikTok, YouTube Shorts, Instagram, DeviantArt)에 클릭 한 번으로 브로드캐스트합니다. 백엔드가 없으며 게시 콘텐츠는 어떠한 제3자 서버도 거치지 않습니다.","h2PrivacySummary":"한 문장으로 정리한 개인정보 보호","privacySummaryBody":"Tutti에는 백엔드 서버가 없습니다. 게시 콘텐츠 (텍스트, 이미지, 동영상)는 귀하의 브라우저에서 선택한 각 소셜 네트워크로 직접 전송됩니다 — 개발자가 통제하는 서버를 거치지 않습니다.","privacyFullPolicy":"전체 정책:"},"privacy":{"title":"Tutti — 개인정보 처리방침","headerTagline":"제3자 데이터 수집 없음. 모든 게시 콘텐츠는 브라우저에서 각 SNS로 직접 전송됩니다.","lastUpdated":"최종 업데이트: 2026-05-23 (v0.5.0)","h2Data":"1. 수집·전송하는 데이터","dataIntro":"<strong>Tutti에는 백엔드 서버가 없습니다.</strong> 게시 콘텐츠 (텍스트, 이미지, 동영상)는 어떠한 제3자 서버에도 전송되지 않습니다. 마치 귀하가 직접 입력하고 제출한 것처럼, 브라우저에서 선택한 각 소셜 네트워크로 직접 전달됩니다.","dataLi1":"게시 텍스트, 이미지, 동영상은 귀하가 선택한 SNS 페이지 (X, Bluesky, Threads, Mastodon, Misskey, Tumblr, Pixiv, DeviantArt, Instagram, TikTok, YouTube)에 브라우저 내에서만 전달됩니다.","dataLi2":"Bluesky / Mastodon / Misskey에 대해 선택적 공식 API 경로를 활성화한 경우, 설정에서 제공한 자격 증명을 사용하여 게시물이 브라우저에서 <strong>해당 SNS 자체 API 서버</strong>로 직접 전송됩니다. Tutti / 개발자 서버는 관여하지 않습니다.","dataLi3":"분석, 추적 또는 광고 데이터를 수집하지 않습니다.","dataLi4":"Tutti는 SNS 사이트의 인증 토큰, 쿠키, 세션 데이터를 <strong>읽거나 저장하지 않습니다</strong>.","h3Report":"예외 — 수동 오류 보고 (클릭 시마다 동의)","reportIntro":"오류 대화 상자 또는 진단 패널에 표시된 <strong>「보고」 버튼</strong>을 누르신 경우 (그리고 그때만), 다음 항목이 Cloudflare Workers 릴레이를 통해 <strong>비공개 GitHub issue tracker</strong> (<code>komm64/tutti-issues</code>, Tutti 개발자만 열람 가능)로 전송됩니다:","reportLi1":"오류 메시지, 확장 프로그램 버전, 브라우저 User-Agent 문자열.","reportLi2":"확장 프로그램의 내부 로그 마지막 30개 (구성한 로그 수준; 기본 INFO). 게시 콘텐츠, 이미지, 동영상, SNS 로그인 데이터, API 자격 증명은 <strong>절대</strong> 포함되지 않습니다.","reportLi3":"오류가 발생한 SNS 탭의 redacted DOM 스냅샷. 깨진 선택자를 복구하는 데 사용됩니다. 텍스트 내용, 속성값, URL 경로/쿼리/조각, <code>href</code>/<code>src</code> 속성, <code>&lt;meta&gt;</code>/<code>&lt;link&gt;</code> 태그는 모두 제거됩니다. 페이로드는 8 KB로 제한됩니다. 구현은 <a href=\"https://github.com/komm64/tutti/blob/main/src/utils/dom-snapshot.ts\">dom-snapshot.ts</a>를 참조하세요.","reportOutro":"보고 버튼을 누르기 전까지는 아무것도 전송되지 않습니다. 수신처는 비공개이며 Tutti 개발자만 열람 가능합니다.","h2Local":"2. 로컬에 저장되는 데이터","localIntro":"다음 항목은 Chrome의 <code>storage</code> API를 통해 귀하의 브라우저 내에만 저장됩니다. Tutti가 외부로 전송하는 일은 없습니다.","localSettings":"<strong>설정</strong> (<code>chrome.storage.sync</code>): Mastodon / Misskey 인스턴스 URL, autoPost 토글, 표시 방식, selector override URL 등. Chrome에 로그인되어 있는 경우 Chrome Sync를 통해 다른 기기로 복제될 수 있습니다.","localDrafts":"<strong>초안</strong> (<code>chrome.storage.session</code>): 작성 중인 게시 텍스트 및 첨부 미디어 (이미지 / 동영상). 브라우저 종료 시 자동 삭제.","localSelected":"<strong>선택된 SNS</strong> (<code>chrome.storage.local</code>): 게시 대상으로 체크한 SNS. 편의를 위해 세션 간에 유지됩니다; 기기 로컬만.","localUsers":"<strong>마지막으로 확인된 사용자명</strong> (<code>chrome.storage.local</code>): 각 SNS의 현재 로그인된 사용자명. 어느 계정이 게시물을 받을지 확인할 수 있도록 popup에 표시됩니다. 기기 로컬만.","localHistory":"<strong>게시 기록</strong> (<code>chrome.storage.local</code>): 최근 20개의 게시물: 텍스트의 처음 80자, 대상 플랫폼, 플랫폼별 성공/실패 상태, 타임스탬프. 기기 로컬만.","localCreds":"<strong>API 자격 증명</strong> (<code>chrome.storage.local</code>): Bluesky / Mastodon / Misskey의 공식 API 경로를 명시적으로 활성화한 경우에만 저장: 귀하의 Bluesky app password 또는 Mastodon / Misskey access token. <strong>기기 로컬만; Chrome Sync로 복제되지 않음; 어떠한 개발자 서버에도 전송되지 않음.</strong> 설정 마법사에서 제거할 수 있습니다.","localSelectors":"<strong>선택자 오버라이드 캐시</strong> (<code>chrome.storage.local</code>): 설정에서 구성한 URL에서 가져온 선택자 핫픽스 데이터 (기본값: Tutti의 GitHub Pages에 있는 공개 <code>selectors.json</code>).","localVideoCap":"<strong>동영상 업로드 한도 캐시</strong> (<code>chrome.storage.local</code>): 계정별 동영상 업로드 한도 (예: Bluesky)에 대한 API 프로브 결과. 숫자 값만; 자격 증명 없음.","localWipe":"확장 프로그램을 제거하거나 Chrome의 확장 프로그램 저장소를 지우면 언제든지 모두 완전히 삭제할 수 있습니다.","h2Perms":"3. 사용 권한","permsThead1":"권한","permsThead2":"용도","permsStorage":"위의 로컬 데이터 (설정, 초안, 기록, 선택된 플랫폼 등)를 브라우저 내에 저장하기 위해.","permsOffscreen":"소스가 대상 SNS의 크기 제한을 초과할 때 offscreen 문서에서 <code>ffmpeg.wasm</code>을 실행하여 동영상 파일을 압축 / 재인코딩하기 위해. 동영상 데이터는 로컬에서만 처리됩니다; Tutti가 어디로도 전송하지 않습니다.","permsSidePanel":"선택적 UI 표시 방식: 액션 popup 대신 Chrome의 사이드 패널에 Tutti의 작성 양식을 표시하여 SNS 탭 사이를 전환할 때에도 열린 상태를 유지합니다. 옵션 페이지에서 사용 설정합니다; 기본값은 표준 popup입니다.","permsHost":"각 SNS 사이트 (x.com / twitter.com / bsky.app / bsky.social / threads.net / threads.com / mastodon.social / misskey.io / tumblr.com / pixiv.net / tiktok.com / youtube.com / instagram.com / deviantart.com)에 content script를 주입하여 작성 양식에 귀하 대신 게시 콘텐츠를 채우고 제출하기 위해. 이 사이트에서 데이터를 읽어 다른 곳으로 보내지 않습니다; content script는 귀하 본인의 입력만 작성합니다.","permsOptHost":"사용자 지정 Mastodon 또는 Misskey 인스턴스 URL (기본값 외)을 구성하는 경우에만 런타임에 요청됩니다. 그 순간 Chrome이 표준 권한 프롬프트를 표시합니다.","h2Relationship":"4. SNS 제공업체와의 관계","relationshipBody":"Tutti는 11개의 지원 네트워크의 웹 UI를 자동화 (또는 선택적으로 공식 API를 통해 게시)합니다. 이는 비공식 기능이며, Tutti는 X, Bluesky, Meta (Threads / Instagram), Mastodon gGmbH, Misskey, Tumblr, Pixiv, DeviantArt, TikTok 또는 YouTube와 제휴 관계가 없습니다. 귀하는 여전히 각 서비스 자체의 이용 약관에 따라야 합니다.","h2Contact":"5. 연락처","contactGitHub":"GitHub Issues:","contactEmail":"이메일:","h2Changes":"6. 본 정책의 변경","changesBody":"본 정책에 대한 업데이트는 이 페이지 및 정식 소스 파일 (<a href=\"https://github.com/komm64/tutti/blob/main/PRIVACY.md\">PRIVACY.md</a>) 업데이트를 통해 전달됩니다."},"support":{"title":"Tutti — 지원","headerTagline":"지원 리소스 및 FAQ","h2Help":"도움이 필요하신가요?","h3Failed":"1. 게시 실패 / 동작이 이상함","failedBody":"<strong>popup 내의 「진단」→「보고」 버튼</strong>을 사용하세요. 이것이 정식 채널입니다. 보고는 redact (핸들, URL, 이메일) 처리되어 비공개 issue tracker로 전달되고, 거기에서 자동으로 선택자 수정 PR이 생성되며 며칠 내에 모든 사용자에게 핫픽스로 푸시됩니다.","calloutTitle":"왜 제품 내 보고 버튼을 사용해야 하나요?","calloutBody":"popup의 보고 흐름은 최종 작성 상태, redacted DOM 스냅샷, 선택자 감사 결과를 자동으로 첨부합니다 — 선택자 손상을 빠르게 수정하는 데 필요한 정확한 것들입니다. PII는 전송 전 여러 계층에서 제거됩니다.","h3General":"2. 일반 질문 / 기능 요청","generalBody":"<a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>로 이메일을 보내주세요. 비공개 채널이므로 스크린샷 / 개인 핸들을 안전하게 공유할 수 있습니다.","h3Install":"3. 설치 / 계정 질문","installBody":"Tutti는 <strong>각 소셜 네트워크의 기존 브라우저 로그인을 재사용</strong>합니다. 별도의 Tutti 계정이나 로그인 단계가 없습니다. 동일한 Chrome 프로파일에서 소셜 네트워크에 로그인되어 있으면 Tutti가 거기에서 게시할 수 있습니다.","h2Faq":"FAQ","q1":"Q. 게시가 실패했습니다.","a1":"이는 일반적으로 소셜 네트워크가 DOM을 변경했음을 의미합니다. popup에서 <strong>진단 → 보고</strong>를 사용하세요. 선택자 핫픽스는 일반적으로 며칠 내에 <code>selectors.json</code> 자동 업데이트를 통해 배포됩니다 (확장 프로그램 업데이트 불필요).","q2":"Q. Tutti가 내 로그인을 기억하지 못합니다.","a2":"Tutti는 네트워크의 일반 브라우저 로그인에 의존합니다. 먼저 Chrome에서 각 네트워크에 로그인한 후 Tutti가 대신 게시할 수 있습니다. 시크릿 모드에서는 네트워크 세션이 없기 때문에 작동하지 않습니다.","q3":"Q. 네트워크별 문자 제한이 다른데 — 문제가 되나요?","a3":"아니요. 네트워크의 문자 제한을 초과하는 긴 게시물은 자동으로 연속 스레드로 분할됩니다 (X에서는 정식 답글 체인; 다른 네트워크에서는 순차 게시). 제한 내의 게시물은 그대로 전송됩니다.","q4":"Q. 이미지 / 동영상이 너무 크다고 합니다.","a4":"이미지는 Canvas를 통해 각 네트워크의 크기 제한에 맞게 자동으로 크기가 조정됩니다. 동영상은 네트워크 제한을 초과할 때 ffmpeg.wasm으로 자동 압축됩니다. 압축으로도 맞지 않는 경우 오류가 표시됩니다 — 먼저 네트워크의 네이티브 앱을 통해 파일이 업로드되는지 확인하세요.","q5":"Q. Tutti가 내 게시 콘텐츠를 보나요?","a5":"아니요. 게시 콘텐츠는 어떠한 제3자 서버도 거치지 않습니다. Tutti는 각 네트워크의 웹 작성 페이지에 직접 주입합니다. 자세한 내용은 <a href=\"./privacy.html\">개인정보 처리방침</a>을 참조하세요. 유일한 예외는 제품 내 보고 버튼을 누를 때이며, 이는 redacted 오류 정보를 비공개 issue tracker로 전송합니다.","q6":"Q. 후원할 수 있나요?","a6":"아직은 아닙니다 — 부담 없는 후원 채널을 준비 중입니다. 가장 큰 지속 비용은 각 소셜 네트워크의 UI 변경을 따라잡는 것입니다; 향후의 Ko-fi 흐름은 그러한 유지보수에 자금을 지원합니다."}},"nl":{"lang":"nl","common":{"appName":"Tutti","tagline":"Eén Chrome-extensie. Elf sociale netwerken. Geen gedoe.","navHome":"Home","navGitHub":"GitHub","navSupport":"Ondersteuning","navPrivacy":"Privacybeleid","navLanguages":"Andere talen","footerCopy":"&copy; 2026 komm64 &mdash; <a href=\"https://github.com/komm64/tutti/blob/main/LICENSE\">Alle rechten voorbehouden</a>","footerContact":"Tutti is een Chrome-extensie van <a href=\"https://github.com/komm64\">komm64</a>. Contact: <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>"},"index":{"title":"Tutti — Cross-post extensie","headerTagline":"Eén Chrome-extensie. Elf sociale netwerken. Geen gedoe.","h2Overview":"Overzicht","overviewBody":"Tutti verzendt hetzelfde bericht met één klik naar 11 sociale netwerken (X, Bluesky, Threads, Tumblr, Mastodon, Misskey, Pixiv, TikTok, YouTube Shorts, Instagram, DeviantArt). Het heeft geen backend; berichtinhoud loopt nooit via een server van derden.","h2PrivacySummary":"Privacy in één zin","privacySummaryBody":"Tutti heeft geen backendserver. Berichtinhoud (tekst, afbeeldingen, video) gaat direct vanuit uw browser naar elk geselecteerd sociaal netwerk — nooit via een door de ontwikkelaar beheerde server.","privacyFullPolicy":"Volledig beleid:"},"privacy":{"title":"Tutti — Privacybeleid","headerTagline":"Geen gegevensverzameling door derden. Alle berichtinhoud gaat direct vanuit uw browser naar elk SNS.","lastUpdated":"Laatst bijgewerkt: 2026-05-23 (v0.5.0)","h2Data":"1. Gegevens die we verzamelen en verzenden","dataIntro":"<strong>Tutti heeft geen backendserver.</strong> Berichtinhoud (tekst, afbeeldingen, video) wordt nooit verzonden naar een server van derden. Het reist direct vanuit uw browser naar elk geselecteerd sociaal netwerk, precies alsof u het daar zelf had getypt en verzonden.","dataLi1":"Tekst, afbeeldingen en video van berichten worden alleen doorgegeven aan de door u gekozen SNS-pagina's (X, Bluesky, Threads, Mastodon, Misskey, Tumblr, Pixiv, DeviantArt, Instagram, TikTok, YouTube) binnen uw browser.","dataLi2":"Wanneer het optionele officiële API-pad is ingeschakeld voor Bluesky / Mastodon / Misskey, worden berichten direct vanuit uw browser naar de <strong>eigen API-server van dat SNS</strong> gestuurd met de door u in de Instellingen opgegeven inloggegevens. Er is geen Tutti- / ontwikkelaars-server bij betrokken.","dataLi3":"Er worden geen analyse-, tracking- of advertentiegegevens verzameld.","dataLi4":"Tutti leest of bewaart <strong>geen</strong> authenticatietokens, cookies of sessiegegevens van de SNS-sites.","h3Report":"Uitzondering — handmatige foutmeldingen (toestemming per klik)","reportIntro":"Wanneer (en alleen wanneer) u op de <strong>knop &ldquo;Rapporteren&rdquo;</strong> drukt die in een foutdialoog of het diagnosepaneel wordt weergegeven, wordt het volgende via een Cloudflare Workers-relay verzonden naar een <strong>privé GitHub-issue-tracker</strong> (<code>komm64/tutti-issues</code>, alleen zichtbaar voor de Tutti-ontwikkelaar):","reportLi1":"Het foutbericht, de extensieversie, de User-Agent-string van de browser.","reportLi2":"De laatste 30 vermeldingen van het interne log van de extensie (het door u geconfigureerde logniveau; standaard INFO). Berichtinhoud, afbeeldingen, video, SNS-inloggegevens en API-inloggegevens worden <strong>nooit</strong> opgenomen.","reportLi3":"Een geredigeerde DOM-snapshot van het SNS-tabblad waar de fout optrad, gebruikt om defecte selectors te repareren. Tekstinhoud, attribuutwaarden, URL-paden/-queries/-fragmenten, <code>href</code>/<code>src</code>-attributen en <code>&lt;meta&gt;</code>/<code>&lt;link&gt;</code>-tags worden verwijderd. De payload is beperkt tot 8 KB. Zie <a href=\"https://github.com/komm64/tutti/blob/main/src/utils/dom-snapshot.ts\">dom-snapshot.ts</a> voor de implementatie.","reportOutro":"Er wordt niets verzonden tot u op de rapporteer-knop drukt. De bestemming is privé, alleen zichtbaar voor de Tutti-ontwikkelaar.","h2Local":"2. Lokaal opgeslagen gegevens","localIntro":"Het volgende wordt uitsluitend in uw browser opgeslagen via Chrome's <code>storage</code>-API. Tutti verzendt niets buiten het apparaat.","localSettings":"<strong>Instellingen</strong> (<code>chrome.storage.sync</code>): Mastodon-/Misskey-instance-URL's, autoPost-schakelaar, weergavemodus, selector-override-URL, enz. Kan via Chrome Sync worden gerepliceerd naar uw andere apparaten als u bent aangemeld bij Chrome.","localDrafts":"<strong>Concepten</strong> (<code>chrome.storage.session</code>): Berichttekst in bewerking en bijgevoegde media (afbeeldingen / video). Wordt automatisch gewist bij het sluiten van de browser.","localSelected":"<strong>Geselecteerde SNS</strong> (<code>chrome.storage.local</code>): De SNS die u als publicatiedoelen heeft aangevinkt. Blijft tussen sessies behouden voor het gemak; alleen lokaal op het apparaat.","localUsers":"<strong>Laatst geziene gebruikersnamen</strong> (<code>chrome.storage.local</code>): De momenteel ingelogde gebruikersnaam op elk SNS, weergegeven in de pop-up zodat u kunt bevestigen welk account de publicatie ontvangt. Alleen lokaal op het apparaat.","localHistory":"<strong>Berichtgeschiedenis</strong> (<code>chrome.storage.local</code>): De laatste 20 berichten: eerste 80 tekens van de tekst, doelplatforms, succes/falen per platform en tijdstempel. Alleen lokaal op het apparaat.","localCreds":"<strong>API-inloggegevens</strong> (<code>chrome.storage.local</code>): Alleen als u het officiële API-pad expliciet heeft ingeschakeld voor Bluesky / Mastodon / Misskey: uw Bluesky app password of Mastodon-/Misskey-access-token. <strong>Alleen lokaal op het apparaat; nooit gerepliceerd via Chrome Sync; nooit verzonden naar een ontwikkelaars-server.</strong> Verwijderbaar via de Instellingen-wizard.","localSelectors":"<strong>Cache van selector-overrides</strong> (<code>chrome.storage.local</code>): Selector-hotfix-gegevens opgehaald van de URL die u in Instellingen heeft geconfigureerd (standaard: de openbare <code>selectors.json</code> op Tutti's GitHub Pages).","localVideoCap":"<strong>Cache van video-uploadlimiet</strong> (<code>chrome.storage.local</code>): Resultaat van API-sondes voor video-uploadlimieten per account (bijv. Bluesky). Alleen numerieke waarden; geen inloggegevens.","localWipe":"Dit alles kan op elk moment worden gewist door de extensie te verwijderen of de opslag van Chrome-extensies te wissen.","h2Perms":"3. Gebruikte machtigingen","permsThead1":"Machtiging","permsThead2":"Doel","permsStorage":"De bovenstaande lokale gegevens (instellingen, concepten, geschiedenis, geselecteerde platforms, enz.) in uw browser opslaan.","permsOffscreen":"<code>ffmpeg.wasm</code> uitvoeren in een offscreen-document om videobestanden te comprimeren / opnieuw te coderen wanneer de bron de groottelimiet van het bestemmings-SNS overschrijdt. Videogegevens worden uitsluitend lokaal verwerkt; worden door Tutti nergens naartoe verzonden.","permsSidePanel":"Optionele UI-weergavemodus: toont Tutti's opstelformulier in het zijpaneel van Chrome in plaats van in de actiepop-up, zodat het geopend blijft terwijl u tussen SNS-tabbladen wisselt. U schakelt dit in via de Opties-pagina; de standaardwaarde is de gewone pop-up.","permsHost":"Content scripts injecteren in elke SNS-site (x.com / twitter.com / bsky.app / bsky.social / threads.net / threads.com / mastodon.social / misskey.io / tumblr.com / pixiv.net / tiktok.com / youtube.com / instagram.com / deviantart.com) om het opstelformulier met uw berichtinhoud te vullen en namens u te verzenden. Er worden geen gegevens van deze sites gelezen en elders verzonden; het content script schrijft alleen uw eigen invoer.","permsOptHost":"Wordt tijdens runtime alleen aangevraagd als u een aangepaste Mastodon- of Misskey-instance-URL configureert (anders dan de standaardwaarden). Chrome toont op dat moment de standaard machtigingsprompt.","h2Relationship":"4. Relatie met de SNS-aanbieders","relationshipBody":"Tutti automatiseert de web-UI van (of, optioneel, plaatst via de officiële API van) de 11 ondersteunde netwerken. Dit is niet-officiële functionaliteit; Tutti is niet verbonden aan X, Bluesky, Meta (Threads / Instagram), Mastodon gGmbH, Misskey, Tumblr, Pixiv, DeviantArt, TikTok of YouTube. U blijft gebonden aan de eigen gebruiksvoorwaarden van elke dienst.","h2Contact":"5. Contact","contactGitHub":"GitHub Issues:","contactEmail":"E-mail:","h2Changes":"6. Wijzigingen aan dit beleid","changesBody":"Updates van dit beleid worden gecommuniceerd door deze pagina en het canonieke bronbestand (<a href=\"https://github.com/komm64/tutti/blob/main/PRIVACY.md\">PRIVACY.md</a>) bij te werken."},"support":{"title":"Tutti — Ondersteuning","headerTagline":"Ondersteuningsbronnen en FAQ","h2Help":"Hulp nodig?","h3Failed":"1. Publicatie mislukt / iets gedraagt zich vreemd","failedBody":"Gebruik de <strong>knop &ldquo;Diagnose&rdquo; → &ldquo;Rapporteren&rdquo; in de pop-up</strong>. Dit is het kanonieke kanaal. De melding wordt geredigeerd (handles, URL's, e-mails) en doorgestuurd naar onze privé issue-tracker, waar automatisch een selector-fix PR wordt geopend en binnen enkele dagen als hotfix naar alle gebruikers wordt gepusht.","calloutTitle":"Waarom de rapporteer-knop in het product gebruiken?","calloutBody":"De rapporteer-flow van de pop-up voegt automatisch de uiteindelijke opstel-status, een geredigeerde DOM-snapshot en selector-auditresultaten toe — precies wat nodig is om selector-breakage snel te repareren. PII wordt door meerdere lagen heen verwijderd vóór verzending.","h3General":"2. Algemene vragen / functieverzoeken","generalBody":"Mail ons op <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>. Dit is een privé kanaal, veilig om screenshots / persoonlijke handles te delen.","h3Install":"3. Installatie- / accountvragen","installBody":"Tutti <strong>hergebruikt uw bestaande browser-aanmeldingen</strong> voor elk sociaal netwerk. Er is geen apart Tutti-account of aanmeldstap. Zodra u in hetzelfde Chrome-profiel bent aangemeld bij een sociaal netwerk, kan Tutti vanaf daar publiceren.","h2Faq":"FAQ","q1":"V. Mijn publicatie is mislukt.","a1":"Dit betekent meestal dat een sociaal netwerk zijn DOM heeft gewijzigd. Gebruik <strong>Diagnose → Rapporteren</strong> in de pop-up. Een selector-hotfix wordt doorgaans binnen enkele dagen geleverd via de automatische update van <code>selectors.json</code> (geen extensie-update vereist).","q2":"V. Tutti onthoudt mijn aanmelding niet.","a2":"Tutti vertrouwt op de normale browser-aanmelding van het netwerk. Log eerst in bij elk netwerk in Chrome, dan kan Tutti namens u publiceren. De incognitomodus werkt niet omdat de sessies van het netwerk daar niet aanwezig zijn.","q3":"V. Tekenlimieten verschillen per netwerk — is dat een probleem?","a3":"Nee. Lange berichten die de tekenlimiet van een netwerk overschrijden, worden automatisch opgesplitst in een vervolg-thread (op X een correcte reply-chain; op andere netwerken sequentiële berichten). Berichten binnen de limiet gaan ongewijzigd door.","q4":"V. Mij wordt verteld dat mijn afbeelding / video te groot is.","a4":"Afbeeldingen worden via Canvas automatisch verkleind om aan de groottelimiet van elk netwerk te voldoen. Video's worden automatisch gecomprimeerd met ffmpeg.wasm wanneer ze boven de limiet van een netwerk uitkomen. Als zelfs compressie niet past, ziet u een foutmelding — controleer eerst of het bestand via de native app van het netwerk uploadt.","q5":"V. Ziet Tutti mijn berichtinhoud?","a5":"Nee. Berichtinhoud loopt nooit via een server van derden. Tutti injecteert direct in de webopstelpagina van elk netwerk. Zie ons <a href=\"./privacy.html\">Privacybeleid</a> voor details. De enige uitzondering is wanneer u op de rapporteer-knop in het product drukt, die geredigeerde foutinformatie naar onze privé issue-tracker verzendt.","q6":"V. Kan ik doneren?","a6":"Nog niet — we werken aan een laagdrempelig ondersteuningskanaal. De grootste doorlopende kosten zijn het bijhouden van de UI-wijzigingen van elk sociaal netwerk; toekomstige Ko-fi-flows zullen dat onderhoud financieren."}},"no":{"lang":"no","common":{"appName":"Tutti","tagline":"Én Chrome-utvidelse. Elleve sosiale nettverk. Null styr.","navHome":"Hjem","navGitHub":"GitHub","navSupport":"Støtte","navPrivacy":"Personvernerklæring","navLanguages":"Andre språk","footerCopy":"&copy; 2026 komm64 &mdash; <a href=\"https://github.com/komm64/tutti/blob/main/LICENSE\">Alle rettigheter forbeholdt</a>","footerContact":"Tutti er en Chrome-utvidelse av <a href=\"https://github.com/komm64\">komm64</a>. Kontakt: <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>"},"index":{"title":"Tutti — Krysspost-utvidelse","headerTagline":"Én Chrome-utvidelse. Elleve sosiale nettverk. Null styr.","h2Overview":"Oversikt","overviewBody":"Tutti sender det samme innlegget til 11 sosiale nettverk (X, Bluesky, Threads, Tumblr, Mastodon, Misskey, Pixiv, TikTok, YouTube Shorts, Instagram, DeviantArt) med ett enkelt klikk. Den har ingen backend; innleggsinnhold går aldri gjennom noen tredjepartsserver.","h2PrivacySummary":"Personvern i én setning","privacySummaryBody":"Tutti har ingen backend-server. Innleggsinnhold (tekst, bilder, video) går direkte fra nettleseren din til hvert sosiale nettverk du velger — aldri via en server kontrollert av utvikleren.","privacyFullPolicy":"Fullstendig policy:"},"privacy":{"title":"Tutti — Personvernerklæring","headerTagline":"Ingen datainnsamling fra tredjeparter. Alt innleggsinnhold går direkte fra nettleseren din til hvert SNS.","lastUpdated":"Sist oppdatert: 2026-05-23 (v0.5.0)","h2Data":"1. Data vi samler inn og overfører","dataIntro":"<strong>Tutti har ingen backend-server.</strong> Innleggsinnhold (tekst, bilder, video) overføres aldri til noen tredjepartsserver. Det reiser direkte fra nettleseren din til hvert sosiale nettverk du velger, akkurat som om du hadde skrevet og sendt det inn der selv.","dataLi1":"Innleggets tekst, bilder og video sendes kun til de SNS-sidene du velger (X, Bluesky, Threads, Mastodon, Misskey, Tumblr, Pixiv, DeviantArt, Instagram, TikTok, YouTube) innenfor nettleseren din.","dataLi2":"Når den valgfrie offisielle API-banen er aktivert for Bluesky / Mastodon / Misskey, sendes innlegg direkte fra nettleseren din til <strong>det SNS-ets egen API-server</strong> ved bruk av legitimasjonen du oppga i Innstillinger. Ingen Tutti- / utviklerserver er involvert.","dataLi3":"Ingen analyse-, sporings- eller annonsedata samles inn.","dataLi4":"Tutti <strong>leser</strong> eller lagrer ikke autentiseringstokens, informasjonskapsler eller sesjonsdata fra SNS-nettstedene.","h3Report":"Unntak — manuelle feilrapporter (samtykke per klikk)","reportIntro":"Når (og bare når) du trykker på <strong>knappen &laquo;Rapporter&raquo;</strong> som vises i en feildialog eller diagnosepanelet, sendes følgende gjennom et Cloudflare Workers-relé til en <strong>privat GitHub-issue-tracker</strong> (<code>komm64/tutti-issues</code>, kun synlig for Tutti-utvikleren):","reportLi1":"Feilmeldingen, utvidelsesversjonen, nettleserens User-Agent-streng.","reportLi2":"De siste 30 oppføringene i utvidelsens interne logg (loggnivået du konfigurerte; INFO som standard). Innleggsinnhold, bilder, video, SNS-innloggingsdata og API-legitimasjon <strong>aldri</strong> inkluderes.","reportLi3":"Et redigert DOM-øyeblikksbilde av SNS-fanen der feilen oppsto, brukt til å reparere ødelagte selektorer. Tekstinnhold, attributtverdier, URL-stier/-spørringer/-fragmenter, <code>href</code>/<code>src</code>-attributter og <code>&lt;meta&gt;</code>/<code>&lt;link&gt;</code>-tagger fjernes. Nyttelasten er begrenset til 8 KB. Se <a href=\"https://github.com/komm64/tutti/blob/main/src/utils/dom-snapshot.ts\">dom-snapshot.ts</a> for implementeringen.","reportOutro":"Ingenting sendes før du trykker på rapporteringsknappen. Destinasjonen er privat og kun synlig for Tutti-utvikleren.","h2Local":"2. Lokalt lagrede data","localIntro":"Følgende lagres kun inne i nettleseren din via Chromes <code>storage</code>-API. Ingenting overføres ut av enheten av Tutti.","localSettings":"<strong>Innstillinger</strong> (<code>chrome.storage.sync</code>): URL-er for Mastodon-/Misskey-instanser, autoPost-bryter, visningsmodus, selector-overstyrings-URL, osv. Kan repliseres til de andre enhetene dine via Chrome Sync hvis du er logget på Chrome.","localDrafts":"<strong>Utkast</strong> (<code>chrome.storage.session</code>): Pågående innleggstekst og vedlagte medier (bilder / video). Tømmes automatisk når nettleseren avsluttes.","localSelected":"<strong>Valgte SNS</strong> (<code>chrome.storage.local</code>): SNS-ene du har krysset av som publiseringsmål. Bibeholdes mellom sesjoner for bekvemmelighet; kun lokalt på enheten.","localUsers":"<strong>Sist sett brukernavn</strong> (<code>chrome.storage.local</code>): Brukernavnet som er pålogget på hvert SNS, vist i popupen slik at du kan bekrefte hvilken konto som vil motta innlegget. Kun lokalt på enheten.","localHistory":"<strong>Innleggshistorikk</strong> (<code>chrome.storage.local</code>): De siste 20 innleggene: de første 80 tegnene av teksten, målplattformer, suksess/feil per plattform og tidsstempel. Kun lokalt på enheten.","localCreds":"<strong>API-legitimasjon</strong> (<code>chrome.storage.local</code>): Kun hvis du eksplisitt aktiverte den offisielle API-banen for Bluesky / Mastodon / Misskey: ditt Bluesky app password eller Mastodon-/Misskey-tilgangs-token. <strong>Kun lokalt på enheten; repliseres aldri via Chrome Sync; overføres aldri til noen utviklerserver.</strong> Kan fjernes fra innstillingsveiviseren.","localSelectors":"<strong>Buffer for selector-overstyringer</strong> (<code>chrome.storage.local</code>): Selector-hurtigreparasjonsdata hentet fra URL-en du konfigurerte i Innstillinger (standard: den offentlige <code>selectors.json</code> på Tuttis GitHub Pages).","localVideoCap":"<strong>Buffer for videoopplastingsgrense</strong> (<code>chrome.storage.local</code>): Resultat av API-sonderinger for videoopplastingsgrenser per konto (f.eks. Bluesky). Kun numeriske verdier; ingen legitimasjon.","localWipe":"Alt dette kan slettes når som helst ved å avinstallere utvidelsen eller tømme Chromes utvidelseslagring.","h2Perms":"3. Tillatelser som brukes","permsThead1":"Tillatelse","permsThead2":"Formål","permsStorage":"Lagre de lokale dataene ovenfor (innstillinger, utkast, historikk, valgte plattformer, osv.) inne i nettleseren din.","permsOffscreen":"Kjøre <code>ffmpeg.wasm</code> i et offscreen-dokument for å komprimere / omkode videofiler når kilden overskrider størrelsesgrensen for mål-SNS-et. Videodata behandles kun lokalt; overføres ingen steder av Tutti.","permsSidePanel":"Valgfri UI-visningsmodus: viser Tuttis komposisjonsskjema i Chromes sidepanel i stedet for handlings-popupen, slik at den forblir åpen mens du veksler mellom SNS-faner. Du velger dette fra Alternativer-siden; standardverdien er standard-popupen.","permsHost":"Injisere content-skript på hvert SNS-nettsted (x.com / twitter.com / bsky.app / bsky.social / threads.net / threads.com / mastodon.social / misskey.io / tumblr.com / pixiv.net / tiktok.com / youtube.com / instagram.com / deviantart.com) for å fylle ut komposisjonsskjemaet med innleggsinnholdet ditt og sende det på dine vegne. Ingen data leses fra disse nettstedene og sendes andre steder; content-skriptet skriver kun din egen inndata.","permsOptHost":"Forespørres ved kjøretid kun hvis du konfigurerer en tilpasset Mastodon- eller Misskey-instans-URL (annet enn standardverdiene). Chrome viser standard tillatelsesforespørselen på det tidspunktet.","h2Relationship":"4. Forhold til SNS-leverandørene","relationshipBody":"Tutti automatiserer web-UI-en (eller, valgfritt, publiserer via det offisielle API-et) til de 11 støttede nettverkene. Dette er ikke-offisiell funksjonalitet; Tutti er ikke tilknyttet X, Bluesky, Meta (Threads / Instagram), Mastodon gGmbH, Misskey, Tumblr, Pixiv, DeviantArt, TikTok eller YouTube. Du er fortsatt bundet av hver tjenestes egne vilkår for bruk.","h2Contact":"5. Kontakt","contactGitHub":"GitHub Issues:","contactEmail":"E-post:","h2Changes":"6. Endringer i denne policyen","changesBody":"Oppdateringer av denne policyen kommuniseres ved å oppdatere denne siden og den kanoniske kildefilen (<a href=\"https://github.com/komm64/tutti/blob/main/PRIVACY.md\">PRIVACY.md</a>)."},"support":{"title":"Tutti — Støtte","headerTagline":"Støtteressurser og FAQ","h2Help":"Trenger du hjelp?","h3Failed":"1. Publisering mislyktes / noe oppfører seg merkelig","failedBody":"Bruk <strong>knappen &laquo;Diagnostiser&raquo; → &laquo;Rapporter&raquo; inne i popupen</strong>. Dette er den kanoniske kanalen. Rapporten redigeres (håndtak, URL-er, e-poster) og videresendes til vår private issue-tracker, der en selector-fiks-PR åpnes automatisk og pushes som hurtigreparasjon til alle brukere innen få dager.","calloutTitle":"Hvorfor bruke rapporteringsknappen i produktet?","calloutBody":"Popupens rapporteringsflyt vedlegger automatisk den endelige komposisjonstilstanden, et redigert DOM-øyeblikksbilde og selector-revisjonsresultater — nøyaktig det som trengs for å raskt fikse selector-brudd. PII fjernes gjennom flere lag før sending.","h3General":"2. Generelle spørsmål / funksjonsforespørsler","generalBody":"Send oss e-post på <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>. Dette er en privat kanal, trygg for å dele skjermbilder / personlige håndtak.","h3Install":"3. Installasjons- / kontospørsmål","installBody":"Tutti <strong>gjenbruker dine eksisterende nettleserinnlogginger</strong> for hvert sosiale nettverk. Det er ingen separat Tutti-konto eller innloggingstrinn. Når du er logget på et sosialt nettverk i samme Chrome-profil, kan Tutti publisere derfra.","h2Faq":"FAQ","q1":"S. Publiseringen min mislyktes.","a1":"Dette betyr vanligvis at et sosialt nettverk har endret sitt DOM. Bruk <strong>Diagnostiser → Rapporter</strong> i popupen. En selector-hurtigreparasjon leveres vanligvis innen få dager via den automatiske oppdateringen av <code>selectors.json</code> (ingen utvidelsesoppdatering kreves).","q2":"S. Tutti husker ikke innloggingen min.","a2":"Tutti er avhengig av nettverkets normale nettleserinnlogging. Logg inn på hvert nettverk i Chrome først, så kan Tutti publisere på dine vegne. Inkognitomodus fungerer ikke fordi nettverkets sesjoner ikke er der.","q3":"S. Tegngrenser varierer per nettverk — er det et problem?","a3":"Nei. Lange innlegg som overskrider et nettverks tegngrense deles automatisk opp i en fortsettelsestråd (på X en ordentlig svarkjede; på andre nettverk sekvensielle innlegg). Innlegg innenfor grensen går gjennom som de er.","q4":"S. Det blir fortalt meg at bildet / videoen min er for stor.","a4":"Bilder endres automatisk i størrelse via Canvas for å passe hvert nettverks størrelsesgrense. Videoer komprimeres automatisk med ffmpeg.wasm når de er over et nettverks grense. Hvis selv komprimering ikke passer, vil du se en feil — vennligst verifiser først at filen lastes opp via nettverkets opprinnelige app.","q5":"S. Ser Tutti innleggsinnholdet mitt?","a5":"Nei. Innleggsinnhold går aldri gjennom en tredjepartsserver. Tutti injiserer direkte i hvert nettverks webkomposisjonsside. Se vår <a href=\"./privacy.html\">Personvernerklæring</a> for detaljer. Det eneste unntaket er når du trykker på den innebygde rapporteringsknappen, som sender redigert feilinformasjon til vår private issue-tracker.","q6":"S. Kan jeg donere?","a6":"Ikke ennå — vi jobber med en lavpress støttekanal. Den største pågående kostnaden er å holde tritt med hvert sosiale nettverks UI-endringer; fremtidige Ko-fi-flyter vil finansiere det vedlikeholdet."}},"pl":{"lang":"pl","common":{"appName":"Tutti","tagline":"Jedno rozszerzenie Chrome. Jedenaście sieci społecznościowych. Zero zachodu.","navHome":"Strona główna","navGitHub":"GitHub","navSupport":"Pomoc","navPrivacy":"Polityka prywatności","navLanguages":"Inne języki","footerCopy":"&copy; 2026 komm64 &mdash; <a href=\"https://github.com/komm64/tutti/blob/main/LICENSE\">Wszelkie prawa zastrzeżone</a>","footerContact":"Tutti to rozszerzenie Chrome autorstwa <a href=\"https://github.com/komm64\">komm64</a>. Kontakt: <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>"},"index":{"title":"Tutti — Rozszerzenie do publikacji krzyżowej","headerTagline":"Jedno rozszerzenie Chrome. Jedenaście sieci społecznościowych. Zero zachodu.","h2Overview":"Przegląd","overviewBody":"Tutti rozsyła ten sam post do 11 sieci społecznościowych (X, Bluesky, Threads, Tumblr, Mastodon, Misskey, Pixiv, TikTok, YouTube Shorts, Instagram, DeviantArt) jednym kliknięciem. Nie ma backendu; zawartość postów nigdy nie przechodzi przez żaden serwer strony trzeciej.","h2PrivacySummary":"Prywatność w jednym zdaniu","privacySummaryBody":"Tutti nie ma serwera backend. Zawartość postów (tekst, obrazy, wideo) trafia bezpośrednio z Twojej przeglądarki do każdej wybranej sieci społecznościowej — nigdy przez serwer kontrolowany przez dewelopera.","privacyFullPolicy":"Pełna polityka:"},"privacy":{"title":"Tutti — Polityka prywatności","headerTagline":"Brak gromadzenia danych przez strony trzecie. Cała zawartość postów trafia bezpośrednio z Twojej przeglądarki do każdej SNS.","lastUpdated":"Ostatnia aktualizacja: 2026-05-23 (v0.5.0)","h2Data":"1. Dane, które zbieramy i przekazujemy","dataIntro":"<strong>Tutti nie ma serwera backend.</strong> Zawartość postów (tekst, obrazy, wideo) nigdy nie jest przesyłana do żadnego serwera strony trzeciej. Podróżuje bezpośrednio z Twojej przeglądarki do każdej wybranej sieci społecznościowej, dokładnie tak, jakbyś sam(a) wpisał(a) i wysłał(a) to tam.","dataLi1":"Tekst, obrazy i wideo postów są przekazywane tylko do wybranych przez Ciebie stron SNS (X, Bluesky, Threads, Mastodon, Misskey, Tumblr, Pixiv, DeviantArt, Instagram, TikTok, YouTube) wewnątrz Twojej przeglądarki.","dataLi2":"Gdy opcjonalna ścieżka oficjalnego API jest włączona dla Bluesky / Mastodon / Misskey, posty są wysyłane bezpośrednio z Twojej przeglądarki na <strong>własny serwer API tego SNS</strong> przy użyciu poświadczeń, które podałeś w Ustawieniach. Żaden serwer Tutti / dewelopera nie jest zaangażowany.","dataLi3":"Nie są gromadzone żadne dane analityczne, śledzenia ani reklamowe.","dataLi4":"Tutti <strong>nie</strong> odczytuje ani nie przechowuje Twoich tokenów uwierzytelniania, plików cookie ani danych sesji z witryn SNS.","h3Report":"Wyjątek — ręczne raporty o błędach (zgoda przy każdym kliknięciu)","reportIntro":"Gdy (i tylko gdy) naciśniesz <strong>przycisk &bdquo;Zgłoś&rdquo;</strong> pokazany w oknie błędu lub panelu diagnostyki, następujące dane są wysyłane przez przekaźnik Cloudflare Workers do <strong>prywatnego trackera zgłoszeń GitHub</strong> (<code>komm64/tutti-issues</code>, widocznego tylko dla dewelopera Tutti):","reportLi1":"Komunikat o błędzie, wersja rozszerzenia, ciąg User-Agent przeglądarki.","reportLi2":"Ostatnie 30 wpisów wewnętrznego logu rozszerzenia (poziom logu, który skonfigurowałeś; domyślnie INFO). Zawartość postów, obrazy, wideo, dane logowania do SNS i poświadczenia API <strong>nigdy</strong> nie są dołączane.","reportLi3":"Zredagowany snapshot DOM karty SNS, w której wystąpił błąd, używany do naprawy zepsutych selektorów. Zawartość tekstowa, wartości atrybutów, ścieżki/zapytania/fragmenty URL, atrybuty <code>href</code>/<code>src</code> oraz tagi <code>&lt;meta&gt;</code>/<code>&lt;link&gt;</code> są usuwane. Ładowność jest ograniczona do 8 KB. Implementację zobacz w <a href=\"https://github.com/komm64/tutti/blob/main/src/utils/dom-snapshot.ts\">dom-snapshot.ts</a>.","reportOutro":"Nic nie jest wysyłane, dopóki nie naciśniesz przycisku zgłoszenia. Adresat jest prywatny, widoczny tylko dla dewelopera Tutti.","h2Local":"2. Dane przechowywane lokalnie","localIntro":"Poniższe dane są przechowywane wyłącznie wewnątrz Twojej przeglądarki za pośrednictwem API <code>storage</code> Chrome. Nic nie jest przesyłane poza urządzenie przez Tutti.","localSettings":"<strong>Ustawienia</strong> (<code>chrome.storage.sync</code>): URL-e instancji Mastodon / Misskey, przełącznik autoPost, tryb wyświetlania, URL nadpisania selektorów itd. Mogą być replikowane na Twoje inne urządzenia przez Chrome Sync, jeśli jesteś zalogowany do Chrome.","localDrafts":"<strong>Wersje robocze</strong> (<code>chrome.storage.session</code>): Tekst postu w trakcie i załączone media (obrazy / wideo). Automatycznie czyszczone po zamknięciu przeglądarki.","localSelected":"<strong>Wybrane SNS</strong> (<code>chrome.storage.local</code>): SNS, które zaznaczyłeś jako cele publikacji. Utrzymuje się między sesjami dla wygody; tylko lokalnie na urządzeniu.","localUsers":"<strong>Ostatnio widziane nazwy użytkowników</strong> (<code>chrome.storage.local</code>): Aktualnie zalogowana nazwa użytkownika w każdym SNS, wyświetlana w popup, abyś mógł potwierdzić, które konto otrzyma post. Tylko lokalnie na urządzeniu.","localHistory":"<strong>Historia postów</strong> (<code>chrome.storage.local</code>): Ostatnie 20 postów: pierwsze 80 znaków tekstu, platformy docelowe, sukces/niepowodzenie na platformę i znacznik czasu. Tylko lokalnie na urządzeniu.","localCreds":"<strong>Poświadczenia API</strong> (<code>chrome.storage.local</code>): Tylko jeśli jawnie włączyłeś ścieżkę oficjalnego API dla Bluesky / Mastodon / Misskey: Twoje Bluesky app password lub token dostępu Mastodon / Misskey. <strong>Tylko lokalnie na urządzeniu; nigdy nie replikowane przez Chrome Sync; nigdy nie przesyłane do żadnego serwera dewelopera.</strong> Można usunąć z kreatora Ustawień.","localSelectors":"<strong>Cache nadpisania selektorów</strong> (<code>chrome.storage.local</code>): Dane hot-fixu selektorów pobierane z URL skonfigurowanego w Ustawieniach (domyślnie: publiczny <code>selectors.json</code> na GitHub Pages Tutti).","localVideoCap":"<strong>Cache limitu przesyłania wideo</strong> (<code>chrome.storage.local</code>): Wynik sond API dla limitów przesyłania wideo na konto (np. Bluesky). Tylko wartości liczbowe; brak poświadczeń.","localWipe":"Wszystko to można wyczyścić w dowolnym momencie, odinstalowując rozszerzenie lub czyszcząc pamięć rozszerzeń Chrome.","h2Perms":"3. Używane uprawnienia","permsThead1":"Uprawnienie","permsThead2":"Cel","permsStorage":"Przechowywanie powyższych danych lokalnych (ustawienia, wersje robocze, historia, wybrane platformy itd.) wewnątrz Twojej przeglądarki.","permsOffscreen":"Uruchamianie <code>ffmpeg.wasm</code> w dokumencie offscreen do kompresji / przekodowania plików wideo, gdy źródło przekracza limit rozmiaru docelowego SNS. Dane wideo są przetwarzane tylko lokalnie; nie są przesyłane nigdzie przez Tutti.","permsSidePanel":"Opcjonalny tryb wyświetlania UI: pokazuje formularz tworzenia postu Tutti w panelu bocznym Chrome zamiast popup akcji, aby pozostawał otwarty podczas przełączania między kartami SNS. Włączasz go na stronie Opcji; domyślnie jest to standardowy popup.","permsHost":"Wstrzykiwanie content scripts do każdej witryny SNS (x.com / twitter.com / bsky.app / bsky.social / threads.net / threads.com / mastodon.social / misskey.io / tumblr.com / pixiv.net / tiktok.com / youtube.com / instagram.com / deviantart.com) w celu wypełnienia formularza tworzenia postu zawartością Twojego postu i wysłania go w Twoim imieniu. Z tych witryn nie są odczytywane żadne dane i wysyłane gdzie indziej; content script zapisuje tylko Twoje własne dane wejściowe.","permsOptHost":"Wymagane w czasie wykonywania tylko jeśli skonfigurujesz niestandardowy URL instancji Mastodon lub Misskey (inny niż domyślny). Chrome wyświetla standardowy monit o uprawnienie w tym momencie.","h2Relationship":"4. Relacja z dostawcami SNS","relationshipBody":"Tutti automatyzuje interfejs webowy (lub, opcjonalnie, publikuje przez oficjalne API) 11 obsługiwanych sieci. To nieoficjalna funkcjonalność; Tutti nie jest powiązany z X, Bluesky, Meta (Threads / Instagram), Mastodon gGmbH, Misskey, Tumblr, Pixiv, DeviantArt, TikTok ani YouTube. Nadal obowiązują Cię własne warunki użytkowania każdej usługi.","h2Contact":"5. Kontakt","contactGitHub":"GitHub Issues:","contactEmail":"E-mail:","h2Changes":"6. Zmiany w tej polityce","changesBody":"Aktualizacje tej polityki są komunikowane poprzez aktualizację tej strony i kanonicznego pliku źródłowego (<a href=\"https://github.com/komm64/tutti/blob/main/PRIVACY.md\">PRIVACY.md</a>)."},"support":{"title":"Tutti — Pomoc","headerTagline":"Zasoby pomocy i FAQ","h2Help":"Potrzebujesz pomocy?","h3Failed":"1. Publikacja nie powiodła się / coś zachowuje się dziwnie","failedBody":"Użyj <strong>przycisku &bdquo;Diagnostyka&rdquo; → &bdquo;Zgłoś&rdquo; wewnątrz popup</strong>. To kanoniczny kanał. Raport jest redagowany (uchwyty, URL-e, e-maile) i przekazywany do naszego prywatnego trackera zgłoszeń, gdzie automatycznie otwierany jest PR z poprawką selektorów i w ciągu kilku dni wysyłany jako hot-fix do wszystkich użytkowników.","calloutTitle":"Dlaczego warto użyć przycisku zgłoszenia wbudowanego w produkt?","calloutBody":"Przepływ zgłaszania popupu automatycznie dołącza końcowy stan tworzenia, zredagowany snapshot DOM i wyniki audytu selektorów — dokładnie to, co potrzebne do szybkiego naprawienia awarii selektorów. PII jest usuwana przez kilka warstw przed wysłaniem.","h3General":"2. Pytania ogólne / prośby o funkcje","generalBody":"Napisz do nas na <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>. To prywatny kanał, bezpieczny do udostępniania zrzutów ekranu / osobistych uchwytów.","h3Install":"3. Pytania o instalację / konto","installBody":"Tutti <strong>ponownie wykorzystuje Twoje istniejące logowania w przeglądarce</strong> dla każdej sieci społecznościowej. Nie ma oddzielnego konta Tutti ani kroku logowania. Po zalogowaniu się do sieci społecznościowej w tym samym profilu Chrome Tutti może z niej publikować.","h2Faq":"FAQ","q1":"P. Moja publikacja nie powiodła się.","a1":"Zwykle oznacza to, że sieć społecznościowa zmieniła swój DOM. Użyj <strong>Diagnostyka → Zgłoś</strong> w popup. Hot-fix selektora jest zwykle dostarczany w ciągu kilku dni przez automatyczną aktualizację <code>selectors.json</code> (aktualizacja rozszerzenia nie jest wymagana).","q2":"P. Tutti nie pamięta mojego logowania.","a2":"Tutti polega na normalnym logowaniu w przeglądarce w sieci. Najpierw zaloguj się do każdej sieci w Chrome, wtedy Tutti może publikować w Twoim imieniu. Tryb incognito nie działa, ponieważ sesji sieci tam nie ma.","q3":"P. Limity znaków różnią się w zależności od sieci — czy to problem?","a3":"Nie. Długie posty przekraczające limit znaków sieci są automatycznie dzielone na wątek kontynuacji (w X właściwy łańcuch odpowiedzi; w innych sieciach posty sekwencyjne). Posty w granicach limitu przechodzą bez zmian.","q4":"P. Mówiono mi, że mój obraz / wideo jest za duże.","a4":"Obrazy są automatycznie zmieniane w rozmiarze za pomocą Canvas, aby pasowały do limitu rozmiaru każdej sieci. Wideo jest automatycznie kompresowane za pomocą ffmpeg.wasm, gdy przekracza limit sieci. Jeśli nawet kompresja nie pasuje, zobaczysz błąd — proszę najpierw zweryfikuj, czy plik się przesyła przez natywną aplikację sieci.","q5":"P. Czy Tutti widzi zawartość moich postów?","a5":"Nie. Zawartość postów nigdy nie przechodzi przez serwer strony trzeciej. Tutti wstrzykuje bezpośrednio na stronę web tworzenia postu każdej sieci. Szczegóły znajdziesz w naszej <a href=\"./privacy.html\">Polityce prywatności</a>. Jedyny wyjątek to gdy naciśniesz przycisk zgłoszenia wbudowany w produkt, który wysyła zredagowane informacje o błędzie do naszego prywatnego trackera zgłoszeń.","q6":"P. Czy mogę przekazać darowiznę?","a6":"Jeszcze nie — pracujemy nad kanałem wsparcia bez presji. Największym bieżącym kosztem jest nadążanie za zmianami UI każdej sieci społecznościowej; przyszłe przepływy Ko-fi sfinansują tę konserwację."}},"pt-BR":{"lang":"pt-BR","common":{"appName":"Tutti","tagline":"Uma extensão do Chrome. Onze redes sociais. Zero complicação.","navHome":"Início","navGitHub":"GitHub","navSupport":"Suporte","navPrivacy":"Política de privacidade","navLanguages":"Outros idiomas","footerCopy":"&copy; 2026 komm64 &mdash; <a href=\"https://github.com/komm64/tutti/blob/main/LICENSE\">Todos os direitos reservados</a>","footerContact":"Tutti é uma extensão do Chrome desenvolvida por <a href=\"https://github.com/komm64\">komm64</a>. Contato: <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>"},"index":{"title":"Tutti — Extensão de postagem cruzada","headerTagline":"Uma extensão do Chrome. Onze redes sociais. Zero complicação.","h2Overview":"Visão geral","overviewBody":"O Tutti transmite a mesma postagem para 11 redes sociais (X, Bluesky, Threads, Tumblr, Mastodon, Misskey, Pixiv, TikTok, YouTube Shorts, Instagram, DeviantArt) com um único clique. Não tem backend; o conteúdo das postagens nunca passa por nenhum servidor de terceiros.","h2PrivacySummary":"Privacidade em uma frase","privacySummaryBody":"O Tutti não tem servidor backend. O conteúdo das postagens (texto, imagens, vídeo) vai diretamente do seu navegador para cada rede social que você selecionar — nunca por nenhum servidor controlado pelo desenvolvedor.","privacyFullPolicy":"Política completa:"},"privacy":{"title":"Tutti — Política de privacidade","headerTagline":"Sem coleta de dados por terceiros. Todo o conteúdo de postagens vai diretamente do seu navegador para cada SNS.","lastUpdated":"Última atualização: 2026-05-23 (v0.5.0)","h2Data":"1. Dados que coletamos e transmitimos","dataIntro":"<strong>O Tutti não tem servidor backend.</strong> O conteúdo das postagens (texto, imagens, vídeo) nunca é transmitido para nenhum servidor de terceiros. Ele viaja diretamente do seu navegador para cada rede social que você selecionar, exatamente como se você tivesse digitado e enviado lá mesmo.","dataLi1":"O texto, as imagens e os vídeos das postagens são passados apenas para as páginas dos SNS que você escolher (X, Bluesky, Threads, Mastodon, Misskey, Tumblr, Pixiv, DeviantArt, Instagram, TikTok, YouTube) dentro do seu navegador.","dataLi2":"Quando o caminho opcional de API oficial está habilitado para Bluesky / Mastodon / Misskey, as postagens são enviadas diretamente do seu navegador para o <strong>próprio servidor de API daquele SNS</strong> usando as credenciais que você forneceu nas Configurações. Nenhum servidor do Tutti / desenvolvedor está envolvido.","dataLi3":"Nenhum dado analítico, de rastreamento ou publicitário é coletado.","dataLi4":"O Tutti <strong>não</strong> lê nem armazena seus tokens de autenticação, cookies ou dados de sessão dos sites SNS.","h3Report":"Exceção — relatórios manuais de erro (consentimento por clique)","reportIntro":"Quando (e somente quando) você pressiona o <strong>botão &ldquo;Reportar&rdquo;</strong> mostrado em uma caixa de diálogo de erro ou no painel de diagnóstico, o seguinte é enviado através de um relay do Cloudflare Workers para um <strong>rastreador privado de issues do GitHub</strong> (<code>komm64/tutti-issues</code>, visível apenas para o desenvolvedor do Tutti):","reportLi1":"A mensagem de erro, a versão da extensão, a string User-Agent do navegador.","reportLi2":"As últimas 30 entradas do log interno da extensão (o nível de log que você configurou; INFO por padrão). Conteúdo de postagens, imagens, vídeo, dados de login em SNS e credenciais de API <strong>nunca</strong> são incluídos.","reportLi3":"Um snapshot DOM redigido da aba SNS onde o erro ocorreu, usado para reparar seletores quebrados. O conteúdo de texto, os valores de atributos, os caminhos/consultas/fragmentos de URL, os atributos <code>href</code>/<code>src</code> e as tags <code>&lt;meta&gt;</code>/<code>&lt;link&gt;</code> são removidos. O payload é limitado a 8 KB. Veja <a href=\"https://github.com/komm64/tutti/blob/main/src/utils/dom-snapshot.ts\">dom-snapshot.ts</a> para a implementação.","reportOutro":"Nada é enviado até você pressionar o botão de relatório. O destino é privado, visível apenas para o desenvolvedor do Tutti.","h2Local":"2. Dados armazenados localmente","localIntro":"O seguinte é armazenado apenas dentro do seu navegador através da API <code>storage</code> do Chrome. Nada é transmitido para fora do dispositivo pelo Tutti.","localSettings":"<strong>Configurações</strong> (<code>chrome.storage.sync</code>): URLs de instâncias Mastodon / Misskey, toggle autoPost, modo de exibição, URL de override de seletores, etc. Pode ser replicado para seus outros dispositivos via Chrome Sync se você estiver conectado ao Chrome.","localDrafts":"<strong>Rascunhos</strong> (<code>chrome.storage.session</code>): Texto de postagem em andamento e mídia anexada (imagens / vídeo). Limpo automaticamente quando o navegador é fechado.","localSelected":"<strong>SNS selecionados</strong> (<code>chrome.storage.local</code>): Os SNS que você marcou como destinos de postagem. Persiste entre sessões por conveniência; apenas local no dispositivo.","localUsers":"<strong>Últimos nomes de usuário vistos</strong> (<code>chrome.storage.local</code>): O nome de usuário atualmente conectado em cada SNS, exibido no popup para você confirmar qual conta receberá a postagem. Apenas local no dispositivo.","localHistory":"<strong>Histórico de postagens</strong> (<code>chrome.storage.local</code>): As últimas 20 postagens: primeiros 80 caracteres do texto, plataformas-alvo, sucesso/falha por plataforma e timestamp. Apenas local no dispositivo.","localCreds":"<strong>Credenciais de API</strong> (<code>chrome.storage.local</code>): Apenas se você habilitou explicitamente o caminho de API oficial para Bluesky / Mastodon / Misskey: seu app password do Bluesky ou access token do Mastodon / Misskey. <strong>Apenas local no dispositivo; nunca replicado via Chrome Sync; nunca transmitido para nenhum servidor do desenvolvedor.</strong> Removível pelo assistente de Configurações.","localSelectors":"<strong>Cache de override de seletores</strong> (<code>chrome.storage.local</code>): Dados de hot-fix de seletores obtidos da URL que você configurou em Configurações (padrão: o <code>selectors.json</code> público nas GitHub Pages do Tutti).","localVideoCap":"<strong>Cache de limite de upload de vídeo</strong> (<code>chrome.storage.local</code>): Resultado de sondagens de API para limites de upload de vídeo por conta (p. ex., Bluesky). Apenas valores numéricos; sem credenciais.","localWipe":"Tudo isso pode ser apagado a qualquer momento desinstalando a extensão ou limpando o armazenamento de extensões do Chrome.","h2Perms":"3. Permissões usadas","permsThead1":"Permissão","permsThead2":"Propósito","permsStorage":"Armazenar os dados locais acima (configurações, rascunhos, histórico, plataformas selecionadas, etc.) dentro do seu navegador.","permsOffscreen":"Executar <code>ffmpeg.wasm</code> em um documento offscreen para comprimir / recodificar arquivos de vídeo quando a origem exceder o limite de tamanho do SNS de destino. Dados de vídeo são processados apenas localmente; não transmitidos a lugar nenhum pelo Tutti.","permsSidePanel":"Modo de exibição de UI opcional: mostra o formulário de redação do Tutti no painel lateral do Chrome em vez do popup de ação, para que permaneça aberto enquanto você alterna entre abas de SNS. Você opta pela página de Opções; o padrão é o popup padrão.","permsHost":"Injetar content scripts em cada site SNS (x.com / twitter.com / bsky.app / bsky.social / threads.net / threads.com / mastodon.social / misskey.io / tumblr.com / pixiv.net / tiktok.com / youtube.com / instagram.com / deviantart.com) para preencher o formulário de redação com o conteúdo da sua postagem e enviá-lo em seu nome. Nenhum dado é lido desses sites e enviado para outro lugar; o content script apenas escreve sua própria entrada.","permsOptHost":"Solicitado em tempo de execução apenas se você configurar uma URL de instância personalizada de Mastodon ou Misskey (diferente das padrões). O Chrome mostra o prompt de permissão padrão nesse momento.","h2Relationship":"4. Relação com os provedores de SNS","relationshipBody":"O Tutti automatiza a UI web das (ou, opcionalmente, posta via a API oficial das) 11 redes supo
