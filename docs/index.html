rtadas. Esta é uma funcionalidade não oficial; o Tutti não é afiliado a X, Bluesky, Meta (Threads / Instagram), Mastodon gGmbH, Misskey, Tumblr, Pixiv, DeviantArt, TikTok ou YouTube. Você permanece sujeito aos termos de uso de cada serviço.","h2Contact":"5. Contato","contactGitHub":"GitHub Issues:","contactEmail":"E-mail:","h2Changes":"6. Mudanças nesta política","changesBody":"As atualizações desta política são comunicadas atualizando esta página e o arquivo de origem canônico (<a href=\"https://github.com/komm64/tutti/blob/main/PRIVACY.md\">PRIVACY.md</a>)."},"support":{"title":"Tutti — Suporte","headerTagline":"Recursos de suporte e FAQ","h2Help":"Precisa de ajuda?","h3Failed":"1. A postagem falhou / algo se comporta de forma estranha","failedBody":"Use o <strong>botão &ldquo;Diagnosticar&rdquo; → &ldquo;Reportar&rdquo; dentro do popup</strong>. Este é o canal canônico. O relatório é redigido (handles, URLs, e-mails) e encaminhado ao nosso rastreador privado de issues, onde um PR de correção de seletores é aberto automaticamente e enviado como hot-fix a todos os usuários em poucos dias.","calloutTitle":"Por que usar o botão de relatório dentro do produto?","calloutBody":"O fluxo de relatório do popup anexa automaticamente o estado final de redação, um snapshot DOM redigido e os resultados de auditoria de seletores — exatamente o necessário para corrigir rapidamente a quebra de seletores. PII é removida através de múltiplas camadas antes do envio.","h3General":"2. Perguntas gerais / solicitações de recursos","generalBody":"Escreva para <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>. Este é um canal privado, seguro para compartilhar capturas de tela / handles pessoais.","h3Install":"3. Perguntas sobre instalação / conta","installBody":"O Tutti <strong>reutiliza seus logins de navegador existentes</strong> para cada rede social. Não há conta separada do Tutti nem etapa de login. Uma vez conectado a uma rede social no mesmo perfil do Chrome, o Tutti pode postar a partir de lá.","h2Faq":"FAQ","q1":"P. Minha postagem falhou.","a1":"Isso geralmente significa que uma rede social mudou seu DOM. Use <strong>Diagnosticar → Reportar</strong> no popup. Um hot-fix de seletor normalmente é enviado em poucos dias via a atualização automática de <code>selectors.json</code> (atualização da extensão não é necessária).","q2":"P. O Tutti não lembra meu login.","a2":"O Tutti depende do login normal da rede no navegador. Faça login em cada rede no Chrome primeiro e, então, o Tutti pode postar em seu nome. O modo anônimo não funciona porque as sessões da rede não estão lá.","q3":"P. Os limites de caracteres diferem por rede — isso é um problema?","a3":"Não. As postagens longas que excedem o limite de caracteres de uma rede são automaticamente divididas em uma thread de continuação (no X, uma cadeia de respostas adequada; em outras redes, postagens sequenciais). As postagens dentro do limite passam como estão.","q4":"P. Disseram que minha imagem / vídeo é grande demais.","a4":"Imagens são redimensionadas automaticamente via Canvas para se ajustarem ao limite de tamanho de cada rede. Vídeos são comprimidos automaticamente com ffmpeg.wasm quando excedem o limite de uma rede. Se nem a compressão couber, você verá um erro — verifique primeiro se o arquivo é enviado pelo aplicativo nativo da rede.","q5":"P. O Tutti vê o conteúdo da minha postagem?","a5":"Não. O conteúdo das postagens nunca passa por um servidor de terceiros. O Tutti injeta diretamente na página web de redação de cada rede. Consulte nossa <a href=\"./privacy.html\">Política de privacidade</a> para detalhes. A única exceção é quando você pressiona o botão de relatório dentro do produto, que envia informações de erro redigidas para nosso rastreador privado de issues.","q6":"P. Posso doar?","a6":"Ainda não — estamos trabalhando em um canal de apoio sem pressão. O maior custo contínuo é manter-se atualizado com as mudanças de UI de cada rede social; futuros fluxos de Ko-fi financiarão essa manutenção."}},"pt-PT":{"lang":"pt-PT","common":{"appName":"Tutti","tagline":"Uma extensão do Chrome. Onze redes sociais. Zero complicações.","navHome":"Início","navGitHub":"GitHub","navSupport":"Apoio","navPrivacy":"Política de privacidade","navLanguages":"Outros idiomas","footerCopy":"&copy; 2026 komm64 &mdash; <a href=\"https://github.com/komm64/tutti/blob/main/LICENSE\">Todos os direitos reservados</a>","footerContact":"Tutti é uma extensão do Chrome de <a href=\"https://github.com/komm64\">komm64</a>. Contacto: <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>"},"index":{"title":"Tutti — Extensão de publicação cruzada","headerTagline":"Uma extensão do Chrome. Onze redes sociais. Zero complicações.","h2Overview":"Visão geral","overviewBody":"O Tutti transmite a mesma publicação para 11 redes sociais (X, Bluesky, Threads, Tumblr, Mastodon, Misskey, Pixiv, TikTok, YouTube Shorts, Instagram, DeviantArt) com um único clique. Não tem backend; o conteúdo das publicações nunca passa por nenhum servidor de terceiros.","h2PrivacySummary":"Privacidade numa só frase","privacySummaryBody":"O Tutti não tem servidor backend. O conteúdo das publicações (texto, imagens, vídeo) vai diretamente do seu navegador para cada rede social que selecionar — nunca através de qualquer servidor controlado pelo programador.","privacyFullPolicy":"Política completa:"},"privacy":{"title":"Tutti — Política de privacidade","headerTagline":"Sem recolha de dados por terceiros. Todo o conteúdo das publicações vai diretamente do seu navegador para cada SNS.","lastUpdated":"Última atualização: 2026-05-23 (v0.5.0)","h2Data":"1. Dados que recolhemos e transmitimos","dataIntro":"<strong>O Tutti não tem servidor backend.</strong> O conteúdo das publicações (texto, imagens, vídeo) nunca é transmitido a qualquer servidor de terceiros. Viaja diretamente do seu navegador para cada rede social que selecionar, exatamente como se o tivesse escrito e submetido aí.","dataLi1":"O texto, as imagens e o vídeo das publicações são passados apenas para as páginas dos SNS que escolher (X, Bluesky, Threads, Mastodon, Misskey, Tumblr, Pixiv, DeviantArt, Instagram, TikTok, YouTube) dentro do seu navegador.","dataLi2":"Quando o caminho opcional da API oficial está ativado para Bluesky / Mastodon / Misskey, as publicações são enviadas diretamente do seu navegador para o <strong>próprio servidor de API daquele SNS</strong> utilizando as credenciais fornecidas nas Definições. Nenhum servidor do Tutti / programador está envolvido.","dataLi3":"Não são recolhidos dados analíticos, de seguimento ou publicitários.","dataLi4":"O Tutti <strong>não</strong> lê nem armazena os seus tokens de autenticação, cookies ou dados de sessão dos sites SNS.","h3Report":"Exceção — relatórios manuais de erro (consentimento por clique)","reportIntro":"Quando (e apenas quando) carrega no <strong>botão &ldquo;Relatar&rdquo;</strong> apresentado numa caixa de diálogo de erro ou no painel de diagnóstico, é enviado o seguinte através de um relay do Cloudflare Workers para um <strong>repositório privado de issues do GitHub</strong> (<code>komm64/tutti-issues</code>, visível apenas para o programador do Tutti):","reportLi1":"A mensagem de erro, a versão da extensão, a cadeia User-Agent do navegador.","reportLi2":"As últimas 30 entradas do registo interno da extensão (o nível de log configurado; INFO por omissão). O conteúdo das publicações, as imagens, o vídeo, os dados de início de sessão em SNS e as credenciais de API <strong>nunca</strong> são incluídos.","reportLi3":"Uma captura DOM redigida do separador SNS onde ocorreu o erro, utilizada para reparar seletores partidos. O conteúdo de texto, os valores de atributos, os caminhos/consultas/fragmentos de URL, os atributos <code>href</code>/<code>src</code> e as etiquetas <code>&lt;meta&gt;</code>/<code>&lt;link&gt;</code> são removidos. O payload tem o limite de 8 KB. Consulte <a href=\"https://github.com/komm64/tutti/blob/main/src/utils/dom-snapshot.ts\">dom-snapshot.ts</a> para a implementação.","reportOutro":"Nada é enviado até que carregue no botão de relato. O destino é privado, visível apenas para o programador do Tutti.","h2Local":"2. Dados armazenados localmente","localIntro":"O seguinte é armazenado apenas dentro do seu navegador através da API <code>storage</code> do Chrome. Nada é transmitido para fora do dispositivo pelo Tutti.","localSettings":"<strong>Definições</strong> (<code>chrome.storage.sync</code>): URLs de instâncias Mastodon / Misskey, toggle autoPost, modo de visualização, URL de override de seletores, etc. Pode ser replicado para os seus outros dispositivos via Chrome Sync se tiver sessão iniciada no Chrome.","localDrafts":"<strong>Rascunhos</strong> (<code>chrome.storage.session</code>): Texto de publicação em curso e ficheiros multimédia anexados (imagens / vídeo). Limpo automaticamente quando o navegador é fechado.","localSelected":"<strong>SNS selecionados</strong> (<code>chrome.storage.local</code>): Os SNS que marcou como destinos de publicação. Persiste entre sessões por conveniência; apenas local ao dispositivo.","localUsers":"<strong>Últimos nomes de utilizador vistos</strong> (<code>chrome.storage.local</code>): O nome de utilizador atualmente autenticado em cada SNS, apresentado no popup para que possa confirmar que conta receberá a publicação. Apenas local ao dispositivo.","localHistory":"<strong>Histórico de publicações</strong> (<code>chrome.storage.local</code>): As últimas 20 publicações: primeiros 80 caracteres de texto, plataformas-alvo, sucesso/falha por plataforma e timestamp. Apenas local ao dispositivo.","localCreds":"<strong>Credenciais de API</strong> (<code>chrome.storage.local</code>): Apenas se ativou explicitamente o caminho da API oficial para Bluesky / Mastodon / Misskey: a sua app password do Bluesky ou access token do Mastodon / Misskey. <strong>Apenas local ao dispositivo; nunca replicado via Chrome Sync; nunca transmitido a qualquer servidor do programador.</strong> Removível pelo assistente de Definições.","localSelectors":"<strong>Cache de override de seletores</strong> (<code>chrome.storage.local</code>): Dados de hot-fix de seletores obtidos do URL que configurou nas Definições (omissão: o <code>selectors.json</code> público nas GitHub Pages do Tutti).","localVideoCap":"<strong>Cache do limite de envio de vídeo</strong> (<code>chrome.storage.local</code>): Resultado de sondagens API para limites de envio de vídeo por conta (por exemplo, Bluesky). Apenas valores numéricos; sem credenciais.","localWipe":"Tudo isto pode ser apagado a qualquer momento desinstalando a extensão ou limpando o armazenamento de extensões do Chrome.","h2Perms":"3. Permissões utilizadas","permsThead1":"Permissão","permsThead2":"Finalidade","permsStorage":"Armazenar os dados locais acima (definições, rascunhos, histórico, plataformas selecionadas, etc.) dentro do seu navegador.","permsOffscreen":"Executar <code>ffmpeg.wasm</code> num documento offscreen para comprimir / recodificar ficheiros de vídeo quando a origem exceder o limite de tamanho do SNS de destino. Os dados de vídeo são processados apenas localmente; não são transmitidos para lugar nenhum pelo Tutti.","permsSidePanel":"Modo de visualização de UI opcional: apresenta o formulário de composição do Tutti no painel lateral do Chrome em vez do popup de ação, para que permaneça aberto enquanto alterna entre separadores SNS. Opta-se por ele a partir da página de Opções; a omissão é o popup padrão.","permsHost":"Injetar content scripts em cada site SNS (x.com / twitter.com / bsky.app / bsky.social / threads.net / threads.com / mastodon.social / misskey.io / tumblr.com / pixiv.net / tiktok.com / youtube.com / instagram.com / deviantart.com) para preencher o formulário de composição com o conteúdo da sua publicação e submetê-lo em seu nome. Não são lidos dados destes sites para enviar para outro lado; o content script apenas escreve a sua própria entrada.","permsOptHost":"Pedido em tempo de execução apenas se configurar um URL de instância personalizado de Mastodon ou Misskey (diferente das omissões). O Chrome mostra o pedido de permissão padrão nesse momento.","h2Relationship":"4. Relação com os fornecedores SNS","relationshipBody":"O Tutti automatiza a UI web das (ou, opcionalmente, publica via API oficial das) 11 redes suportadas. Esta é funcionalidade não oficial; o Tutti não está associado a X, Bluesky, Meta (Threads / Instagram), Mastodon gGmbH, Misskey, Tumblr, Pixiv, DeviantArt, TikTok ou YouTube. Permanece sujeito aos termos de utilização de cada serviço.","h2Contact":"5. Contacto","contactGitHub":"GitHub Issues:","contactEmail":"E-mail:","h2Changes":"6. Alterações a esta política","changesBody":"As atualizações desta política são comunicadas atualizando esta página e o ficheiro de origem canónico (<a href=\"https://github.com/komm64/tutti/blob/main/PRIVACY.md\">PRIVACY.md</a>)."},"support":{"title":"Tutti — Apoio","headerTagline":"Recursos de apoio e FAQ","h2Help":"Precisa de ajuda?","h3Failed":"1. A publicação falhou / algo se comporta de forma estranha","failedBody":"Utilize o <strong>botão &ldquo;Diagnosticar&rdquo; → &ldquo;Relatar&rdquo; dentro do popup</strong>. Este é o canal canónico. O relatório é redigido (handles, URLs, e-mails) e encaminhado ao nosso repositório privado de issues, onde um PR de correção de seletores é aberto automaticamente e enviado como hot-fix a todos os utilizadores em poucos dias.","calloutTitle":"Porquê utilizar o botão de relato dentro do produto?","calloutBody":"O fluxo de relato do popup anexa automaticamente o estado final de composição, uma captura DOM redigida e os resultados de auditoria de seletores — exatamente o necessário para corrigir rapidamente seletores partidos. PII é removida através de várias camadas antes do envio.","h3General":"2. Questões gerais / pedidos de funcionalidades","generalBody":"Envie-nos um e-mail para <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>. Este é um canal privado, seguro para partilhar capturas de ecrã / handles pessoais.","h3Install":"3. Questões de instalação / conta","installBody":"O Tutti <strong>reutiliza as suas sessões existentes no navegador</strong> para cada rede social. Não há conta Tutti separada nem passo de início de sessão. Depois de iniciar sessão numa rede social no mesmo perfil do Chrome, o Tutti pode publicar a partir daí.","h2Faq":"FAQ","q1":"P. A minha publicação falhou.","a1":"Isto normalmente significa que uma rede social mudou o seu DOM. Utilize <strong>Diagnosticar → Relatar</strong> no popup. Um hot-fix de seletor normalmente é enviado em poucos dias via a atualização automática de <code>selectors.json</code> (não é necessária atualização da extensão).","q2":"P. O Tutti não se lembra do meu início de sessão.","a2":"O Tutti depende do início de sessão normal da rede no navegador. Inicie sessão em cada rede no Chrome primeiro e, depois, o Tutti pode publicar em seu nome. O modo anónimo não funciona porque as sessões da rede não estão lá.","q3":"P. Os limites de caracteres diferem por rede — é um problema?","a3":"Não. As publicações longas que excedem o limite de caracteres de uma rede são divididas automaticamente numa thread de continuação (no X, uma cadeia de respostas adequada; noutras redes, publicações sequenciais). As publicações dentro do limite passam tal como estão.","q4":"P. Dizem que a minha imagem / vídeo é demasiado grande.","a4":"As imagens são automaticamente redimensionadas via Canvas para se ajustarem ao limite de tamanho de cada rede. Os vídeos são comprimidos automaticamente com ffmpeg.wasm quando estão acima do limite de uma rede. Se mesmo a compressão não couber, verá um erro — verifique primeiro se o ficheiro é enviado pela app nativa da rede.","q5":"P. O Tutti vê o conteúdo da minha publicação?","a5":"Não. O conteúdo das publicações nunca passa por um servidor de terceiros. O Tutti injeta diretamente na página web de composição de cada rede. Consulte a nossa <a href=\"./privacy.html\">Política de privacidade</a> para detalhes. A única exceção é quando carrega no botão de relato dentro do produto, que envia informação de erro redigida ao nosso repositório privado de issues.","q6":"P. Posso doar?","a6":"Ainda não — estamos a trabalhar num canal de apoio sem pressão. O maior custo contínuo é manter-se a par das alterações da UI de cada rede social; futuros fluxos Ko-fi financiarão essa manutenção."}},"ro":{"lang":"ro","common":{"appName":"Tutti","tagline":"O singură extensie Chrome. Unsprezece rețele sociale. Zero bătăi de cap.","navHome":"Acasă","navGitHub":"GitHub","navSupport":"Asistență","navPrivacy":"Politica de confidențialitate","navLanguages":"Alte limbi","footerCopy":"&copy; 2026 komm64 &mdash; <a href=\"https://github.com/komm64/tutti/blob/main/LICENSE\">Toate drepturile rezervate</a>","footerContact":"Tutti este o extensie Chrome dezvoltată de <a href=\"https://github.com/komm64\">komm64</a>. Contact: <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>"},"index":{"title":"Tutti — Extensie pentru postare încrucișată","headerTagline":"O singură extensie Chrome. Unsprezece rețele sociale. Zero bătăi de cap.","h2Overview":"Prezentare generală","overviewBody":"Tutti distribuie aceeași postare către 11 rețele sociale (X, Bluesky, Threads, Tumblr, Mastodon, Misskey, Pixiv, TikTok, YouTube Shorts, Instagram, DeviantArt) cu un singur clic. Nu are backend; conținutul postărilor nu trece niciodată prin niciun server terț.","h2PrivacySummary":"Confidențialitate într-o singură frază","privacySummaryBody":"Tutti nu are server backend. Conținutul postărilor (text, imagini, video) merge direct din browserul tău către fiecare rețea socială pe care o selectezi — niciodată prin vreun server controlat de dezvoltator.","privacyFullPolicy":"Politică completă:"},"privacy":{"title":"Tutti — Politica de confidențialitate","headerTagline":"Nicio colectare de date de către terți. Tot conținutul postărilor merge direct din browserul tău către fiecare SNS.","lastUpdated":"Ultima actualizare: 2026-05-23 (v0.5.0)","h2Data":"1. Datele pe care le colectăm și le transmitem","dataIntro":"<strong>Tutti nu are server backend.</strong> Conținutul postărilor (text, imagini, video) nu este niciodată transmis către niciun server terț. Călătorește direct din browserul tău către fiecare rețea socială pe care o selectezi, exact ca și cum l-ai fi tastat și trimis tu însuți acolo.","dataLi1":"Textul, imaginile și videoul postării sunt transmise doar paginilor SNS pe care le alegi (X, Bluesky, Threads, Mastodon, Misskey, Tumblr, Pixiv, DeviantArt, Instagram, TikTok, YouTube) în interiorul browserului tău.","dataLi2":"Când calea API oficială opțională este activată pentru Bluesky / Mastodon / Misskey, postările sunt trimise direct din browserul tău către <strong>propriul server API al acelei SNS</strong> folosind credențialele furnizate în Setări. Niciun server Tutti / al dezvoltatorului nu este implicat.","dataLi3":"Nu sunt colectate date de analiză, urmărire sau publicitate.","dataLi4":"Tutti <strong>nu</strong> citește și nu stochează tokenurile tale de autentificare, cookie-urile sau datele de sesiune de pe site-urile SNS.","h3Report":"Excepție — rapoarte manuale de erori (consimțământ per clic)","reportIntro":"Când (și doar când) apeși <strong>butonul &bdquo;Raportează&rdquo;</strong> afișat într-un dialog de eroare sau în panoul de diagnostic, următoarele sunt trimise printr-un relay Cloudflare Workers către un <strong>tracker de issue-uri GitHub privat</strong> (<code>komm64/tutti-issues</code>, vizibil doar pentru dezvoltatorul Tutti):","reportLi1":"Mesajul de eroare, versiunea extensiei, șirul User-Agent al browserului.","reportLi2":"Ultimele 30 de intrări din jurnalul intern al extensiei (nivelul de log pe care l-ai configurat; INFO implicit). Conținutul postărilor, imaginile, videoul, datele de autentificare SNS și credențialele API <strong>niciodată</strong> nu sunt incluse.","reportLi3":"Un snapshot DOM editat al tab-ului SNS în care a apărut eroarea, folosit pentru repararea selectorilor stricați. Conținutul textului, valorile atributelor, căile/interogările/fragmentele URL, atributele <code>href</code>/<code>src</code> și tag-urile <code>&lt;meta&gt;</code>/<code>&lt;link&gt;</code> sunt eliminate. Payload-ul este limitat la 8 KB. Vezi <a href=\"https://github.com/komm64/tutti/blob/main/src/utils/dom-snapshot.ts\">dom-snapshot.ts</a> pentru implementare.","reportOutro":"Nimic nu se trimite până nu apeși butonul de raportare. Destinația este privată, vizibilă doar pentru dezvoltatorul Tutti.","h2Local":"2. Date stocate local","localIntro":"Următoarele sunt stocate doar în browserul tău prin API-ul <code>storage</code> al Chrome. Nimic nu este transmis în afara dispozitivului de către Tutti.","localSettings":"<strong>Setări</strong> (<code>chrome.storage.sync</code>): URL-uri ale instanțelor Mastodon / Misskey, comutator autoPost, mod de afișare, URL de suprascriere selectori etc. Pot fi replicate pe celelalte dispozitive prin Chrome Sync dacă ești conectat la Chrome.","localDrafts":"<strong>Ciorne</strong> (<code>chrome.storage.session</code>): Text postare în desfășurare și media atașate (imagini / video). Șterse automat la închiderea browserului.","localSelected":"<strong>SNS selectate</strong> (<code>chrome.storage.local</code>): SNS-urile pe care le-ai bifat ca ținte de postare. Persistă între sesiuni pentru comoditate; doar local pe dispozitiv.","localUsers":"<strong>Ultimele nume de utilizator văzute</strong> (<code>chrome.storage.local</code>): Numele de utilizator conectat curent pe fiecare SNS, afișat în popup pentru a putea confirma ce cont va primi postarea. Doar local pe dispozitiv.","localHistory":"<strong>Istoric postări</strong> (<code>chrome.storage.local</code>): Ultimele 20 de postări: primele 80 de caractere ale textului, platforme țintă, succes/eșec per platformă și marcaj temporal. Doar local pe dispozitiv.","localCreds":"<strong>Credențiale API</strong> (<code>chrome.storage.local</code>): Doar dacă ai activat explicit calea API oficială pentru Bluesky / Mastodon / Misskey: Bluesky app password sau access token Mastodon / Misskey. <strong>Doar local pe dispozitiv; niciodată replicate prin Chrome Sync; niciodată transmise vreunui server al dezvoltatorului.</strong> Pot fi eliminate din asistentul de Setări.","localSelectors":"<strong>Cache suprascriere selectori</strong> (<code>chrome.storage.local</code>): Date hot-fix pentru selectori obținute de la URL-ul configurat în Setări (implicit: <code>selectors.json</code> public pe GitHub Pages al Tutti).","localVideoCap":"<strong>Cache limită de încărcare video</strong> (<code>chrome.storage.local</code>): Rezultatul sondelor API pentru limitele de încărcare video per cont (de ex. Bluesky). Doar valori numerice; nicio credențială.","localWipe":"Toate acestea pot fi șterse oricând prin dezinstalarea extensiei sau curățarea spațiului de stocare al extensiilor Chrome.","h2Perms":"3. Permisiuni folosite","permsThead1":"Permisiune","permsThead2":"Scop","permsStorage":"Stocarea datelor locale de mai sus (setări, ciorne, istoric, platforme selectate etc.) în browserul tău.","permsOffscreen":"Rularea <code>ffmpeg.wasm</code> într-un document offscreen pentru comprimarea / recodificarea fișierelor video atunci când sursa depășește limita de dimensiune a SNS-ului țintă. Datele video sunt procesate doar local; Tutti nu le transmite nicăieri.","permsSidePanel":"Mod de afișare UI opțional: arată formularul de compunere al Tutti în panoul lateral Chrome în loc de popup-ul de acțiune, astfel încât să rămână deschis în timp ce comuți între tab-uri SNS. Activezi din pagina Opțiuni; valoarea implicită este popup-ul standard.","permsHost":"Injectarea de content scripts pe fiecare site SNS (x.com / twitter.com / bsky.app / bsky.social / threads.net / threads.com / mastodon.social / misskey.io / tumblr.com / pixiv.net / tiktok.com / youtube.com / instagram.com / deviantart.com) pentru a completa formularul de compunere cu conținutul postării tale și a-l trimite în numele tău. Nu sunt citite date de pe aceste site-uri și trimise în altă parte; content script scrie doar propria ta intrare.","permsOptHost":"Solicitat la rulare doar dacă configurezi un URL de instanță personalizat pentru Mastodon sau Misskey (altul decât cele implicite). Chrome afișează promptul standard de permisiune în acel moment.","h2Relationship":"4. Relația cu furnizorii SNS","relationshipBody":"Tutti automatizează interfața web (sau, opțional, postează prin API-ul oficial) al celor 11 rețele suportate. Aceasta este funcționalitate neoficială; Tutti nu este afiliat cu X, Bluesky, Meta (Threads / Instagram), Mastodon gGmbH, Misskey, Tumblr, Pixiv, DeviantArt, TikTok sau YouTube. Rămâi legat de termenii de utilizare proprii ai fiecărui serviciu.","h2Contact":"5. Contact","contactGitHub":"GitHub Issues:","contactEmail":"E-mail:","h2Changes":"6. Modificări ale acestei politici","changesBody":"Actualizările acestei politici sunt comunicate prin actualizarea acestei pagini și a fișierului sursă canonic (<a href=\"https://github.com/komm64/tutti/blob/main/PRIVACY.md\">PRIVACY.md</a>)."},"support":{"title":"Tutti — Asistență","headerTagline":"Resurse de asistență și întrebări frecvente","h2Help":"Ai nevoie de ajutor?","h3Failed":"1. Postarea a eșuat / ceva se comportă ciudat","failedBody":"Folosește <strong>butonul &bdquo;Diagnostichează&rdquo; → &bdquo;Raportează&rdquo; din interiorul popup-ului</strong>. Acesta este canalul canonic. Raportul este editat (handle-uri, URL-uri, e-mailuri) și redirecționat către trackerul nostru privat de issue-uri, unde se deschide automat un PR de corectare a selectorilor și se trimite ca hot-fix tuturor utilizatorilor în câteva zile.","calloutTitle":"De ce să folosești butonul de raportare integrat în produs?","calloutBody":"Fluxul de raportare al popup-ului atașează automat starea finală a compunerii, un snapshot DOM editat și rezultatele auditului selectorilor — exact ce este nevoie pentru a remedia rapid defectarea selectorilor. PII este eliminată prin mai multe straturi înainte de trimitere.","h3General":"2. Întrebări generale / cereri de funcționalități","generalBody":"Scrie-ne un e-mail la <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>. Acesta este un canal privat, sigur pentru a partaja capturi de ecran / handle-uri personale.","h3Install":"3. Întrebări despre instalare / cont","installBody":"Tutti <strong>reutilizează autentificările tale existente din browser</strong> pentru fiecare rețea socială. Nu există un cont Tutti separat sau pas de autentificare. Odată ce ești conectat la o rețea socială în același profil Chrome, Tutti poate posta de acolo.","h2Faq":"Întrebări frecvente","q1":"Î. Postarea mea a eșuat.","a1":"Aceasta înseamnă de obicei că o rețea socială și-a schimbat DOM-ul. Folosește <strong>Diagnostichează → Raportează</strong> în popup. Un hot-fix de selector este de obicei livrat în câteva zile prin actualizarea automată a <code>selectors.json</code> (nu este necesară actualizarea extensiei).","q2":"Î. Tutti nu îmi memorează autentificarea.","a2":"Tutti se bazează pe autentificarea normală din browser a rețelei. Conectează-te mai întâi la fiecare rețea în Chrome, apoi Tutti poate posta în numele tău. Modul incognito nu funcționează deoarece sesiunile rețelei nu sunt acolo.","q3":"Î. Limitele de caractere diferă pe fiecare rețea — este o problemă?","a3":"Nu. Postările lungi care depășesc limita de caractere a unei rețele sunt automat împărțite într-un fir de continuare (pe X, un lanț corect de răspunsuri; pe alte rețele, postări secvențiale). Postările în limita admisă trec ca atare.","q4":"Î. Mi se spune că imaginea / videoul meu este prea mare.","a4":"Imaginile sunt redimensionate automat prin Canvas pentru a se încadra în limita de dimensiune a fiecărei rețele. Videourile sunt comprimate automat cu ffmpeg.wasm când sunt peste limita unei rețele. Dacă nici comprimarea nu se încadrează, vei vedea o eroare — te rog verifică mai întâi că fișierul se încarcă prin aplicația nativă a rețelei.","q5":"Î. Tutti vede conținutul postărilor mele?","a5":"Nu. Conținutul postărilor nu trece niciodată printr-un server terț. Tutti se injectează direct în pagina web de compunere a fiecărei rețele. Vezi <a href=\"./privacy.html\">Politica de confidențialitate</a> pentru detalii. Singura excepție este când apeși butonul de raportare integrat în produs, care trimite informații de eroare editate către trackerul nostru privat de issue-uri.","q6":"Î. Pot să donez?","a6":"Nu încă — lucrăm la un canal de suport fără presiune. Cel mai mare cost continuu este să ne ținem la curent cu schimbările UI ale fiecărei rețele sociale; viitoarele fluxuri Ko-fi vor finanța această întreținere."}},"ru":{"lang":"ru","common":{"appName":"Tutti","tagline":"Одно расширение Chrome. Одиннадцать соцсетей. Ноль хлопот.","navHome":"Главная","navGitHub":"GitHub","navSupport":"Поддержка","navPrivacy":"Политика конфиденциальности","navLanguages":"Другие языки","footerCopy":"&copy; 2026 komm64 &mdash; <a href=\"https://github.com/komm64/tutti/blob/main/LICENSE\">Все права защищены</a>","footerContact":"Tutti — расширение Chrome от <a href=\"https://github.com/komm64\">komm64</a>. Контакт: <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>"},"index":{"title":"Tutti — Расширение кросс-постинга","headerTagline":"Одно расширение Chrome. Одиннадцать соцсетей. Ноль хлопот.","h2Overview":"Обзор","overviewBody":"Tutti рассылает один и тот же пост в 11 соцсетей (X, Bluesky, Threads, Tumblr, Mastodon, Misskey, Pixiv, TikTok, YouTube Shorts, Instagram, DeviantArt) в один клик. У него нет бэкенда; содержимое постов никогда не проходит через сторонние серверы.","h2PrivacySummary":"Конфиденциальность одним предложением","privacySummaryBody":"У Tutti нет бэкенд-сервера. Содержимое постов (текст, изображения, видео) идёт прямо из вашего браузера в каждую выбранную вами соцсеть — никогда через сервер, контролируемый разработчиком.","privacyFullPolicy":"Полная политика:"},"privacy":{"title":"Tutti — Политика конфиденциальности","headerTagline":"Никакого сбора данных третьими сторонами. Всё содержимое постов идёт прямо из вашего браузера в каждую SNS.","lastUpdated":"Последнее обновление: 2026-05-23 (v0.5.0)","h2Data":"1. Собираемые и передаваемые данные","dataIntro":"<strong>У Tutti нет бэкенд-сервера.</strong> Содержимое постов (текст, изображения, видео) никогда не передаётся ни одному стороннему серверу. Оно идёт напрямую из вашего браузера в каждую выбранную вами соцсеть, точно так же, как если бы вы сами набрали и отправили его там.","dataLi1":"Текст, изображения и видео постов передаются только на выбранные вами страницы SNS (X, Bluesky, Threads, Mastodon, Misskey, Tumblr, Pixiv, DeviantArt, Instagram, TikTok, YouTube) внутри вашего браузера.","dataLi2":"Когда включён опциональный путь через официальный API для Bluesky / Mastodon / Misskey, посты отправляются напрямую из вашего браузера на <strong>собственный API-сервер этой SNS</strong> с использованием учётных данных, которые вы предоставили в Настройках. Никакой сервер Tutti / разработчика не задействован.","dataLi3":"Никакие аналитические, трекинговые или рекламные данные не собираются.","dataLi4":"Tutti <strong>не</strong> читает и не хранит ваши токены аутентификации, куки или данные сессии с сайтов SNS.","h3Report":"Исключение — ручные отчёты об ошибках (согласие на каждый клик)","reportIntro":"Когда (и только когда) вы нажимаете <strong>кнопку «Сообщить»</strong>, показанную в диалоге ошибки или панели диагностики, через релей Cloudflare Workers в <strong>приватный трекер задач GitHub</strong> (<code>komm64/tutti-issues</code>, видимый только разработчику Tutti) отправляется следующее:","reportLi1":"Сообщение об ошибке, версия расширения, строка User-Agent браузера.","reportLi2":"Последние 30 записей внутреннего журнала расширения (настроенный вами уровень лога; по умолчанию INFO). Содержимое постов, изображения, видео, данные входа в SNS и учётные данные API <strong>никогда</strong> не включаются.","reportLi3":"Отредактированный DOM-снимок вкладки SNS, где произошла ошибка, используемый для починки сломанных селекторов. Текстовое содержимое, значения атрибутов, пути/запросы/фрагменты URL, атрибуты <code>href</code>/<code>src</code> и теги <code>&lt;meta&gt;</code>/<code>&lt;link&gt;</code> удаляются. Размер полезной нагрузки ограничен 8 КБ. Реализацию см. в <a href=\"https://github.com/komm64/tutti/blob/main/src/utils/dom-snapshot.ts\">dom-snapshot.ts</a>.","reportOutro":"Ничего не отправляется, пока вы не нажмёте кнопку отчёта. Назначение приватное, видимое только разработчику Tutti.","h2Local":"2. Локально сохраняемые данные","localIntro":"Следующее сохраняется только внутри вашего браузера через API <code>storage</code> Chrome. Tutti ничего не передаёт за пределы устройства.","localSettings":"<strong>Настройки</strong> (<code>chrome.storage.sync</code>): URL-адреса инстансов Mastodon / Misskey, переключатель autoPost, режим отображения, URL переопределения селекторов и т. д. Может реплицироваться на ваши другие устройства через Chrome Sync, если вы вошли в Chrome.","localDrafts":"<strong>Черновики</strong> (<code>chrome.storage.session</code>): Текст поста в процессе и прикреплённые медиа (изображения / видео). Автоматически очищается при закрытии браузера.","localSelected":"<strong>Выбранные SNS</strong> (<code>chrome.storage.local</code>): SNS, которые вы отметили как цели публикации. Сохраняется между сессиями для удобства; только локально на устройстве.","localUsers":"<strong>Последние увиденные имена пользователей</strong> (<code>chrome.storage.local</code>): Текущее имя пользователя, вошедшего в каждую SNS, отображается во всплывающем окне, чтобы вы могли подтвердить, какой аккаунт получит пост. Только локально на устройстве.","localHistory":"<strong>История постов</strong> (<code>chrome.storage.local</code>): Последние 20 постов: первые 80 символов текста, целевые платформы, успех/неудача по платформе и временная метка. Только локально на устройстве.","localCreds":"<strong>Учётные данные API</strong> (<code>chrome.storage.local</code>): Только если вы явно включили путь через официальный API для Bluesky / Mastodon / Misskey: ваш Bluesky app password или токен доступа Mastodon / Misskey. <strong>Только локально на устройстве; никогда не реплицируется через Chrome Sync; никогда не передаётся ни на какой сервер разработчика.</strong> Удаляется из мастера Настроек.","localSelectors":"<strong>Кэш переопределения селекторов</strong> (<code>chrome.storage.local</code>): Данные горячего исправления селекторов, полученные с URL, настроенного вами в Настройках (по умолчанию: публичный <code>selectors.json</code> на GitHub Pages Tutti).","localVideoCap":"<strong>Кэш предела загрузки видео</strong> (<code>chrome.storage.local</code>): Результат API-зондов для предельных значений загрузки видео по аккаунту (например, Bluesky). Только числовые значения; без учётных данных.","localWipe":"Всё это можно стереть в любое время, удалив расширение или очистив хранилище расширений Chrome.","h2Perms":"3. Используемые разрешения","permsThead1":"Разрешение","permsThead2":"Назначение","permsStorage":"Хранить указанные выше локальные данные (настройки, черновики, история, выбранные платформы и т. д.) внутри вашего браузера.","permsOffscreen":"Запускать <code>ffmpeg.wasm</code> в офскрин-документе для сжатия / повторного кодирования видеофайлов, когда источник превышает ограничение размера целевой SNS. Видеоданные обрабатываются только локально; Tutti не передаёт их никуда.","permsSidePanel":"Опциональный режим отображения UI: показывает форму создания поста Tutti в боковой панели Chrome вместо всплывающего окна действия, чтобы она оставалась открытой при переключении между вкладками SNS. Вы включаете это на странице Параметров; по умолчанию используется обычное всплывающее окно.","permsHost":"Внедрять контент-скрипты на каждый сайт SNS (x.com / twitter.com / bsky.app / bsky.social / threads.net / threads.com / mastodon.social / misskey.io / tumblr.com / pixiv.net / tiktok.com / youtube.com / instagram.com / deviantart.com), чтобы заполнить форму создания поста содержимым вашего поста и отправить его от вашего имени. Никакие данные не считываются с этих сайтов и не отправляются куда-либо ещё; контент-скрипт записывает только ваш собственный ввод.","permsOptHost":"Запрашивается во время выполнения только если вы настраиваете пользовательский URL инстанса Mastodon или Misskey (отличный от значений по умолчанию). Chrome показывает стандартный запрос разрешения в этот момент.","h2Relationship":"4. Отношения с провайдерами SNS","relationshipBody":"Tutti автоматизирует веб-интерфейс (или, опционально, публикует через официальный API) 11 поддерживаемых сетей. Это неофициальная функциональность; Tutti не аффилирован с X, Bluesky, Meta (Threads / Instagram), Mastodon gGmbH, Misskey, Tumblr, Pixiv, DeviantArt, TikTok или YouTube. Вы по-прежнему обязаны соблюдать собственные условия использования каждого сервиса.","h2Contact":"5. Контакт","contactGitHub":"GitHub Issues:","contactEmail":"Email:","h2Changes":"6. Изменения в этой политике","changesBody":"Обновления этой политики сообщаются путём обновления этой страницы и канонического исходного файла (<a href=\"https://github.com/komm64/tutti/blob/main/PRIVACY.md\">PRIVACY.md</a>)."},"support":{"title":"Tutti — Поддержка","headerTagline":"Ресурсы поддержки и FAQ","h2Help":"Нужна помощь?","h3Failed":"1. Публикация не удалась / что-то ведёт себя странно","failedBody":"Используйте <strong>кнопку «Диагностика» → «Сообщить» внутри всплывающего окна</strong>. Это канонический канал. Отчёт редактируется (имена пользователей, URL, email) и пересылается в наш приватный трекер задач, где автоматически открывается PR с исправлением селекторов и в течение нескольких дней доставляется как hot-fix всем пользователям.","calloutTitle":"Почему стоит использовать кнопку отчёта внутри продукта?","calloutBody":"Поток отчёта во всплывающем окне автоматически прикрепляет конечное состояние составления поста, отредактированный DOM-снимок и результаты аудита селекторов — именно то, что нужно, чтобы быстро исправить поломку селекторов. PII удаляется через несколько слоёв перед отправкой.","h3General":"2. Общие вопросы / запросы функций","generalBody":"Напишите нам на <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>. Это приватный канал, безопасный для обмена скриншотами / личными именами.","h3Install":"3. Вопросы по установке / аккаунту","installBody":"Tutti <strong>повторно использует ваши существующие входы в браузер</strong> для каждой соцсети. Нет отдельного аккаунта Tutti или шага входа. Как только вы вошли в соцсеть в том же профиле Chrome, Tutti может публиковать оттуда.","h2Faq":"FAQ","q1":"В. Моя публикация не удалась.","a1":"Это обычно означает, что соцсеть изменила свой DOM. Используйте <strong>Диагностика → Сообщить</strong> во всплывающем окне. Hot-fix селектора обычно доставляется в течение нескольких дней через автоматическое обновление <code>selectors.json</code> (обновление расширения не требуется).","q2":"В. Tutti не помнит мой вход.","a2":"Tutti полагается на обычный вход в сеть через браузер. Сначала войдите в каждую сеть в Chrome, тогда Tutti сможет публиковать от вашего имени. Режим инкогнито не работает, потому что сессий сети там нет.","q3":"В. Ограничения на символы различаются для каждой сети — это проблема?","a3":"Нет. Длинные посты, превышающие ограничение на символы сети, автоматически разбиваются на ветку-продолжение (на X — правильная цепочка ответов; в других сетях — последовательные посты). Посты в пределах ограничения проходят как есть.","q4":"В. Мне сообщают, что моё изображение / видео слишком большое.","a4":"Изображения автоматически изменяются по размеру через Canvas, чтобы соответствовать ограничению размера каждой сети. Видео автоматически сжимается с помощью ffmpeg.wasm, когда оно превышает ограничение сети. Если даже сжатие не подходит, вы увидите ошибку — пожалуйста, сначала проверьте, что файл загружается через нативное приложение сети.","q5":"В. Видит ли Tutti содержимое моих постов?","a5":"Нет. Содержимое постов никогда не проходит через сторонний сервер. Tutti внедряется напрямую в веб-страницу создания поста каждой сети. См. нашу <a href=\"./privacy.html\">Политику конфиденциальности</a> для деталей. Единственное исключение — когда вы нажимаете кнопку отчёта внутри продукта, которая отправляет отредактированную информацию об ошибке в наш приватный трекер задач.","q6":"В. Могу ли я сделать пожертвование?","a6":"Пока нет — мы работаем над ненавязчивым каналом поддержки. Самая большая текущая стоимость — это успевать за изменениями UI каждой соцсети; будущие потоки Ko-fi будут финансировать это обслуживание."}},"sv":{"lang":"sv","common":{"appName":"Tutti","tagline":"Ett Chrome-tillägg. Elva sociala nätverk. Inget krångel.","navHome":"Hem","navGitHub":"GitHub","navSupport":"Support","navPrivacy":"Integritetspolicy","navLanguages":"Andra språk","footerCopy":"&copy; 2026 komm64 &mdash; <a href=\"https://github.com/komm64/tutti/blob/main/LICENSE\">Alla rättigheter förbehållna</a>","footerContact":"Tutti är ett Chrome-tillägg från <a href=\"https://github.com/komm64\">komm64</a>. Kontakt: <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>"},"index":{"title":"Tutti — Tillägg för korsposter","headerTagline":"Ett Chrome-tillägg. Elva sociala nätverk. Inget krångel.","h2Overview":"Översikt","overviewBody":"Tutti sänder samma inlägg till 11 sociala nätverk (X, Bluesky, Threads, Tumblr, Mastodon, Misskey, Pixiv, TikTok, YouTube Shorts, Instagram, DeviantArt) med ett enda klick. Det har ingen backend; inläggsinnehåll passerar aldrig genom någon tredjepartsserver.","h2PrivacySummary":"Integritet i en mening","privacySummaryBody":"Tutti har ingen backend-server. Inläggsinnehåll (text, bilder, video) går direkt från din webbläsare till varje socialt nätverk du väljer — aldrig via någon server kontrollerad av utvecklaren.","privacyFullPolicy":"Fullständig policy:"},"privacy":{"title":"Tutti — Integritetspolicy","headerTagline":"Ingen datainsamling av tredje part. Allt inläggsinnehåll går direkt från din webbläsare till varje SNS.","lastUpdated":"Senast uppdaterad: 2026-05-23 (v0.5.0)","h2Data":"1. Data vi samlar in och överför","dataIntro":"<strong>Tutti har ingen backend-server.</strong> Inläggsinnehåll (text, bilder, video) överförs aldrig till någon tredjepartsserver. Det färdas direkt från din webbläsare till varje socialt nätverk du väljer, precis som om du hade skrivit och skickat det där själv.","dataLi1":"Inläggets text, bilder och video skickas endast till de SNS-sidor du väljer (X, Bluesky, Threads, Mastodon, Misskey, Tumblr, Pixiv, DeviantArt, Instagram, TikTok, YouTube) inom din webbläsare.","dataLi2":"När den valfria officiella API-vägen är aktiverad för Bluesky / Mastodon / Misskey skickas inlägg direkt från din webbläsare till <strong>det SNS:s egna API-server</strong> med de uppgifter du angett i Inställningar. Ingen Tutti- / utvecklarserver är inblandad.","dataLi3":"Inga analys-, spårnings- eller annonsdata samlas in.","dataLi4":"Tutti <strong>läser inte</strong> och lagrar inte dina autentiseringstokens, cookies eller sessionsdata från SNS-webbplatserna.","h3Report":"Undantag — manuella felrapporter (samtycke per klick)","reportIntro":"När (och endast när) du trycker på <strong>knappen &ldquo;Rapportera&rdquo;</strong> som visas i en feldialog eller diagnospanelen skickas följande via ett Cloudflare Workers-relä till en <strong>privat GitHub-issue-tracker</strong> (<code>komm64/tutti-issues</code>, endast synlig för Tutti-utvecklaren):","reportLi1":"Felmeddelandet, tilläggets version och webbläsarens User-Agent-sträng.","reportLi2":"De senaste 30 posterna i tilläggets interna logg (loggnivån du konfigurerat; INFO som standard). Inläggsinnehåll, bilder, video, SNS-inloggningsdata och API-uppgifter ingår <strong>aldrig</strong>.","reportLi3":"En redigerad DOM-ögonblicksbild av SNS-fliken där felet inträffade, används för att reparera trasiga selektorer. Textinnehåll, attributvärden, URL-sökvägar/-frågor/-fragment, <code>href</code>/<code>src</code>-attribut och <code>&lt;meta&gt;</code>/<code>&lt;link&gt;</code>-taggar tas bort. Nyttolasten är begränsad till 8 KB. Se <a href=\"https://github.com/komm64/tutti/blob/main/src/utils/dom-snapshot.ts\">dom-snapshot.ts</a> för implementeringen.","reportOutro":"Inget skickas förrän du trycker på rapporteringsknappen. Destinationen är privat och endast synlig för Tutti-utvecklaren.","h2Local":"2. Lokalt lagrade data","localIntro":"Följande lagras endast i din webbläsare via Chromes <code>storage</code>-API. Inget överförs från enheten av Tutti.","localSettings":"<strong>Inställningar</strong> (<code>chrome.storage.sync</code>): Mastodon-/Misskey-instans-URL:er, autoPost-omkopplare, visningsläge, selector-override-URL osv. Kan replikeras till dina andra enheter via Chrome Sync om du är inloggad på Chrome.","localDrafts":"<strong>Utkast</strong> (<code>chrome.storage.session</code>): Pågående inläggstext och bifogade media (bilder / video). Rensas automatiskt när webbläsaren avslutas.","localSelected":"<strong>Valda SNS</strong> (<code>chrome.storage.local</code>): De SNS du markerat som publiceringsmål. Bibehålls mellan sessioner för bekvämlighets skull; endast lokalt på enheten.","localUsers":"<strong>Senast sedda användarnamn</strong> (<code>chrome.storage.local</code>): Det användarnamn som för närvarande är inloggat på varje SNS, visat i popupen så att du kan bekräfta vilket konto som tar emot inlägget. Endast lokalt på enheten.","localHistory":"<strong>Inläggshistorik</strong> (<code>chrome.storage.local</code>): De senaste 20 inläggen: de första 80 tecknen av texten, målplattformar, framgång/misslyckande per plattform och tidsstämpel. Endast lokalt på enheten.","localCreds":"<strong>API-uppgifter</strong> (<code>chrome.storage.local</code>): Endast om du uttryckligen aktiverat den officiella API-vägen för Bluesky / Mastodon / Misskey: ditt Bluesky app password eller Mastodon-/Misskey-access-token. <strong>Endast lokalt på enheten; replikeras aldrig via Chrome Sync; skickas aldrig till någon utvecklarserver.</strong> Borttagbart från inställningsguiden.","localSelectors":"<strong>Cache för selector-override</strong> (<code>chrome.storage.local</code>): Selector-hot-fix-data hämtad från den URL du konfigurerat i Inställningar (standard: den offentliga <code>selectors.json</code> på Tuttis GitHub Pages).","localVideoCap":"<strong>Cache för videouppladdningsgräns</strong> (<code>chrome.storage.local</code>): Resultat av API-sonderingar för videouppladdningsgränser per konto (t.ex. Bluesky). Endast numeriska värden; inga uppgifter.","localWipe":"Allt detta kan raderas när som helst genom att avinstallera tillägget eller rensa Chromes tilläggslagring.","h2Perms":"3. Använda behörigheter","permsThead1":"Behörighet","permsThead2":"Syfte","permsStorage":"Lagra ovanstående lokala data (inställningar, utkast, historik, valda plattformar osv.) i din webbläsare.","permsOffscreen":"Köra <code>ffmpeg.wasm</code> i ett offscreen-dokument för att komprimera / omkoda videofiler när källan överskrider storleksgränsen för mål-SNS. Videodata bearbetas endast lokalt; överförs inte någonstans av Tutti.","permsSidePanel":"Valfritt UI-visningsläge: visar Tuttis komposeringsformulär i Chromes sidopanel istället för åtgärds-popupen, så att det förblir öppet medan du växlar mellan SNS-flikar. Du väljer detta från Alternativ-sidan; standardvärdet är standard-popupen.","permsHost":"Injicera content scripts i varje SNS-webbplats (x.com / twitter.com / bsky.app / bsky.social / threads.net / threads.com / mastodon.social / misskey.io / tumblr.com / pixiv.net / tiktok.com / youtube.com / instagram.com / deviantart.com) för att fylla i komposeringsformuläret med ditt inläggsinnehåll och skicka det å dina vägnar. Inga data läses från dessa webbplatser och skickas någon annanstans; content-skriptet skriver endast din egen inmatning.","permsOptHost":"Begärs vid körning endast om du konfigurerar en anpassad Mastodon- eller Misskey-instans-URL (annan än standardvärdena). Chrome visar standardbehörighetsprompten vid den tidpunkten.","h2Relationship":"4. Förhållande till SNS-leverantörerna","relationshipBody":"Tutti automatiserar webb-UI:n (eller, valfritt, publicerar via det officiella API:et) för de 11 stödda nätverken. Detta är inofficiell funktionalitet; Tutti är inte ansluten till X, Bluesky, Meta (Threads / Instagram), Mastodon gGmbH, Misskey, Tumblr, Pixiv, DeviantArt, TikTok eller YouTube. Du förblir bunden av varje tjänsts egna användarvillkor.","h2Contact":"5. Kontakt","contactGitHub":"GitHub Issues:","contactEmail":"E-post:","h2Changes":"6. Ändringar i denna policy","changesBody":"Uppdateringar av denna policy kommuniceras genom att uppdatera denna sida och den kanoniska källfilen (<a href=\"https://github.com/komm64/tutti/blob/main/PRIVACY.md\">PRIVACY.md</a>)."},"support":{"title":"Tutti — Support","headerTagline":"Supportresurser och FAQ","h2Help":"Behöver du hjälp?","h3Failed":"1. Publiceringen misslyckades / något beter sig konstigt","failedBody":"Använd <strong>knappen &ldquo;Diagnostisera&rdquo; → &ldquo;Rapportera&rdquo; inuti popupen</strong>. Detta är den kanoniska kanalen. Rapporten redigeras (handtag, URL:er, e-postadresser) och vidarebefordras till vår privata issue-tracker, där en selector-fix PR öppnas automatiskt och pushas som hotfix till alla användare inom några dagar.","calloutTitle":"Varför använda den inbyggda rapporteringsknappen?","calloutBody":"Popupens rapporteringsflöde bifogar automatiskt det slutliga komposeringsläget, en redigerad DOM-ögonblicksbild och selector-revisionsresultat — exakt vad som behövs för att snabbt fixa selector-fel. PII tas bort genom flera lager innan sändning.","h3General":"2. Allmänna frågor / funktionsförfrågningar","generalBody":"Mejla oss på <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>. Detta är en privat kanal, säker att dela skärmdumpar / personliga handtag i.","h3Install":"3. Installations- / kontofrågor","installBody":"Tutti <strong>återanvänder dina befintliga webbläsarinloggningar</strong> för varje socialt nätverk. Det finns inget separat Tutti-konto eller inloggningssteg. När du har loggat in på ett socialt nätverk i samma Chrome-profil kan Tutti publicera därifrån.","h2Faq":"FAQ","q1":"F. Min publicering misslyckades.","a1":"Detta betyder vanligtvis att ett socialt nätverk har ändrat sitt DOM. Använd <strong>Diagnostisera → Rapportera</strong> i popupen. En selector-hotfix levereras vanligtvis inom några dagar via den automatiska uppdateringen av <code>selectors.json</code> (ingen tilläggsuppdatering krävs).","q2":"F. Tutti kommer inte ihåg min inloggning.","a2":"Tutti förlitar sig på nätverkets normala webbläsarinloggning. Logga in på varje nätverk i Chrome först, sedan kan Tutti publicera å dina vägnar. Inkognitoläget fungerar inte eftersom nätverkets sessioner inte finns där.","q3":"F. Teckenbegränsningarna skiljer sig åt mellan nätverk — är det ett problem?","a3":"Nej. Långa inlägg som överskrider ett nätverks teckenbegränsning delas automatiskt upp i en fortsättningstråd (på X en korrekt svarskedja; på andra nätverk sekventiella inlägg). Inlägg inom gränsen går igenom som de är.","q4":"F. Jag får meddelandet att min bild / video är för stor.","a4":"Bilder ändras automatiskt i storlek via Canvas för att passa varje nätverks storleksgräns. Videor komprimeras automatiskt med ffmpeg.wasm när de överskrider ett nätverks gräns. Om inte ens komprimering passar visas ett fel — verifiera först att filen laddas upp via nätverkets nativa app.","q5":"F. Ser Tutti mitt inläggsinnehåll?","a5":"Nej. Inläggsinnehåll passerar aldrig genom en tredjepartsserver. Tutti injicerar direkt i varje nätverks webbsida för komposering. Se vår <a href=\"./privacy.html\">Integritetspolicy</a> för detaljer. Det enda undantaget är när du trycker på den inbyggda rapporteringsknappen, som skickar redigerad felinformation till vår privata issue-tracker.","q6":"F. Kan jag donera?","a6":"Inte än — vi arbetar på en lågprofil-stödkanal. Den största pågående kostnaden är att hålla jämna steg med varje socialt nätverks UI-ändringar; framtida Ko-fi-flöden kommer att finansiera det underhållet."}},"th":{"lang":"th","common":{"appName":"Tutti","tagline":"ส่วนขยาย Chrome เดียว เครือข่ายสังคมสิบเอ็ดแห่ง ไร้ความยุ่งยาก","navHome":"หน้าแรก","navGitHub":"GitHub","navSupport":"การสนับสนุน","navPrivacy":"นโยบายความเป็นส่วนตัว","navLanguages":"ภาษาอื่น ๆ","footerCopy":"&copy; 2026 komm64 &mdash; <a href=\"https://github.com/komm64/tutti/blob/main/LICENSE\">สงวนลิขสิทธิ์</a>","footerContact":"Tutti เป็นส่วนขยาย Chrome โดย <a href=\"https://github.com/komm64\">komm64</a> ติดต่อ: <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>"},"index":{"title":"Tutti — ส่วนขยายโพสต์ข้ามแพลตฟอร์ม","headerTagline":"ส่วนขยาย Chrome เดียว เครือข่ายสังคมสิบเอ็ดแห่ง ไร้ความยุ่งยาก","h2Overview":"ภาพรวม","overviewBody":"Tutti เผยแพร่โพสต์เดียวกันไปยังเครือข่ายสังคม 11 แห่ง (X, Bluesky, Threads, Tumblr, Mastodon, Misskey, Pixiv, TikTok, YouTube Shorts, Instagram, DeviantArt) ด้วยการคลิกครั้งเดียว ไม่มีแบ็กเอนด์; เนื้อหาโพสต์ไม่เคยผ่านเซิร์ฟเวอร์บุคคลที่สามใด ๆ","h2PrivacySummary":"ความเป็นส่วนตัวในประโยคเดียว","privacySummaryBody":"Tutti ไม่มีเซิร์ฟเวอร์แบ็กเอนด์ เนื้อหาโพสต์ (ข้อความ, ภาพ, วิดีโอ) ส่งตรงจากเบราว์เซอร์ของคุณไปยังเครือข่ายสังคมแต่ละแห่งที่คุณเลือก — ไม่เคยผ่านเซิร์ฟเวอร์ที่ผู้พัฒนาควบคุม","privacyFullPolicy":"นโยบายฉบับสมบูรณ์:"},"privacy":{"title":"Tutti — นโยบายความเป็นส่วนตัว","headerTagline":"ไม่มีการเก็บข้อมูลโดยบุคคลที่สาม เนื้อหาโพสต์ทั้งหมดส่งตรงจากเบราว์เซอร์ของคุณไปยัง SNS แต่ละแห่ง","lastUpdated":"อัปเดตล่าสุด: 2026-05-23 (v0.5.0)","h2Data":"1. ข้อมูลที่เราเก็บและส่งต่อ","dataIntro":"<strong>Tutti ไม่มีเซิร์ฟเวอร์แบ็กเอนด์</strong> เนื้อหาโพสต์ (ข้อความ, ภาพ, วิดีโอ) ไม่ถูกส่งไปยังเซิร์ฟเวอร์บุคคลที่สามใด ๆ ทั้งสิ้น มันเดินทางตรงจากเบราว์เซอร์ของคุณไปยังเครือข่ายสังคมแต่ละแห่งที่คุณเลือก เหมือนกับว่าคุณพิมพ์และส่งด้วยตัวเองที่นั่น","dataLi1":"ข้อความโพสต์, ภาพ, และวิดีโอจะถูกส่งไปยังหน้า SNS ที่คุณเลือกเท่านั้น (X, Bluesky, Threads, Mastodon, Misskey, Tumblr, Pixiv, DeviantArt, Instagram, TikTok, YouTube) ภายในเบราว์เซอร์ของคุณ","dataLi2":"เมื่อเส้นทาง API อย่างเป็นทางการแบบเสริมถูกเปิดใช้งานสำหรับ Bluesky / Mastodon / Misskey โพสต์จะถูกส่งตรงจากเบราว์เซอร์ของคุณไปยัง <strong>เซิร์ฟเวอร์ API ของ SNS นั้นเอง</strong> โดยใช้ข้อมูลรับรองที่คุณให้ไว้ในการตั้งค่า ไม่มีเซิร์ฟเวอร์ Tutti / ผู้พัฒนาเกี่ยวข้อง","dataLi3":"ไม่มีการเก็บข้อมูลการวิเคราะห์, การติดตาม, หรือโฆษณา","dataLi4":"Tutti <strong>ไม่</strong> อ่านหรือเก็บโทเค็นการรับรอง, คุกกี้, หรือข้อมูลเซสชันจากเว็บไซต์ SNS","h3Report":"ข้อยกเว้น — รายงานข้อผิดพลาดด้วยตนเอง (ยินยอมต่อการคลิก)","reportIntro":"เมื่อ (และเฉพาะเมื่อ) คุณกด <strong>ปุ่ม &laquo;รายงาน&raquo;</strong> ที่แสดงในกล่องโต้ตอบข้อผิดพลาดหรือแผงวินิจฉัย ข้อมูลต่อไปนี้จะถูกส่งผ่าน Cloudflare Workers relay ไปยัง <strong>ตัวติดตามประเด็น GitHub แบบส่วนตัว</strong> (<code>komm64/tutti-issues</code>, มองเห็นได้เฉพาะผู้พัฒนา Tutti เท่านั้น):","reportLi1":"ข้อความข้อผิดพลาด, เวอร์ชันส่วนขยาย, สตริง User-Agent ของเบราว์เซอร์","reportLi2":"30 รายการล่าสุดของบันทึกภายในของส่วนขยาย (ระดับบันทึกที่คุณตั้งค่า; INFO ตามค่าเริ่มต้น) เนื้อหาโพสต์, ภาพ, วิดีโอ, ข้อมูลล็อกอิน SNS, และข้อมูลรับรอง API <strong>ไม่</strong> ถูกรวมไว้","reportLi3":"ภาพรวม DOM ที่ผ่านการแก้ไขข้อมูลของแท็บ SNS ที่เกิดข้อผิดพลาด ใช้สำหรับซ่อมแซมตัวเลือกที่เสีย เนื้อหาข้อความ, ค่าแอตทริบิวต์, เส้นทาง/คำสั่ง/ส่วนของ URL, แอตทริบิวต์ <code>href</code>/<code>src</code> และแท็ก <code>&lt;meta&gt;</code>/<code>&lt;link&gt;</code> ถูกตัดออก ขนาด payload ถูกจำกัดที่ 8 KB ดูการนำไปใช้ที่ <a href=\"https://github.com/komm64/tutti/blob/main/src/utils/dom-snapshot.ts\">dom-snapshot.ts</a>","reportOutro":"ไม่มีอะไรถูกส่งจนกว่าคุณจะกดปุ่มรายงาน ปลายทางเป็นส่วนตัว มองเห็นได้เฉพาะผู้พัฒนา Tutti เท่านั้น","h2Local":"2. ข้อมูลที่จัดเก็บไว้ในเครื่อง","localIntro":"ข้อมูลต่อไปนี้ถูกจัดเก็บไว้ภายในเบราว์เซอร์ของคุณเท่านั้นผ่าน Chrome <code>storage</code> API ไม่มีสิ่งใดถูกส่งออกจากอุปกรณ์โดย Tutti","localSettings":"<strong>การตั้งค่า</strong> (<code>chrome.storage.sync</code>): URL อินสแตนซ์ Mastodon / Misskey, สวิตช์ autoPost, โหมดการแสดงผล, URL แทนที่ตัวเลือก ฯลฯ อาจถูกจำลองไปยังอุปกรณ์อื่น ๆ ของคุณผ่าน Chrome Sync หากคุณลงชื่อเข้าใช้ Chrome","localDrafts":"<strong>ฉบับร่าง</strong> (<code>chrome.storage.session</code>): ข้อความโพสต์ที่กำลังดำเนินการและสื่อที่แนบ (ภาพ / วิดีโอ) ล้างอัตโนมัติเมื่อปิดเบราว์เซอร์","localSelected":"<strong>SNS ที่เลือก</strong> (<code>chrome.storage.local</code>): SNS ที่คุณเลือกเป็นเป้าหมายการโพสต์ คงอยู่ระหว่างเซสชันเพื่อความสะดวก; เฉพาะในอุปกรณ์เท่านั้น","localUsers":"<strong>ชื่อผู้ใช้ที่เห็นล่าสุด</strong> (<code>chrome.storage.local</code>): ชื่อผู้ใช้ที่เข้าสู่ระบบปัจจุบันในแต่ละ SNS แสดงใน popup เพื่อให้คุณยืนยันว่าบัญชีใดจะรับโพสต์ เฉพาะในอุปกรณ์เท่านั้น","localHistory":"<strong>ประวัติโพสต์</strong> (<code>chrome.storage.local</code>): 20 โพสต์ล่าสุด: 80 อักขระแรกของข้อความ, แพลตฟอร์มเป้าหมาย, สำเร็จ/ล้มเหลวตามแพลตฟอร์ม, และตราเวลา เฉพาะในอุปกรณ์เท่านั้น","localCreds":"<strong>ข้อมูลรับรอง API</strong> (<code>chrome.storage.local</code>): เฉพาะเมื่อคุณเปิดใช้งานเส้นทาง API อย่างเป็นทางการสำหรับ Bluesky / Mastodon / Misskey อย่างชัดเจน: Bluesky app password ของคุณ หรือโทเค็นการเข้าถึง Mastodon / Misskey <strong>เฉพาะในอุปกรณ์เท่านั้น; ไม่เคยจำลองผ่าน Chrome Sync; ไม่เคยส่งไปยังเซิร์ฟเวอร์ผู้พัฒนาใด ๆ</strong> สามารถลบได้จากตัวช่วยตั้งค่า","localSelectors":"<strong>แคชการแทนที่ตัวเลือก</strong> (<code>chrome.storage.local</code>): ข้อมูล hot-fix ตัวเลือกที่ดึงจาก URL ที่คุณกำหนดในการตั้งค่า (ค่าเริ่มต้น: <code>selectors.json</code> สาธารณะบน GitHub Pages ของ Tutti)","localVideoCap":"<strong>แคชขีดจำกัดการอัปโหลดวิดีโอ</strong> (<code>chrome.storage.local</code>): ผลลัพธ์ของการตรวจสอบ API สำหรับขีดจำกัดการอัปโหลดวิดีโอต่อบัญชี (เช่น Bluesky) เฉพาะค่าตัวเลข; ไม่มีข้อมูลรับรอง","localWipe":"สิ่งเหล่านี้ทั้งหมดสามารถลบได้ตลอดเวลาโดยการถอนการติดตั้งส่วนขยายหรือล้างพื้นที่จัดเก็บข้อมูลส่วนขยายของ Chrome","h2Perms":"3. การอนุญาตที่ใช้","permsThead1":"การอนุญาต","permsThead2":"วัตถุประสงค์","permsStorage":"จัดเก็บข้อมูลในเครื่องด้านบน (การตั้งค่า, ฉบับร่าง, ประวัติ, แพลตฟอร์มที่เลือก ฯลฯ) ภายในเบราว์เซอร์ของคุณ","permsOffscreen":"เรียกใช้ <code>ffmpeg.wasm</code> ในเอกสาร offscreen เพื่อบีบอัด / เข้ารหัสไฟล์วิดีโอใหม่เมื่อแหล่งที่มาเกินขีดจำกัดขนาดของ SNS ปลายทาง ข้อมูลวิดีโอประมวลผลในเครื่องเท่านั้น; ไม่ได้ส่งไปที่ใดโดย Tutti","permsSidePanel":"โหมดการแสดงผล UI ทางเลือก: แสดงแบบฟอร์มสร้างโพสต์ของ Tutti ในแผงด้านข้างของ Chrome แทนที่ popup ของการดำเนินการ เพื่อให้เปิดอยู่ขณะที่คุณสลับระหว่างแท็บ SNS คุณเลือกใช้จากหน้าตัวเลือก; ค่าเริ่มต้นคือ popup มาตรฐาน","permsHost":"ฉีด content scripts เข้าไปในแต่ละเว็บไซต์ SNS (x.com / twitter.com / bsky.app / bsky.social / threads.net / threads.com / mastodon.social / misskey.io / tumblr.com / pixiv.net / tiktok.com / youtube.com / instagram.com / deviantart.com) เพื่อกรอกแบบฟอร์มสร้างโพสต์ด้วยเนื้อหาโพสต์ของคุณและส่งในนามของคุณ ไม่มีการอ่านข้อมูลจากเว็บไซต์เหล่านี้และส่งไปที่อื่น; content script เขียนเฉพาะอินพุตของคุณเองเท่านั้น","permsOptHost":"ขอในขณะรันไทม์เฉพาะเมื่อคุณกำหนด URL อินสแตนซ์ Mastodon หรือ Misskey แบบกำหนดเอง (อื่นนอกจากค่าเริ่มต้น) Chrome แสดงพรอมต์การอนุญาตมาตรฐานในขณะนั้น","h2Relationship":"4. ความสัมพันธ์กับผู้ให้บริการ SNS","relationshipBody":"Tutti อัตโนมัติ Web UI ของ (หรือ ทางเลือก, โพสต์ผ่าน API อย่างเป็นทางการของ) 11 เครือข่ายที่รองรับ นี่เป็นฟังก์ชันที่ไม่เป็นทางการ; Tutti ไม่ได้มีความเกี่ยวข้องกับ X, Bluesky, Meta (Threads / Instagram), Mastodon gGmbH, Misskey, Tumblr, Pixiv, DeviantArt, TikTok หรือ YouTube คุณยังคงผูกพันตามเงื่อนไขการใช้บริการของแต่ละบริการเอง","h2Contact":"5. ติดต่อ","contactGitHub":"GitHub Issues:","contactEmail":"อีเมล:","h2Changes":"6. การเปลี่ยนแปลงนโยบายนี้","changesBody":"การอัปเดตนโยบายนี้จะถูกสื่อสารโดยการอัปเดตหน้านี้และไฟล์แหล่งที่มาที่เป็นมาตรฐาน (<a href=\"https://github.com/komm64/tutti/blob/main/PRIVACY.md\">PRIVACY.md</a>)"},"support":{"title":"Tutti — การสนับสนุน","headerTagline":"แหล่งข้อมูลสนับสนุนและคำถามที่พบบ่อย","h2Help":"ต้องการความช่วยเหลือ?","h3Failed":"1. การโพสต์ล้มเหลว / มีบางสิ่งทำงานผิดปกติ","failedBody":"ใช้ <strong>ปุ่ม &laquo;วินิจฉัย&raquo; → &laquo;รายงาน&raquo; ภายใน popup</strong> นี่คือช่องทางมาตรฐาน รายงานจะถูกแก้ไขข้อมูล (handles, URLs, อีเมล) และส่งต่อไปยังตัวติดตามประเด็นส่วนตัวของเรา ซึ่งจะเปิด PR แก้ไขตัวเลือกโดยอัตโนมัติและส่งเป็น hot-fix ให้ผู้ใช้ทุกคนภายในไม่กี่วัน","calloutTitle":"ทำไมต้องใช้ปุ่มรายงานในผลิตภัณฑ์?","calloutBody":"ขั้นตอนการรายงานของ popup จะแนบสถานะการสร้างโพสต์สุดท้าย, ภาพรวม DOM ที่แก้ไขแล้ว, และผลการตรวจสอบตัวเลือกโดยอัตโนมัติ — แน่นอนสิ่งที่จำเป็นในการแก้ไขการแตกหักของตัวเลือกอย่างรวดเร็ว PII ถูกลบผ่านหลายชั้นก่อนการส่ง","h3General":"2. คำถามทั่วไป / คำขอคุณสมบัติ","generalBody":"ส่งอีเมลถึงเราที่ <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a> นี่เป็นช่องทางส่วนตัว ปลอดภัยสำหรับการแชร์ภาพหน้าจอ / handles ส่วนตัว","h3Install":"3. คำถามเกี่ยวกับการติดตั้ง / บัญชี","installBody":"Tutti <strong>นำการล็อกอินเบราว์เซอร์ที่มีอยู่ของคุณกลับมาใช้ใหม่</strong> สำหรับแต่ละเครือข่ายสังคม ไม่มีบัญชี Tutti แยกหรือขั้นตอนการเข้าสู่ระบบ เมื่อคุณเข้าสู่ระบบเครือข่ายสังคมในโปรไฟล์ Chrome เดียวกัน Tutti สามารถโพสต์จากที่นั่นได้","h2Faq":"คำถามที่พบบ่อย","q1":"ถ. การโพสต์ของฉันล้มเหลว","a1":"โดยปกติหมายความว่าเครือข่ายสังคมได้เปลี่ยน DOM ของมัน ใช้ <strong>วินิจฉัย → รายงาน</strong> ใน popup การ hot-fix ตัวเลือกมักจะส่งภายในไม่กี่วันผ่านการอัปเดตอัตโนมัติของ <code>selectors.json</code> (ไม่ต้องอัปเดตส่วนขยาย)","q2":"ถ. Tutti ไม่จำการเข้าสู่ระบบของฉัน","a2":"Tutti พึ่งพาการเข้าสู่ระบบเบราว์เซอร์ปกติของเครือข่าย เข้าสู่ระบบแต่ละเครือข่ายใน Chrome ก่อน จากนั้น Tutti จะสามารถโพสต์ในนามของคุณได้ โหมดไม่ระบุตัวตนไม่ทำงานเพราะไม่มีเซสชันเครือข่ายอยู่ที่นั่น","q3":"ถ. ขีดจำกัดอักขระต่างกันในแต่ละเครือข่าย — เป็นปัญหาหรือไม่?","a3":"ไม่ใช่ โพสต์ยาวที่เกินขีดจำกัดอักขระของเครือข่ายจะถูกแบ่งเป็นเธรดต่อเนื่องโดยอัตโนมัติ (บน X เป็นห่วงโซ่ตอบกลับที่เหมาะสม; บนเครือข่ายอื่น ๆ เป็นโพสต์ตามลำดับ) โพสต์ภายในขีดจำกัดจะถูกส่งไปตามที่เป็น","q4":"ถ. ฉันได้รับการแจ้งว่าภาพ / วิดีโอของฉันใหญ่เกินไป","a4":"ภาพจะถูกปรับขนาดโดยอัตโนมัติผ่าน Canvas เพื่อให้พอดีกับขีดจำกัดขนาดของแต่ละเครือข่าย วิดีโอจะถูกบีบอัดโดยอัตโนมัติด้วย ffmpeg.wasm เมื่อเกินขีดจำกัดของเครือข่าย หากแม้แต่การบีบอัดก็ไม่สามารถใส่ได้ คุณจะเห็นข้อผิดพลาด — โปรดยืนยันก่อนว่าไฟล์อัปโหลดผ่านแอปพลิเคชันดั้งเดิมของเครือข่ายได้","q5":"ถ. Tutti เห็นเนื้อหาโพสต์ของฉันหรือไม่?","a5":"ไม่เห็น เนื้อหาโพสต์ไม่เคยผ่านเซิร์ฟเวอร์บุคคลที่สาม Tutti ฉีดเข้าโดยตรงไปยังหน้าสร้างโพสต์เว็บของแต่ละเครือข่าย ดูรายละเอียดใน<a href=\"./privacy.html\">นโยบายความเป็นส่วนตัว</a>ของเรา ข้อยกเว้นเดียวคือเมื่อคุณกดปุ่มรายงานในผลิตภัณฑ์ ซึ่งส่งข้อมูลข้อผิดพลาดที่แก้ไขแล้วไปยังตัวติดตามประเด็นส่วนตัวของเรา","q6":"ถ. ฉันบริจาคได้ไหม?","a6":"ยังไม่ได้ — เรากำลังทำงานในช่องทางสนับสนุนที่ไม่กดดัน ค่าใช้จ่ายต่อเนื่องที่ใหญ่ที่สุดคือการตามทันการเปลี่ยนแปลง UI ของแต่ละเครือข่ายสังคม; กระแสเงิน Ko-fi ในอนาคตจะเป็นทุนสำหรับการบำรุงรักษานั้น"}},"tr":{"lang":"tr","common":{"appName":"Tutti","tagline":"Tek bir Chrome uzantısı. On bir sosyal ağ. Sıfır zahmet.","navHome":"Ana sayfa","navGitHub":"GitHub","navSupport":"Destek","navPrivacy":"Gizlilik politikası","navLanguages":"Diğer diller","footerCopy":"&copy; 2026 komm64 &mdash; <a href=\"https://github.com/komm64/tutti/blob/main/LICENSE\">Tüm hakları saklıdır</a>","footerContact":"Tutti, <a href=\"https://github.com/komm64\">komm64</a> tarafından geliştirilen bir Chrome uzantısıdır. İletişim: <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>"},"index":{"title":"Tutti — Çapraz gönderim uzantısı","headerTagline":"Tek bir Chrome uzantısı. On bir sosyal ağ. Sıfır zahmet.","h2Overview":"Genel bakış","overviewBody":"Tutti aynı gönderiyi tek tıkla 11 sosyal ağa (X, Bluesky, Threads, Tumblr, Mastodon, Misskey, Pixiv, TikTok, YouTube Shorts, Instagram, DeviantArt) yayınlar. Arka uç yok; gönderi içeriği asla üçüncü taraf sunucudan geçmez.","h2PrivacySummary":"Tek cümlede gizlilik","privacySummaryBody":"Tutti'nin arka uç sunucusu yoktur. Gönderi içeriği (metin, resimler, video), seçtiğiniz her sosyal ağa doğrudan tarayıcınızdan gider — asla geliştirici kontrolündeki bir sunucu üzerinden geçmez.","privacyFullPolicy":"Tam politika:"},"privacy":{"title":"Tutti — Gizlilik politikası","headerTagline":"Üçüncü taraf veri toplama yok. Tüm gönderi içeriği tarayıcınızdan doğrudan her SNS'ye gider.","lastUpdated":"Son güncelleme: 2026-05-23 (v0.5.0)","h2Data":"1. Topladığımız ve ilettiğimiz veriler","dataIntro":"<strong>Tutti'nin arka uç sunucusu yoktur.</strong> Gönderi içeriği (metin, resimler, video) asla üçüncü taraf bir sunucuya iletilmez. Tıpkı oraya kendiniz yazıp göndermişsiniz gibi, doğrudan tarayıcınızdan seçtiğiniz her sosyal ağa gider.","dataLi1":"Gönderi metni, resimleri ve videosu yalnızca tarayıcınız içinde seçtiğiniz SNS sayfalarına (X, Bluesky, Threads, Mastodon, Misskey, Tumblr, Pixiv, DeviantArt, Instagram, TikTok, YouTube) iletilir.","dataLi2":"Bluesky / Mastodon / Misskey için isteğe bağlı resmi API yolu etkinleştirildiğinde gönderiler, Ayarlar'da sağladığınız kimlik bilgileri kullanılarak doğrudan tarayıcınızdan <strong>o SNS'nin kendi API sunucusuna</strong> gönderilir. Hiçbir Tutti / geliştirici sunucusu dahil değildir.","dataLi3":"Hiçbir analitik, izleme veya reklam verisi toplanmaz.","dataLi4":"Tutti, SNS sitelerinden kimlik doğrulama belirteçlerinizi, çerezlerinizi veya oturum verilerinizi <strong>okumaz</strong> ve depolamaz.","h3Report":"İstisna — manuel hata raporları (her tıklamada onay)","reportIntro":"Bir hata iletişim kutusunda veya tanılama panelinde gösterilen <strong>&ldquo;Bildir&rdquo; düğmesine</strong> bastığınızda (ve yalnızca o zaman), aşağıdakiler Cloudflare Workers aktarımı üzerinden <strong>özel bir GitHub konu izleyicisine</strong> (<code>komm64/tutti-issues</code>, yalnızca Tutti geliştiricisine görünür) gönderilir:","reportLi1":"Hata mesajı, uzantı sürümü, tarayıcı User-Agent dizesi.","reportLi2":"Uzantının dahili günlüğünün son 30 girişi (yapılandırdığınız günlük düzeyi; varsayılan INFO). Gönderi içeriği, resimler, video, SNS oturum açma verileri ve API kimlik bilgileri <strong>asla</strong> dahil edilmez.","reportLi3":"Hatanın oluştuğu SNS sekmesinin redakte edilmiş DOM anlık görüntüsü, bozuk seçicileri onarmak için kullanılır. Metin içeriği, öznitelik değerleri, URL yolları/sorguları/parçaları, <code>href</code>/<code>src</code> öznitelikleri ve <code>&lt;meta&gt;</code>/<code>&lt;link&gt;</code> etiketleri çıkarılır. Yük 8 KB ile sınırlıdır. Uygulama için <a href=\"https://github.com/komm64/tutti/blob/main/src/utils/dom-snapshot.ts\">dom-snapshot.ts</a> bakın.","reportOutro":"Raporlama düğmesine basana kadar hiçbir şey gönderilmez. Hedef özeldir, yalnızca Tutti geliştiricisi görebilir.","h2Local":"2. Yerel olarak depolanan veriler","localIntro":"Aşağıdakiler yalnızca tarayıcınızda Chrome'un <code>storage</code> API'si aracılığıyla saklanır. Tutti hiçbir şeyi cihaz dışına aktarmaz.","localSettings":"<strong>Ayarlar</strong> (<code>chrome.storage.sync</code>): Mastodon / Misskey örnek URL'leri, autoPost anahtarı, görüntüleme modu, seçici geçersiz kılma URL'si vb. Chrome'da oturum açtıysanız Chrome Sync aracılığıyla diğer cihazlarınıza kopyalanabilir.","localDrafts":"<strong>Taslaklar</strong> (<code>chrome.storage.session</code>): Süren gönderi metni ve eklenmiş medya (resim / video). Tarayıcı çıkışında otomatik olarak temizlenir.","localSelected":"<strong>Seçilen SNS</strong> (<code>chrome.storage.local</code>): Gönderi hedefleri olarak işaretlediğiniz SNS'ler. Kolaylık için oturumlar arasında kalıcıdır; yalnızca cihaza yerel.","localUsers":"<strong>Son görülen kullanıcı adları</strong> (<code>chrome.storage.local</code>): Her SNS'de şu anda oturum açmış olan kullanıcı adı, gönderiyi hangi hesabın alacağını onaylayabilmeniz için popup'ta gösterilir. Yalnızca cihaza yerel.","localHistory":"<strong>Gönderi geçmişi</strong> (<code>chrome.storage.local</code>): Son 20 gönderi: metnin ilk 80 karakteri, hedef platformlar, platform başına başarı/başarısızlık ve zaman damgası. Yalnızca cihaza yerel.","localCreds":"<strong>API kimlik bilgileri</strong> (<code>chrome.storage.local</code>): Yalnızca Bluesky / Mastodon / Misskey için resmi API yolunu açıkça etkinleştirdiyseniz: Bluesky app password veya Mastodon / Misskey erişim belirteci. <strong>Yalnızca cihaza yerel; asla Chrome Sync üzerinden çoğaltılmaz; asla herhangi bir geliştirici sunucusuna iletilmez.</strong> Ayarlar sihirbazından kaldırılabilir.","localSelectors":"<strong>Seçici geçersiz kılma önbelleği</strong> (<code>chrome.storage.local</code>): Ayarlar'da yapılandırdığınız URL'den alınan seçici sıcak düzeltme verileri (varsayılan: Tutti'nin GitHub Pages'taki genel <code>selectors.json</code>).","localVideoCap":"<strong>Video yükleme sınırı önbelleği</strong> (<code>chrome.storage.local</code>): Hesap başına video yükleme sınırları için API probelerinin sonucu (ör. Bluesky). Yalnızca sayısal değerler; kimlik bilgisi yok.","localWipe":"Tüm bunlar uzantıyı kaldırarak veya Chrome'un uzantı depolamasını temizleyerek istediğiniz zaman silinebilir.","h2Perms":"3. Kullanılan izinler","permsThead1":"İzin","permsThead2":"Amaç","permsStorage":"Yukarıdaki yerel verileri (ayarlar, taslaklar, geçmiş, seçili platformlar vb.) tarayıcınızda depolamak için.","permsOffscreen":"Kaynak, hedef SNS'nin boyut sınırını aştığında <code>ffmpeg.wasm</code>'ı offscreen belgesinde çalıştırarak video dosyalarını sıkıştırmak / yeniden kodlamak için. Video verileri yalnızca yerel olarak işlenir; Tutti tarafından hiçbir yere aktarılmaz.","permsSidePanel":"İsteğe bağlı UI görüntüleme modu: Tutti'nin yazma formunu eylem popup'ı yerine Chrome'un yan panelinde gösterir, böylece SNS sekmeleri arasında geçiş yaparken açık kalır. Seçenekler sayfasından etkinleştirirsiniz; varsayılan standart popup'tır.","permsHost":"Her SNS sitesine (x.com / twitter.com / bsky.app / bsky.social / threads.net / threads.com / mastodon.social / misskey.io / tumblr.com / pixiv.net / tiktok.com / youtube.com / instagram.com / deviantart.com) content scriptleri enjekte ederek yazma formunu gönderi içeriğinizle doldurmak ve sizin adınıza göndermek için. Bu sitelerden hiçbir veri okunmaz ve başka bir yere gönderilmez; content script yalnızca kendi girdinizi yazar.","permsOptHost":"Yalnızca özel bir Mastodon veya Misskey örnek URL'si yapılandırdığınızda (varsayılan dışında) çalışma zamanında istenir. Chrome o anda standart izin istemini gösterir.","h2Relationship":"4. SNS sağlayıcıları ile ilişki","relationshipBody":"Tutti, desteklenen 11 ağın web UI'sını otomatikleştirir (veya isteğe bağlı olarak resmi API üzerinden yayınlar). Bu resmi olmayan bir işlevdir; Tutti X, Bluesky, Meta (Threads / Instagram), Mastodon gGmbH, Misskey, Tumblr, Pixiv, DeviantArt, TikTok veya YouTube ile bağlantılı değildir. Her hizmetin kendi kullanım koşullarına bağlı kalmaya devam edersiniz.","h2Contact":"5. İletişim","contactGitHub":"GitHub Issues:","contactEmail":"E-posta:","h2Changes":"6. Bu politikadaki değişiklikler","changesBody":"Bu politikadaki güncellemeler, bu sayfa ve kanonik kaynak dosya (<a href=\"https://github.com/komm64/tutti/blob/main/PRIVACY.md\">PRIVACY.md</a>) güncellenerek iletilir."},"support":{"title":"Tutti — Destek","headerTagline":"Destek kaynakları ve SSS","h2Help":"Yardıma mı ihtiyacınız var?","h3Failed":"1. Gönderim başarısız / bir şey tuhaf davranıyor","failedBody":"Popup içindeki <strong>&ldquo;Tanıla&rdquo; → &ldquo;Bildir&rdquo; düğmesini</strong> kullanın. Bu kanonik kanaldır. Rapor redakte edilir (kullanıcı adları, URL'ler, e-postalar) ve özel konu izleyicimize iletilir, burada otomatik olarak bir seçici düzeltme PR'si açılır ve birkaç gün içinde tüm kullanıcılara hot-fix olarak gönderilir.","calloutTitle":"Ürün içi bildirim düğmesini neden kullanmalısınız?","calloutBody":"Popup'ın bildirim akışı, son yazma durumunu, redakte edilmiş DOM anlık görüntüsünü ve seçici denetim sonuçlarını otomatik olarak ekler — seçici bozulmalarını hızla düzeltmek için tam olarak gereken şeyler. PII gönderilmeden önce birden çok katmandan geçirilerek çıkarılır.","h3General":"2. Genel sorular / özellik istekleri","generalBody":"Bize <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a> adresinden e-posta gönderin. Bu, ekran görüntülerini / kişisel kullanıcı adlarını paylaşmak için güvenli özel bir kanaldır.","h3Install":"3. Kurulum / hesap soruları","installBody":"Tutti her sosyal ağ için <strong>mevcut tarayıcı oturum açma bilgilerinizi yeniden kullanır</strong>. Ayrı bir Tutti hesabı veya oturum açma adımı yoktur. Aynı Chrome profilinde bir sosyal ağa giriş yaptıktan sonra Tutti oradan gönderim yapabilir.","h2Faq":"SSS","q1":"S. Gönderim başarısız oldu.","a1":"Bu genellikle bir sosyal ağın DOM'sini değiştirdiği anlamına gelir. Popup'ta <strong>Tanıla → Bildir</strong> kullanın. Bir seçici hot-fix'i genellikle birkaç gün içinde <code>selectors.json</code> otomatik güncellemesi yoluyla gönderilir (uzantı güncellemesi gerekmez).","q2":"S. Tutti oturum açmamı hatırlamıyor.","a2":"Tutti, ağın normal tarayıcı oturum açma bilgilerine dayanır. Önce Chrome'da her ağa giriş yapın, ardından Tutti sizin adınıza gönderim yapabilir. Gizli mod çalışmaz çünkü ağın oturumları orada yoktur.","q3":"S. Karakter sınırları ağa göre farklı — bu bir sorun mu?","a3":"Hayır. Bir ağın karakter sınırını aşan uzun gönderiler otomatik olarak bir devam dizisine bölünür (X'te uygun bir yanıt zinciri; diğer ağlarda sıralı gönderiler). Sınır dahilindeki gönderiler olduğu gibi geçer.","q4":"S. Resmimin / videomun çok büyük olduğu söyleniyor.","a4":"Resimler her ağın boyut sınırına sığacak şekilde Canvas aracılığıyla otomatik olarak yeniden boyutlandırılır. Videolar bir ağın sınırının üzerinde olduğunda ffmpeg.wasm ile otomatik olarak sıkıştırılır. Sıkıştırma bile sığmazsa bir hata göreceksiniz — lütfen önce dosyanın ağın yerel uygulaması aracılığıyla yüklendiğini doğrulayın.","q5":"S. Tutti gönderi içeriğimi görüyor mu?","a5":"Hayır. Gönderi içeriği asla üçüncü taraf bir sunucudan geçmez. Tutti, her ağın web yazma sayfasına doğrudan enjekte eder. Ayrıntılar için <a href=\"./privacy.html\">Gizlilik Politikamıza</a> bakın. Tek istisna, ürün içi bildirim düğmesine bastığınızda, bu redakte edilmiş hata bilgisini özel konu izleyicimize gönderir.","q6":"S. Bağış yapabilir miyim?","a6":"Henüz değil — düşük baskılı bir destek kanalı üzerinde çalışıyoruz. En büyük süreklilik maliyeti her sosyal ağın UI değişikliklerine ayak uydurmaktır; gelecekteki Ko-fi akışları bu bakımı finanse edecektir."}},"uk":{"lang":"uk","common":{"appName":"Tutti","tagline":"Одне розширення Chrome. Одинадцять соцмереж. Жодних клопотів.","navHome":"Головна","navGitHub":"GitHub","navSupport":"Підтримка","navPrivacy":"Політика конфіденційності","navLanguages":"Інші мови","footerCopy":"&copy; 2026 komm64 &mdash; <a href=\"https://github.com/komm64/tutti/blob/main/LICENSE\">Усі права захищені</a>","footerContact":"Tutti — розширення Chrome від <a href=\"https://github.com/komm64\">komm64</a>. Контакт: <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>"},"index":{"title":"Tutti — Розширення для крос-постингу","headerTagline":"Одне розширення Chrome. Одинадцять соцмереж. Жодних клопотів.","h2Overview":"Огляд","overviewBody":"Tutti розсилає один і той самий допис у 11 соцмереж (X, Bluesky, Threads, Tumblr, Mastodon, Misskey, Pixiv, TikTok, YouTube Shorts, Instagram, DeviantArt) одним кліком. Він не має бекенду; вміст дописів ніколи не проходить через жоден сторонній сервер.","h2PrivacySummary":"Конфіденційність одним реченням","privacySummaryBody":"У Tutti немає бекенд-сервера. Вміст дописів (текст, зображення, відео) йде прямо з вашого браузера в кожну вибрану вами соцмережу — ніколи через сервер, контрольований розробником.","privacyFullPolicy":"Повна політика:"},"privacy":{"title":"Tutti — Політика конфіденційності","headerTagline":"Ніякого збору даних третіми сторонами. Весь вміст дописів йде прямо з вашого браузера в кожну SNS.","lastUpdated":"Останнє оновлення: 2026-05-23 (v0.5.0)","h2Data":"1. Дані, які ми збираємо та передаємо","dataIntro":"<strong>У Tutti немає бекенд-сервера.</strong> Вміст дописів (текст, зображення, відео) ніколи не передається жодному сторонньому серверу. Він мандрує прямо з вашого браузера в кожну вибрану вами соцмережу, точно так, ніби ви самі набрали і надіслали його там.","dataLi1":"Текст, зображення та відео дописів передаються лише на вибрані вами сторінки SNS (X, Bluesky, Threads, Mastodon, Misskey, Tumblr, Pixiv, DeviantArt, Instagram, TikTok, YouTube) у вашому браузері.","dataLi2":"Коли увімкнено опціональний шлях через офіційний API для Bluesky / Mastodon / Misskey, дописи надсилаються прямо з вашого браузера на <strong>власний API-сервер цього SNS</strong> з використанням облікових даних, які ви вказали в Налаштуваннях. Жоден сервер Tutti / розробника не задіяний.","dataLi3":"Жодні аналітичні, трекінгові чи рекламні дані не збираються.","dataLi4":"Tutti <strong>не</strong> читає і не зберігає ваші токени автентифікації, кукі або дані сесії з сайтів SNS.","h3Report":"Виняток — ручні звіти про помилки (згода на кожен клік)","reportIntro":"Коли (і лише коли) ви натискаєте <strong>кнопку «Повідомити»</strong>, показану в діалозі помилки або панелі діагностики, через релей Cloudflare Workers у <strong>приватний трекер завдань GitHub</strong> (<code>komm64/tutti-issues</code>, видимий лише розробнику Tutti) надсилається наступне:","reportLi1":"Повідомлення про помилку, версія розширення, рядок User-Agent браузера.","reportLi2":"Останні 30 записів внутрішнього журналу розширення (налаштований вами рівень логу; за замовчуванням INFO). Вміст дописів, зображення, відео, дані входу в SNS та облікові дані API <strong>ніколи</strong> не включаються.","reportLi3":"Відредагований DOM-знімок вкладки SNS, де сталася помилка, використовується для лагодження зламаних селекторів. Текстовий вміст, значення атрибутів, шляхи/запити/фрагменти URL, атрибути <code>href</code>/<code>src</code> та теги <code>&lt;meta&gt;</code>/<code>&lt;link&gt;</code> видаляються. Розмір корисного навантаження обмежений 8 КБ. Реалізацію див. у <a href=\"https://github.com/komm64/tutti/blob/main/src/utils/dom-snapshot.ts\">dom-snapshot.ts</a>.","reportOutro":"Нічого не надсилається, поки ви не натиснете кнопку звіту. Призначення приватне, видиме лише розробнику Tutti.","h2Local":"2. Локально збережені дані","localIntro":"Наступне зберігається лише всередині вашого браузера через API <code>storage</code> Chrome. Tutti не передає нічого за межі пристрою.","localSettings":"<strong>Налаштування</strong> (<code>chrome.storage.sync</code>): URL-адреси інстансів Mastodon / Misskey, перемикач autoPost, режим відображення, URL перевизначення селекторів тощо. Може реплікуватися на ваші інші пристрої через Chrome Sync, якщо ви увійшли в Chrome.","localDrafts":"<strong>Чернетки</strong> (<code>chrome.storage.session</code>): Текст допису у процесі та прикріплені медіа (зображення / відео). Автоматично очищається при закритті браузера.","localSelected":"<strong>Вибрані SNS</strong> (<code>chrome.storage.local</code>): SNS, які ви позначили як цілі публікації. Зберігається між сесіями для зручності; лише локально на пристрої.","localUsers":"<strong>Останні побачені імена користувачів</strong> (<code>chrome.storage.local</code>): Поточне ім'я користувача, що увійшов у кожну SNS, відображається в popup, щоб ви могли підтвердити, який обліковий запис отримає допис. Лише локально на пристрої.","localHistory":"<strong>Історія дописів</strong> (<code>chrome.storage.local</code>): Останні 20 дописів: перші 80 символів тексту, цільові платформи, успіх/невдача за платформою та часова мітка. Лише
