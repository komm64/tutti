локально на пристрої.","localCreds":"<strong>Облікові дані API</strong> (<code>chrome.storage.local</code>): Лише якщо ви явно увімкнули шлях через офіційний API для Bluesky / Mastodon / Misskey: ваш Bluesky app password або токен доступу Mastodon / Misskey. <strong>Лише локально на пристрої; ніколи не реплікується через Chrome Sync; ніколи не передається на жоден сервер розробника.</strong> Видаляється з майстра Налаштувань.","localSelectors":"<strong>Кеш перевизначення селекторів</strong> (<code>chrome.storage.local</code>): Дані гарячого виправлення селекторів, отримані з URL, який ви налаштували в Налаштуваннях (за замовчуванням: публічний <code>selectors.json</code> на GitHub Pages Tutti).","localVideoCap":"<strong>Кеш ліміту завантаження відео</strong> (<code>chrome.storage.local</code>): Результат API-зондів для лімітів завантаження відео по обліковому запису (наприклад, Bluesky). Лише числові значення; без облікових даних.","localWipe":"Усе це можна стерти в будь-який час, видаливши розширення або очистивши сховище розширень Chrome.","h2Perms":"3. Використовувані дозволи","permsThead1":"Дозвіл","permsThead2":"Призначення","permsStorage":"Зберігати вищезгадані локальні дані (налаштування, чернетки, історія, вибрані платформи тощо) всередині вашого браузера.","permsOffscreen":"Запускати <code>ffmpeg.wasm</code> в офскрин-документі для стискання / перекодування відеофайлів, коли джерело перевищує обмеження розміру цільового SNS. Відеодані обробляються лише локально; Tutti не передає їх нікуди.","permsSidePanel":"Опціональний режим відображення UI: показує форму створення допису Tutti в бічній панелі Chrome замість popup дії, щоб вона залишалася відкритою, коли ви перемикаєтеся між вкладками SNS. Ви вмикаєте це на сторінці Параметрів; за замовчуванням використовується звичайний popup.","permsHost":"Впроваджувати контент-скрипти в кожен сайт SNS (x.com / twitter.com / bsky.app / bsky.social / threads.net / threads.com / mastodon.social / misskey.io / tumblr.com / pixiv.net / tiktok.com / youtube.com / instagram.com / deviantart.com), щоб заповнити форму створення допису вмістом вашого допису та надіслати його від вашого імені. Жодних даних не зчитується з цих сайтів і не надсилається кудись ще; контент-скрипт записує лише ваш власний ввід.","permsOptHost":"Запитується під час виконання, лише якщо ви налаштовуєте користувацький URL інстансу Mastodon або Misskey (відмінний від значень за замовчуванням). Chrome показує стандартний запит дозволу в цей момент.","h2Relationship":"4. Стосунки з провайдерами SNS","relationshipBody":"Tutti автоматизує веб-інтерфейс (або, опціонально, публікує через офіційний API) 11 підтримуваних мереж. Це неофіційна функціональність; Tutti не пов'язаний з X, Bluesky, Meta (Threads / Instagram), Mastodon gGmbH, Misskey, Tumblr, Pixiv, DeviantArt, TikTok або YouTube. Ви продовжуєте дотримуватися власних умов використання кожного сервісу.","h2Contact":"5. Контакт","contactGitHub":"GitHub Issues:","contactEmail":"Email:","h2Changes":"6. Зміни до цієї політики","changesBody":"Оновлення цієї політики повідомляються шляхом оновлення цієї сторінки та канонічного вихідного файлу (<a href=\"https://github.com/komm64/tutti/blob/main/PRIVACY.md\">PRIVACY.md</a>)."},"support":{"title":"Tutti — Підтримка","headerTagline":"Ресурси підтримки та FAQ","h2Help":"Потрібна допомога?","h3Failed":"1. Публікація не вдалася / щось поводиться дивно","failedBody":"Використовуйте <strong>кнопку «Діагностика» → «Повідомити» всередині popup</strong>. Це канонічний канал. Звіт редагується (імена користувачів, URL, email) і пересилається в наш приватний трекер завдань, де автоматично відкривається PR з виправленням селекторів і протягом кількох днів доставляється як hot-fix усім користувачам.","calloutTitle":"Чому варто використовувати кнопку звіту всередині продукту?","calloutBody":"Потік звіту в popup автоматично прикріплює кінцевий стан складання допису, відредагований DOM-знімок та результати аудиту селекторів — саме те, що потрібно, щоб швидко виправити поломку селекторів. PII видаляється через кілька шарів перед відправкою.","h3General":"2. Загальні питання / запити функцій","generalBody":"Напишіть нам на <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>. Це приватний канал, безпечний для обміну скріншотами / особистими іменами.","h3Install":"3. Питання щодо встановлення / облікового запису","installBody":"Tutti <strong>повторно використовує ваші існуючі входи в браузер</strong> для кожної соцмережі. Немає окремого облікового запису Tutti або кроку входу. Як тільки ви увійшли в соцмережу в тому ж профілі Chrome, Tutti може публікувати звідти.","h2Faq":"FAQ","q1":"П. Моя публікація не вдалася.","a1":"Це зазвичай означає, що соцмережа змінила свій DOM. Використовуйте <strong>Діагностика → Повідомити</strong> у popup. Hot-fix селектора зазвичай доставляється протягом кількох днів через автоматичне оновлення <code>selectors.json</code> (оновлення розширення не потрібне).","q2":"П. Tutti не пам'ятає мій вхід.","a2":"Tutti покладається на звичайний вхід у мережу через браузер. Спочатку увійдіть у кожну мережу в Chrome, тоді Tutti зможе публікувати від вашого імені. Режим інкогніто не працює, тому що сесій мережі там немає.","q3":"П. Обмеження на символи різняться залежно від мережі — це проблема?","a3":"Ні. Довгі дописи, які перевищують обмеження на символи мережі, автоматично розбиваються на гілку-продовження (на X — правильний ланцюг відповідей; в інших мережах — послідовні дописи). Дописи в межах обмеження проходять як є.","q4":"П. Мені кажуть, що моє зображення / відео занадто велике.","a4":"Зображення автоматично змінюються в розмірі через Canvas, щоб відповідати обмеженню розміру кожної мережі. Відео автоматично стискається за допомогою ffmpeg.wasm, коли воно перевищує обмеження мережі. Якщо навіть стискання не підходить, ви побачите помилку — будь ласка, спочатку перевірте, що файл завантажується через нативний додаток мережі.","q5":"П. Чи бачить Tutti вміст моїх дописів?","a5":"Ні. Вміст дописів ніколи не проходить через сторонній сервер. Tutti впроваджується напряму у веб-сторінку створення допису кожної мережі. Деталі див. у нашій <a href=\"./privacy.html\">Політиці конфіденційності</a>. Єдиний виняток — коли ви натискаєте кнопку звіту всередині продукту, яка надсилає відредаговану інформацію про помилку в наш приватний трекер завдань.","q6":"П. Чи можу я зробити пожертву?","a6":"Поки що ні — ми працюємо над ненав'язливим каналом підтримки. Найбільша поточна вартість — це встигати за змінами UI кожної соцмережі; майбутні потоки Ko-fi фінансуватимуть це обслуговування."}},"vi":{"lang":"vi","common":{"appName":"Tutti","tagline":"Một tiện ích Chrome. Mười một mạng xã hội. Không phiền phức.","navHome":"Trang chủ","navGitHub":"GitHub","navSupport":"Hỗ trợ","navPrivacy":"Chính sách bảo mật","navLanguages":"Ngôn ngữ khác","footerCopy":"&copy; 2026 komm64 &mdash; <a href=\"https://github.com/komm64/tutti/blob/main/LICENSE\">Bảo lưu mọi quyền</a>","footerContact":"Tutti là tiện ích Chrome của <a href=\"https://github.com/komm64\">komm64</a>. Liên hệ: <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>"},"index":{"title":"Tutti — Tiện ích đăng bài đa nền tảng","headerTagline":"Một tiện ích Chrome. Mười một mạng xã hội. Không phiền phức.","h2Overview":"Tổng quan","overviewBody":"Tutti phát cùng một bài đăng đến 11 mạng xã hội (X, Bluesky, Threads, Tumblr, Mastodon, Misskey, Pixiv, TikTok, YouTube Shorts, Instagram, DeviantArt) chỉ với một cú nhấp chuột. Không có backend; nội dung bài đăng không bao giờ đi qua bất kỳ máy chủ bên thứ ba nào.","h2PrivacySummary":"Quyền riêng tư trong một câu","privacySummaryBody":"Tutti không có máy chủ backend. Nội dung bài đăng (văn bản, hình ảnh, video) đi thẳng từ trình duyệt của bạn đến từng mạng xã hội bạn chọn — không bao giờ qua bất kỳ máy chủ nào do nhà phát triển kiểm soát.","privacyFullPolicy":"Chính sách đầy đủ:"},"privacy":{"title":"Tutti — Chính sách bảo mật","headerTagline":"Không thu thập dữ liệu từ bên thứ ba. Tất cả nội dung bài đăng đi thẳng từ trình duyệt của bạn đến từng SNS.","lastUpdated":"Cập nhật lần cuối: 2026-05-23 (v0.5.0)","h2Data":"1. Dữ liệu chúng tôi thu thập và truyền","dataIntro":"<strong>Tutti không có máy chủ backend.</strong> Nội dung bài đăng (văn bản, hình ảnh, video) không bao giờ được truyền đến bất kỳ máy chủ bên thứ ba nào. Nó đi thẳng từ trình duyệt của bạn đến từng mạng xã hội bạn chọn, chính xác như thể bạn đã tự gõ và gửi ở đó.","dataLi1":"Văn bản, hình ảnh và video của bài đăng chỉ được truyền đến các trang SNS bạn chọn (X, Bluesky, Threads, Mastodon, Misskey, Tumblr, Pixiv, DeviantArt, Instagram, TikTok, YouTube) trong trình duyệt của bạn.","dataLi2":"Khi đường dẫn API chính thức tùy chọn được bật cho Bluesky / Mastodon / Misskey, bài đăng được gửi trực tiếp từ trình duyệt của bạn đến <strong>máy chủ API riêng của SNS đó</strong> bằng cách sử dụng thông tin đăng nhập bạn đã cung cấp trong Cài đặt. Không có máy chủ Tutti / nhà phát triển nào liên quan.","dataLi3":"Không thu thập bất kỳ dữ liệu phân tích, theo dõi hoặc quảng cáo nào.","dataLi4":"Tutti <strong>không</strong> đọc hoặc lưu trữ mã thông báo xác thực, cookie hoặc dữ liệu phiên của bạn từ các trang SNS.","h3Report":"Ngoại lệ — báo cáo lỗi thủ công (đồng ý mỗi lần nhấp)","reportIntro":"Khi (và chỉ khi) bạn nhấn <strong>nút &laquo;Báo cáo&raquo;</strong> hiển thị trong hộp thoại lỗi hoặc bảng chẩn đoán, thông tin sau được gửi qua relay Cloudflare Workers đến <strong>trình theo dõi vấn đề GitHub riêng tư</strong> (<code>komm64/tutti-issues</code>, chỉ nhà phát triển Tutti có thể xem):","reportLi1":"Thông báo lỗi, phiên bản tiện ích, chuỗi User-Agent của trình duyệt.","reportLi2":"30 mục cuối cùng của nhật ký nội bộ tiện ích (cấp độ nhật ký bạn đã định cấu hình; INFO mặc định). Nội dung bài đăng, hình ảnh, video, dữ liệu đăng nhập SNS và thông tin xác thực API <strong>không bao giờ</strong> được bao gồm.","reportLi3":"Ảnh chụp nhanh DOM đã được biên tập của tab SNS nơi lỗi xảy ra, được sử dụng để sửa chữa các bộ chọn bị hỏng. Nội dung văn bản, giá trị thuộc tính, đường dẫn/truy vấn/đoạn URL, các thuộc tính <code>href</code>/<code>src</code> và các thẻ <code>&lt;meta&gt;</code>/<code>&lt;link&gt;</code> đều bị loại bỏ. Tải trọng được giới hạn ở 8 KB. Xem <a href=\"https://github.com/komm64/tutti/blob/main/src/utils/dom-snapshot.ts\">dom-snapshot.ts</a> để biết cách triển khai.","reportOutro":"Không có gì được gửi cho đến khi bạn nhấn nút báo cáo. Đích đến là riêng tư, chỉ nhà phát triển Tutti có thể xem.","h2Local":"2. Dữ liệu lưu trữ cục bộ","localIntro":"Những điều sau đây chỉ được lưu trữ bên trong trình duyệt của bạn thông qua API <code>storage</code> của Chrome. Không có gì được truyền ra khỏi thiết bị bởi Tutti.","localSettings":"<strong>Cài đặt</strong> (<code>chrome.storage.sync</code>): URL phiên bản Mastodon / Misskey, công tắc autoPost, chế độ hiển thị, URL ghi đè bộ chọn, v.v. Có thể được sao chép sang các thiết bị khác của bạn thông qua Chrome Sync nếu bạn đã đăng nhập vào Chrome.","localDrafts":"<strong>Bản nháp</strong> (<code>chrome.storage.session</code>): Văn bản bài đăng đang viết và phương tiện đính kèm (hình ảnh / video). Tự động xóa khi thoát trình duyệt.","localSelected":"<strong>SNS đã chọn</strong> (<code>chrome.storage.local</code>): Các SNS bạn đã đánh dấu làm mục tiêu đăng bài. Giữ nguyên giữa các phiên để thuận tiện; chỉ cục bộ trên thiết bị.","localUsers":"<strong>Tên người dùng đã thấy gần đây nhất</strong> (<code>chrome.storage.local</code>): Tên người dùng hiện đang đăng nhập trên từng SNS, hiển thị trong popup để bạn có thể xác nhận tài khoản nào sẽ nhận bài đăng. Chỉ cục bộ trên thiết bị.","localHistory":"<strong>Lịch sử bài đăng</strong> (<code>chrome.storage.local</code>): 20 bài đăng cuối cùng: 80 ký tự đầu tiên của văn bản, các nền tảng mục tiêu, thành công/thất bại theo nền tảng và dấu thời gian. Chỉ cục bộ trên thiết bị.","localCreds":"<strong>Thông tin xác thực API</strong> (<code>chrome.storage.local</code>): Chỉ khi bạn đã bật rõ ràng đường dẫn API chính thức cho Bluesky / Mastodon / Misskey: app password Bluesky hoặc mã thông báo truy cập Mastodon / Misskey của bạn. <strong>Chỉ cục bộ trên thiết bị; không bao giờ được sao chép qua Chrome Sync; không bao giờ được truyền đến bất kỳ máy chủ nhà phát triển nào.</strong> Có thể xóa từ trình hướng dẫn Cài đặt.","localSelectors":"<strong>Bộ nhớ cache ghi đè bộ chọn</strong> (<code>chrome.storage.local</code>): Dữ liệu hot-fix bộ chọn được lấy từ URL bạn đã định cấu hình trong Cài đặt (mặc định: <code>selectors.json</code> công khai trên GitHub Pages của Tutti).","localVideoCap":"<strong>Bộ nhớ cache giới hạn tải lên video</strong> (<code>chrome.storage.local</code>): Kết quả của các đầu dò API cho giới hạn tải lên video trên mỗi tài khoản (ví dụ: Bluesky). Chỉ giá trị số; không có thông tin xác thực.","localWipe":"Tất cả những điều này có thể được xóa bất cứ lúc nào bằng cách gỡ cài đặt tiện ích hoặc xóa bộ nhớ tiện ích của Chrome.","h2Perms":"3. Quyền được sử dụng","permsThead1":"Quyền","permsThead2":"Mục đích","permsStorage":"Lưu trữ dữ liệu cục bộ ở trên (cài đặt, bản nháp, lịch sử, các nền tảng đã chọn, v.v.) bên trong trình duyệt của bạn.","permsOffscreen":"Chạy <code>ffmpeg.wasm</code> trong tài liệu offscreen để nén / mã hóa lại các tệp video khi nguồn vượt quá giới hạn kích thước của SNS đích. Dữ liệu video chỉ được xử lý cục bộ; không được truyền đi đâu bởi Tutti.","permsSidePanel":"Chế độ hiển thị UI tùy chọn: hiển thị biểu mẫu soạn thảo của Tutti trong bảng bên của Chrome thay vì popup hành động, để nó luôn mở khi bạn chuyển đổi giữa các tab SNS. Bạn chọn từ trang Tùy chọn; mặc định là popup tiêu chuẩn.","permsHost":"Chèn content scripts vào từng trang SNS (x.com / twitter.com / bsky.app / bsky.social / threads.net / threads.com / mastodon.social / misskey.io / tumblr.com / pixiv.net / tiktok.com / youtube.com / instagram.com / deviantart.com) để điền vào biểu mẫu soạn thảo với nội dung bài đăng của bạn và gửi nó thay mặt bạn. Không có dữ liệu nào được đọc từ các trang web này và gửi đi nơi khác; content script chỉ ghi nội dung đầu vào của riêng bạn.","permsOptHost":"Chỉ được yêu cầu khi chạy nếu bạn định cấu hình URL phiên bản Mastodon hoặc Misskey tùy chỉnh (khác với mặc định). Chrome hiển thị lời nhắc cấp quyền tiêu chuẩn vào thời điểm đó.","h2Relationship":"4. Mối quan hệ với các nhà cung cấp SNS","relationshipBody":"Tutti tự động hóa giao diện web (hoặc, tùy chọn, đăng qua API chính thức) của 11 mạng được hỗ trợ. Đây là chức năng không chính thức; Tutti không liên kết với X, Bluesky, Meta (Threads / Instagram), Mastodon gGmbH, Misskey, Tumblr, Pixiv, DeviantArt, TikTok hoặc YouTube. Bạn vẫn bị ràng buộc bởi các điều khoản sử dụng của từng dịch vụ.","h2Contact":"5. Liên hệ","contactGitHub":"GitHub Issues:","contactEmail":"Email:","h2Changes":"6. Thay đổi đối với chính sách này","changesBody":"Các bản cập nhật chính sách này được truyền đạt bằng cách cập nhật trang này và tệp nguồn chuẩn (<a href=\"https://github.com/komm64/tutti/blob/main/PRIVACY.md\">PRIVACY.md</a>)."},"support":{"title":"Tutti — Hỗ trợ","headerTagline":"Tài nguyên hỗ trợ và Câu hỏi thường gặp","h2Help":"Cần trợ giúp?","h3Failed":"1. Đăng bài thất bại / có gì đó hoạt động kỳ lạ","failedBody":"Sử dụng <strong>nút &laquo;Chẩn đoán&raquo; → &laquo;Báo cáo&raquo; bên trong popup</strong>. Đây là kênh chuẩn. Báo cáo được biên tập (tên người dùng, URL, email) và chuyển tiếp đến trình theo dõi vấn đề riêng tư của chúng tôi, nơi PR sửa bộ chọn được mở tự động và đẩy như một hot-fix đến tất cả người dùng trong vòng vài ngày.","calloutTitle":"Tại sao nên sử dụng nút báo cáo trong sản phẩm?","calloutBody":"Quy trình báo cáo của popup tự động đính kèm trạng thái soạn thảo cuối cùng, ảnh chụp nhanh DOM đã biên tập và kết quả kiểm tra bộ chọn — đúng những gì cần thiết để khắc phục nhanh chóng sự cố bộ chọn. PII bị loại bỏ qua nhiều lớp trước khi gửi.","h3General":"2. Câu hỏi chung / yêu cầu tính năng","generalBody":"Gửi email cho chúng tôi tại <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>. Đây là kênh riêng tư, an toàn để chia sẻ ảnh chụp màn hình / tên người dùng cá nhân.","h3Install":"3. Câu hỏi về cài đặt / tài khoản","installBody":"Tutti <strong>tái sử dụng các đăng nhập trình duyệt hiện có của bạn</strong> cho từng mạng xã hội. Không có tài khoản Tutti riêng biệt hoặc bước đăng nhập. Khi bạn đã đăng nhập vào một mạng xã hội trong cùng một hồ sơ Chrome, Tutti có thể đăng bài từ đó.","h2Faq":"Câu hỏi thường gặp","q1":"H. Bài đăng của tôi đã thất bại.","a1":"Điều này thường có nghĩa là một mạng xã hội đã thay đổi DOM của nó. Sử dụng <strong>Chẩn đoán → Báo cáo</strong> trong popup. Một hot-fix bộ chọn thường được gửi trong vòng vài ngày thông qua cập nhật tự động của <code>selectors.json</code> (không cần cập nhật tiện ích).","q2":"H. Tutti không nhớ đăng nhập của tôi.","a2":"Tutti dựa vào đăng nhập trình duyệt bình thường của mạng. Trước tiên hãy đăng nhập vào từng mạng trong Chrome, sau đó Tutti có thể đăng bài thay mặt bạn. Chế độ ẩn danh không hoạt động vì các phiên của mạng không có ở đó.","q3":"H. Giới hạn ký tự khác nhau theo từng mạng — có vấn đề gì không?","a3":"Không. Các bài đăng dài vượt quá giới hạn ký tự của một mạng được tự động chia thành luồng tiếp theo (trên X, một chuỗi trả lời thích hợp; trên các mạng khác, các bài đăng tuần tự). Các bài đăng trong giới hạn đi qua như chúng vốn có.","q4":"H. Tôi được thông báo rằng hình ảnh / video của tôi quá lớn.","a4":"Hình ảnh được tự động thay đổi kích thước qua Canvas để phù hợp với giới hạn kích thước của từng mạng. Video được tự động nén với ffmpeg.wasm khi vượt quá giới hạn của một mạng. Nếu ngay cả việc nén cũng không vừa, bạn sẽ thấy một lỗi — vui lòng xác minh rằng tệp tải lên qua ứng dụng gốc của mạng trước.","q5":"H. Tutti có thấy nội dung bài đăng của tôi không?","a5":"Không. Nội dung bài đăng không bao giờ đi qua máy chủ bên thứ ba. Tutti chèn trực tiếp vào trang web soạn thảo của từng mạng. Xem <a href=\"./privacy.html\">Chính sách bảo mật</a> của chúng tôi để biết chi tiết. Ngoại lệ duy nhất là khi bạn nhấn nút báo cáo trong sản phẩm, nút này gửi thông tin lỗi đã biên tập đến trình theo dõi vấn đề riêng tư của chúng tôi.","q6":"H. Tôi có thể quyên góp không?","a6":"Chưa — chúng tôi đang làm việc trên một kênh hỗ trợ ít áp lực. Chi phí lớn nhất đang diễn ra là theo kịp các thay đổi UI của từng mạng xã hội; các luồng Ko-fi trong tương lai sẽ tài trợ cho việc bảo trì đó."}},"zh-Hans":{"lang":"zh-Hans","common":{"appName":"Tutti","tagline":"一个 Chrome 扩展。11 个社交网络。零烦恼。","navHome":"首页","navGitHub":"GitHub","navSupport":"支持","navPrivacy":"隐私政策","navLanguages":"其他语言","footerCopy":"&copy; 2026 komm64 &mdash; <a href=\"https://github.com/komm64/tutti/blob/main/LICENSE\">保留所有权利</a>","footerContact":"Tutti 是由 <a href=\"https://github.com/komm64\">komm64</a> 开发的 Chrome 扩展。联系方式: <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>"},"index":{"title":"Tutti — 跨平台发布扩展","headerTagline":"一个 Chrome 扩展。11 个社交网络。零烦恼。","h2Overview":"概述","overviewBody":"Tutti 一键将同一内容广播到 11 个社交网络 (X, Bluesky, Threads, Tumblr, Mastodon, Misskey, Pixiv, TikTok, YouTube Shorts, Instagram, DeviantArt)。无后端服务器,发布内容绝不经过任何第三方服务器。","h2PrivacySummary":"一句话隐私说明","privacySummaryBody":"Tutti 没有后端服务器。发布内容 (文本、图片、视频) 直接从您的浏览器发送至您选择的每个社交网络 — 绝不经由任何开发者控制的服务器。","privacyFullPolicy":"完整政策:"},"privacy":{"title":"Tutti — 隐私政策","headerTagline":"无第三方数据收集。所有发布内容直接从您的浏览器发送至每个 SNS。","lastUpdated":"最后更新: 2026-05-23 (v0.5.0)","h2Data":"1. 我们收集和传输的数据","dataIntro":"<strong>Tutti 没有后端服务器。</strong> 发布内容 (文本、图片、视频) 绝不传输至任何第三方服务器。它直接从您的浏览器发送至您选择的每个社交网络,如同您亲自在该处输入并提交一般。","dataLi1":"发布的文本、图片和视频仅在您的浏览器中传递给您选择的 SNS 页面 (X, Bluesky, Threads, Mastodon, Misskey, Tumblr, Pixiv, DeviantArt, Instagram, TikTok, YouTube)。","dataLi2":"若您为 Bluesky / Mastodon / Misskey 启用了可选的官方 API 路径,发布内容将使用您在设置中提供的凭据,直接从浏览器发送至 <strong>该 SNS 自身的 API 服务器</strong>。Tutti / 开发者服务器不参与其中。","dataLi3":"不收集任何分析、追踪或广告数据。","dataLi4":"Tutti <strong>不会</strong> 读取或存储您在 SNS 站点上的认证 token、cookie 或会话数据。","h3Report":"例外 — 手动错误报告 (每次点击即时同意)","reportIntro":"当 (且仅当) 您按下错误对话框或诊断面板中显示的 <strong>「报告」按钮</strong> 时,以下内容会通过 Cloudflare Workers 中继发送至 <strong>私有的 GitHub issue tracker</strong> (<code>komm64/tutti-issues</code>,仅 Tutti 开发者可见):","reportLi1":"错误消息、扩展版本、浏览器 User-Agent 字符串。","reportLi2":"扩展内部日志的最后 30 条 (按您配置的日志级别;默认 INFO)。发布内容、图片、视频、SNS 登录数据和 API 凭据 <strong>绝不</strong> 包含在内。","reportLi3":"发生错误的 SNS 标签页的 redacted DOM 快照,用于修复失效的选择器。文本内容、属性值、URL 路径/查询/片段、<code>href</code>/<code>src</code> 属性以及 <code>&lt;meta&gt;</code>/<code>&lt;link&gt;</code> 标签均被剥离。负载上限为 8 KB。实现请参见 <a href=\"https://github.com/komm64/tutti/blob/main/src/utils/dom-snapshot.ts\">dom-snapshot.ts</a>。","reportOutro":"您按下报告按钮前不会发送任何数据。接收方为私有,仅 Tutti 开发者可见。","h2Local":"2. 本地存储的数据","localIntro":"以下数据仅通过 Chrome 的 <code>storage</code> API 存储于您的浏览器内。Tutti 不会将其传输至设备外。","localSettings":"<strong>设置</strong> (<code>chrome.storage.sync</code>): Mastodon / Misskey 实例 URL、autoPost 开关、显示方式、selector override URL 等。若您已登录 Chrome,可能通过 Chrome Sync 复制到您的其他设备。","localDrafts":"<strong>草稿</strong> (<code>chrome.storage.session</code>): 正在编辑的发布文本及附加媒体 (图片 / 视频)。浏览器退出时自动清除。","localSelected":"<strong>选中的 SNS</strong> (<code>chrome.storage.local</code>): 您勾选为发布目标的 SNS。为方便起见在多次会话间保留;仅设备本地。","localUsers":"<strong>最后所见用户名</strong> (<code>chrome.storage.local</code>): 各 SNS 当前登录的用户名,显示在 popup 中以便您确认哪个账号将接收发布。仅设备本地。","localHistory":"<strong>发布历史</strong> (<code>chrome.storage.local</code>): 最近 20 次发布: 文本的前 80 个字符、目标平台、每个平台的成功/失败状态、时间戳。仅设备本地。","localCreds":"<strong>API 凭据</strong> (<code>chrome.storage.local</code>): 仅当您为 Bluesky / Mastodon / Misskey 明确启用官方 API 路径时存储: 您的 Bluesky app password 或 Mastodon / Misskey access token。<strong>仅设备本地;绝不通过 Chrome Sync 复制;绝不传输至任何开发者服务器。</strong> 可从设置向导中删除。","localSelectors":"<strong>选择器覆盖缓存</strong> (<code>chrome.storage.local</code>): 从您在设置中配置的 URL 获取的选择器热修复数据 (默认: Tutti 在 GitHub Pages 上的公共 <code>selectors.json</code>)。","localVideoCap":"<strong>视频上传上限缓存</strong> (<code>chrome.storage.local</code>): 针对每账号视频上传上限 (例如 Bluesky) 的 API 探测结果。仅数值,不含凭据。","localWipe":"卸载扩展或清除 Chrome 的扩展存储即可随时擦除以上所有数据。","h2Perms":"3. 所用权限","permsThead1":"权限","permsThead2":"用途","permsStorage":"在浏览器内存储上述本地数据 (设置、草稿、历史、选中的平台等)。","permsOffscreen":"在 offscreen 文档中运行 <code>ffmpeg.wasm</code>,当源文件超过目标 SNS 大小上限时压缩 / 重新编码视频文件。视频数据仅本地处理;Tutti 不会将其传输至任何位置。","permsSidePanel":"可选的 UI 显示方式: 在 Chrome 的侧边栏中显示 Tutti 的发布表单,而非操作 popup,这样在切换 SNS 标签时它能保持打开。您可在选项页中启用;默认为标准 popup。","permsHost":"将 content script 注入各 SNS 站点 (x.com / twitter.com / bsky.app / bsky.social / threads.net / threads.com / mastodon.social / misskey.io / tumblr.com / pixiv.net / tiktok.com / youtube.com / instagram.com / deviantart.com),以代您填写发布表单内容并提交。不会从这些站点读取数据并发送至其他位置;content script 仅写入您自己的输入。","permsOptHost":"仅当您配置自定义 Mastodon 或 Misskey 实例 URL (默认值之外) 时才在运行时请求。届时 Chrome 会显示标准权限提示。","h2Relationship":"4. 与 SNS 提供商的关系","relationshipBody":"Tutti 自动化 (或通过官方 API) 操作 11 个支持的网络的 Web UI。这是非官方功能;Tutti 与 X、Bluesky、Meta (Threads / Instagram)、Mastodon gGmbH、Misskey、Tumblr、Pixiv、DeviantArt、TikTok 或 YouTube 均无附属关系。您仍需遵守每项服务自身的使用条款。","h2Contact":"5. 联系方式","contactGitHub":"GitHub Issues:","contactEmail":"邮箱:","h2Changes":"6. 本政策的变更","changesBody":"本政策的更新通过更新此页面和官方源文件 (<a href=\"https://github.com/komm64/tutti/blob/main/PRIVACY.md\">PRIVACY.md</a>) 进行通知。"},"support":{"title":"Tutti — 支持","headerTagline":"支持资源与 FAQ","h2Help":"需要帮助?","h3Failed":"1. 发布失败 / 有些行为异常","failedBody":"请使用 <strong>popup 中的「诊断」→「报告」按钮</strong>。这是正规渠道。报告经过 redact (用户名、URL、邮箱) 后转发至我们的私有 issue tracker,在那里会自动创建 selector 修复 PR,数天内以热修复形式推送至全体用户。","calloutTitle":"为什么使用产品内的报告按钮?","calloutBody":"popup 的报告流程会自动附上最终发布状态、redacted DOM 快照及选择器审计结果 — 这正是快速修复 selector 失效所需的内容。个人可识别信息在发送前经过多层 redact。","h3General":"2. 一般问题 / 功能请求","generalBody":"请发邮件至 <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>。这是私有渠道,可以安全分享截图 / 个人用户名。","h3Install":"3. 安装 / 账号问题","installBody":"Tutti <strong>重用您各个社交网络的现有浏览器登录</strong>。无需单独的 Tutti 账号或登录步骤。只要您在同一个 Chrome 配置文件中已登录某个社交网络,Tutti 就能从那里发布。","h2Faq":"FAQ","q1":"Q. 我的发布失败了。","a1":"通常意味着某个社交网络更改了其 DOM。请使用 popup 中的 <strong>诊断 → 报告</strong>。选择器热修复通常会在数天内通过 <code>selectors.json</code> 自动更新发布 (无需更新扩展)。","q2":"Q. Tutti 记不住我的登录。","a2":"Tutti 依赖网络的常规浏览器登录。请先在 Chrome 中登录每个网络,然后 Tutti 才能代您发布。隐身模式不可用,因为那里没有该网络的会话。","q3":"Q. 每个网络的字符上限不同 — 这有问题吗?","a3":"没有问题。超过某网络字符上限的长文会自动拆分为连续推文 (在 X 上是真正的回复链;其他网络是顺序发布)。在上限以内的发布则原样发送。","q4":"Q. 提示我的图片 / 视频过大。","a4":"图片通过 Canvas 自动调整大小以适应各网络的大小上限。视频在超过网络上限时通过 ffmpeg.wasm 自动压缩。若压缩后仍无法适应,您将看到错误 — 请先通过该网络的原生应用验证文件可上传。","q5":"Q. Tutti 能看到我的发布内容吗?","a5":"不能。发布内容绝不经过任何第三方服务器。Tutti 直接注入各网络的 Web 发布页面。详情请参阅我们的<a href=\"./privacy.html\">隐私政策</a>。唯一例外是您按下产品内报告按钮时,这会将 redacted 错误信息发送至我们的私有 issue tracker。","q6":"Q. 我可以捐赠吗?","a6":"暂时还不行 — 我们正在准备一个低压力的支持渠道。最大的持续成本是跟进每个社交网络的 UI 变更;未来的 Ko-fi 流程将资助这种维护。"}},"zh-Hant":{"lang":"zh-Hant","common":{"appName":"Tutti","tagline":"一個 Chrome 擴充功能。11 個社群網路。零麻煩。","navHome":"首頁","navGitHub":"GitHub","navSupport":"支援","navPrivacy":"隱私權政策","navLanguages":"其他語言","footerCopy":"&copy; 2026 komm64 &mdash; <a href=\"https://github.com/komm64/tutti/blob/main/LICENSE\">保留所有權利</a>","footerContact":"Tutti 是由 <a href=\"https://github.com/komm64\">komm64</a> 開發的 Chrome 擴充功能。聯絡方式: <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>"},"index":{"title":"Tutti — 跨平台發布擴充功能","headerTagline":"一個 Chrome 擴充功能。11 個社群網路。零麻煩。","h2Overview":"概觀","overviewBody":"Tutti 一鍵將同一內容廣播到 11 個社群網路 (X、Bluesky、Threads、Tumblr、Mastodon、Misskey、Pixiv、TikTok、YouTube Shorts、Instagram、DeviantArt)。沒有後端伺服器,發布內容絕不會經過任何第三方伺服器。","h2PrivacySummary":"一句話隱私說明","privacySummaryBody":"Tutti 沒有後端伺服器。發布內容 (文字、圖片、影片) 直接從您的瀏覽器送至您選擇的每個社群網路 — 絕不會透過任何開發者控制的伺服器。","privacyFullPolicy":"完整政策:"},"privacy":{"title":"Tutti — 隱私權政策","headerTagline":"無第三方資料收集。所有發布內容直接從您的瀏覽器傳送至每個 SNS。","lastUpdated":"最後更新: 2026-05-23 (v0.5.0)","h2Data":"1. 我們收集與傳送的資料","dataIntro":"<strong>Tutti 沒有後端伺服器。</strong> 發布內容 (文字、圖片、影片) 絕不會傳送至任何第三方伺服器。它直接從您的瀏覽器送至您選擇的每個社群網路,如同您親自在該處輸入並送出一樣。","dataLi1":"發布的文字、圖片與影片僅在您的瀏覽器中傳遞給您選擇的 SNS 頁面 (X、Bluesky、Threads、Mastodon、Misskey、Tumblr、Pixiv、DeviantArt、Instagram、TikTok、YouTube)。","dataLi2":"若您為 Bluesky / Mastodon / Misskey 啟用了選用的官方 API 路徑,發布內容將使用您在設定中提供的憑證,直接從瀏覽器送至 <strong>該 SNS 自身的 API 伺服器</strong>。Tutti / 開發者伺服器不參與其中。","dataLi3":"不收集任何分析、追蹤或廣告資料。","dataLi4":"Tutti <strong>不會</strong> 讀取或儲存您在 SNS 站點上的驗證 token、cookie 或工作階段資料。","h3Report":"例外 — 手動錯誤回報 (每次點擊即同意)","reportIntro":"當 (且僅當) 您按下錯誤對話框或診斷面板中顯示的 <strong>「回報」按鈕</strong> 時,以下內容會透過 Cloudflare Workers 中繼傳送至 <strong>私有的 GitHub issue tracker</strong> (<code>komm64/tutti-issues</code>,僅 Tutti 開發者可見):","reportLi1":"錯誤訊息、擴充功能版本、瀏覽器 User-Agent 字串。","reportLi2":"擴充功能內部記錄的最後 30 筆 (依您設定的記錄層級;預設 INFO)。發布內容、圖片、影片、SNS 登入資料和 API 憑證 <strong>絕不</strong> 包含在內。","reportLi3":"發生錯誤的 SNS 分頁的 redacted DOM 快照,用以修復失效的選擇器。文字內容、屬性值、URL 路徑/查詢/片段、<code>href</code>/<code>src</code> 屬性以及 <code>&lt;meta&gt;</code>/<code>&lt;link&gt;</code> 標籤皆已剝除。負載上限為 8 KB。實作請參見 <a href=\"https://github.com/komm64/tutti/blob/main/src/utils/dom-snapshot.ts\">dom-snapshot.ts</a>。","reportOutro":"在您按下回報按鈕前不會傳送任何資料。接收方為私有,僅 Tutti 開發者可見。","h2Local":"2. 本機儲存的資料","localIntro":"以下資料僅透過 Chrome 的 <code>storage</code> API 儲存於您的瀏覽器內。Tutti 不會將其傳送至裝置外。","localSettings":"<strong>設定</strong> (<code>chrome.storage.sync</code>): Mastodon / Misskey 執行個體 URL、autoPost 開關、顯示方式、selector override URL 等。若您已登入 Chrome,可能透過 Chrome Sync 同步至您的其他裝置。","localDrafts":"<strong>草稿</strong> (<code>chrome.storage.session</code>): 正在編輯的發布文字及附加媒體 (圖片 / 影片)。瀏覽器結束時自動清除。","localSelected":"<strong>已選 SNS</strong> (<code>chrome.storage.local</code>): 您勾選為發布目標的 SNS。為方便起見會跨工作階段保留;僅限本機。","localUsers":"<strong>最後所見使用者名稱</strong> (<code>chrome.storage.local</code>): 各 SNS 目前登入的使用者名稱,顯示在 popup 中以便您確認哪個帳號將接收發布。僅限本機。","localHistory":"<strong>發布記錄</strong> (<code>chrome.storage.local</code>): 最近 20 筆發布: 文字的前 80 個字元、目標平台、每個平台的成功/失敗狀態、時間戳記。僅限本機。","localCreds":"<strong>API 憑證</strong> (<code>chrome.storage.local</code>): 僅當您為 Bluesky / Mastodon / Misskey 明確啟用官方 API 路徑時儲存: 您的 Bluesky app password 或 Mastodon / Misskey access token。<strong>僅限本機;絕不透過 Chrome Sync 同步;絕不傳送至任何開發者伺服器。</strong> 可從設定精靈中移除。","localSelectors":"<strong>選擇器覆寫快取</strong> (<code>chrome.storage.local</code>): 從您在設定中設定的 URL 取得的選擇器熱修復資料 (預設: Tutti 於 GitHub Pages 上公開的 <code>selectors.json</code>)。","localVideoCap":"<strong>影片上傳上限快取</strong> (<code>chrome.storage.local</code>): 針對每個帳號影片上傳上限 (例如 Bluesky) 的 API 探測結果。僅數值;不含憑證。","localWipe":"解除安裝擴充功能或清除 Chrome 的擴充功能儲存即可隨時清除上述所有資料。","h2Perms":"3. 使用的權限","permsThead1":"權限","permsThead2":"用途","permsStorage":"在瀏覽器內儲存上述本機資料 (設定、草稿、記錄、選擇的平台等)。","permsOffscreen":"在 offscreen 文件中執行 <code>ffmpeg.wasm</code>,當來源超過目標 SNS 大小上限時壓縮 / 重新編碼影片檔案。影片資料僅在本機處理;Tutti 不會將其傳送至任何位置。","permsSidePanel":"選用的 UI 顯示方式: 在 Chrome 的側邊面板顯示 Tutti 的發布表單,而非操作 popup,讓您在 SNS 分頁間切換時能保持開啟。可於選項頁面啟用;預設為標準 popup。","permsHost":"將 content script 注入各 SNS 站點 (x.com / twitter.com / bsky.app / bsky.social / threads.net / threads.com / mastodon.social / misskey.io / tumblr.com / pixiv.net / tiktok.com / youtube.com / instagram.com / deviantart.com),以代您填寫發布表單並送出。不會從這些站點讀取資料並送至其他位置;content script 僅寫入您自身的輸入。","permsOptHost":"僅當您設定自訂 Mastodon 或 Misskey 執行個體 URL (預設值以外) 時才會在執行階段請求。屆時 Chrome 會顯示標準權限提示。","h2Relationship":"4. 與 SNS 提供者的關係","relationshipBody":"Tutti 自動化 (或選擇性地透過官方 API) 操作 11 個支援網路的 Web UI。這是非官方功能;Tutti 與 X、Bluesky、Meta (Threads / Instagram)、Mastodon gGmbH、Misskey、Tumblr、Pixiv、DeviantArt、TikTok 或 YouTube 均無關係。您仍須遵守每項服務自身的使用條款。","h2Contact":"5. 聯絡方式","contactGitHub":"GitHub Issues:","contactEmail":"電子郵件:","h2Changes":"6. 本政策的變更","changesBody":"本政策的更新將透過更新此頁面與官方來源檔案 (<a href=\"https://github.com/komm64/tutti/blob/main/PRIVACY.md\">PRIVACY.md</a>) 進行通知。"},"support":{"title":"Tutti — 支援","headerTagline":"支援資源與 FAQ","h2Help":"需要協助嗎?","h3Failed":"1. 發布失敗 / 行為異常","failedBody":"請使用 <strong>popup 中的「診斷」→「回報」按鈕</strong>。這是正規管道。回報經過 redact (使用者名稱、URL、電子郵件) 後轉送至我們的私有 issue tracker,在那裡會自動建立 selector 修復 PR,數日內以熱修復形式推送至全體使用者。","calloutTitle":"為什麼使用產品內的回報按鈕?","calloutBody":"popup 的回報流程會自動附上最終發布狀態、redacted DOM 快照及選擇器稽核結果 — 這正是快速修復 selector 失效所需的內容。個人識別資訊在傳送前經多層 redact。","h3General":"2. 一般問題 / 功能請求","generalBody":"請寄信至 <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>。這是私有管道,可安全分享螢幕截圖 / 個人使用者名稱。","h3Install":"3. 安裝 / 帳號問題","installBody":"Tutti <strong>重複使用您各個社群網路的現有瀏覽器登入</strong>。無需單獨的 Tutti 帳號或登入步驟。只要您在同一個 Chrome 設定檔中已登入某個社群網路,Tutti 即可從該處發布。","h2Faq":"FAQ","q1":"Q. 我的發布失敗了。","a1":"通常表示某個社群網路更改了其 DOM。請使用 popup 中的 <strong>診斷 → 回報</strong>。選擇器熱修復通常會在數日內透過 <code>selectors.json</code> 自動更新發布 (無需更新擴充功能)。","q2":"Q. Tutti 記不住我的登入。","a2":"Tutti 依賴網路的一般瀏覽器登入。請先在 Chrome 中登入每個網路,然後 Tutti 才能代您發布。無痕模式無法運作,因為該處沒有網路的工作階段。","q3":"Q. 各網路的字元上限不同 — 這有問題嗎?","a3":"沒有問題。超過某網路字元上限的長文會自動拆分為連續推文 (在 X 上為真正的回覆鏈;其他網路為連續發布)。在上限以內的發布則原樣送出。","q4":"Q. 系統提示我的圖片 / 影片過大。","a4":"圖片透過 Canvas 自動調整大小以符合各網路的大小上限。影片在超過網路上限時透過 ffmpeg.wasm 自動壓縮。若壓縮後仍無法符合,您將看到錯誤 — 請先透過該網路的原生應用程式確認檔案能上傳。","q5":"Q. Tutti 能看到我的發布內容嗎?","a5":"不能。發布內容絕不會經過任何第三方伺服器。Tutti 直接注入各網路的 Web 發布頁面。詳情請參閱我們的<a href=\"./privacy.html\">隱私權政策</a>。唯一例外是您按下產品內回報按鈕時,這會將 redacted 錯誤資訊傳送至我們的私有 issue tracker。","q6":"Q. 我可以捐款嗎?","a6":"暫時還不行 — 我們正在準備低壓力的支援管道。最大的持續成本是跟進每個社群網路的 UI 變更;未來的 Ko-fi 流程將用於資助這種維護。"}}};

var CWS_URL='https://chromewebstore.google.com/detail/mcjfgdcffjfhkcepfpnifcpknlddmbpe';
function render(code){
  var t=T[code]||T['en'],c=t.common,i=t.index;
  document.title=i.title;
  document.documentElement.lang=code;
  document.documentElement.dir=code==='ar'?'rtl':'';
  document.getElementById('tagline').textContent=i.headerTagline;
  document.getElementById('nav').innerHTML=
    '<a href="'+CWS_URL+'" target="_blank" rel="noopener">Chrome Web Store</a>'+
    '<a href="https://github.com/komm64/tutti">'+c.navGitHub+'</a>'+
    '<a href="./support.html">'+c.navSupport+'</a>'+
    '<a href="./privacy.html">'+c.navPrivacy+'</a>';
  document.getElementById('content').innerHTML=
    '<a class="cws-btn" href="'+CWS_URL+'" target="_blank" rel="noopener">'+
    '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2zm0 2c1.93 0 3.72.6 5.2 1.62L12 12 6.8 5.62A7.96 7.96 0 0 1 12 4zM4 12a8 8 0 0 1 2.07-5.34L12 14.5l5.93-7.84A8 8 0 1 1 4 12z"/></svg> Add to Chrome — Free</a>'+
    '<h2>'+i.h2Overview+'</h2><p>'+i.overviewBody+'</p>'+
    '<h2>'+i.h2PrivacySummary+'</h2>'+
    '<p>'+i.privacySummaryBody+'</p>'+
    '<p>'+i.privacyFullPolicy+' <a href="./privacy.html">Privacy Policy</a></p>';
  document.getElementById('footer').innerHTML=c.footerCopy;
}


function setLang(c){try{localStorage.setItem('tutti_lang',c)}catch(e){}render(c);document.getElementById('lang').value=c;}
function detectLang(){
  try{var s=localStorage.getItem('tutti_lang');if(s&&T[s])return s;}catch(e){}
  var n=(navigator.language||'en').toLowerCase();
  for(var i=0;i<LANGS.length;i++){if(n===LANGS[i][0].toLowerCase())return LANGS[i][0];}
  for(var i=0;i<LANGS.length;i++){if(n.startsWith(LANGS[i][0].split('-')[0].toLowerCase()))return LANGS[i][0];}
  return 'en';
}
(function(){var sel=document.getElementById('lang');for(var i=0;i<LANGS.length;i++){var o=document.createElement('option');o.value=LANGS[i][0];o.textContent=LANGS[i][1];sel.appendChild(o);}})();
var _l=detectLang();document.getElementById('lang').value=_l;render(_l);

</script>
