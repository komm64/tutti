const T={"ar":{"lang":"ar","common":{"appName":"Tutti","tagline":"إضافة Chrome واحدة. أحد عشر شبكة اجتماعية. صفر عناء.","navHome":"الرئيسية","navGitHub":"GitHub","navSupport":"الدعم","navPrivacy":"سياسة الخصوصية","navLanguages":"لغات أخرى","footerCopy":"&copy; 2026 komm64 &mdash; <a href=\"https://github.com/komm64/tutti/blob/main/LICENSE\">جميع الحقوق محفوظة</a>","footerContact":"Tutti هو إضافة Chrome من <a href=\"https://github.com/komm64\">komm64</a>. التواصل: <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>"},"index":{"title":"Tutti — إضافة النشر المتعدد","headerTagline":"إضافة Chrome واحدة. أحد عشر شبكة اجتماعية. صفر عناء.","h2Overview":"نظرة عامة","overviewBody":"يقوم Tutti ببث نفس المنشور إلى 11 شبكة اجتماعية (X, Bluesky, Threads, Tumblr, Mastodon, Misskey, Pixiv, TikTok, YouTube Shorts, Instagram, DeviantArt) بنقرة واحدة. ليس لديه واجهة خلفية؛ محتوى المنشور لا يمر أبدًا عبر أي خادم طرف ثالث.","h2PrivacySummary":"الخصوصية في جملة واحدة","privacySummaryBody":"ليس لدى Tutti خادم واجهة خلفية. ينتقل محتوى المنشور (النص والصور والفيديو) مباشرةً من متصفحك إلى كل شبكة اجتماعية تختارها — لا يمر أبدًا عبر أي خادم يتحكم فيه المطور.","privacyFullPolicy":"السياسة الكاملة:"},"privacy":{"title":"Tutti — سياسة الخصوصية","headerTagline":"لا يوجد جمع بيانات من طرف ثالث. كل محتوى المنشورات ينتقل مباشرةً من متصفحك إلى كل SNS.","lastUpdated":"آخر تحديث: 2026-05-23 (v0.5.0)","h2Data":"1. البيانات التي نجمعها وننقلها","dataIntro":"<strong>ليس لدى Tutti خادم واجهة خلفية.</strong> محتوى المنشور (النص والصور والفيديو) لا يُرسل أبدًا إلى أي خادم طرف ثالث. ينتقل مباشرةً من متصفحك إلى كل شبكة اجتماعية تختارها، تمامًا كما لو كنت قد كتبته وأرسلته بنفسك هناك.","dataLi1":"يتم تمرير نص المنشور والصور والفيديو فقط إلى صفحات SNS التي تختارها (X, Bluesky, Threads, Mastodon, Misskey, Tumblr, Pixiv, DeviantArt, Instagram, TikTok, YouTube) داخل متصفحك.","dataLi2":"عند تمكين مسار API الرسمي الاختياري لـ Bluesky / Mastodon / Misskey، يتم إرسال المنشورات مباشرةً من متصفحك إلى <strong>خادم API الخاص بهذا الـ SNS</strong> باستخدام بيانات الاعتماد التي قدمتها في الإعدادات. لا يشارك أي خادم Tutti / المطور.","dataLi3":"لا يتم جمع أي بيانات تحليلية أو تتبع أو إعلانية.","dataLi4":"Tutti <strong>لا</strong> يقرأ أو يخزن رموز المصادقة أو ملفات تعريف الارتباط أو بيانات الجلسة الخاصة بك من مواقع SNS.","h3Report":"استثناء — تقارير الأخطاء اليدوية (موافقة لكل نقرة)","reportIntro":"عند الضغط (وفقط عند الضغط) على <strong>زر &laquo;إبلاغ&raquo;</strong> المعروض في مربع حوار الخطأ أو لوحة التشخيص، يتم إرسال ما يلي عبر مرحل Cloudflare Workers إلى <strong>متتبع issues GitHub خاص</strong> (<code>komm64/tutti-issues</code>, مرئي فقط لمطور Tutti):","reportLi1":"رسالة الخطأ وإصدار الإضافة وسلسلة User-Agent للمتصفح.","reportLi2":"آخر 30 إدخالاً من السجل الداخلي للإضافة (مستوى السجل الذي قمت بتكوينه؛ INFO افتراضيًا). محتوى المنشورات والصور والفيديو وبيانات تسجيل الدخول إلى SNS وبيانات اعتماد API <strong>لا</strong> يتم تضمينها أبدًا.","reportLi3":"لقطة DOM منقحة لعلامة تبويب SNS حيث حدث الخطأ، تُستخدم لإصلاح المحددات المعطلة. يتم تجريد محتوى النص وقيم السمات ومسارات/استعلامات/أجزاء URL وسمات <code>href</code>/<code>src</code> وعلامات <code>&lt;meta&gt;</code>/<code>&lt;link&gt;</code>. الحمولة محددة بـ 8 كيلوبايت. انظر <a href=\"https://github.com/komm64/tutti/blob/main/src/utils/dom-snapshot.ts\">dom-snapshot.ts</a> للتنفيذ.","reportOutro":"لا يتم إرسال أي شيء حتى تضغط على زر التقرير. الوجهة خاصة، مرئية فقط لمطور Tutti.","h2Local":"2. البيانات المخزنة محليًا","localIntro":"يتم تخزين ما يلي فقط داخل متصفحك عبر واجهة برمجة تطبيقات <code>storage</code> الخاصة بـ Chrome. لا يتم نقل أي شيء خارج الجهاز بواسطة Tutti.","localSettings":"<strong>الإعدادات</strong> (<code>chrome.storage.sync</code>): عناوين URL لمثيلات Mastodon / Misskey، مفتاح autoPost، وضع العرض، عنوان URL لتجاوز المحدد، إلخ. قد يتم نسخها إلى أجهزتك الأخرى عبر Chrome Sync إذا كنت قد سجلت الدخول إلى Chrome.","localDrafts":"<strong>المسودات</strong> (<code>chrome.storage.session</code>): نص المنشور قيد التقدم والوسائط المرفقة (الصور / الفيديو). يتم مسحها تلقائيًا عند إغلاق المتصفح.","localSelected":"<strong>SNS المحددة</strong> (<code>chrome.storage.local</code>): SNS التي قمت بتحديدها كأهداف نشر. تستمر بين الجلسات للراحة؛ محلية فقط للجهاز.","localUsers":"<strong>أسماء المستخدمين التي شوهدت مؤخرًا</strong> (<code>chrome.storage.local</code>): اسم المستخدم المسجل حاليًا على كل SNS، يُعرض في النافذة المنبثقة حتى تتمكن من تأكيد الحساب الذي سيتلقى المنشور. محلية فقط للجهاز.","localHistory":"<strong>سجل المنشورات</strong> (<code>chrome.storage.local</code>): آخر 20 منشورًا: أول 80 حرفًا من النص، المنصات المستهدفة، النجاح/الفشل لكل منصة، والطابع الزمني. محلية فقط للجهاز.","localCreds":"<strong>بيانات اعتماد API</strong> (<code>chrome.storage.local</code>): فقط إذا قمت بتمكين مسار API الرسمي صراحةً لـ Bluesky / Mastodon / Misskey: Bluesky app password أو رمز الوصول الخاص بـ Mastodon / Misskey. <strong>محلية فقط للجهاز؛ لا يتم نسخها أبدًا عبر Chrome Sync؛ لا يتم نقلها أبدًا إلى أي خادم مطور.</strong> يمكن إزالتها من معالج الإعدادات.","localSelectors":"<strong>ذاكرة التخزين المؤقت لتجاوز المحددات</strong> (<code>chrome.storage.local</code>): بيانات hot-fix للمحددات تم جلبها من عنوان URL الذي قمت بتكوينه في الإعدادات (افتراضيًا: <code>selectors.json</code> العام على GitHub Pages الخاص بـ Tutti).","localVideoCap":"<strong>ذاكرة التخزين المؤقت لحد رفع الفيديو</strong> (<code>chrome.storage.local</code>): نتيجة استكشاف API لحدود رفع الفيديو لكل حساب (مثل Bluesky). القيم الرقمية فقط؛ بدون بيانات اعتماد.","localWipe":"يمكن مسح كل هذا في أي وقت عن طريق إلغاء تثبيت الإضافة أو مسح تخزين الإضافات الخاص بـ Chrome.","h2Perms":"3. الأذونات المستخدمة","permsThead1":"الإذن","permsThead2":"الغرض","permsStorage":"تخزين البيانات المحلية أعلاه (الإعدادات، المسودات، السجل، المنصات المحددة، إلخ) داخل متصفحك.","permsOffscreen":"تشغيل <code>ffmpeg.wasm</code> في مستند خارج الشاشة لضغط / إعادة ترميز ملفات الفيديو عندما يتجاوز المصدر حد حجم SNS الوجهة. تتم معالجة بيانات الفيديو محليًا فقط؛ لا تُنقل إلى أي مكان بواسطة Tutti.","permsSidePanel":"وضع عرض واجهة المستخدم الاختياري: يُظهر نموذج تأليف Tutti في اللوحة الجانبية لـ Chrome بدلاً من النافذة المنبثقة للإجراء، بحيث يظل مفتوحًا أثناء التبديل بين علامات تبويب SNS. تختار من صفحة الخيارات؛ الافتراضي هو النافذة المنبثقة القياسية.","permsHost":"حقن content scripts في كل موقع SNS (x.com / twitter.com / bsky.app / bsky.social / threads.net / threads.com / mastodon.social / misskey.io / tumblr.com / pixiv.net / tiktok.com / youtube.com / instagram.com / deviantart.com) لملء نموذج التأليف بمحتوى منشورك وإرساله نيابةً عنك. لا تُقرأ أي بيانات من هذه المواقع وتُرسل إلى مكان آخر؛ يقوم content script فقط بكتابة إدخالك الخاص.","permsOptHost":"يُطلب أثناء التشغيل فقط إذا قمت بتكوين عنوان URL مخصص لمثيل Mastodon أو Misskey (غير الافتراضي). يعرض Chrome مطالبة الإذن القياسية في تلك اللحظة.","h2Relationship":"4. العلاقة مع مزودي SNS","relationshipBody":"يقوم Tutti بأتمتة واجهة المستخدم الويب (أو، اختياريًا، النشر عبر API الرسمي) لـ 11 شبكة مدعومة. هذه وظيفة غير رسمية؛ Tutti ليس مرتبطًا بـ X أو Bluesky أو Meta (Threads / Instagram) أو Mastodon gGmbH أو Misskey أو Tumblr أو Pixiv أو DeviantArt أو TikTok أو YouTube. تظل ملزمًا بشروط استخدام كل خدمة.","h2Contact":"5. التواصل","contactGitHub":"GitHub Issues:","contactEmail":"البريد الإلكتروني:","h2Changes":"6. التغييرات على هذه السياسة","changesBody":"يتم إبلاغ تحديثات هذه السياسة عن طريق تحديث هذه الصفحة وملف المصدر الأساسي (<a href=\"https://github.com/komm64/tutti/blob/main/PRIVACY.md\">PRIVACY.md</a>)."},"support":{"title":"Tutti — الدعم","headerTagline":"موارد الدعم والأسئلة الشائعة","h2Help":"هل تحتاج إلى مساعدة؟","h3Failed":"1. فشل النشر / شيء ما يتصرف بشكل غريب","failedBody":"استخدم <strong>زر &laquo;التشخيص&raquo; → &laquo;إبلاغ&raquo; داخل النافذة المنبثقة</strong>. هذه هي القناة الأساسية. يتم تنقيح التقرير (المستخدمين، عناوين URL، رسائل البريد الإلكتروني) وإعادة توجيهه إلى متتبع issue الخاص بنا، حيث يتم فتح PR لإصلاح المحدد تلقائيًا ودفعه كـ hot-fix لجميع المستخدمين في غضون أيام.","calloutTitle":"لماذا تستخدم زر التقرير داخل المنتج؟","calloutBody":"يرفق تدفق التقرير في النافذة المنبثقة تلقائيًا حالة التأليف النهائية ولقطة DOM منقحة ونتائج تدقيق المحددات — بالضبط ما هو ضروري لإصلاح كسر المحدد بسرعة. يتم تجريد المعلومات الشخصية القابلة للتعريف عبر طبقات متعددة قبل الإرسال.","h3General":"2. أسئلة عامة / طلبات ميزات","generalBody":"راسلنا عبر البريد الإلكتروني على <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>. هذه قناة خاصة، آمنة لمشاركة لقطات الشاشة / المستخدمين الشخصيين.","h3Install":"3. أسئلة التثبيت / الحساب","installBody":"Tutti <strong>يعيد استخدام تسجيلات دخول المتصفح الموجودة لديك</strong> لكل شبكة اجتماعية. لا يوجد حساب Tutti منفصل أو خطوة تسجيل دخول. بمجرد تسجيل الدخول إلى شبكة اجتماعية في نفس ملف تعريف Chrome، يمكن لـ Tutti النشر من هناك.","h2Faq":"الأسئلة الشائعة","q1":"س. فشل منشوري.","a1":"يعني هذا عادةً أن الشبكة الاجتماعية غيرت DOM الخاص بها. استخدم <strong>التشخيص → إبلاغ</strong> في النافذة المنبثقة. عادةً ما يتم شحن hot-fix للمحدد في غضون أيام عبر التحديث التلقائي لـ <code>selectors.json</code> (لا حاجة لتحديث الإضافة).","q2":"س. لا يتذكر Tutti تسجيل الدخول الخاص بي.","a2":"يعتمد Tutti على تسجيل الدخول العادي للمتصفح للشبكة. سجّل الدخول إلى كل شبكة في Chrome أولاً، ثم يمكن لـ Tutti النشر نيابةً عنك. لا يعمل وضع التصفح المتخفي لأن جلسات الشبكة غير موجودة هناك.","q3":"س. تختلف حدود الأحرف لكل شبكة — هل هذا مشكلة؟","a3":"لا. يتم تقسيم المنشورات الطويلة التي تتجاوز حد أحرف الشبكة تلقائيًا إلى موضوع متابعة (في X، سلسلة ردود مناسبة؛ في الشبكات الأخرى، منشورات متتالية). تمر المنشورات ضمن الحد كما هي.","q4":"س. أُخبرت أن صورتي / فيديو الخاص بي كبير جدًا.","a4":"يتم تغيير حجم الصور تلقائيًا عبر Canvas لتناسب حد حجم كل شبكة. يتم ضغط مقاطع الفيديو تلقائيًا باستخدام ffmpeg.wasm عندما تكون فوق حد الشبكة. إذا لم يتناسب الضغط أيضًا، فسترى خطأً — يرجى التحقق أولاً من تحميل الملف عبر التطبيق الأصلي للشبكة.","q5":"س. هل يرى Tutti محتوى منشوري؟","a5":"لا. لا يمر محتوى المنشور أبدًا عبر خادم طرف ثالث. يحقن Tutti مباشرةً في صفحة التأليف الويب لكل شبكة. راجع <a href=\"./privacy.html\">سياسة الخصوصية</a> الخاصة بنا للحصول على التفاصيل. الاستثناء الوحيد هو عند الضغط على زر التقرير داخل المنتج، الذي يرسل معلومات الخطأ المنقحة إلى متتبع issue الخاص بنا.","q6":"س. هل يمكنني التبرع؟","a6":"ليس بعد — نحن نعمل على قناة دعم منخفضة الضغط. أكبر تكلفة مستمرة هي مواكبة تغييرات واجهة المستخدم لكل شبكة اجتماعية؛ ستمول تدفقات Ko-fi المستقبلية تلك الصيانة."}},"bg":{"lang":"bg","common":{"appName":"Tutti","tagline":"Едно разширение за Chrome. Единадесет социални мрежи. Нула главоболия.","navHome":"Начало","navGitHub":"GitHub","navSupport":"Поддръжка","navPrivacy":"Политика за поверителност","navLanguages":"Други езици","footerCopy":"&copy; 2026 komm64 &mdash; <a href=\"https://github.com/komm64/tutti/blob/main/LICENSE\">Всички права запазени</a>","footerContact":"Tutti е разширение за Chrome от <a href=\"https://github.com/komm64\">komm64</a>. Контакт: <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>"},"index":{"title":"Tutti — Разширение за крос-постване","headerTagline":"Едно разширение за Chrome. Единадесет социални мрежи. Нула главоболия.","h2Overview":"Преглед","overviewBody":"Tutti излъчва една и съща публикация в 11 социални мрежи (X, Bluesky, Threads, Tumblr, Mastodon, Misskey, Pixiv, TikTok, YouTube Shorts, Instagram, DeviantArt) с едно кликване. Няма бекенд; съдържанието на публикациите никога не минава през сървър на трета страна.","h2PrivacySummary":"Поверителност в едно изречение","privacySummaryBody":"Tutti няма бекенд сървър. Съдържанието на публикациите (текст, изображения, видео) отива директно от вашия браузър към всяка избрана от вас социална мрежа — никога през сървър, контролиран от разработчика.","privacyFullPolicy":"Пълна политика:"},"privacy":{"title":"Tutti — Политика за поверителност","headerTagline":"Без събиране на данни от трети страни. Цялото съдържание на публикациите отива директно от вашия браузър към всяка SNS.","lastUpdated":"Последна актуализация: 2026-05-23 (v0.5.0)","h2Data":"1. Данни, които събираме и предаваме","dataIntro":"<strong>Tutti няма бекенд сървър.</strong> Съдържанието на публикациите (текст, изображения, видео) никога не се предава на сървър на трета страна. То пътува директно от вашия браузър към всяка избрана от вас социална мрежа, точно както ако сами сте го въвели и изпратили там.","dataLi1":"Текстът, изображенията и видеото на публикациите се предават само на избраните от вас SNS страници (X, Bluesky, Threads, Mastodon, Misskey, Tumblr, Pixiv, DeviantArt, Instagram, TikTok, YouTube) във вашия браузър.","dataLi2":"Когато опционалният път през официалния API е активиран за Bluesky / Mastodon / Misskey, публикациите се изпращат директно от вашия браузър към <strong>собствения API сървър на тази SNS</strong> с използване на пълномощията, които сте предоставили в Настройките. Никакъв Tutti / разработчиков сървър не е намесен.","dataLi3":"Не се събират аналитични, проследяващи или рекламни данни.","dataLi4":"Tutti <strong>не</strong> чете и не съхранява вашите токени за автентикация, бисквитки или сесийни данни от SNS сайтовете.","h3Report":"Изключение — ръчни доклади за грешки (съгласие на кликване)","reportIntro":"Когато (и само когато) натиснете <strong>бутона &bdquo;Докладвай&ldquo;</strong>, показан в диалог за грешка или диагностичен панел, следното се изпраща през Cloudflare Workers релей към <strong>частен GitHub issue tracker</strong> (<code>komm64/tutti-issues</code>, видим само за разработчика на Tutti):","reportLi1":"Съобщението за грешка, версията на разширението, низа User-Agent на браузъра.","reportLi2":"Последните 30 записа на вътрешния лог на разширението (нивото на лога, което сте конфигурирали; INFO по подразбиране). Съдържание на публикации, изображения, видео, данни за вход в SNS и API пълномощия <strong>никога</strong> не са включени.","reportLi3":"Редактиран DOM моментен снимка на SNS таба, където е възникнала грешката, използвана за поправка на счупени селектори. Текстово съдържание, стойности на атрибути, пътища/заявки/фрагменти на URL, атрибути <code>href</code>/<code>src</code> и тагове <code>&lt;meta&gt;</code>/<code>&lt;link&gt;</code> се премахват. Полезният товар е ограничен до 8 KB. Вижте <a href=\"https://github.com/komm64/tutti/blob/main/src/utils/dom-snapshot.ts\">dom-snapshot.ts</a> за реализацията.","reportOutro":"Нищо не се изпраща, докато не натиснете бутона за докладване. Дестинацията е частна, видима само за разработчика на Tutti.","h2Local":"2. Локално съхранявани данни","localIntro":"Следното се съхранява само вътре във вашия браузър чрез API <code>storage</code> на Chrome. Tutti не предава нищо извън устройството.","localSettings":"<strong>Настройки</strong> (<code>chrome.storage.sync</code>): URL на инстанции Mastodon / Misskey, превключвател autoPost, режим на показване, URL за override на селектори и т.н. Може да се репликира на другите ви устройства чрез Chrome Sync, ако сте влезли в Chrome.","localDrafts":"<strong>Чернови</strong> (<code>chrome.storage.session</code>): Текст на публикация в процес и прикачени медии (изображения / видео). Автоматично се изчистват при затваряне на браузъра.","localSelected":"<strong>Избрани SNS</strong> (<code>chrome.storage.local</code>): SNS, които сте отметнали като цели на публикация. Запазва се между сесии за удобство; само локално на устройството.","localUsers":"<strong>Последно видени имена на потребители</strong> (<code>chrome.storage.local</code>): Текущото име на потребител, влязъл във всяка SNS, показано в popup, за да можете да потвърдите кой акаунт ще получи публикацията. Само локално на устройството.","localHistory":"<strong>История на публикации</strong> (<code>chrome.storage.local</code>): Последните 20 публикации: първите 80 символа текст, целеви платформи, успех/неуспех по платформа и времеви печат. Само локално на устройството.","localCreds":"<strong>API пълномощия</strong> (<code>chrome.storage.local</code>): Само ако изрично сте активирали пътя през официалния API за Bluesky / Mastodon / Misskey: вашата Bluesky app password или достъпен токен за Mastodon / Misskey. <strong>Само локално на устройството; никога не се репликира чрез Chrome Sync; никога не се предава на никой разработчиков сървър.</strong> Може да се премахне от съветника на Настройки.","localSelectors":"<strong>Кеш за override на селектори</strong> (<code>chrome.storage.local</code>): Данни за hot-fix на селектори, извлечени от URL, който сте конфигурирали в Настройки (по подразбиране: публичният <code>selectors.json</code> на GitHub Pages на Tutti).","localVideoCap":"<strong>Кеш за лимит на качване на видео</strong> (<code>chrome.storage.local</code>): Резултат от API сондажи за лимити на качване на видео по акаунт (напр. Bluesky). Само числови стойности; без пълномощия.","localWipe":"Всичко това може да бъде изтрито по всяко време чрез деинсталиране на разширението или изчистване на хранилището за разширения на Chrome.","h2Perms":"3. Използвани разрешения","permsThead1":"Разрешение","permsThead2":"Цел","permsStorage":"Съхранява гореспоменатите локални данни (настройки, чернови, история, избрани платформи и т.н.) вътре във вашия браузър.","permsOffscreen":"Изпълнява <code>ffmpeg.wasm</code> в offscreen документ за компресиране / прекодиране на видеофайлове, когато източникът надхвърля лимита на размера на целевата SNS. Видеоданните се обработват само локално; Tutti не ги предава никъде.","permsSidePanel":"Опционален режим на показване на UI: показва формуляра за съставяне на публикация на Tutti в страничния панел на Chrome вместо в popup на действие, така че да остане отворен, докато превключвате между SNS табове. Активирате го от страницата с Опции; стойността по подразбиране е стандартният popup.","permsHost":"Инжектиране на content scripts във всеки SNS сайт (x.com / twitter.com / bsky.app / bsky.social / threads.net / threads.com / mastodon.social / misskey.io / tumblr.com / pixiv.net / tiktok.com / youtube.com / instagram.com / deviantart.com) за попълване на формуляра за съставяне със съдържанието на вашата публикация и изпращането ѝ от ваше име. Никакви данни не се четат от тези сайтове и не се изпращат другаде; content скриптът само записва собствения ви вход.","permsOptHost":"Изисква се по време на изпълнение само ако конфигурирате персонализиран URL на инстанция Mastodon или Misskey (различен от стойностите по подразбиране). Chrome показва стандартното подканване за разрешение в този момент.","h2Relationship":"4. Връзка с доставчиците на SNS","relationshipBody":"Tutti автоматизира уеб UI (или, опционално, публикува чрез официалния API) на 11-те поддържани мрежи. Това е неофициална функционалност; Tutti не е свързан с X, Bluesky, Meta (Threads / Instagram), Mastodon gGmbH, Misskey, Tumblr, Pixiv, DeviantArt, TikTok или YouTube. Продължавате да сте обвързани със собствените условия за използване на всяка услуга.","h2Contact":"5. Контакт","contactGitHub":"GitHub Issues:","contactEmail":"Имейл:","h2Changes":"6. Промени в тази политика","changesBody":"Актуализациите на тази политика се съобщават чрез актуализиране на тази страница и каноничния изходен файл (<a href=\"https://github.com/komm64/tutti/blob/main/PRIVACY.md\">PRIVACY.md</a>)."},"support":{"title":"Tutti — Поддръжка","headerTagline":"Ресурси за поддръжка и FAQ","h2Help":"Имате нужда от помощ?","h3Failed":"1. Публикуването е неуспешно / нещо се държи странно","failedBody":"Използвайте <strong>бутона &bdquo;Диагностика&ldquo; → &bdquo;Докладвай&ldquo; вътре в popup</strong>. Това е каноничният канал. Докладът се редактира (handles, URL, имейли) и се препраща към нашия частен issue tracker, където автоматично се отваря PR за поправка на селектори и в рамките на дни се изпраща като hot-fix на всички потребители.","calloutTitle":"Защо да използвате бутона за докладване, вграден в продукта?","calloutBody":"Потокът за докладване на popup автоматично прикачва крайното състояние на съставяне, редактиран DOM моментен снимка и резултати от одита на селектори — точно това, което е необходимо за бързо отстраняване на счупване на селектори. PII се премахва през няколко слоя преди изпращане.","h3General":"2. Общи въпроси / заявки за функции","generalBody":"Пишете ни на <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>. Това е частен канал, безопасен за споделяне на екранни снимки / лични handles.","h3Install":"3. Въпроси за инсталация / акаунт","installBody":"Tutti <strong>използва повторно съществуващите ви влизания в браузъра</strong> за всяка социална мрежа. Няма отделен акаунт Tutti или стъпка за влизане. След като сте влезли в социална мрежа в същия Chrome профил, Tutti може да публикува оттам.","h2Faq":"FAQ","q1":"В. Публикуването ми е неуспешно.","a1":"Това обикновено означава, че социална мрежа е променила своето DOM. Използвайте <strong>Диагностика → Докладвай</strong> в popup. Hot-fix за селектор обикновено се доставя в рамките на дни чрез автоматичната актуализация на <code>selectors.json</code> (не е необходимо обновяване на разширението).","q2":"В. Tutti не помни моето влизане.","a2":"Tutti разчита на нормалното влизане в мрежата чрез браузъра. Първо влезте във всяка мрежа в Chrome, след това Tutti може да публикува от ваше име. Инкогнито режим не работи, защото сесиите на мрежата ги няма там.","q3":"В. Ограниченията за символи се различават по мрежи — това проблем ли е?","a3":"Не. Дълги публикации, превишаващи ограничението за символи на мрежа, автоматично се разделят на продължаваща нишка (в X — правилна верига от отговори; в други мрежи — последователни публикации). Публикации в рамките на ограничението преминават както са.","q4":"В. Казват ми, че моето изображение / видео е твърде голямо.","a4":"Изображенията автоматично се преоразмеряват чрез Canvas, за да съответстват на ограничението за размер на всяка мрежа. Видеата автоматично се компресират с ffmpeg.wasm, когато са над ограничението на мрежата. Ако дори компресията не пасва, ще видите грешка — моля, първо проверете дали файлът се качва чрез нативното приложение на мрежата.","q5":"В. Вижда ли Tutti съдържанието на моите публикации?","a5":"Не. Съдържанието на публикациите никога не минава през сървър на трета страна. Tutti инжектира директно в уеб страницата за съставяне на всяка мрежа. Вижте нашата <a href=\"./privacy.html\">Политика за поверителност</a> за подробности. Единственото изключение е, когато натиснете бутона за докладване, вграден в продукта, който изпраща редактирана информация за грешка към нашия частен issue tracker.","q6":"В. Мога ли да даря?","a6":"Още не — работим върху канал за подкрепа с ниско налягане. Най-голямото текущо разходи е да следваме промените в UI на всяка социална мрежа; бъдещите Ko-fi потоци ще финансират тази поддръжка."}},"cs":{"lang":"cs","common":{"appName":"Tutti","tagline":"Jedno rozšíření Chrome. Jedenáct sociálních sítí. Žádné starosti.","navHome":"Domů","navGitHub":"GitHub","navSupport":"Podpora","navPrivacy":"Zásady ochrany soukromí","navLanguages":"Jiné jazyky","footerCopy":"&copy; 2026 komm64 &mdash; <a href=\"https://github.com/komm64/tutti/blob/main/LICENSE\">Všechna práva vyhrazena</a>","footerContact":"Tutti je rozšíření Chrome od <a href=\"https://github.com/komm64\">komm64</a>. Kontakt: <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>"},"index":{"title":"Tutti — Rozšíření pro křížové publikování","headerTagline":"Jedno rozšíření Chrome. Jedenáct sociálních sítí. Žádné starosti.","h2Overview":"Přehled","overviewBody":"Tutti rozesílá stejný příspěvek do 11 sociálních sítí (X, Bluesky, Threads, Tumblr, Mastodon, Misskey, Pixiv, TikTok, YouTube Shorts, Instagram, DeviantArt) jediným kliknutím. Nemá backend; obsah příspěvků nikdy neprochází žádným serverem třetí strany.","h2PrivacySummary":"Soukromí v jedné větě","privacySummaryBody":"Tutti nemá backend server. Obsah příspěvků (text, obrázky, video) putuje přímo z vašeho prohlížeče do každé vybrané sociální sítě — nikdy přes žádný server kontrolovaný vývojářem.","privacyFullPolicy":"Plné zásady:"},"privacy":{"title":"Tutti — Zásady ochrany soukromí","headerTagline":"Žádný sběr dat třetími stranami. Veškerý obsah příspěvků jde přímo z vašeho prohlížeče do každé SNS.","lastUpdated":"Poslední aktualizace: 2026-05-23 (v0.5.0)","h2Data":"1. Údaje, které shromažďujeme a přenášíme","dataIntro":"<strong>Tutti nemá backend server.</strong> Obsah příspěvků (text, obrázky, video) není nikdy přenášen na žádný server třetí strany. Putuje přímo z vašeho prohlížeče do každé vybrané sociální sítě, přesně jako byste je tam sami napsali a odeslali.","dataLi1":"Text, obrázky a video příspěvků jsou předávány pouze na vámi zvolené stránky SNS (X, Bluesky, Threads, Mastodon, Misskey, Tumblr, Pixiv, DeviantArt, Instagram, TikTok, YouTube) uvnitř vašeho prohlížeče.","dataLi2":"Když je volitelná cesta oficiálního API povolena pro Bluesky / Mastodon / Misskey, příspěvky jsou odesílány přímo z vašeho prohlížeče na <strong>vlastní API server této SNS</strong> pomocí přihlašovacích údajů, které jste poskytli v Nastavení. Žádný server Tutti / vývojáře není zapojen.","dataLi3":"Nejsou shromažďována žádná analytická, sledovací ani reklamní data.","dataLi4":"Tutti <strong>nečte</strong> ani neukládá vaše ověřovací tokeny, soubory cookie ani data relace ze stránek SNS.","h3Report":"Výjimka — ruční hlášení chyb (souhlas na klik)","reportIntro":"Když (a pouze když) stisknete <strong>tlačítko &bdquo;Nahlásit&ldquo;</strong> zobrazené v dialogu chyby nebo panelu diagnostiky, je následující odesláno přes relé Cloudflare Workers do <strong>privátního trackeru issue GitHub</strong> (<code>komm64/tutti-issues</code>, viditelného pouze vývojáři Tutti):","reportLi1":"Chybová zpráva, verze rozšíření, řetězec User-Agent prohlížeče.","reportLi2":"Posledních 30 záznamů z vnitřního logu rozšíření (úroveň logu, kterou jste nastavili; výchozí INFO). Obsah příspěvků, obrázky, video, přihlašovací data SNS a přihlašovací údaje API <strong>nikdy</strong> nejsou zahrnuty.","reportLi3":"Redigovaný DOM snapshot karty SNS, kde došlo k chybě, používaný k opravě poškozených selektorů. Textový obsah, hodnoty atributů, cesty/dotazy/fragmenty URL, atributy <code>href</code>/<code>src</code> a tagy <code>&lt;meta&gt;</code>/<code>&lt;link&gt;</code> jsou odstraněny. Užitečné zatížení je omezeno na 8 KB. Implementaci viz <a href=\"https://github.com/komm64/tutti/blob/main/src/utils/dom-snapshot.ts\">dom-snapshot.ts</a>.","reportOutro":"Nic se neodesílá, dokud nestisknete tlačítko hlášení. Cílové místo je privátní, viditelné pouze vývojáři Tutti.","h2Local":"2. Lokálně ukládaná data","localIntro":"Následující se ukládá pouze uvnitř vašeho prohlížeče prostřednictvím API <code>storage</code> Chrome. Nic není přenášeno mimo zařízení Tutti.","localSettings":"<strong>Nastavení</strong> (<code>chrome.storage.sync</code>): URL instancí Mastodon / Misskey, přepínač autoPost, režim zobrazení, URL přepsání selektorů atd. Může být replikováno na vaše další zařízení přes Chrome Sync, pokud jste přihlášeni do Chrome.","localDrafts":"<strong>Koncepty</strong> (<code>chrome.storage.session</code>): Text rozepsaného příspěvku a připojená média (obrázky / video). Automaticky se vymaže při ukončení prohlížeče.","localSelected":"<strong>Vybrané SNS</strong> (<code>chrome.storage.local</code>): SNS, které jste zaškrtli jako cíle publikování. Zachovává se mezi relacemi pro pohodlí; pouze lokálně na zařízení.","localUsers":"<strong>Posledně viděná uživatelská jména</strong> (<code>chrome.storage.local</code>): Aktuálně přihlášené uživatelské jméno na každé SNS, zobrazované v popup, abyste mohli potvrdit, který účet obdrží příspěvek. Pouze lokálně na zařízení.","localHistory":"<strong>Historie příspěvků</strong> (<code>chrome.storage.local</code>): Posledních 20 příspěvků: prvních 80 znaků textu, cílové platformy, úspěch/selhání na platformu a časové razítko. Pouze lokálně na zařízení.","localCreds":"<strong>Přihlašovací údaje API</strong> (<code>chrome.storage.local</code>): Pouze pokud jste explicitně povolili cestu oficiálního API pro Bluesky / Mastodon / Misskey: vaše Bluesky app password nebo přístupový token Mastodon / Misskey. <strong>Pouze lokálně na zařízení; nikdy nereplikováno přes Chrome Sync; nikdy nepřenášeno na žádný vývojářský server.</strong> Lze odebrat z průvodce Nastavení.","localSelectors":"<strong>Cache přepsání selektorů</strong> (<code>chrome.storage.local</code>): Data hot-fixu selektorů získaná z URL, kterou jste nakonfigurovali v Nastavení (výchozí: veřejný <code>selectors.json</code> na GitHub Pages Tutti).","localVideoCap":"<strong>Cache limitu nahrávání videa</strong> (<code>chrome.storage.local</code>): Výsledek API sond pro limity nahrávání videa na účet (např. Bluesky). Pouze číselné hodnoty; žádné přihlašovací údaje.","localWipe":"Vše lze kdykoli vymazat odinstalováním rozšíření nebo vymazáním úložiště rozšíření Chrome.","h2Perms":"3. Použitá oprávnění","permsThead1":"Oprávnění","permsThead2":"Účel","permsStorage":"Ukládat výše uvedená lokální data (nastavení, koncepty, historie, vybrané platformy atd.) uvnitř vašeho prohlížeče.","permsOffscreen":"Spouštět <code>ffmpeg.wasm</code> v offscreen dokumentu pro kompresi / překódování videosouborů, když zdroj překračuje limit velikosti cílové SNS. Videodata jsou zpracovávána pouze lokálně; Tutti je nikam nepřenáší.","permsSidePanel":"Volitelný režim zobrazení UI: zobrazuje formulář pro vytvoření příspěvku Tutti v bočním panelu Chrome místo akčního popup, takže zůstane otevřený při přepínání mezi kartami SNS. Aktivujete jej ze stránky Možnosti; výchozí je standardní popup.","permsHost":"Vkládat content scripts na každý web SNS (x.com / twitter.com / bsky.app / bsky.social / threads.net / threads.com / mastodon.social / misskey.io / tumblr.com / pixiv.net / tiktok.com / youtube.com / instagram.com / deviantart.com) pro vyplnění formuláře pro vytvoření příspěvku obsahem vašeho příspěvku a jeho odeslání vaším jménem. Z těchto webů se nečtou žádná data ani se neodesílají jinam; content script pouze zapisuje váš vlastní vstup.","permsOptHost":"Požadováno za běhu pouze pokud nakonfigurujete vlastní URL instance Mastodon nebo Misskey (jinou než výchozí). Chrome v tu chvíli zobrazí standardní výzvu k udělení oprávnění.","h2Relationship":"4. Vztah s poskytovateli SNS","relationshipBody":"Tutti automatizuje webové UI (nebo volitelně publikuje přes oficiální API) 11 podporovaných sítí. Toto je neoficiální funkčnost; Tutti není přidružen k X, Bluesky, Meta (Threads / Instagram), Mastodon gGmbH, Misskey, Tumblr, Pixiv, DeviantArt, TikTok ani YouTube. Stále se vás týkají vlastní podmínky použití každé služby.","h2Contact":"5. Kontakt","contactGitHub":"GitHub Issues:","contactEmail":"E-mail:","h2Changes":"6. Změny těchto zásad","changesBody":"Aktualizace těchto zásad jsou oznamovány aktualizací této stránky a kanonického zdrojového souboru (<a href=\"https://github.com/komm64/tutti/blob/main/PRIVACY.md\">PRIVACY.md</a>)."},"support":{"title":"Tutti — Podpora","headerTagline":"Zdroje podpory a FAQ","h2Help":"Potřebujete pomoc?","h3Failed":"1. Publikování selhalo / něco se chová zvláštně","failedBody":"Použijte <strong>tlačítko &bdquo;Diagnóza&ldquo; → &bdquo;Nahlásit&ldquo; uvnitř popupu</strong>. Toto je kanonický kanál. Hlášení je redigováno (handles, URL, e-maily) a předáno do našeho privátního trackeru issue, kde se automaticky otevře PR s opravou selektoru a v řádu dní se rozešle jako hot-fix všem uživatelům.","calloutTitle":"Proč použít tlačítko hlášení vestavěné v produktu?","calloutBody":"Tok hlášení popupu automaticky připojuje konečný stav vytváření, redigovaný DOM snapshot a výsledky auditu selektorů — přesně to, co je potřeba k rychlému opravení rozbití selektorů. PII se odstraňuje skrz více vrstev před odesláním.","h3General":"2. Obecné otázky / žádosti o funkce","generalBody":"Napište nám na <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>. Toto je privátní kanál, bezpečný pro sdílení snímků obrazovky / osobních handles.","h3Install":"3. Otázky o instalaci / účtu","installBody":"Tutti <strong>znovu využívá vaše stávající přihlášení v prohlížeči</strong> pro každou sociální síť. Není žádný oddělený účet Tutti ani krok přihlášení. Jakmile jste přihlášeni do sociální sítě ve stejném profilu Chrome, Tutti odtamtud může publikovat.","h2Faq":"FAQ","q1":"O. Moje publikování selhalo.","a1":"Toto obvykle znamená, že sociální síť změnila své DOM. Použijte <strong>Diagnóza → Nahlásit</strong> v popupu. Hot-fix selektoru se obvykle dodává v řádu dní přes automatickou aktualizaci <code>selectors.json</code> (aktualizace rozšíření není nutná).","q2":"O. Tutti si nepamatuje moje přihlášení.","a2":"Tutti spoléhá na běžné přihlášení v prohlížeči pro síť. Nejprve se přihlaste do každé sítě v Chrome, pak může Tutti publikovat vaším jménem. Anonymní režim nefunguje, protože tam nejsou relace sítě.","q3":"O. Limity znaků se mezi sítěmi liší — je to problém?","a3":"Ne. Dlouhé příspěvky překračující limit znaků sítě jsou automaticky rozděleny do pokračovacího vlákna (na X správný řetězec odpovědí; v jiných sítích sekvenční příspěvky). Příspěvky v rámci limitu projdou tak, jak jsou.","q4":"O. Říká se mi, že můj obrázek / video je příliš velký.","a4":"Obrázky jsou automaticky zmenšovány přes Canvas, aby vyhovovaly limitu velikosti každé sítě. Videa jsou automaticky komprimována ffmpeg.wasm, když jsou nad limitem sítě. Pokud ani komprese nevyhoví, uvidíte chybu — prosím nejprve ověřte, že se soubor nahraje přes nativní aplikaci sítě.","q5":"O. Vidí Tutti obsah mých příspěvků?","a5":"Ne. Obsah příspěvků nikdy neprochází serverem třetí strany. Tutti se vkládá přímo na webovou stránku vytváření příspěvků každé sítě. Podrobnosti viz naše <a href=\"./privacy.html\">Zásady ochrany soukromí</a>. Jediná výjimka je, když stisknete tlačítko hlášení vestavěné v produktu, které odešle redigované informace o chybě do našeho privátního trackeru issue.","q6":"O. Mohu darovat?","a6":"Ještě ne — pracujeme na kanálu podpory bez tlaku. Největším probíhajícím nákladem je udržovat krok se změnami UI každé sociální sítě; budoucí toky Ko-fi budou tuto údržbu financovat."}},"da":{"lang":"da","common":{"appName":"Tutti","tagline":"Én Chrome-udvidelse. Elleve sociale netværk. Nul besvær.","navHome":"Hjem","navGitHub":"GitHub","navSupport":"Support","navPrivacy":"Privatlivspolitik","navLanguages":"Andre sprog","footerCopy":"&copy; 2026 komm64 &mdash; <a href=\"https://github.com/komm64/tutti/blob/main/LICENSE\">Alle rettigheder forbeholdes</a>","footerContact":"Tutti er en Chrome-udvidelse af <a href=\"https://github.com/komm64\">komm64</a>. Kontakt: <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>"},"index":{"title":"Tutti — Krydsposting-udvidelse","headerTagline":"Én Chrome-udvidelse. Elleve sociale netværk. Nul besvær.","h2Overview":"Oversigt","overviewBody":"Tutti udsender det samme opslag til 11 sociale netværk (X, Bluesky, Threads, Tumblr, Mastodon, Misskey, Pixiv, TikTok, YouTube Shorts, Instagram, DeviantArt) med ét klik. Den har ingen backend; opslagsindhold passerer aldrig gennem nogen tredjepartsserver.","h2PrivacySummary":"Privatliv i én sætning","privacySummaryBody":"Tutti har ingen backend-server. Opslagsindhold (tekst, billeder, video) går direkte fra din browser til hvert socialt netværk, du vælger — aldrig via en server kontrolleret af udvikleren.","privacyFullPolicy":"Fuld politik:"},"privacy":{"title":"Tutti — Privatlivspolitik","headerTagline":"Ingen tredjeparts dataindsamling. Alt opslagsindhold går direkte fra din browser til hvert SNS.","lastUpdated":"Sidst opdateret: 2026-05-23 (v0.5.0)","h2Data":"1. Data, vi indsamler og transmitterer","dataIntro":"<strong>Tutti har ingen backend-server.</strong> Opslagsindhold (tekst, billeder, video) transmitteres aldrig til nogen tredjepartsserver. Det rejser direkte fra din browser til hvert socialt netværk, du vælger, nøjagtig som hvis du selv havde indtastet og indsendt det der.","dataLi1":"Opslagets tekst, billeder og video sendes kun til de SNS-sider, du vælger (X, Bluesky, Threads, Mastodon, Misskey, Tumblr, Pixiv, DeviantArt, Instagram, TikTok, YouTube) inden for din browser.","dataLi2":"Når den valgfri officielle API-sti er aktiveret for Bluesky / Mastodon / Misskey, sendes opslag direkte fra din browser til <strong>det SNS's egen API-server</strong> ved hjælp af de legitimationsoplysninger, du har angivet i Indstillinger. Ingen Tutti- / udviklerserver er involveret.","dataLi3":"Der indsamles ingen analyse-, sporings- eller annoncedata.","dataLi4":"Tutti læser eller gemmer <strong>ikke</strong> dine autentificeringstokens, cookies eller sessionsdata fra SNS-sites.","h3Report":"Undtagelse — manuelle fejlrapporter (samtykke pr. klik)","reportIntro":"Når (og kun når) du trykker på <strong>knappen &laquo;Rapporter&raquo;</strong>, der vises i en fejldialog eller diagnosepanelet, sendes følgende via et Cloudflare Workers-relay til en <strong>privat GitHub-issue-tracker</strong> (<code>komm64/tutti-issues</code>, kun synlig for Tutti-udvikleren):","reportLi1":"Fejlmeddelelsen, udvidelsesversionen, browserens User-Agent-streng.","reportLi2":"De sidste 30 poster i udvidelsens interne log (det logniveau, du har konfigureret; INFO som standard). Opslagsindhold, billeder, video, SNS-loginoplysninger og API-legitimationsoplysninger inkluderes <strong>aldrig</strong>.","reportLi3":"Et redigeret DOM-snapshot af SNS-fanen, hvor fejlen opstod, brugt til at reparere ødelagte selektorer. Tekstindhold, attributværdier, URL-stier/-forespørgsler/-fragmenter, <code>href</code>/<code>src</code>-attributter og <code>&lt;meta&gt;</code>/<code>&lt;link&gt;</code>-tags fjernes. Nyttelasten er begrænset til 8 KB. Se <a href=\"https://github.com/komm64/tutti/blob/main/src/utils/dom-snapshot.ts\">dom-snapshot.ts</a> for implementeringen.","reportOutro":"Intet sendes, før du trykker på rapporteringsknappen. Destinationen er privat og kun synlig for Tutti-udvikleren.","h2Local":"2. Lokalt lagrede data","localIntro":"Følgende lagres kun i din browser via Chromes <code>storage</code>-API. Intet transmitteres uden for enheden af Tutti.","localSettings":"<strong>Indstillinger</strong> (<code>chrome.storage.sync</code>): Mastodon-/Misskey-instans-URL'er, autoPost-skifter, visningstilstand, selector-overstyrings-URL osv. Kan replikeres til dine andre enheder via Chrome Sync, hvis du er logget ind på Chrome.","localDrafts":"<strong>Kladder</strong> (<code>chrome.storage.session</code>): Igangværende opslagstekst og vedhæftede medier (billeder / video). Ryddes automatisk, når browseren afsluttes.","localSelected":"<strong>Valgte SNS</strong> (<code>chrome.storage.local</code>): De SNS, du har markeret som opslagsmål. Bevares mellem sessioner for nemheds skyld; kun lokalt på enheden.","localUsers":"<strong>Sidst sete brugernavne</strong> (<code>chrome.storage.local</code>): Det brugernavn, der i øjeblikket er logget ind på hvert SNS, vist i popupen, så du kan bekræfte, hvilken konto der modtager opslaget. Kun lokalt på enheden.","localHistory":"<strong>Opslagshistorik</strong> (<code>chrome.storage.local</code>): De seneste 20 opslag: de første 80 tegn af teksten, målplatforme, succes/fejl pr. platform og tidsstempel. Kun lokalt på enheden.","localCreds":"<strong>API-legitimationsoplysninger</strong> (<code>chrome.storage.local</code>): Kun hvis du udtrykkeligt har aktiveret den officielle API-sti for Bluesky / Mastodon / Misskey: dit Bluesky app password eller Mastodon-/Misskey-adgangstoken. <strong>Kun lokalt på enheden; replikeres aldrig via Chrome Sync; transmitteres aldrig til nogen udviklerserver.</strong> Kan fjernes fra Indstillinger-guiden.","localSelectors":"<strong>Cache for selector-overstyringer</strong> (<code>chrome.storage.local</code>): Selector-hotfix-data hentet fra den URL, du har konfigureret i Indstillinger (standard: den offentlige <code>selectors.json</code> på Tuttis GitHub Pages).","localVideoCap":"<strong>Cache for video-uploadgrænse</strong> (<code>chrome.storage.local</code>): Resultat af API-sonderinger for video-uploadgrænser pr. konto (f.eks. Bluesky). Kun numeriske værdier; ingen legitimationsoplysninger.","localWipe":"Alt dette kan slettes når som helst ved at afinstallere udvidelsen eller rydde Chromes udvidelseslager.","h2Perms":"3. Anvendte tilladelser","permsThead1":"Tilladelse","permsThead2":"Formål","permsStorage":"Lagre ovenstående lokale data (indstillinger, kladder, historik, valgte platforme osv.) i din browser.","permsOffscreen":"Køre <code>ffmpeg.wasm</code> i et offscreen-dokument for at komprimere / omkode videofiler, når kilden overskrider mål-SNS'ets størrelsesgrænse. Videodata behandles kun lokalt; transmitteres ingen steder af Tutti.","permsSidePanel":"Valgfri UI-visningstilstand: viser Tuttis kompositionsformular i Chromes sidepanel i stedet for handlings-popupen, så den forbliver åben, mens du skifter mellem SNS-faner. Du tilvælger dette fra Indstillinger-siden; standardværdien er standard-popupen.","permsHost":"Injicere content scripts på hvert SNS-site (x.com / twitter.com / bsky.app / bsky.social / threads.net / threads.com / mastodon.social / misskey.io / tumblr.com / pixiv.net / tiktok.com / youtube.com / instagram.com / deviantart.com) for at udfylde kompositionsformularen med dit opslagsindhold og indsende det på dine vegne. Ingen data læses fra disse sites og sendes andre steder; content-scriptet skriver kun din egen indtastning.","permsOptHost":"Anmodes om ved runtime, kun hvis du konfigurerer en tilpasset Mastodon- eller Misskey-instans-URL (andet end standardværdierne). Chrome viser standardprompten for tilladelse på det tidspunkt.","h2Relationship":"4. Forhold til SNS-udbyderne","relationshipBody":"Tutti automatiserer web-UI'en til (eller, valgfrit, poster via det officielle API for) de 11 understøttede netværk. Dette er uofficiel funktionalitet; Tutti er ikke tilknyttet X, Bluesky, Meta (Threads / Instagram), Mastodon gGmbH, Misskey, Tumblr, Pixiv, DeviantArt, TikTok eller YouTube. Du er stadig bundet af hver tjenestes egne vilkår for brug.","h2Contact":"5. Kontakt","contactGitHub":"GitHub Issues:","contactEmail":"E-mail:","h2Changes":"6. Ændringer af denne politik","changesBody":"Opdateringer af denne politik kommunikeres ved at opdatere denne side og den kanoniske kildefil (<a href=\"https://github.com/komm64/tutti/blob/main/PRIVACY.md\">PRIVACY.md</a>)."},"support":{"title":"Tutti — Support","headerTagline":"Supportressourcer og FAQ","h2Help":"Brug for hjælp?","h3Failed":"1. Opslag mislykkedes / noget opfører sig mærkeligt","failedBody":"Brug <strong>knappen &laquo;Diagnosticer&raquo; → &laquo;Rapporter&raquo; inde i popupen</strong>. Dette er den kanoniske kanal. Rapporten redigeres (håndtag, URL'er, e-mails) og videresendes til vores private issue-tracker, hvor en selector-fix PR åbnes automatisk og pushes som hotfix til alle brugere inden for få dage.","calloutTitle":"Hvorfor bruge rapporteringsknappen i produktet?","calloutBody":"Popupens rapporteringsflow vedhæfter automatisk den endelige kompositionstilstand, et redigeret DOM-snapshot og selector-auditresultater — præcis hvad der er nødvendigt for hurtigt at rette selector-brud. PII fjernes gennem flere lag før afsendelse.","h3General":"2. Generelle spørgsmål / funktionsanmodninger","generalBody":"Send os en e-mail på <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>. Dette er en privat kanal, sikker at dele skærmbilleder / personlige håndtag med.","h3Install":"3. Installations- / kontospørgsmål","installBody":"Tutti <strong>genbruger dine eksisterende browser-logins</strong> for hvert socialt netværk. Der er ingen separat Tutti-konto eller login-trin. Når du er logget ind på et socialt netværk i den samme Chrome-profil, kan Tutti poste derfra.","h2Faq":"FAQ","q1":"S. Mit opslag mislykkedes.","a1":"Dette betyder normalt, at et socialt netværk har ændret sit DOM. Brug <strong>Diagnosticer → Rapporter</strong> i popupen. En selector-hotfix leveres normalt inden for få dage via den automatiske opdatering af <code>selectors.json</code> (ingen udvidelsesopdatering kræves).","q2":"S. Tutti husker ikke mit login.","a2":"Tutti er afhængig af netværkets normale browser-login. Log først ind på hvert netværk i Chrome, så kan Tutti poste på dine vegne. Inkognitotilstand virker ikke, fordi netværkets sessioner ikke er der.","q3":"S. Tegngrænser varierer pr. netværk — er det et problem?","a3":"Nej. Lange opslag, der overskrider et netværks tegngrænse, opdeles automatisk i en fortsættelses-tråd (på X en ordentlig svar-kæde; på andre netværk sekventielle opslag). Opslag inden for grænsen går igennem, som de er.","q4":"S. Jeg får at vide, at mit billede / min video er for stor.","a4":"Billeder ændres automatisk i størrelse via Canvas, så de passer til hvert netværks størrelsesgrænse. Videoer komprimeres automatisk med ffmpeg.wasm, når de er over et netværks grænse. Hvis selv komprimering ikke passer, vil du se en fejl — bekræft først, at filen uploader via netværkets oprindelige app.","q5":"S. Ser Tutti mit opslagsindhold?","a5":"Nej. Opslagsindhold passerer aldrig gennem en tredjepartsserver. Tutti injicerer direkte i hvert netværks web-kompositionsside. Se vores <a href=\"./privacy.html\">Privatlivspolitik</a> for detaljer. Den eneste undtagelse er, når du trykker på den indbyggede rapporteringsknap, som sender redigeret fejlinformation til vores private issue-tracker.","q6":"S. Kan jeg donere?","a6":"Ikke endnu — vi arbejder på en lavtrykskanal til støtte. Den største løbende omkostning er at holde trit med hvert socialt netværks UI-ændringer; fremtidige Ko-fi-flows vil finansiere den vedligeholdelse."}},"de":{"lang":"de","common":{"appName":"Tutti","tagline":"Eine Chrome-Erweiterung. Elf soziale Netzwerke. Null Aufwand.","navHome":"Startseite","navGitHub":"GitHub","navSupport":"Support","navPrivacy":"Datenschutzerklärung","navLanguages":"Andere Sprachen","footerCopy":"&copy; 2026 komm64 &mdash; <a href=\"https://github.com/komm64/tutti/blob/main/LICENSE\">Alle Rechte vorbehalten</a>","footerContact":"Tutti ist eine Chrome-Erweiterung von <a href=\"https://github.com/komm64\">komm64</a>. Kontakt: <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>"},"index":{"title":"Tutti — Cross-Post-Erweiterung","headerTagline":"Eine Chrome-Erweiterung. Elf soziale Netzwerke. Null Aufwand.","h2Overview":"Überblick","overviewBody":"Tutti verteilt denselben Beitrag mit einem Klick an 11 soziale Netzwerke (X, Bluesky, Threads, Tumblr, Mastodon, Misskey, Pixiv, TikTok, YouTube Shorts, Instagram, DeviantArt). Es hat kein Backend; Beitragsinhalte laufen nie über einen Drittserver.","h2PrivacySummary":"Datenschutz in einem Satz","privacySummaryBody":"Tutti hat keinen Backend-Server. Beitragsinhalte (Text, Bilder, Video) gehen direkt von Ihrem Browser an jedes ausgewählte soziale Netzwerk — niemals über einen vom Entwickler kontrollierten Server.","privacyFullPolicy":"Vollständige Richtlinie:"},"privacy":{"title":"Tutti — Datenschutzerklärung","headerTagline":"Keine Drittanbieter-Datenerfassung. Alle Beitragsinhalte gehen direkt von Ihrem Browser an jedes SNS.","lastUpdated":"Zuletzt aktualisiert: 2026-05-23 (v0.5.0)","h2Data":"1. Erhobene und übermittelte Daten","dataIntro":"<strong>Tutti hat keinen Backend-Server.</strong> Beitragsinhalte (Text, Bilder, Video) werden niemals an einen Drittserver übermittelt. Sie wandern direkt von Ihrem Browser zu jedem ausgewählten sozialen Netzwerk, genau so, als hätten Sie sie dort selbst eingegeben und gesendet.","dataLi1":"Beitragstext, Bilder und Video werden ausschließlich an die von Ihnen gewählten SNS-Seiten (X, Bluesky, Threads, Mastodon, Misskey, Tumblr, Pixiv, DeviantArt, Instagram, TikTok, YouTube) innerhalb Ihres Browsers weitergegeben.","dataLi2":"Wenn der optionale offizielle API-Pfad für Bluesky / Mastodon / Misskey aktiviert ist, werden Beiträge unter Verwendung der in den Einstellungen hinterlegten Zugangsdaten direkt aus Ihrem Browser an den <strong>eigenen API-Server dieses SNS</strong> gesendet. Kein Tutti- / Entwickler-Server ist beteiligt.","dataLi3":"Es werden keine Analyse-, Tracking- oder Werbedaten erfasst.","dataLi4":"Tutti liest oder speichert <strong>keine</strong> Authentifizierungstoken, Cookies oder Sitzungsdaten von den SNS-Seiten.","h3Report":"Ausnahme — manuelle Fehlerberichte (Zustimmung pro Klick)","reportIntro":"Wenn (und nur wenn) Sie auf den <strong>Schaltfläche &bdquo;Melden&ldquo;</strong> in einem Fehlerdialog oder im Diagnosepanel klicken, wird Folgendes über ein Cloudflare Workers-Relay an einen <strong>privaten GitHub-Issue-Tracker</strong> (<code>komm64/tutti-issues</code>, nur für den Tutti-Entwickler einsehbar) gesendet:","reportLi1":"Die Fehlermeldung, die Erweiterungsversion, der User-Agent-String des Browsers.","reportLi2":"Die letzten 30 Einträge des internen Erweiterungslogs (das von Ihnen konfigurierte Log-Level; standardmäßig INFO). Beitragsinhalte, Bilder, Video, SNS-Anmeldedaten und API-Zugangsdaten werden <strong>niemals</strong> einbezogen.","reportLi3":"Ein redigierter DOM-Snapshot des SNS-Tabs, in dem der Fehler aufgetreten ist, zur Reparatur defekter Selektoren. Textinhalte, Attributwerte, URL-Pfade/-Abfragen/-Fragmente, <code>href</code>/<code>src</code>-Attribute und <code>&lt;meta&gt;</code>/<code>&lt;link&gt;</code>-Tags werden entfernt. Die Nutzlast ist auf 8 KB begrenzt. Siehe <a href=\"https://github.com/komm64/tutti/blob/main/src/utils/dom-snapshot.ts\">dom-snapshot.ts</a> für die Implementierung.","reportOutro":"Nichts wird gesendet, bevor Sie die Melden-Schaltfläche drücken. Das Ziel ist privat, nur für den Tutti-Entwickler einsehbar.","h2Local":"2. Lokal gespeicherte Daten","localIntro":"Folgendes wird ausschließlich innerhalb Ihres Browsers über die <code>storage</code>-API von Chrome gespeichert. Tutti übermittelt nichts vom Gerät weg.","localSettings":"<strong>Einstellungen</strong> (<code>chrome.storage.sync</code>): Mastodon-/Misskey-Instanz-URLs, autoPost-Schalter, Anzeigemodus, Selector-Override-URL usw. Kann über Chrome Sync auf Ihre anderen Geräte repliziert werden, wenn Sie in Chrome angemeldet sind.","localDrafts":"<strong>Entwürfe</strong> (<code>chrome.storage.session</code>): In Bearbeitung befindlicher Beitragstext und angehängte Medien (Bilder / Video). Wird beim Beenden des Browsers automatisch gelöscht.","localSelected":"<strong>Ausgewählte SNS</strong> (<code>chrome.storage.local</code>): Die als Veröffentlichungsziele angehakten SNS. Bleibt der Bequemlichkeit halber sitzungsübergreifend bestehen; nur gerätelokal.","localUsers":"<strong>Zuletzt gesehene Benutzernamen</strong> (<code>chrome.storage.local</code>): Der aktuell angemeldete Benutzername bei jedem SNS, im Popup angezeigt, damit Sie bestätigen können, welches Konto den Beitrag erhalten wird. Nur gerätelokal.","localHistory":"<strong>Beitragsverlauf</strong> (<code>chrome.storage.local</code>): Die letzten 20 Beiträge: erste 80 Zeichen des Textes, Zielplattformen, Erfolg/Misserfolg pro Plattform und Zeitstempel. Nur gerätelokal.","localCreds":"<strong>API-Zugangsdaten</strong> (<code>chrome.storage.local</code>): Nur wenn Sie den offiziellen API-Pfad für Bluesky / Mastodon / Misskey ausdrücklich aktiviert haben: Ihr Bluesky App-Passwort oder Mastodon-/Misskey-Access-Token. <strong>Nur gerätelokal; niemals über Chrome Sync repliziert; niemals an einen Entwicklerserver übermittelt.</strong> Über den Einstellungsassistenten entfernbar.","localSelectors":"<strong>Selector-Override-Cache</strong> (<code>chrome.storage.local</code>): Selector-Hotfix-Daten, die von der in den Einstellungen konfigurierten URL abgerufen werden (Standard: die öffentliche <code>selectors.json</code> auf Tuttis GitHub Pages).","localVideoCap":"<strong>Video-Upload-Limit-Cache</strong> (<code>chrome.storage.local</code>): Ergebnis von API-Abfragen für Video-Upload-Obergrenzen pro Konto (z. B. Bluesky). Nur numerische Werte; keine Zugangsdaten.","localWipe":"All das kann jederzeit gelöscht werden, indem Sie die Erweiterung deinstallieren oder den Speicher der Chrome-Erweiterungen leeren.","h2Perms":"3. Verwendete Berechtigungen","permsThead1":"Berechtigung","permsThead2":"Zweck","permsStorage":"Die oben genannten lokalen Daten (Einstellungen, Entwürfe, Verlauf, ausgewählte Plattformen usw.) innerhalb Ihres Browsers speichern.","permsOffscreen":"<code>ffmpeg.wasm</code> in einem Offscreen-Dokument ausführen, um Videodateien zu komprimieren / neu zu kodieren, wenn die Quelle die Größenbeschränkung des Ziel-SNS überschreitet. Videodaten werden ausschließlich lokal verarbeitet; werden von Tutti nirgendwohin übertragen.","permsSidePanel":"Optionaler UI-Anzeigemodus: Zeigt Tuttis Formular zur Beitragserstellung in der Seitenleiste von Chrome statt im Aktions-Popup an, damit es geöffnet bleibt, während Sie zwischen SNS-Tabs wechseln. Sie aktivieren dies über die Optionsseite; Standard ist das normale Popup.","permsHost":"Content Scripts in jede SNS-Site (x.com / twitter.com / bsky.app / bsky.social / threads.net / threads.com / mastodon.social / misskey.io / tumblr.com / pixiv.net / tiktok.com / youtube.com / instagram.com / deviantart.com) injizieren, um das Formular zur Beitragserstellung mit Ihrem Beitragsinhalt zu füllen und in Ihrem Namen abzusenden. Es werden keine Daten von diesen Sites gelesen und woandershin gesendet; das Content Script schreibt nur Ihre eigene Eingabe.","permsOptHost":"Wird zur Laufzeit nur angefordert, wenn Sie eine benutzerdefinierte Mastodon- oder Misskey-Instanz-URL (außer den Standardwerten) konfigurieren. Chrome zeigt zu diesem Zeitpunkt die Standard-Berechtigungsabfrage an.","h2Relationship":"4. Beziehung zu den SNS-Anbietern","relationshipBody":"Tutti automatisiert die Web-UI (bzw. veröffentlicht optional über die offizielle API) der 11 unterstützten Netzwerke. Dies ist eine inoffizielle Funktionalität; Tutti ist weder mit X, Bluesky, Meta (Threads / Instagram), Mastodon gGmbH, Misskey, Tumblr, Pixiv, DeviantArt, TikTok noch YouTube verbunden. Sie bleiben an die jeweiligen Nutzungsbedingungen der einzelnen Dienste gebunden.","h2Contact":"5. Kontakt","contactGitHub":"GitHub Issues:","contactEmail":"E-Mail:","h2Changes":"6. Änderungen dieser Richtlinie","changesBody":"Aktualisierungen dieser Richtlinie werden durch Aktualisierung dieser Seite und der kanonischen Quelldatei (<a href=\"https://github.com/komm64/tutti/blob/main/PRIVACY.md\">PRIVACY.md</a>) bekannt gegeben."},"support":{"title":"Tutti — Support","headerTagline":"Support-Ressourcen und FAQ","h2Help":"Brauchen Sie Hilfe?","h3Failed":"1. Veröffentlichung fehlgeschlagen / etwas verhält sich seltsam","failedBody":"Verwenden Sie die <strong>Schaltfläche &bdquo;Diagnose&ldquo; → &bdquo;Melden&ldquo; im Popup</strong>. Dies ist der kanonische Kanal. Der Bericht wird redigiert (Handles, URLs, E-Mails) und an unseren privaten Issue-Tracker weitergeleitet, wo automatisch ein PR zur Selektor-Korrektur erstellt und innerhalb weniger Tage als Hotfix an alle Nutzer ausgeliefert wird.","calloutTitle":"Warum die Melden-Schaltfläche im Produkt verwenden?","calloutBody":"Der Melden-Ablauf des Popups hängt automatisch den endgültigen Erstellungszustand, einen redigierten DOM-Snapshot und die Selektor-Audit-Ergebnisse an — genau das, was zur schnellen Behebung von Selektorausfällen benötigt wird. PII wird in mehreren Schichten vor dem Senden entfernt.","h3General":"2. Allgemeine Fragen / Funktionswünsche","generalBody":"Schreiben Sie uns an <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>. Dies ist ein privater Kanal, sicher, um Screenshots / persönliche Handles zu teilen.","h3Install":"3. Fragen zur Installation / zum Konto","installBody":"Tutti <strong>nutzt Ihre bestehenden Browser-Anmeldungen wieder</strong> für jedes soziale Netzwerk. Es gibt kein separates Tutti-Konto und keinen Anmeldeschritt. Sobald Sie in demselben Chrome-Profil bei einem sozialen Netzwerk angemeldet sind, kann Tutti von dort aus veröffentlichen.","h2Faq":"FAQ","q1":"F. Meine Veröffentlichung ist fehlgeschlagen.","a1":"Das bedeutet normalerweise, dass ein soziales Netzwerk sein DOM geändert hat. Verwenden Sie <strong>Diagnose → Melden</strong> im Popup. Ein Selektor-Hotfix wird in der Regel innerhalb weniger Tage über das automatische Update von <code>selectors.json</code> ausgeliefert (kein Erweiterungs-Update erforderlich).","q2":"F. Tutti merkt sich meine Anmeldung nicht.","a2":"Tutti stützt sich auf die normale Browser-Anmeldung des Netzwerks. Melden Sie sich zuerst in Chrome bei jedem Netzwerk an, dann kann Tutti in Ihrem Namen veröffentlichen. Der Inkognito-Modus funktioniert nicht, da die Sitzungen des Netzwerks dort nicht vorhanden sind.","q3":"F. Die Zeichenbegrenzungen unterscheiden sich je nach Netzwerk — ist das ein Problem?","a3":"Nein. Lange Beiträge, die die Zeichenbegrenzung eines Netzwerks überschreiten, werden automatisch in einen Fortsetzungs-Thread aufgeteilt (bei X eine richtige Antwortkette; bei anderen Netzwerken sequentielle Beiträge). Beiträge innerhalb des Limits werden so wie sie sind durchgereicht.","q4":"F. Mir wird gesagt, dass mein Bild / Video zu groß ist.","a4":"Bilder werden über Canvas automatisch an das Größenlimit jedes Netzwerks angepasst. Videos werden mit ffmpeg.wasm automatisch komprimiert, wenn sie über dem Limit eines Netzwerks liegen. Wenn selbst die Komprimierung nicht passt, sehen Sie einen Fehler — bitte überprüfen Sie zuerst, ob die Datei über die native App des Netzwerks hochgeladen werden kann.","q5":"F. Sieht Tutti meinen Beitragsinhalt?","a5":"Nein. Beitragsinhalte laufen nie über einen Drittserver. Tutti injiziert direkt in die Web-Erstellungsseite jedes Netzwerks. Siehe unsere <a href=\"./privacy.html\">Datenschutzerklärung</a> für Details. Die einzige Ausnahme ist, wenn Sie die im Produkt integrierte Melden-Schaltfläche drücken, die redigierte Fehlerinformationen an unseren privaten Issue-Tracker sendet.","q6":"F. Kann ich spenden?","a6":"Noch nicht — wir arbeiten an einem unaufdringlichen Support-Kanal. Die größte laufende Kosten ist es, mit den UI-Änderungen jedes sozialen Netzwerks Schritt zu halten; künftige Ko-fi-Abläufe werden diese Wartung finanzieren."}},"el":{"lang":"el","common":{"appName":"Tutti","tagline":"Μία επέκταση Chrome. Έντεκα κοινωνικά δίκτυα. Μηδέν φασαρία.","navHome":"Αρχική","navGitHub":"GitHub","navSupport":"Υποστήριξη","navPrivacy":"Πολιτική απορρήτου","navLanguages":"Άλλες γλώσσες","footerCopy":"&copy; 2026 komm64 &mdash; <a href=\"https://github.com/komm64/tutti/blob/main/LICENSE\">Με επιφύλαξη παντός δικαιώματος</a>","footerContact":"Το Tutti είναι μια επέκταση Chrome από τον/την <a href=\"https://github.com/komm64\">komm64</a>. Επικοινωνία: <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>"},"index":{"title":"Tutti — Επέκταση διασταυρούμενης δημοσίευσης","headerTagline":"Μία επέκταση Chrome. Έντεκα κοινωνικά δίκτυα. Μηδέν φασαρία.","h2Overview":"Επισκόπηση","overviewBody":"Το Tutti μεταδίδει την ίδια ανάρτηση σε 11 κοινωνικά δίκτυα (X, Bluesky, Threads, Tumblr, Mastodon, Misskey, Pixiv, TikTok, YouTube Shorts, Instagram, DeviantArt) με ένα κλικ. Δεν έχει backend· το περιεχόμενο των αναρτήσεων δεν περνά ποτέ από κανέναν διακομιστή τρίτου.","h2PrivacySummary":"Απόρρητο σε μία πρόταση","privacySummaryBody":"Το Tutti δεν έχει διακομιστή backend. Το περιεχόμενο των αναρτήσεων (κείμενο, εικόνες, βίντεο) πηγαίνει απευθείας από τον περιηγητή σας σε κάθε κοινωνικό δίκτυο που επιλέγετε — ποτέ μέσω κανενός διακομιστή που ελέγχει ο προγραμματιστής.","privacyFullPolicy":"Πλήρης πολιτική:"},"privacy":{"title":"Tutti — Πολιτική απορρήτου","headerTagline":"Καμία συλλογή δεδομένων από τρίτους. Όλο το περιεχόμενο των αναρτήσεων πηγαίνει απευθείας από τον περιηγητή σας σε κάθε SNS.","lastUpdated":"Τελευταία ενημέρωση: 2026-05-23 (v0.5.0)","h2Data":"1. Δεδομένα που συλλέγουμε και μεταδίδουμε","dataIntro":"<strong>Το Tutti δεν έχει διακομιστή backend.</strong> Το περιεχόμενο των αναρτήσεων (κείμενο, εικόνες, βίντεο) δεν μεταδίδεται ποτέ σε κανέναν διακομιστή τρίτου. Ταξιδεύει απευθείας από τον περιηγητή σας σε κάθε κοινωνικό δίκτυο που επιλέγετε, ακριβώς σαν να το είχατε πληκτρολογήσει και υποβάλει εσείς εκεί.","dataLi1":"Το κείμενο, οι εικόνες και το βίντεο των αναρτήσεων παραδίδονται μόνο στις σελίδες SNS που επιλέγετε (X, Bluesky, Threads, Mastodon, Misskey, Tumblr, Pixiv, DeviantArt, Instagram, TikTok, YouTube) μέσα στον περιηγητή σας.","dataLi2":"Όταν η προαιρετική διαδρομή επίσημου API είναι ενεργοποιημένη για Bluesky / Mastodon / Misskey, οι αναρτήσεις αποστέλλονται απευθείας από τον περιηγητή σας στον <strong>δικό του διακομιστή API του εν λόγω SNS</strong> χρησιμοποιώντας τα διαπιστευτήρια που παρέχατε στις Ρυθμίσεις. Δεν εμπλέκεται κανένας διακομιστής Tutti / προγραμματιστή.","dataLi3":"Δεν συλλέγονται δεδομένα αναλυτικών στοιχείων, παρακολούθησης ή διαφήμισης.","dataLi4":"Το Tutti <strong>δεν</strong> διαβάζει ούτε αποθηκεύει τα διακριτικά ελέγχου ταυτότητας, τα cookies ή τα δεδομένα περιόδου σύνδεσής σας από τους ιστότοπους SNS.","h3Report":"Εξαίρεση — χειροκίνητες αναφορές σφαλμάτων (συναίνεση ανά κλικ)","reportIntro":"Όταν (και μόνο όταν) πατάτε το <strong>κουμπί &laquo;Αναφορά&raquo;</strong> που εμφανίζεται σε διάλογο σφάλματος ή στον πίνακα διαγνωστικών, τα ακόλουθα αποστέλλονται μέσω αναμετάδοσης Cloudflare Workers σε έναν <strong>ιδιωτικό ιχνηλάτη ζητημάτων GitHub</strong> (<code>komm64/tutti-issues</code>, ορατό μόνο στον προγραμματιστή του Tutti):","reportLi1":"Το μήνυμα σφάλματος, η έκδοση της επέκτασης, η συμβολοσειρά User-Agent του περιηγητή.","reportLi2":"Οι τελευταίες 30 καταχωρήσεις του εσωτερικού log της επέκτασης (το επίπεδο log που έχετε ρυθμίσει· INFO προεπιλογή). Το περιεχόμενο των αναρτήσεων, οι εικόνες, το βίντεο, τα δεδομένα σύνδεσης SNS και τα διαπιστευτήρια API <strong>δεν</strong> περιλαμβάνονται ποτέ.","reportLi3":"Ένα επεξεργασμένο στιγμιότυπο DOM της καρτέλας SNS όπου συνέβη το σφάλμα, που χρησιμοποιείται για την επισκευή κατεστραμμένων επιλογέων. Το περιεχόμενο κειμένου, οι τιμές χαρακτηριστικών, οι διαδρομές/ερωτήματα/τμήματα URL, τα χαρακτηριστικά <code>href</code>/<code>src</code> και οι ετικέτες <code>&lt;meta&gt;</code>/<code>&lt;link&gt;</code> αφαιρούνται. Το payload είναι περιορισμένο σε 8 KB. Δείτε το <a href=\"https://github.com/komm64/tutti/blob/main/src/utils/dom-snapshot.ts\">dom-snapshot.ts</a> για την υλοποίηση.","reportOutro":"Τίποτα δεν αποστέλλεται μέχρι να πατήσετε το κουμπί αναφοράς. Ο προορισμός είναι ιδιωτικός, ορατός μόνο στον προγραμματιστή του Tutti.","h2Local":"2. Τοπικά αποθηκευμένα δεδομένα","localIntro":"Τα ακόλουθα αποθηκεύονται μόνο μέσα στον περιηγητή σας μέσω του API <code>storage</code> του Chrome. Τίποτα δεν μεταδίδεται εκτός συσκευής από το Tutti.","localSettings":"<strong>Ρυθμίσεις</strong> (<code>chrome.storage.sync</code>): URL στιγμιοτύπων Mastodon / Misskey, διακόπτης autoPost, λειτουργία εμφάνισης, URL υπερβολής επιλογέων κ.λπ. Μπορεί να αναπαραχθεί στις άλλες συσκευές σας μέσω Chrome Sync εάν είστε συνδεδεμένος στο Chrome.","localDrafts":"<strong>Πρόχειρα</strong> (<code>chrome.storage.session</code>): Κείμενο ανάρτησης σε εξέλιξη και επισυναπτόμενα μέσα (εικόνες / βίντεο). Διαγράφεται αυτόματα κατά την έξοδο από τον περιηγητή.","localSelected":"<strong>Επιλεγμένα SNS</strong> (<code>chrome.storage.local</code>): Τα SNS που έχετε επιλέξει ως στόχους δημοσίευσης. Διατηρείται μεταξύ συνεδριών για ευκολία· μόνο τοπικά στη συσκευή.","localUsers":"<strong>Τελευταία ονόματα χρηστών που εθεάθησαν</strong> (<code>chrome.storage.local</code>): Το όνομα χρήστη που είναι συνδεδεμένο αυτή τη στιγμή σε κάθε SNS, εμφανίζεται στο popup ώστε να μπορείτε να επιβεβαιώσετε ποιος λογαριασμός θα λάβει την ανάρτηση. Μόνο τοπικά στη συσκευή.","localHistory":"<strong>Ιστορικό αναρτήσεων</strong> (<code>chrome.storage.local</code>): Οι τελευταίες 20 αναρτήσεις: οι πρώτοι 80 χαρακτήρες κειμένου, οι πλατφόρμες-στόχοι, επιτυχία/αποτυχία ανά πλατφόρμα και χρονοσφραγίδα. Μόνο τοπικά στη συσκευή.","localCreds":"<strong>Διαπιστευτήρια API</strong> (<code>chrome.storage.local</code>): Μόνο αν έχετε ενεργοποιήσει ρητά τη διαδρομή επίσημου API για Bluesky / Mastodon / Misskey: το Bluesky app password σας ή το διακριτικό πρόσβασης Mastodon / Misskey. <strong>Μόνο τοπικά στη συσκευή· ποτέ δεν αναπαράγεται μέσω Chrome Sync· ποτέ δεν μεταδίδεται σε κανέναν διακομιστή προγραμματιστή.</strong> Αφαιρείται από τον οδηγό Ρυθμίσεων.","localSelectors":"<strong>Cache υπερβολής επιλογέων</strong> (<code>chrome.storage.local</code>): Δεδομένα hot-fix επιλογέων που λαμβάνονται από το URL που έχετε ρυθμίσει στις Ρυθμίσεις (προεπιλογή: το δημόσιο <code>selectors.json</code> στις GitHub Pages του Tutti).","localVideoCap":"<strong>Cache ορίου μεταφόρτωσης βίντεο</strong> (<code>chrome.storage.local</code>): Αποτέλεσμα ελέγχων API για όρια μεταφόρτωσης βίντεο ανά λογαριασμό (π.χ. Bluesky). Μόνο αριθμητικές τιμές· χωρίς διαπιστευτήρια.","localWipe":"Όλα αυτά μπορούν να διαγραφούν ανά πάσα στιγμή με την απεγκατάσταση της επέκτασης ή την εκκαθάριση του χώρου αποθήκευσης επεκτάσεων του Chrome.","h2Perms":"3. Χρησιμοποιούμενα δικαιώματα","permsThead1":"Δικαίωμα","permsThead2":"Σκοπός","permsStorage":"Αποθήκευση των παραπάνω τοπικών δεδομένων (ρυθμίσεις, πρόχειρα, ιστορικό, επιλεγμένες πλατφόρμες κ.λπ.) μέσα στον περιηγητή σας.","permsOffscreen":"Εκτέλεση του <code>ffmpeg.wasm</code> σε ένα έγγραφο offscreen για συμπίεση / επανακωδικοποίηση αρχείων βίντεο όταν η πηγή υπερβαίνει το όριο μεγέθους του SNS προορισμού. Τα δεδομένα βίντεο επεξεργάζονται μόνο τοπικά· δεν μεταδίδονται πουθενά από το Tutti.","permsSidePanel":"Προαιρετική λειτουργία εμφάνισης UI: εμφανίζει τη φόρμα σύνθεσης του Tutti στον πλευρικό πίνακα του Chrome αντί του popup ενέργειας, ώστε να παραμένει ανοιχτή ενώ μεταβαίνετε μεταξύ καρτελών SNS. Επιλέγετε από τη σελίδα Επιλογών· η προεπιλογή είναι το τυπικό popup.","permsHost":"Έγχυση content scripts σε κάθε ιστότοπο SNS (x.com / twitter.com / bsky.app / bsky.social / threads.net / threads.com / mastodon.social / misskey.io / tumblr.com / pixiv.net / tiktok.com / youtube.com / instagram.com / deviantart.com) για να συμπληρώνει τη φόρμα σύνθεσης με το περιεχόμενο της ανάρτησής σας και να την υποβάλλει για λογαριασμό σας. Δεν διαβάζονται δεδομένα από αυτούς τους ιστότοπους και δεν αποστέλλονται αλλού· το content script γράφει μόνο τη δική σας είσοδο.","permsOptHost":"Ζητείται κατά την εκτέλεση μόνο εάν διαμορφώσετε ένα προσαρμοσμένο URL στιγμιοτύπου Mastodon ή Misskey (διαφορετικό από τις προεπιλογές). Το Chrome εμφανίζει την τυπική προτροπή δικαιωμάτων εκείνη τη στιγμή.","h2Relationship":"4. Σχέση με τους παρόχους SNS","relationshipBody":"Το Tutti αυτοματοποιεί το web UI (ή, προαιρετικά, δημοσιεύει μέσω του επίσημου API) των 11 υποστηριζόμενων δικτύων. Αυτή είναι ανεπίσημη λειτουργικότητα· το Tutti δεν συνδέεται με X, Bluesky, Meta (Threads / Instagram), Mastodon gGmbH, Misskey, Tumblr, Pixiv, DeviantArt, TikTok ή YouTube. Παραμένετε δεσμευμένος από τους όρους χρήσης κάθε υπηρεσίας.","h2Contact":"5. Επικοινωνία","contactGitHub":"GitHub Issues:","contactEmail":"Email:","h2Changes":"6. Αλλαγές σε αυτήν την πολιτική","changesBody":"Οι ενημερώσεις αυτής της πολιτικής επικοινωνούνται με την ενημέρωση αυτής της σελίδας και του κανονικού αρχείου πηγής (<a href=\"https://github.com/komm64/tutti/blob/main/PRIVACY.md\">PRIVACY.md</a>)."},"support":{"title":"Tutti — Υποστήριξη","headerTagline":"Πόροι υποστήριξης και Συχνές Ερωτήσεις","h2Help":"Χρειάζεστε βοήθεια;","h3Failed":"1. Η δημοσίευση απέτυχε / κάτι συμπεριφέρεται περίεργα","failedBody":"Χρησιμοποιήστε το <strong>κουμπί &laquo;Διάγνωση&raquo; → &laquo;Αναφορά&raquo; μέσα στο popup</strong>. Αυτό είναι το κανονικό κανάλι. Η αναφορά επεξεργάζεται (handles, URLs, emails) και προωθείται στον ιδιωτικό μας ιχνηλάτη ζητημάτων, όπου ανοίγει αυτόματα ένα PR διόρθωσης επιλογέα και ωθείται ως hot-fix σε όλους τους χρήστες εντός ημερών.","calloutTitle":"Γιατί να χρησιμοποιήσετε το κουμπί αναφοράς εντός του προϊόντος;","calloutBody":"Η ροή αναφοράς του popup επισυνάπτει αυτόματα την τελική κατάσταση σύνθεσης, ένα επεξεργασμένο στιγμιότυπο DOM και τα αποτελέσματα του ελέγχου επιλογέων — ακριβώς αυτό που χρειάζεται για να διορθώσει γρήγορα τη ζημιά επιλογέα. Τα PII αφαιρούνται μέσω πολλαπλών επιπέδων πριν την αποστολή.","h3General":"2. Γενικές ερωτήσεις / αιτήματα λειτουργιών","generalBody":"Στείλτε μας email στο <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>. Αυτό είναι ιδιωτικό κανάλι, ασφαλές για κοινή χρήση στιγμιοτύπων / προσωπικών handles.","h3Install":"3. Ερωτήσεις εγκατάστασης / λογαριασμού","installBody":"Το Tutti <strong>επαναχρησιμοποιεί τις υπάρχουσες συνδέσεις σας στον περιηγητή</strong> για κάθε κοινωνικό δίκτυο. Δεν υπάρχει ξεχωριστός λογαριασμός Tutti ή βήμα σύνδεσης. Μόλις συνδεθείτε σε ένα κοινωνικό δίκτυο στο ίδιο προφίλ Chrome, το Tutti μπορεί να δημοσιεύσει από εκεί.","h2Faq":"Συχνές Ερωτήσεις","q1":"Ε. Η δημοσίευσή μου απέτυχε.","a1":"Αυτό συνήθως σημαίνει ότι ένα κοινωνικό δίκτυο άλλαξε το DOM του. Χρησιμοποιήστε <strong>Διάγνωση → Αναφορά</strong> στο popup. Ένα hot-fix επιλογέα συνήθως αποστέλλεται εντός ημερών μέσω της αυτόματης ενημέρωσης του <code>selectors.json</code> (δεν απαιτείται ενημέρωση επέκτασης).","q2":"Ε. Το Tutti δεν θυμάται τη σύνδεσή μου.","a2":"Το Tutti βασίζεται στην κανονική σύνδεση του δικτύου από τον περιηγητή. Συνδεθείτε πρώτα σε κάθε δίκτυο στο Chrome και, στη συνέχεια, το Tutti μπορεί να δημοσιεύσει για λογαριασμό σας. Η κατάσταση ανώνυμης περιήγησης δεν λειτουργεί επειδή οι συνεδρίες του δικτύου δεν υπάρχουν εκεί.","q3":"Ε. Τα όρια χαρακτήρων διαφέρουν ανά δίκτυο — είναι πρόβλημα;","a3":"Όχι. Οι μακροσκελείς αναρτήσεις που υπερβαίνουν το όριο χαρακτήρων ενός δικτύου χωρίζονται αυτόματα σε νήμα συνέχειας (στο X, μια κανονική αλυσίδα απαντήσεων· σε άλλα δίκτυα, διαδοχικές αναρτήσεις). Οι αναρτήσεις εντός του ορίου περνούν ως έχουν.","q4":"Ε. Μου λένε ότι η εικόνα / το βίντεό μου είναι πολύ μεγάλο.","a4":"Οι εικόνες αλλάζουν αυτόματα μέγεθος μέσω Canvas για να ταιριάζουν στο όριο μεγέθους κάθε δικτύου. Τα βίντεο συμπιέζονται αυτόματα με ffmpeg.wasm όταν είναι πάνω από το όριο ενός δικτύου. Εάν ακόμη και η συμπίεση δεν χωράει, θα δείτε σφάλμα — επαληθεύστε πρώτα ότι το αρχείο μεταφορτώνεται μέσω της εγγενούς εφαρμογής του δικτύου.","q5":"Ε. Βλέπει το Tutti το περιεχόμενο των αναρτήσεών μου;","a5":"Όχι. Το περιεχόμενο των αναρτήσεων δεν περνά ποτέ από διακομιστή τρίτου. Το Tutti εγχέεται απευθείας στη σελίδα σύνθεσης ιστού κάθε δικτύου. Δείτε την <a href=\"./privacy.html\">Πολιτική απορρήτου</a> μας για λεπτομέρειες. Η μοναδική εξαίρεση είναι όταν πατάτε το κουμπί αναφοράς εντός του προϊόντος, το οποίο στέλνει επεξεργασμένες πληροφορίες σφάλματος στον ιδιωτικό μας ιχνηλάτη ζητημάτων.","q6":"Ε. Μπορώ να κάνω δωρεά;","a6":"Όχι ακόμη — εργαζόμαστε σε ένα χαμηλής πίεσης κανάλι υποστήριξης. Το μεγαλύτερο συνεχιζόμενο κόστος είναι η παρακολούθηση των αλλαγών UI κάθε κοινωνικού δικτύου· οι μελλοντικές ροές Ko-fi θα χρηματοδοτήσουν αυτήν τη συντήρηση."}},"en":{"lang":"en","common":{"appName":"Tutti","tagline":"One Chrome extension. Eleven social networks. Zero hassle.","navHome":"Home","navGitHub":"GitHub","navSupport":"Support","navPrivacy":"Privacy Policy","navLanguages":"Other languages","footerCopy":"&copy; 2026 komm64 &mdash; <a href=\"https://github.com/komm64/tutti/blob/main/LICENSE\">All Rights Reserved</a>","footerContact":"Tutti is a Chrome extension by <a href=\"https://github.com/komm64\">komm64</a>. Contact: <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>"},"index":{"title":"Tutti — Cross-post extension","headerTagline":"One Chrome extension. Eleven social networks. Zero hassle.","h2Overview":"Overview","overviewBody":"Tutti broadcasts the same post to 11 social networks (X, Bluesky, Threads, Tumblr, Mastodon, Misskey, Pixiv, TikTok, YouTube Shorts, Instagram, DeviantArt) in one click. It has no backend; post content never passes through any third-party server.","h2PrivacySummary":"Privacy in one sentence","privacySummaryBody":"Tutti has no backend server. Post content (text, images, video) goes directly from your browser to each social network you select — never via any developer-controlled server.","privacyFullPolicy":"Full policy:"},"privacy":{"title":"Tutti — Privacy Policy","headerTagline":"No third-party data collection. All post content goes directly from your browser to each SNS.","lastUpdated":"Last updated: 2026-05-23 (v0.5.0)","h2Data":"1. Data we collect and transmit","dataIntro":"<strong>Tutti has no backend server.</strong> Post content (text, images, video) is never transmitted to any third-party server. It travels directly from your browser to each social network you select, exactly as if you had typed and submitted it there yourself.","dataLi1":"Post text, images, and video are passed only to the SNS pages you choose (X, Bluesky, Threads, Mastodon, Misskey, Tumblr, Pixiv, DeviantArt, Instagram, TikTok, YouTube) within your browser.","dataLi2":"When the optional official-API path is enabled for Bluesky / Mastodon / Misskey, posts are sent directly from your browser to <strong>that SNS's own API server</strong> using credentials you supplied in Settings. No Tutti / developer server is involved.","dataLi3":"No analytics, tracking, or advertising data is collected.","dataLi4":"Tutti does <strong>not</strong> read or store your authentication tokens, cookies, or session data from the SNS sites.","h3Report":"Exception — manual error reports (opt-in per click)","reportIntro":"When (and only when) you press the <strong>&ldquo;Report&rdquo; button</strong> shown in an error dialog or the diagnose panel, the following is sent through a Cloudflare Workers relay to a <strong>private GitHub issue tracker</strong> (<code>komm64/tutti-issues</code>, viewable only by the Tutti developer):","reportLi1":"The error message, extension version, browser User-Agent string.","reportLi2":"The last 30 entries of the extension's internal log (the log level you configured; INFO by default). Post content, images, video, SNS login data, and API credentials are <strong>never</strong> included.","reportLi3":"A redacted DOM snapshot of the SNS tab where the error occurred, used to repair broken selectors. Text content, attribute values, URL paths/queries/fragments, <code>href</code>/<code>src</code> attributes, and <code>&lt;meta&gt;</code>/<code>&lt;link&gt;</code> tags are stripped. The payload is capped at 8 KB. See <a href=\"https://github.com/komm64/tutti/blob/main/src/utils/dom-snapshot.ts\">dom-snapshot.ts</a> for the implementation.","reportOutro":"Nothing is sent until you press the report button. The destination is private, viewable only by the Tutti developer.","h2Local":"2. Locally stored data","localIntro":"The following is stored only inside your browser via Chrome's <code>storage</code> API. Nothing is transmitted off-device by Tutti.","localSettings":"<strong>Settings</strong> (<code>chrome.storage.sync</code>): Mastodon / Misskey instance URLs, autoPost toggle, display mode, selector override URL, etc. May be replicated to your other devices via Chrome Sync if you are signed into Chrome.","localDrafts":"<strong>Drafts</strong> (<code>chrome.storage.session</code>): In-progress post text and attached media (images / video). Auto-cleared when the browser exits.","localSelected":"<strong>Selected SNS</strong> (<code>chrome.storage.local</code>): The SNS you ticked as post targets. Persists across sessions for convenience; device-local only.","localUsers":"<strong>Last seen usernames</strong> (<code>chrome.storage.local</code>): The currently-logged-in username on each SNS, displayed in the popup so you can confirm which account will receive the post. Device-local only.","localHistory":"<strong>Post history</strong> (<code>chrome.storage.local</code>): The last 20 posts: first 80 characters of text, target platforms, success/failure per platform, and timestamp. Device-local only.","localCreds":"<strong>API credentials</strong> (<code>chrome.storage.local</code>): Only if you explicitly enabled the official-API path for Bluesky / Mastodon / Misskey: your Bluesky app password or Mastodon / Misskey access token. <strong>Device-local only; never replicated via Chrome Sync; never transmitted to any developer server.</strong> Removable from the Settings wizard.","localSelectors":"<strong>Selector override cache</strong> (<code>chrome.storage.local</code>): Selector hot-fix data fetched from the URL you configured in Settings (default: the public <code>selectors.json</code> on Tutti's GitHub Pages).","localVideoCap":"<strong>Video upload limit cache</strong> (<code>chrome.storage.local</code>): Result of API probes for per-account video upload caps (e.g., Bluesky). Numeric values only; no credentials.","localWipe":"All of this can be wiped at any time by uninstalling the extension or clearing Chrome's extension storage.","h2Perms":"3. Permissions used","permsThead1":"Permission","permsThead2":"Purpose","permsStorage":"Store the local data above (settings, drafts, history, selected platforms, etc.) inside your browser.","permsOffscreen":"Run <code>ffmpeg.wasm</code> in an offscreen document to compress / re-encode video files when the source exceeds the destination SNS's size cap. Video data is processed locally only; not transmitted anywhere by Tutti.","permsSidePanel":"Optional UI display mode: show Tutti's compose form in Chrome's side panel instead of the action popup, so it stays open while you switch between SNS tabs. You opt in via the Options page; default is the standard popup.","permsHost":"Inject content scripts into each SNS site (x.com / twitter.com / bsky.app / bsky.social / threads.net / threads.com / mastodon.social / misskey.io / tumblr.com / pixiv.net / tiktok.com / youtube.com / instagram.com / deviantart.com) to fill the compose form with your post content and submit it, on your behalf. No data is read from these sites and sent elsewhere; the content script only writes your own input.","permsOptHost":"Requested at runtime only if you configure a custom Mastodon or Misskey instance URL (other than the defaults). Chrome shows the standard permission prompt at that moment.","h2Relationship":"4. Relationship with the SNS providers","relationshipBody":"Tutti automates the web UI of (or, optionally, posts via the official API of) the 11 supported networks. This is unofficial functionality; Tutti is not affiliated with X, Bluesky, Meta (Threads / Instagram), Mastodon gGmbH, Misskey, Tumblr, Pixiv, DeviantArt, TikTok, or YouTube. You remain bound by each service's own terms of use.","h2Contact":"5. Contact","contactGitHub":"GitHub Issues:","contactEmail":"Email:","h2Changes":"6. Changes to this policy","changesBody":"Updates to this policy are communicated by updating this page and the canonical source file (<a href=\"https://github.com/komm64/tutti/blob/main/PRIVACY.md\">PRIVACY.md</a>)."},"support":{"title":"Tutti — Support","headerTagline":"Support resources and FAQ","h2Help":"Need help?","h3Failed":"1. Posting failed / something behaves oddly","failedBody":"Use the <strong>&ldquo;Diagnose&rdquo; &rarr; &ldquo;Report&rdquo; button inside the popup</strong>. This is the canonical channel. The report is redacted (handles, URLs, emails) and forwarded to our private issue tracker, where a selector fix PR is opened automatically and pushed as a hot-fix to all users within days.","calloutTitle":"Why use the in-product Report button?","calloutBody":"The popup's Report flow automatically attaches the final compose state, a redacted DOM snapshot, and selector audit results — exactly what's needed to fix selector breakage fast. PII is stripped through multiple layers before sending.","h3General":"2. General questions / feature requests","generalBody":"Email us at <a href=\"mailto:contact@komm64.com\">contact@komm64.com</a>. This is a private channel, safe to share screenshots / personal handles wit
