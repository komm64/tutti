<!--
  X (twitter.com / x.com) home inline compose の縮小 fixture (v0.4.66〜)。
  thread chaining は v0.4.66 で捨てて、 chunks > 1 は generic chunks loop で
  別 tweet として post する方針に変更 (user 報告 「X 完全失敗」、 Add post button
  が anchor になって navigation を引き起こすため)。
  v0.4.66 で home `/home` の inline compose に戻った。
-->
<html>
<body>
<div role="main">
  <div data-testid="primaryColumn">
    <div data-testid="toolBar">
      <input type="file" data-testid="fileInput" multiple style="display: none">
    </div>
    <div role="region" aria-label="Compose post">
      <div data-testid="tweetTextarea_0RichTextInputContainer">
        <div data-testid="tweetTextarea_0" role="textbox" contenteditable="true" aria-multiline="true" aria-label="Post text">
          <div><br></div>
        </div>
      </div>
      <div role="group">
        <button data-testid="tweetButtonInline" role="button" aria-label="Post">
          <span>Post</span>
        </button>
        <button data-testid="tweetButton" role="button" aria-label="Post">
          <span>Post</span>
        </button>
      </div>
    </div>
  </div>
</div>
<main>
  <input type="file" data-testid="fileInput" multiple style="display: none">
</main>
</body>
</html>
