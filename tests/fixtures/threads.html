<!-- Threads compose modal の縮小 fixture -->
<html><body>
<div role="dialog" aria-label="New thread">
  <div role="textbox" contenteditable="true" aria-label="Start a thread...">
    <p><br></p>
  </div>
  <input type="file" accept="image/jpeg,image/png,image/webp,video/mp4" multiple style="display:none">
  <div role="button" data-pressable-container="true" aria-label="Post">
    <span>Post</span>
  </div>
</div>
</body></html>
