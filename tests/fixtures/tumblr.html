<!-- Tumblr Gutenberg post dialog の縮小 fixture -->
<html><body>
<div role="dialog" aria-label="New post">
  <div data-testid="gutenberg-editor">
    <div class="block-editor-rich-text__editable" role="document">
      <h1 contenteditable="true">Title</h1>
      <p contenteditable="true">Body</p>
    </div>
    <div class="components-drop-zone"></div>
  </div>
  <input type="text" aria-label="#tags" placeholder="#tags" />
  <button data-testid="postFormPostButton" aria-label="Post now">Post now</button>
</div>
</body></html>
