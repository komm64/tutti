name: Auto-triage Tutti issue

# Tutti の selector breakage 報告 issue (label: needs-triage) を Claude に渡し、
# selector 候補 PR を作るワークフロー。
#
# 認証: Claude Code Max サブスクリプション の OAuth token (CLAUDE_CODE_OAUTH_TOKEN)
# 使用。pay-per-token API key ではなく Max sub quota を消費する。
#
# Token 生成 (1 回限り):
#   ローカルで `claude setup-token` を実行 → 表示されたトークンを repo secret
#   `CLAUDE_CODE_OAUTH_TOKEN` に登録 (Settings → Secrets and variables → Actions)
#
# 公式 action: https://github.com/anthropics/claude-code-action

on:
  issues:
    types: [opened, labeled]

jobs:
  triage:
    # needs-triage が付いていて、まだ auto-triaged されていない issue だけ
    if: |
      contains(github.event.issue.labels.*.name, 'needs-triage') &&
      !contains(github.event.issue.labels.*.name, 'auto-triaged')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup git identity for auto-PR
        run: |
          git config user.name "claude-triage[bot]"
          git config user.email "claude-triage[bot]@users.noreply.github.com"

      - name: Run Claude triage
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            あなたは Chrome 拡張 Tutti の SNS adapter 壊れた selector の修正担当。

            ## 入力 issue
            - number: #${{ github.event.issue.number }}
            - title: ${{ github.event.issue.title }}
            - body は `gh issue view ${{ github.event.issue.number }} --json body -q .body`
              で取得できる

            ## 手順

            1. `gh issue view ${{ github.event.issue.number }} --json body -q .body` で
               issue body を取得
            2. body 中の `<!-- tutti-diagnostics-begin -->` ... `<!-- tutti-diagnostics-end -->`
               の間にある JSON コードブロックを抽出して parse
            3. JSON.platforms の中から、`selectors[].matchCount === 0` を持つ最初の
               platform を特定。無ければ "no selector miss" コメントを issue に付けて
               `auto-triaged` ラベルを add して終了
            4. 該当 `src/adapters/<platform>.ts` を Read。current selector の文字列が
               verbatim で含まれてなければ `auto-triaged` ラベル + コメントだけで終了
            5. 同 platform エントリの `domSnapshot` (redacted DOM HTML) を読む。
               記号: `<t/>` = redacted text、`<v/>` = redacted value 属性、
               `<u/>` = redacted URL
            6. snapshot から新 selector を提案する。信頼できる anchor は
               aria-label / role / data-testid / id / class
            7. Confidence 自己評価:
               - snapshot に該当しそうな要素が無ければ confidence=0、PR 作らず
                 issue にコメント (理由付き) + `auto-triaged` ラベル
               - confidence < 0.6 なら同様にコメントだけ + ラベル
               - confidence >= 0.6 なら次の手順で PR 作成
            8. PR 作成手順 (confidence >= 0.6 のとき):
               a. `src/adapters/<platform>.ts` を Edit。古い selector を新 selector に
                  置換 (後方互換のため `"OLD, NEW"` のカンマ列にすると安全)
               b. `docs/selectors.json` を Edit。`{ <platform>: { <name>: <newSelector> } }`
                  を merge する形で追加。既存キーが無ければ作る
               c. `git checkout -b fix/auto-triage-<platform>-${{ github.event.issue.number }}`
               d. `git add` と `git commit -m "fix(<platform>): auto-triage selector update from #<issue>"`
               e. `git push -u origin <branch>`
               f. `gh pr create` で PR 作成。base=main、本文には:
                  - `Fixes #${{ github.event.issue.number }}`
                  - Selector update の old/new と confidence
                  - Reasoning (snapshot のどこから判断したか 1-3 文)
                  - 「自動生成 PR、merge 前に新 selector を実機で確認」の警告
                  - hot-fix 配信について 1 文
            9. 最後に必ず:
               - issue にコメント (PR URL or skip 理由を含む)
               - `gh issue edit ${{ github.event.issue.number }} --add-label auto-triaged`

            ## 重要な制約
            - confidence は厳しめに自己評価する。低確度の推測で PR を量産しない
            - `auto-triaged` ラベルは **必ず最後に付ける** (PR 作成 / skip コメント
              のあと)。失敗で途中終了したらラベル無し → 次回 polling で再試行される
            - merge 判断は人間がやる。あなたは PR を作るところまで
            - GitHub Pages 経由 (`https://komm64.github.io/tutti/selectors.json`)
              で `docs/selectors.json` が配信されるので、merge 後数分で全ユーザに
              hot-fix が届く。だから docs/selectors.json も必ず更新する
          claude_args: "--max-turns 30"
